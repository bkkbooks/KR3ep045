body:
  text: 卷之四案汪善章風邪客肺咳久肺虛治驗汪善章年五旬嘉慶己未春初因風邪客肺咳久肺虛肝木侮金纏綿不已宜先散肺邪白花百合一兩後入防風二錢旋覆花一錢半絹包前胡一錢半橘紅一錢蘇梗一錢河水一碗半先煎五味至一碗去渣投前白花百合煎至將爛連湯一起嚼服服此三劑咳全愈案治陳元隆咳嗽痰不易出肺脾氣虛之驗陳元隆年逾五旬咳嗽痰稠不易出脈右虛弦肺氣虧而中氣虛速治為妥北沙參三錢款冬花三錢叭噠杏三錢去皮尖蘇子一錢半炒冬桑葉一錢半炙甘草八分白茯苓二錢百合三錢加老枇杷葉三大片拭毛蜜炙服三劑咳平痰易出少有喘咳未除肺氣漸降脾土尚欠溫和於益氣養肝中少佐補火生土法是謂上策復診方附後西黨參二錢淮山藥三錢炒白茯苓二錢百合三錢建蓮肉三錢去心炒制首烏三錢女貞子三錢甘草八分炙叭噠杏三錢去皮尖益智仁二錢加紫衣胡桃肉兩枚服四帖而痊案鄒上珍素好飲酒徹夜不寐兩耳常鳴治驗鄒上珍年逾四旬素好飲酒厚味不禁歷有年矣忽於嘉慶戊寅春得徹夜不寐症兩耳常鳴遍訪醫治月餘來毫無一效因邀余診余始作中虛濕阻挾痰治不應又以歸脾法兼以安神鎮肝之劑服數帖亦不應又更醫醫以溫膽珍珠母等法經半月亦不應手於三月初一日仍復求治於余余再諦審病情兼察色脈左脈細數知其陽有餘陰不足相火上炎以致兩耳常鳴目不瞑者兩月矣求一刻安臥竟不可得也於是處以四物湯為君配以鎮肝舒氣之法最後以酒浸炒龍膽草為引導之使服兩劑而耳鳴之聲漸低可以稍睡片刻於此加減出入治經一月而收全功方列於下大生地三錢歸身一錢半白芍藥一錢半炒川芎一錢製半夏一錢半丹皮一錢半炒煅龍齒三錢沉香一錢小青皮一錢枳實一錢石菖蒲八分陳皮一錢加陳酒浸炒龍膽草八分河水煎服復診原方去龍齒枳實陳皮青皮加制首烏遠志甘菊炭仍用酒浸炒龍膽草為引服兩劑三更時睡著約有一時至五更復又睡著半時耳鳴漸輕舌胎糙膩兩邊帶淡黃俱減數日來大葷雖戒其野味魚膻仍未忌是以舌苔濁膩究未能盡徹也復診仍用四物湯佐酒浸炒龍膽草加制洋參元參知母丹皮茯神菖蒲根五味子等煎服服後如前安妥不寐耳鳴俱減半矣竟有時不鳴惟燈後臨臥時則兩耳仍鳴較前卻輕多矣頭角牽痛已平小溲帶赤口淡不喜飲干而不渴復診用六味地黃湯加甘菊元參花粉苡仁甘草煎服服後舌苔溲赤等亦大減復診益陰降火調中除濕大生地三錢丹皮一錢半炒川黃柏一錢酒炒白芍一錢半炒五味子五分歸身一錢半生甘草八分苡仁三錢炒遠志肉一錢青皮一錢焦冬朮一錢半加沉香八分同煎服之如前安妥復診再以熟地歸芍知柏苓甘元參柏子仁炒棗仁輩煎服六劑安睡如前耳鳴更輕復診大熟地四錢山藥三錢炒當歸身一錢半白芍一錢半炒川石斛三錢茯苓二錢黑山梔一錢半炙草八分知母一錢半上藥九味煎好去渣投元武膠一錢煎烊燉服四五劑耳鳴不寐從此全瘳案太學張嵩山足跟漫腫疼痛進藥立愈太學張嵩山足跟漫腫疼痛關尺濡耎沉細悠關肝腎腎主骨肝主筋水不滋木更兼久立少坐此腫痛之所由生也或云足跟生疽何其兩足皆然議養水滋木法大熟地三錢山藥三錢炒當歸身一錢半木瓜一錢半山萸肉一錢半牛膝一錢半蒸菟絲子一錢半炒半夏一錢半制左牡蠣三錢煅加豬後蹄跟骨五錢用去油乳香一錢和白蜜調敷骨上放瓦上炙黃脆打碎同煎服兩帖足跟腫退疼痛頓止此方妙在豬後蹄跟骨以作引導之使故一劑知二劑已也案休邑程梅溪飲酒貪涼驟然嘔吐眩運之治驗太學程梅溪嘉慶戊寅八月初三因遊虎邱飲酒貪涼驟然嘔吐痰水有汗不喜飲舌苔膩白眼開即眩右關沉滑中宮受寒凝食法宜和中佐以溫舒年逾七旬勿輕視之薑製厚朴一錢製半夏一錢半淡茱萸二分陳皮一錢半廣藿香一錢赤茯苓三錢山楂炭三錢木香六分加炒出汗開口川椒五粒臨服入鹽花少些服後嘔吐漸止眼開不眩二便通利舌苔仍膩白口稍苦原方去厚朴茱萸加石斛焦穀芽雞內金煎服服後漸能進食而安案山西溫樹三暑濕內伏因誤治幾成消渴之驗山西溫樹三年二十五歲八月初五病由暑濕內伏邪熱未楚醫投清脾飲溫燥之劑不但熱未清而反增口渴喜飲醫又投四苓加沙參黃芩白芍輩以清利之服後舌色純紅舌尖芒刺無津比前尤渴日飲茶數十碗而不能解其渴因就診於余右脈浮數渴飲無度知其熱在氣分幾成消症於是以白虎湯加竹葉麥冬治之渴飲頓減熱亦漸徹即於方中加鮮石斛服之渴減七八舌尖紅刺漸退而潤再以生地丹皮花粉麥冬元參知母甘草竹捲心輩三劑而瘳案山西宋藹堂暑濕內蘊由單寒而轉瘧之驗山西宋藹堂戊寅仲秋暑濕內蘊由單寒而轉瘧寒輕熱盛頭重且脹小溲濃赤舌膩如粉脈右大左弦細延綿有日速治為妥羌活一錢半藁本一錢半半夏曲一錢半炒黃芩一錢半草果一錢煨廣藿香一錢半瓜蔞仁三錢滑石三錢甘草六分黑山梔一錢半赤茯苓三錢知母一錢半用西瓜汁一碗入生薑汁半小酒杯和勻再加河水一碗同煎至一碗服服藥後寒至未一刻熱來未半時自覺氣從頭頂緩緩至兩顴而下達胸胃自此頭頂不重兩太陽尚少有疼意小便濃赤亦減舌苔亦薄次日原方去藁本瓜蔞山梔加青陳二皮煎法如前再劑瘧止諸恙向安矣附案先大人治山西陳慈民癉瘧奇效又治畢永年之癉瘧仿白虎加桂並小柴胡湯之意而化出妙方即愈可與山西陳慈民之方合參先大人我舟公嘉慶元年七月十四日治山西陳慈民單熱不寒癉瘧之象脈數不洪舌苔尚白口雖干而不喜多飲暑熱內伏早投黃連以致遏邪應用和解法用西瓜汁一碗半生薑汁半小酒杯約重三錢和勻入製半夏廣藿梗枳殼陳皮各一錢五分六神麯三錢柴胡三分同煎至碗上八分服服此一帖至夜未熱自覺鬆爽進飯一碗予嫌其過先大人又治畢永年癉瘧十數發不止脈大身熱有汗而渴入夜則發天明方退先傷於暑而後傷於風也仿白虎加桂並小柴胡湯之意而化出妙方一帖即愈快甚快甚此我得意之筆可與山西陳慈民之方合參亦大同小異也嘉慶元年八月二日西瓜汁一碗半生薑汁半小酒杯約重三錢和勻入製半夏二錢廣藿香一錢半神麯三錢炒陳皮一錢半柴胡一錢小青皮一錢大棗兩枚去核將前二汁代水煎至碗上八分服之案甄湘文得食即嘔吐治驗甄湘文九月初三日脈象沉滑得食則嘔病經四日擬和胃運食法薑製半夏二錢赤苓三錢廣藿梗一錢半神麯三錢炒焦穀芽三錢木香六分加左金丸四分研細藥湯沖服一劑而愈案治歙縣汪吉士喘症垂危臥不著枕陡然汗出如淋立刻救蘇奇效並詳論收功調理丸方用藥配合善後之法徽歙汪吉士喘症危候年逾四旬於道光二年三月二十三日診素有喘症舉發無時向延他醫治屢發屢平邇來發之甚劇於是月二十二午後因登圊陡然汗出如雨舌根強不克多言氣急神呆醫以生脈飲重加熟地八錢牡蠣一兩熟附子六分煎服後漸自汗少氣緩而痰咳甚艱自云要從臍下咳出凡咳從臍下逆上皆屬腎氣不固也咳時必有汗出氣急之狀小溲熱而赤其痰純是白沫日咳數盂兩月來頭不著枕喘不能臥惟以被褥厚壅其背而倚臥之據述每咳有濃厚之黃痰出始能安臥刻下五六日一發神疲難支精力日敗特求救於余余診其脈右三部細軟如綿左脈寸小關弦尺濡知其腎水素虧相火易升又值斷絃納妾之際陰分更虧無疑然喘而不能臥如平人者此又關於肺氣之虛蓋人臥則金氣藏於腎宮今肺氣畏火刑金則母不能隱於子胎其為氣虛者又可知歷閱前方皆以養陰為主地黃亦用之無算而喘症終屢發無休深慮陡然一脫既然望治情殷必需亟固肺氣兼理脾胃俾肺金得令相火下降脾土一健而胃中之水濕不停則肺中之濁痰亦清要之調脾肺尤甚於養陰則可專一於滋陰而不補脾肺則不可況地黃輩群陰之藥惟能膩膈滯脾更無所取及今加意亟固猶恐上脫豈可慢用滋膩之品而日伐肺脾之生氣耶今擬益氣定喘之法以冀轉機人參八分另煎沖淮山藥三錢炒蛤粉炒阿膠三錢茯苓一錢半炙草六分叭噠杏三錢去皮尖左牡蠣一兩煅塊北五味子五分研加紫衣胡桃肉一枚連鬲板用服一帖氣漸平神漸安痰沫雖多咳時氣急汗出卻減小便帶赤出時不熱腹中知飢因藥合宜二十四日仍將原方去人參私加黨參四錢照方服之亦甚妥復診三月二十五日西黨參五錢焦冬朮一錢半扁豆三錢炒苡仁五錢炒陳阿膠三錢蛤粉炒制首烏四錢茯苓二錢炙草八分叭噠杏三錢去皮尖五味子六分研加紫衣胡桃肉一枚連鬲板大南棗三枚去核服兩帖氣喘之勢又減痰沫咳出如前日間稍厚夜間仍有盈盂之白沫痰向日用被五條加兩枕倚靠而睡今可去枕而臥食飲稍增小便不赤舌胎膩黃亦減復診廿七日西黨參五錢山藥三錢炒白扁豆三錢炒款冬花三錢制首烏三錢百合四錢女貞子三錢五味子六分研陳阿膠三錢蛤粉炒茯苓一錢半炙甘草八分白石英三錢煅加銀杏十四粒去心衣大南棗三枚去核臨服入生薑汁和胃化痰極炒六分沖服服兩帖喘勢大緩白沫痰竟減其半食飲日增惟夜半尚咳嗆幾聲而痰肯出且稍厚大便日解不溏不結安妥之至足徵藥之效也二十九日原方再兩劑夜睡可用一被一枕而倚臥之且夜間咳痰不過數口較前大相遠矣復診四月初二日生黃耆二錢鹽水炒北沙參三錢山藥三錢炒苡仁五錢炒蛤粉炒阿膠三錢柏子仁三錢茯神二錢天冬一錢半去心枸杞子三錢益智仁八分五味子五分研加大南棗四枚去核生薑汁六分沖服兩帖後睡時不用枕被而安臥如平人復診初四日調脾保肺兼養腎肝西黨參五錢制西洋參一錢半蛤粉炒阿膠三錢炙草八分制首烏四錢炙鱉甲三錢大南棗四錢去核芡實三錢炒白茯苓二錢白扁豆四錢炒紫沉香二分加白石英三錢煅紅醋碎每交四鼓必咳嗆幾聲痰出而安其餘俱平妥矣余用連皮胡桃肉五枚白冰糖五錢同搗極爛搓如桂圓大至咳時以一圓噙化取其生津寧嗽至時含之果然奇妙復診初七日喘止咳平食增睡安大小便如常惟痰味帶咸脈象軟小乏力尺脈濡細法宜調坤土以助乾金壯坎水以滋震木則子有受蔭之樂母無食氣之虞得其意者可與論治人參六分另煎沖於潛術一錢半土炒茯苓一錢半炙甘草八分元武膠一錢烊化菟絲子一錢半炒天冬一錢半去心海蛤粉三錢煅紫衣胡桃肉一枚連鬲加豬脊髓三條煎湯代水候藥煎好去渣投龜膠熔化將藥湯倒碗中再以參湯沖服服此三劑精神更健痰味不咸四月初十日復診用歸芍六君子加制首烏女貞益智蛤粉輩間以五味異功四君等加一二養水滋木之法而收全功亦再生之幸也第六脈未知肌體未豐精神未足元氣未充此際首重在節欲養氣為緊要關頭蓋氣乃神之祖精乃氣之子氣者精神之根蒂也大矣哉積氣以成精積精以全神於此而加意求之再繼之以丸庶幾無遺憾矣丸方列下何首烏八兩用馬料豆四兩同煮爛去豆銅刀切片蒸曬九次入後藥搗和元武膠二兩切片炒珠鹿角膠二兩切片炒珠白醜筋四兩切片用黃土同炒黃色篩去土用白花百合五兩曬乾焙黃明膠三兩揀明亮細條用海蛤粉二兩同炒珠叭噠杏仁二兩去皮尖炒兔絲子三兩酒浸焙研益智仁一兩五錢白茯苓二兩人乳浸蒸炙甘草一兩五錢新會皮一兩五錢陳醬油浸焙淮山藥四兩用生薑汁拌焙上藥十三味如法制焙共為細末內首烏搗和再用炙黃耆五兩西黨參五兩用長流水煎膏代蜜為丸如桐子大每服五錢清晨滾水送下是喘也屬脾肺腎三經而兼乎肝方中扶脾保肺滋腎養肝等法在所必需而熟地之所以不用者因其膩膈而究非脾土之久虧者所宜也方中侑以首烏元武阿膠輩亦是養陰壯水之要藥第非熟地之性泥滯膈可比耳用藥用兵設不細心揣摩何能深中肯綮耶數年之喘得余藥十有餘劑而喘咳痰嗽頓平足徵活法在人非筆舌所能罄者案王宇葵脾陽不運胸脅脹痛便泄兼嘔酸之驗王宇葵年逾三旬四月二十三日脾陽不運胸脅脹痛便溏溲赤右關遲耎左關弦細病關脾胃甚則嘔酸木邪乘土當理中焦焦冬朮一錢半白扁豆三錢炒苡仁五錢炒茯苓三錢益智仁一錢淡乾薑八分炒陳皮一錢半炙草七分加砂仁末三分沖服兩帖日間不脹不痛至日落後覺兩脅有脹痛之勢二十五日復診原方去苡仁加西黨參廣藿梗各一錢五分服四帖後早晚脹痛俱平大便不溏小溲漸淡二十九日診用六君子湯加乾薑木香扁豆青皮砂仁輩調理而康案山西曹伯侯腳氣常發發時腿膝脹痛甚則寒熱手臂肩背皆不能舉動治之屢效曹門人乃尊伯侯素有腳氣舉發無時嘉慶戊寅六月告診年逾四旬體肥身大好啖厚味濕面脈象沉細腿膝脹痛右甚於左濕氣內侵下達為順最怕上升擬疏通法獨活一錢半當歸一錢半懷牛膝一錢半木通一錢秦艽一錢半陳皮一錢半小青皮一錢苡仁三錢木香八分甘草六分制香附三錢豬苓一錢半加蔥須五枚服兩帖全愈案妹倩王履安丹症寒熱額痛咽疼極險奇驗妹倩王履安兄嘉慶戊寅十月二十六日丹症治驗始於額痛喉疼寒熱舌苔白膩當用羌防甘桔藁本殭蠶牛蒡馬勃桑白皮干浮萍草煎服次日天明微汗頭額痛緩而面額頸項俱發作紅丹成塊大小不一光亮而痛於外內痛大減仍先寒後熱喉痛未減早輕午重時有囈語脈形浮弦左大右小再以荊芥牛蒡酒炒黃芩連翹葛根蟬衣生地薄荷甘桔輩清疏之使素蘊之風熱丹毒出表為最服後寒熱俱輕額痛十減六七惟丹塊愈覺高突足徵丹毒外達之象故胸膈不悶語言清楚三日間頭面手臂肢體俱發丹毒大如胡桃小如蠶豆此即時行丹毒大頭疙瘩瘟之類也當以家制霞城散水調塗丹頃之痛減高突漸平而寒熱未罷口乾欲嘔小溲色赤究竟邪毒未盡即於前方去葛根蟬衣生地加花粉山梔貝母滑石輩加雪梨肉二兩同煎服仍用霞城散水調塗甚妙服煎劑夜稍寐無亂語頭額之丹塊亦十平其七八惟兩顴耳後及唇下尚未大平肢臂下體之小塊亦稍平痛大減仍於前方損益之服後寒熱喉疼俱退盡而猶覺口中不爽自知難過而又不能言其所以然之故細審之此口糜也兼之鼻聲如齆經云心肺有病而呼吸為之不利也又曰膀胱移熱於小腸膈腸不便上為口糜治以苦寒之劑以辛溫佐之擬既濟解毒湯法以清余蘊之邪黃芩一錢半陳酒浸透炒川黃連一錢陳酒浸透炒桔梗一錢半甘草一錢半連翹殼一錢五分當歸一錢柴胡一錢升麻一錢河水煎服外仍用前藥如法塗之赤腫立平服後口糜十去其八項頤之塊亦俱起皺紋再以清火解毒二三劑大小丹粒漸自脫蓋其疤尚有一層白衣剝下宛如痘之託衣從此收功亦丹毒中之險症也案山西田德潤素有喘症因感而發極重治驗山西田德潤年五旬又六素有喘症今於十一月初二日因傷風而起西人好啖麵食葷日來不禁昨夜半忽然喘發不能臥胸脘悶背板如縛而喘聲一刻不停猶如抽風箱之聲特延余診其脈右寸浮緊關脈小滑知其風寒閉肺痰凝氣滯阻塞清道此喘之所由來也速宜疏肺定喘佐以豁痰順氣勢屬險途慎勿輕視蘇葉三錢防風一錢半豆豉三錢半夏曲一錢半甜葶藶一錢半米同炒杏仁三錢薤白三錢廣木香一錢桑白皮一錢半萊菔子四錢炒加青蔥管五寸長流水煎服服後未兩時喘漸停矣即能進粥頃之安臥毫無喘意效如桴鼓稱為仙丹快矣快矣案邢裕芳白濁治驗邢裕芳戊寅十一月初旬白濁半月服通利之劑罔效予以清降相火法佐以疏泄服四帖白濁漸減溺端不封惟小便時及完後少有針刺之象脈寸尺小數此相火未靜宜養陰以濟之濁自止矣大熟地三錢大生地三錢甘草八分茯苓二錢人參鬚五分另煎沖山萸肉二錢黃柏八分鹽水炒牡蠣四錢煅塊海金沙一錢半服四帖濁止去海金沙再服兩劑而安案海鹽張鐵珊堂侄身熱耳聾便秘治驗張鐵珊堂侄戊寅秋年十八歲身熱數日熱非壯熱口乾喜飲卻不多飲舌苔中央膩滯淡黃不飢納少問答尚清起坐自如兼之耳聾脈左大於右此暑伏濕閉之象也擬清解以和之方用小柴胡去參加葛根香薷瓜蔞皮赤苓花粉輩加藕煎服熱稍緩小溲增但舌根腐膩胎黃大便十有餘日未解有欲解未能之勢宿垢內蘊以解表通里法方用瓜蔞實豆豉檳榔枳實黃芩油當歸大腹絨七味煎好去渣入元明粉二錢沖服服此病如前惟舌根之腐膩黃胎十減其半復診熱緩頭尚重小溲赤大便欲解未能小腹氣緊即有轉失氣下夜來熱減而又有似寒之勢究竟邪未盡徹宿垢停滯二者兼治斯為善矣葛根一錢半蔓荊子一錢半秦艽一錢半小生地三錢丹皮一錢半炒黑山梔一錢半赤苓三錢生甘草六分黃芩一錢半炒上九味煎好去渣入更衣丸一錢藥湯送服後次日身熱漸退頭重亦平燈後解結糞尺餘一條頃之又結塊數枚自覺軟倦隨飲稀粥安臥復診再以小生地鮮石斛生穀芽甘草藿梗陳皮赤苓苡仁加荷蒂一枚兩劑而痊案伯岳陸鑑堂風邪上攻腦後魚尾二穴牽掣抽痛寒熱治法極效陸鑑堂伯岳十月初四風邪上攻腦後魚尾二處牽掣抽痛寒熱舌苔淡黃邊白脈象浮軟小數速宜舒解退熱恐高年人難以勝任蔓荊子一錢半羌活八分藁本一錢薄荷一錢炒池菊一錢陳皮一錢炒穀芽三錢楂肉三錢炒加荷葉邊一小個同煎服後未幾得微汗即覺腦後魚尾二處牽掣抽痛頓松至晚十去其八身熱漸退飲粥碗許而愈案馬元奎子初生胎毒腿胯浸淫濕爛治驗馬元奎子產未一月腿胯浸淫濕爛皮損波及陰囊此胎毒也當用熟石膏黃丹研粉以新綿蘸搽患處內用生甘草銀花綠豆皮三味煎湯用新綿裹如奶頭式蘸藥湯與吮日四五度據述如法服之並搽藥後腿胯濕爛頓平且一夜安寧次日仍如前方煎服搽亦同前兩日而痊案山西任福泰大小腹痛則便泄治驗山西任福泰大小腹俱痛痛則大便溏泄早三二次晚五六次病起月餘脈左小右大尺浮腎陽虛而脾土虧兼之食積中宮當以理脾溫腎為主不得泛泛治痛服後方三帖腹痛大減便泄頓止制香附三錢廣木香六分淡茱萸三分枳殼一錢半破故紙一錢半焦穀芽三錢六神麯三錢炒烏藥一錢加生薑四片案張鳳梧小便涓滴有年舉發無期內如刀割症起於壯年溺情過度治法奇妙效如桴鼓之應張鳳梧小溲涓滴有年舉發無時於道光二年正月初十日延診小溲急數欲解出時涓滴不爽刻刻欲出出時溺竅不疼疼刺在半出未完之際如刀割刺痛難忍出未幾而頃之又欲出及出仍如前般日間數餘次口中覺干夜來頻出不爽坐直則腿中筋急溺管中即刺痛必得曲腰坐之則少安且溺時陰莖底面筋急則溺竅越覺痠疼之極若筋柔軟則安種種情事病由昔年溺情過度所致攸關厥陰肝木而兼乎陽明宗筋波及膀胱肺腎者有之況右脈之細軟左脈之弦急尺數非無自也第年逾六旬病根已久性急心活屢屢更醫縱有妙手亦難以建績也是證可與後之黃其祥之病合參大生地六錢清阿膠四錢炒珠秋石化水浸知母一錢半小青皮一錢人中白一錢漂淡鹽水炒川黃柏一錢黑山梔一錢半柴胡五分上八味制炒和勻聽後用先用生黃耆五錢生香附五錢研生苡仁一兩三味用原福珍酒一茶杯拌勻浸透約一炷香時再用乾荷葉一個不破者用熱水泡軟將酒浸之三味包於軟荷葉內線扎用井水三碗煎至一半去荷葉包以此湯煎前八味煎至碗上八分服之用方之意頗妙非深悉陰陽剛柔之理者亦難知其妙耳如法煎服小溲之急數出時之涓滴疼刺之難忍毫不覺矣誠對症之良劑也理宜加意調攝豈知病雖小愈而竟不復再視反恣啖厚味以為補無怪乎病根難除僉自誤之耳案海鹽張鐵珊調理脾腎膏滋方治驗海鹽太學張鐵珊膏滋方道光元年冬十月初一日肝陰不滋責諸腎水之少脾陽不運由於命火之虛而補火補水之外亦宜補肺蓋肺為腎母母足則子有受蔭之樂肺為脾子子足則母無食氣之虞得其意者可與論治大熟地八兩搗元武膠二兩膏成烊化鹿角膠六兩膏成烊化山藥四兩炒枸杞子三兩山萸肉三兩菟絲子四兩蒸歸身二兩肉蓯蓉二兩酒洗補骨脂二兩炒西黨參五兩黃耆三兩炙建蓮肉六兩去心益智仁二兩炙甘草一兩半茯神二兩淨砂仁一兩半上藥十五味如常法用長流水浸煎至膏成再將龜鹿二膠和入烊化調勻懸掛井中一宿取起再退火氣三日每晨隔湯燉熱服五六錢冬至後或七八錢亦可開水過口此症肺脾肝腎皆虧進食稍增則腹中不爽或悶或疼夜膳不敢多進一不如法則小腹脹痛波及胸脘冬來畏冷四肢尤甚年逾三旬服此膏之後諸恙俱平頗為合宜案歙縣豐干庭傷寒誤治垂危立刻救蘇治驗已後調理收功丸方歙縣豐干庭年二十五歲道光元年八月二十二日病由暑濕內蘊而起未經疏解藥餌亂投以致身熱兩月未退耳聾體倦不飢納少小溲短赤大便溏泄日解數次醫更多人寒熱溫涼備嘗之矣熱終未退舌苔灰色邊淡白醫又疑為虛熱以熟地歸芍鹿角膠參耆加升柴朮草其白朮用至四錢炙草用至二錢以六一散為引炙草二錢已嫌其過而又加六一中之甘草何其善用甘草若斯之甚也更奇者病已奄奄一息其人仍將前方加附子一錢並牡蠣黑山梔輩溫涼燥熱並投視人命如草菅幸遇伊同鄉子轂榖汪君阻其所加附子之方不可再進觀其病勢危篤特求救於余余至診其脈兩關弦細不靜問其病則曰耳內常如蛙鼓蚊鑼之響察其色舌中灰色邊淡兼之溲赤便溏合證脈而詳諦之熱未盡徹棘手極矣難以許治姑念客途抱病憐孤兒獨子之形單不得已惟有和中一法清暑卻濕俾上下交融庶乎盡善所謂擊其中而首尾皆應也或可圖其幸耳川黃連五分用陳酒二錢半同煮將干勿焦白扁豆四錢炒煨葛根一錢半廣藿梗一錢半陽春砂仁五分研赤茯苓三錢綠豆皮二錢鹽水炒青皮八分加生穀芽六錢上藥九味用河水兩飯碗煎至一碗去渣再煎去二分僅存八分服之服此漸有微汗小便稍長身熱膚稍潤澤舌中灰胎稍薄余如前又二十三日復診服昨方今日不時呵欠是佳兆也白扁豆五錢炒玉竹四錢茯神二錢苡仁四錢杜芡實三錢炒山萸肉一錢半木瓜一錢半豬苓一錢半澤瀉一錢半加鮮荷葉邊一個沉香汁二分沖服此後呵欠更多此榮衛有相引之機佳象也便溏稍減可進爛飯半盞日飲粥一二鍾口不喜飲神清夜能睡舌中灰色苔竟退其半舌尖已轉淡紅色且滋潤身熱退其六七漸有生機之象也又二十四日復診方西洋參一錢半制白扁豆三錢炒苡仁五錢炒甘草六分川石斛四錢遠志肉一錢去心炒麥冬一錢半去心茯神二錢赤茯苓三錢益智仁八分滑石三錢木香五分加生薑皮四分黑大棗兩枚去核又二十五日復診方淮山藥三錢炒白扁豆五錢炒元參二錢茯苓二錢遠志肉一錢炒生鱉甲二錢炙草八分木香七分煨青蒿子一錢半益智仁一錢陳皮八分加生薑皮四分黑大棗兩枚去核服前後兩方舌中灰黑胎今已全退食飲稍增又二十七日復診方西洋參一錢半制炙鱉甲三錢元參二錢白扁豆五錢炒青蒿子一錢半雲茯苓二錢苡仁五錢炒炙甘草八分煨木香五分陳皮一錢半砂仁五分生穀芽四錢加大南棗三枚去核服後熱退八九大便日二三次且不甚薄小溲日四五次出時覺熱舌轉淡黃胎耳內響如前又廿八日復診方兩日間天明時偶有鼻衄今交秋分虛火上炎也元參三錢麥冬一錢半去心炙鱉甲三錢扁豆五錢炒女貞子三錢苡仁五錢炒干百合四錢砂仁五分炙甘草八分滑石三錢加湖藕二兩切片同煎服此頭額之熱今始退清舌轉之淡黃苔亦從茲而漸退鼻洪止大便一次始結小溲色淡諸恙俱平惟脈象軟小濡細精神尚疲耳內猶響加意圖之自爾痊安二十九日原方略為增減服兩劑安妥如前又九月初一日復診方今可扶起診脈究未能多坐西黨參一錢半二原地三錢歸身一錢女貞子三錢遠志肉一錢炒半夏曲一錢半炒炙草八分大麥冬一錢半去心茯神一錢半陳皮一錢半芡實三錢加生穀芽五錢服兩帖耳聾漸自減半而耳鳴仍然如前究關精氣之未充也初三日原方去半夏曲加建蓮肉再二劑初五日用制首烏女貞枸杞菟絲山萸肉茯苓木香炙草山藥建蓮肉引以砂仁末三分沖服連進五六劑肝腎之陰漸復耳鳴減半食飲亦增惟六脈尚虛小乏力大病兩三月氣血久虧肌瘦神疲節食戒怒毋貪厚味淡蔬最宜俾食飲旺而精氣充加意調攝庶無他虞又九月十一日方調脾胃兼養肝陰冀其坤土健運再為滋補可也西黨參三錢白扁豆三錢炒歸身一錢半白芍一錢半炒廣木香五分半夏曲一錢半炒陳皮一錢半甘草八分炙女貞子三錢砂仁末三分沖加大南棗三枚去核服三劑食飲增倍精神稍健大便日一次且結又十四日方高麗參一錢另煎沖淮山藥三錢炒白扁豆三錢炒茯苓一錢半鹿角霜一錢枸杞子三錢女貞子三錢白芍一錢半炒當歸身一錢半炙甘草八分砂仁五分加桂圓肉五個服數劑耳鳴止精神健食飲復原即於方內去高麗參歸芍茯苓砂仁山藥扁豆等加黃耆黨參龜膠萸肉胡桃肉輩進四五帖而收全功繼以丸方調理方附下大熟地八兩搗入元武膠二兩切炒珠鹿角膠一兩切片炒珠山藥三兩炒菟絲子二兩制熟芡實三兩炒沙苑蒺藜二兩歸身一兩半線魚鰾二兩切片砂炒金櫻子二兩去毛懷牛膝一兩五錢酒蒸杜仲二兩炒女貞子二兩炙山萸肉三兩上藥十四味先將熟地杵膏入藥和勻再以黃耆三兩黨參三兩煎膏代蜜為丸如桐子大每服五錢清晨滾水送下案何兆豐感暑濕病餘熱未盡治驗並後調理收功丸方何兆豐年二十七歲道光辛己七月十六日暑濕內侵病已十八日尚有餘熱未盡有汗喜飲小溲短赤舌苔膩滯淡黃知飢納少大便六七日未解夜能寐脈右小數左弦細此濕阻而兼暑氣之未徹也表之無益即清之涼之亦未見卻病莫如和中祛濕俾暑濕由中以下達庶幾無變遷之虞白扁豆四錢炒薏苡仁四錢炒廣藿梗一錢半豬苓一錢半澤瀉一錢半赤茯苓三錢塊滑石三錢甘草五分砂仁五分生山梔一錢半薑汁炒加西瓜汁一茶杯同煎進一劑熱退再劑解結糞成堆小便長赤減自覺安妥停藥兩日又有微熱早上飲粥少有汗出熱漸退午後又漸微熱知飢能寐二十日復診脈如前而舌胎愈覺膩滯小便又短而赤前方去豬苓澤瀉山梔西瓜汁加鮮石斛姜半夏鱉甲地骨皮等兩劑熱又退清又二十二日診白扁豆四錢炒淮山藥三錢炒赤茯苓三錢藿梗一錢半半夏曲一錢半炒廣木香五分塊滑石三錢陳皮一錢半生甘草六分生鱉甲三錢加生薑二片焦穀芽三錢進前方兩劑舌苔漸退而薄舌尖已有淡紅色日進粥四盞知飢而又不貪飲細審之連進老黃米粥廿有餘日故知飢而不過貪也因囑其進陳白米粥以養胃氣午後可進飯半盞以鯽魚煮湯過口如法服之胃口開而粥飲喜進病人調治之法須當細心揣摩始能得其真情也又廿四日復診方建蓮肉四錢去心玉竹四錢金石斛五錢茯苓一錢半女貞子三錢陳皮一錢半白扁豆三錢炒苡仁三錢炒砂仁五分加黑大棗兩枚去核服三劑食飲日增舌苔退去七八二十七日診再以調脾養肝之劑用四君子湯加二原地女貞子枸杞子陳皮砂仁大棗輩四五劑繼以異功散加制首烏女貞歸身遠志柏子仁等又五劑諸恙向安惟足膝無力精氣未充再以壯水滋肝之劑間佐以黨參黃耆輩數帖而康繼以丸方調理收功方附下大熟地八兩搗入元武板五兩炙山藥四兩炒山萸肉四兩枸杞子三兩焙菟絲子二兩蒸熟茯苓一兩半當歸身一兩半懷牛膝二兩酒蒸川續斷二兩炒杜仲二兩炒砂仁一兩半上為細末先將熟地杵膏入藥和勻再以西黨參五兩煎膏代蜜為丸如桐子大每服五錢清晨滾水送下案休邑黃其祥尿血數月漸自小便涓滴甚至莖中疼刺便溺不爽必得小便先出而大便始解亦由溺情所致治法頗驗附論上層休寧黃其祥素多勞苦娶妻甚遲於道光辛己五月初十日延診尿血數月日漸小便涓滴甚至疼刺難出大便欲解不能必得溲先出而大便始解小便時刻滲出大便愈難一解邇來以絹圍扎陰頭使其滲入有時小腹疼痛莖中又有鮮血頻滴面帶虛浮食飲如常睡臥尚安脈象虛軟左關弦勁尺脈濡細小數纏綿日久深慮頭傾背曲變證蜂起豈是小恙而可藐視之乎其人中年娶妻肌體羸瘦嗜欲無度而致溲便維艱皆為色欲所累褚待中雲男子陰已耗而思色以降其精則精不出而內敗小便秘澀如淋陽已痿而復竭之則大小便牽痛愈痛則愈便愈便則愈痛按其言則陰中有水有火水虛者固多火衰者亦不少未有精泄已虛而元陽獨存者況陰陽互為其根議補陰者須以陽為主蓋無陽則陰無以生也此論可與黃氏之症合而參之乙未夏日竹亭識於有竹居時年七十有一生黃耆五錢生香附四錢柴胡一錢上三味用大荷葉一個泡軟包前三味線扎用福珍酒一飯碗順流水兩飯碗和勻煎藥煎至一碗半去荷葉包將此湯煎後藥煎時以鐵物壓煎不然恐荷葉包浮於面上蜜炙黃柏二錢蜜炙知母二錢土牛膝二錢黑牽牛一錢半上肉桂二分去粗皮五味以前湯一碗半煎藥至八分一碗入血餘六分研極細沖服進藥約在申初至戌時知飢吃飯兩甌少頃先欲大便解時甚暢隨後溲出杯余頃之又出非前之涓滴難忍亦非前之先小便而後大便始出者可比況未服余方前之欲大便而不能必得用力睜之甚至頭眩眼花如斯弩睜而大便解出不過些少而小便則仍涓滴究不能如服前方後之通暢可較也又十一日復診方生黃耆五錢小茴香一錢半小青皮一錢柴胡一錢上四味用童便一杯以拌透為度仍照昨用大鮮荷葉包藥線扎仍以福珍酒一甌順流水兩甌和勻煎藥煎至一碗半去荷葉包將湯煎後藥蜜炙黃柏二錢鹽水炒知母三錢黑牽牛一錢半黑山梔一錢半上肉桂二分去粗皮上五味用前湯一碗半煎至一半臨服仍用血餘灰六分沖服自五月初十十一兩方雖略為變易亦各有取意存焉服後果然奇妙小溲出時不用並氣而出出後不盡少有溜出卻非前之涓滴可比次日早晨大便結糞出時甚爽亦非前之脹墜可較據述病象三減其二矣又十二日復診侵晨出街步行勞力午前陡然尿血如箭內有紫塊前後脹急大便欲解不能尿血仍頻滴不止少頃大便解出成條糞些少溺管中解出血塊一二立覺鬆爽病在二陰之間迄今半載余矣不無溺情所累況血從精竅而出非比血淋之莖痛由膀胱溺竅而出者可較也當急以半通半澀之法兼以治本以照顧左關尺之弦急小數之意耳服後尿血減而脹急未除更醫用龜板熟地知柏麥冬輩反增胸前脹悶二便秘結難忍氣壅於上面浮㿠白不飢不納較前之進食如常者大不同矣因於十四日復求治於余診其脈右寸關虛滯左關尺弦緊小數二便不通弩力並睜不由自主前陰血出涓滴脹急必得瘀塊出大便稍通漸自寬鬆二三日來無一刻之安寧甚至小肋脹痛證屬險極姑念告治情殷亟以升降通幽法或可望諸生黃耆五錢生香附五錢柴胡一錢淡茱萸五分四味用童便浸透以荷葉一小個包緊線扎用順流水四碗煎至一半去荷葉包只用此湯煎後藥大生地六錢藕節一兩切紫沉香一錢切黑牽牛一錢半人中白一錢漂小薊一錢用前湯煎至一飯碗服未進藥前先用陳酒燉溫送更衣丸二錢可以不必用按細閱病情竟服煎方不用更衣丸則更妥更穩竹亭自識時在壬辰十一月二十五日午刻注據述先進丸後服煎劑少頃即睡睡醒覺面浮稍退口乾舌糙亦少潤至夜半又少有小腹並緊之勢至天明解出糞如大指粗者三二條小溲稍增卻無尿血少頃飲粥杯許忽然欲嘔嘔出盈碗之水頃之又嘔其味帶酸非痰非涎中兼黃色好似昨進更衣丸外之硃砂也想連日下焦秘結不通者上焦必壅而不能下達者有之更兼前醫用寒涼無溫熱之佐不無阻滯中宮假此米飲而痛嘔嘔後反覺上部稍寬況有餘之升降疏補通幽之法是以前後二陰稍通故小腹不覺並緊脹急也藥服頗合第右脈如昨左關尺弦緊小數未平腎為胃關胃土壅滯故胸中脹而兼疼而食不貪也厥陰不舒鬱結前陰腎關不利幽門難通深慮復閉閉則必結結則必厥當以和法開其上壅佐以疏通下焦仍不外乎升降一法冀其二便通利庶幾可圖十五日復診方小川連五分薑汁炒制香附三錢鹽水炒淡茱萸二分柴胡六分小青皮八分川楝子二錢打碎黑山梔一錢半黑醜即牽牛一錢半小茴香一錢鹽水炒加藕汁半茶杯沖血餘灰八分沖服此知飢進粥小便頻滴漸稀稍有約束天明時大便成堆毫不覺墜出如平時小溲亦增卻非涓滴可比惟小腹下兩傍少疼尚欠柔軟至於大腹之脹臍之突面之浮俱已十去八矣又復診方右脈虛耎左關尺弦細小數固氣養榮兼理肝腎俾二陰之氣調勻則氣旺水充肝木滋而相火不升心不下蕩血自歸經而尿血可止矣當加意圖維耐性靜養斯可矣生黃耆三錢鹽水炒丹參三錢淮山藥三錢炒白芍一錢半炒川楝子一錢半研青皮八分生益智八分烏藥一錢鹽水炒桑螵蛸二錢炙血餘八分沖人中白六分漂服前方大便通暢小便頻滴又減少腹兩傍亦漸柔和不疼復診又以四君子加首烏女貞白芍淡茱萸杜仲小茴香等服之小便每次可杯許大便日解帶結腰間疼已食飲亦增連進數劑大為合宜又以四六君佐養榮湯出入之繼以壯水滋木之法調理漸安是證也得余前方之奇思妙想而奏功甚捷亦再生之幸耳數月後緣房事不節而病復延就近者調治縱啖厚味未經月而逝誠可惜矣案休寧汪春舫房勞不節脾腎大虧兼之肝氣作楚兩手足掌心痛劇難忍為最甚治驗並丸方洗方汪春舫休寧人年逾五旬道光元年正月十一診六脈虛大脾腎兩虧又兼肝氣作楚病延日久正值春令土為木乘脾主四末無怪乎手足掌心痛劇難忍且腫也二目水光外含其為腎水之不足已露先聲矣盍早圖之深慮驟變權擬一方先治筋脈兼之調脾和肝待病勢少衰再為之計白醜筋一兩切片鹿筋六錢切片歸身一錢半檀香泥一錢二分廣木香七分橘紅八分鹽水炒續斷二錢炒以蔥汁加苡仁二兩先將牛鹿二筋打扁切短用河水四盞煎去一半入前藥同煎至一盞服服兩劑手足心腫痛俱減且能少步出房大便之秘結可日解一次而暢頗屬合宜復診十三日仍用前方加虎掌骨木瓜輩服後如前每至申酉後覺手足心之疼漸增胸中氣悶不爽兩脅作痛引動肝氣當理氣血和其筋脈再商西黨參三錢山藥三錢炒制首烏三錢鱉甲三錢元武板四錢炙歸身一錢半女貞子三錢茯苓二錢制香附二錢澤瀉一錢半五加皮一錢半甘草八分加鹿筋五錢切片用去油乳香沒藥各五分與筋同炒同前藥煎服外用樟木屑四兩先將急流水煎極滾泡樟木屑置盆中以手放盆邊上用綿布蓋之先熏候溫可以淋洗如足指跟痛亦可熏而後洗即膝中冷疼又可用棉布浸透絞乾熨之冷則易服前方並熨後兩足毫不覺痛步行亦然復診四肢無力遍體不疏幸手足心不痛時覺筋惕診其脈幸肺脈之數急已緩惟左關弦勁未舒知其木有侮土之象故食不貪而素有之痰飲黏膩者時而嘔出常多怒怒則火升脾土不運肝木過旺過旺者肝亦自傷為之調脾溫中佐以舒肝和其筋脈通其經絡俾其漸減再為之計西黨參三錢焦冬朮一錢半淡乾薑五分炒香附三錢炒淡附子五分製半夏一錢半炙甘草六分白芍一錢炒當歸身一錢半雲茯苓三錢加沉香三分末沖竹瀝六錢和生薑汁六分沖服前方六帖諸證俱減即於原方去白芍沉香竹瀝薑汁等加龜膠鱉甲膠各一錢候藥煎好去渣烊化引用油松節蘇木節各三錢先用長流水兩盞將二節先煎數滾入前藥同煎煎好去渣再投二膠候烊溫服服三帖更妥行步可不用人扶手足不痛筋脈安舒復診脈之虛軟弦勁俱漸平可惟左尺濡耎右尺浮虛乏力陰氣虧而命火不足是以腰疼膝冷雖絲綿固護而膝骨中究嫌其冷攸關元陽元陰之不足耳議火土相生水火併濟之法或不無小補云爾西黨參三錢焦冬朮一錢半茯神二錢歸身一錢半大熟地三錢淡乾薑五分炒炙草八分棗仁一錢半炒淡附子六分上肉桂四分去粗皮牛膝一錢半陳酒浸蒸加鱉血拌曬木瓜妙法可傳用意頗精一錢五分此藥前次預備存用服數劑膝冷腰疼大減食飲安臥如常復診二月大熟地五錢歸身一錢半山藥三錢炒熟附子五分上肉桂四分茯苓二錢山萸肉一錢半西黨參五錢左牡蠣三錢煅塊炙草八分加鱉血拌木瓜一錢半沉香四分切片服後腰膝疼冷俱漸平可以獨步行走手足心痛極難忍之勢自服余方緩緩而平毫不覺矣復診正值春分節屆服數帖繼以後丸調理收功大熟地五錢元武膠八分熔化鹿角膠一錢半熔化茯神二錢酸棗仁二錢炒西黨參五錢焦冬朮一錢半乾薑六分炒炙甘草八分引鱉血炒木瓜一錢半丸方道光元年辛巳歲定病從四肢不能舉動牽引痠疼手足掌心腫痛症起年餘藥投罔效於正月延診藥服應手病已痊可繼以丸劑以善其後高麗參二兩切片另研極細再同後藥和勻大生地八兩用水煮半日再用陳酒同砂仁一兩半同煮半日放盆內飯鍋上蒸透搗入元武板四兩炙鹿角霜二兩歸身一兩半酒洗柏子仁三兩去油淮山藥三兩炒山萸肉三兩杜仲二兩鹽水炒淡蓯蓉三兩酥炙沙蒺藜二兩宣木瓜一兩半用去油乳香一錢五分同炒同研用沙苑蒺藜用大豬腰子劈開去內白膜剜空內填蒺藜末線扎蒸熟去腰子以蒺藜曬乾研細入藥和勻上為細末先將熟地搗杵入藥同群藥和勻加煉白蜜為丸如小綠豆大曬令極干外用焦冬朮二兩雲茯苓二兩半夏曲二兩木香一兩勿經火炙甘草一兩雞內金一兩半炙新會皮一兩半用生薑汁拌透曬乾略焙上七味共研極細末用荷葉煎湯灑疊為衣每服五錢清晨滾水送下或陳皮湯送亦可案詹荇洲長子舊有淋症未楚新感風寒誤治病增幾乎變症治驗詹荇洲長子道光元年正月二十二日年十八歲去年七月間得淋症溲出疼痛溺竅封口迄今未已半月前曾身熱咳嗽胸悶痰稠醫治熱稍減據述淋症自己諱疾忌醫乃尊細審方知始告治於醫醫以生地丹皮芩連輩不應繼以鮮石斛麥冬竹葉石膏芩連知柏一派苦寒不第客熱未除即淋症亦未減夜不安寧不飢納少溲赤出時疼完時痛莖中脹刺不爽因延治於余余至前醫已定一方用溫膽湯加味以作不寐治雜亂無章妄治誤人余診其脈右浮大左弦細春溫未解兼之濕熱下注淋症半載疼刺脹痛此脾濕而兼少陽甲膽之火鬱未清又兼風溫上受無怪熱難徹而夜不安寧也此皆前醫濫用苦寒之誤耳一誤而兩病不瘳再誤而虛怯之虞難免就余視之退其熱則神安而自寐清其濕熱解其鬱火則淋症之脹痛可平何必妄治哉青蒿子一錢半蔓荊子一錢半黑蘇子一錢半炒赤茯苓三錢鮮石斛五錢黑山梔一錢半升麻五分柴胡三分甘草梢一錢塊滑石三錢地骨皮一錢加荷葉一小個托底煎藥服藥後熱漸緩溲出脹痛亦減且色淡而稍長進粥漸增夜臥稍安惟大便數餘日未解復診二十三日生鱉甲四錢地骨皮一錢半青蒿子一錢半麥冬一錢半赤茯苓三錢甘草梢一錢塊滑石三錢澤瀉一錢半二原地三錢白杏仁三錢柴胡四分升麻二分服後身熱漸退惟侵晨似有微冷兩額少疼舌苔淡黃日飲粥三碗口乾不渴小溲少邪已解而餘波未盡至於淋濁溲時竅端如針刺莖中稍有疼脹之勢非前之脹痛可較也復診二十四日元武板三錢炙炙鱉甲三錢青蒿子一錢半豬苓一錢半蔓荊子一錢半赤茯苓三錢黑山梔一錢半澤瀉一錢半小青皮一錢薏苡仁五錢炒引生薑皮六分大棗二枚去核進藥兩劑客熱已退溲時脹痛大減飲粥又增大便雖數餘日未解不必攻伐緣陰氣虛也復診二十六日大首烏四錢半生半制炙鱉甲三錢川石斛五錢茯苓三錢黑山梔一錢半廣藿梗一錢半小青皮一錢通草一錢甘草梢一錢澤瀉一錢半服此安妥如前復診二十八日病後氣榮兩虛大便半月餘未解審其平時亦要三四日一解色脈合參益氣養血兼以舒運俾其緩緩而解庶乎漸安西黨參一錢半大首烏八錢半生半制歸身一錢半淮山藥三錢炒榆白皮一錢半郁李仁三錢陳皮一錢半枳實炭八分茯神二錢炙甘草八分柏子仁四錢雞內金二錢炙服兩帖初帖出結糞三二寸次帖出結糞五六寸色黑成條小溲出時疼脹已平食飲日增復診二月初一日進前方兩劑計出結糞約七八寸右脈虛滯左脈細弦宿垢未盡第廿餘日之大便秘結於淋濁身熱之後者必體虛腸燥而宿滯難盡諸恙向安仍宜益氣養血潤燥以滑之斯為正治西黨參二錢焦冬朮一錢歸身一錢半炙草六分柏子仁三錢黑芝麻三錢炒茯苓二錢陳皮一錢半榆白皮二錢蜜炙金石斛四錢檳榔一錢炒檳榔可以不用加松子仁二十粒雞內金二錢炙進三劑大便色轉淡黃此正糞也知飢貪食小溲出暢後以五味異功加歸地萸肉山藥女貞懷牛膝輩服數帖而收全功案吳廷玉幼子腹痛塊攻食積挾蟲治驗吳廷玉子八歲二月二十五日腹痛塊攻有時甚則欲厥色脈合參食積挾蟲六神麯三錢炒焦穀芽三錢木香六分切片使君子三錢去殼淡茱萸二分鶴蝨一錢焙烏藥一錢二分加炒開口川椒十粒一劑知二劑已案歙縣汪小庭傷寒垂危救蘇並詳議治法奇效調理丸方收功歙縣汪小庭年四十四歲嘉慶庚辰歲傷寒垂危證治驗細繹病情素不節欲於二月十三日畏寒而起未病前三日泄精兩次既病後又溏瀉三四日其始也他醫作春溫症用清解退熱之劑不應日漸加重始顯三陰見厥之勢體倦微熱無汗醫又用四逆散加乾薑服後肢冷稍溫少頃又冷更醫醫作風溫化熱見厥以清疏法加羚羊角等未曾服主家見勢危險特求治於余余診得脈形右脈沉細左脈虛微知其陰陽兩虧寒邪陷入於三陰而致四肢厥逆邪難達表以故神識模糊語言錯亂舌根短縮口不喜飲也難以許治姑念客途抱病聊盡婆心以應之二月二十一日診人參三分另煎沖大熟地四錢淡附子六分乾薑八分炒炙甘草八分加蔥白兩枚六味河水煎服是方也緣陰陽兩虧而寒邪陷入於三陰者必兼輔正以驅邪或可圖其幸耳設僅用溫法恐正不勝邪而邪終難達表故用人參以助正蔥白通陽以達表取微汗而解然陰虧者又恐汗出劫津故又以熟地之養水以濟之則汗出而無涸津之虞人參熟地之用於蔥白四逆湯中取其邪易達表汗出不涸津非為補陰補陽之謂也方雖神奇恐不合時人之眼而阻之亦數也命也與予何尢據述點燈前進藥少頃睡著約更余方醒醒後小便一次清白且長未幾又睡睡醒飲粥一盞又小便一次漸覺四肢溫暖身熱微汗不喜飲時欲起坐語言似清非清舌縮漸伸中心淡黃病勢稍減脈亦漸起足徵里邪少有出表之機復診二月二十二日證脈合參仍以輔正兼以和解俾邪由里達表取微汗而解方用小柴胡去黃芩之苦寒加生地以退榮分之熱得薑汁以和衛桂枝湯中去芍藥之酸收而加葛根以解肌且柴胡得葛根使邪由少陽而出陽明葛根得桂枝使邪由陽明而出太陽也無非為陰陽兩虛之體輔正以和解祛邪以達表斯為標本兩固之法加減於柴桂二湯之間妙義深矣方附後柴胡一錢二分大生地四錢生薑汁拌炒製半夏一錢半人參三分沖桂枝一錢二分葛根一錢半炙甘草六分加生薑五分黑大棗兩枚去核未服前方據述起坐不寧時欲往外有煩躁之勢至燈後服藥漸自安妥少頃睡著醒後少有微汗口乾飲茶半盞小溲淡赤而長夜半進粥盞許神識漸清次日午前欲大便解膩糞一堆淡黃甚臭此二十三日主家細告而知之也復診二月二十三日證脈合參寒邪陷入三陰而致四肢厥逆進前後兩方脈形漸出有鼓指之勢自是邪有出表之象今始口乾喜飲溲轉淡黃大便黏膩而臭也再以生津退熱調和榮衛取小汗以徹熱庶幾無遺蘊矣大生地五錢大麥冬一錢半元米炒淡黃芩一錢半酒炒丹皮一錢半炒地骨皮一錢半川石斛五錢生甘草六分柴胡八分加生薑五分黑大棗二枚去核服此方唇燥喜飲俱減少頃飲粥一盞漸自汗出頭項胸堂手臂俱到從此熱退七八舌尖漸轉紅潤語言清爽小溲漸長粥飲喜進復診二月二十四日汗出熱緩陷陰之變庶可免矣第脈尚細微左關尺更覺弦細自是邪退而餘波未盡也議養陰生津和胃之劑大生地五錢生鱉甲三錢地骨皮一錢半葛根一錢半鮮石斛五錢知母一錢半廣皮白八分甘草六分大麥冬一錢半加生薑二錢大棗兩枚去核服後熱始退清再以生地麥冬花粉甘草茯神遠志石斛輩養胃生津之劑二三帖後去生地加西洋參南棗粳米輩間去遠志石斛而佐建蓮扁豆木瓜砂仁輩又四五帖服之食飲漸貪睡臥漸安復診三月初三日自前月二十三解膩糞之後至今數日欲解未解當以益陰潤燥之劑冀其自解方附後玉竹三錢女貞子三錢柏子仁三錢木瓜一錢半炙甘草八分陳皮一錢半歸身一錢半茯苓一錢半加陽春砂仁五分服後解結糞一次復診三月初四日大病之後理應大補而數日之宿垢留戀中宮昨始解之證脈合參尚有餘垢未盡權以疏而運之和而達之之法再為議補自無遺憾矣白扁豆四錢炒建蓮肉四錢炒沉香三分切片木香七分大腹絨一錢半半夏曲一錢薤白二錢陳皮一錢服一帖安臥如常腹中響動兩足溫暖至次日侵晨飲粥後忽欲大便解出結糞如彈丸者三二塊色黑隨又解一條腹中之舒暢更甚於前之解也復診三月初五日昨以舒運一法果然余垢已解且結如彈丸亦從權之良劑也傷寒之後胃陰爍而津液不敷脾陽虛而肌肉瘦削不但此也土虛不能生金肺金失平木之職此脈之所以兼弦也土虛不能制水腎水有泛痰之虞此痰之所以帶咸也預為扶土厚培坤元中宮健運妙在資生方用六君子湯加歸身柏子仁引以雞內金服後次日又大便結糞成條先黑後黃此宿垢盡而正糞出也知飢食增胃土漸旺復診三月初七日用五味異功加女貞麥冬石斛柏子仁制首烏引以雞內金取其扶土運食佐以養水滋木之輕劑服之頗佳即於此而加減數日後食飲日健精神漸復惟氣血未充步履無力耳再以五味異功加鹽水炒黃耆木香穀芽益智仁輩又數劑繼以熟地山藥杞子萸肉益智砂仁破故紙胡桃肉等補火生土脾腎雙治之法大為合宜服五六劑繼以丸方調理收功丸方四月初五日證脈合參大病之後氣血兩虧理宜補氣養血然氣陽而血陰又當壯坎陽而滋離陰使榮衛沖和則氣血流通而精髓可填第填精益髓之法又非草木之所能盡其長也須借氣血有情之品而少佐導引之法始能勝其任矣若不此之求而泛作氣血不足之治何濟其事法宜補火生土壯水滋木俾元氣日充精神自健商瞿有後尚可望諸鹿角膠二兩炒珠龜板膠一兩半炒珠枸杞子一兩半焙澤瀉一兩半西黨參三兩大熟地六兩山萸肉三兩酒洗山藥三兩炒焦冬朮一兩半粉丹皮一兩半酒炒熟附子五錢肉桂五錢去皮雲茯苓兩半炙甘草兩上為細末先將熟地杵膏和煉白蜜為丸如桐子大每服四錢清晨滾水送下服後如稍有喉燥用麥冬兩枚泡湯送下可也案山西梁瑞文腹中頻痛治驗梁瑞文山西客嘉慶庚辰正月右脈沉緊腹中頻痛寒與食並小便短赤宜以溫中運食法淡乾薑六分炒木香八分神麯三錢炒陳皮一錢半山楂炭三錢半夏曲一錢半赤茯苓三錢澤瀉一錢半枳殼一錢半加蔥一枝姜一片服兩帖寒散痛止溲多赤退大便兩次帶溏諸恙俱平案陸誠齋尻骨痠疼治驗附案陸誠齋庚辰正月脈形沉滯尻骨痠疼腎陽虛而肝木不舒服後方四帖痠疼頓平鹽水炒杜仲三錢鹽水炒馬料豆三錢香附三錢炒鹽水炒獨活一錢半川續斷一錢半全當歸一錢半山萸肉一錢半菟絲子一錢半炒小茴香一錢加豬脊髓一條復診原方去香附當歸茴香加熟地山藥等調理數劑而痊附案先大人雨香公於乾隆三十七年十一月十四日治崇川王殷璧尻骨痛方用龜板首烏當歸烏藥杜仲續斷女貞子輩七味引用豬尻骨一塊先用白蜜半杯和升麻一錢煎好塗尻骨上火炙打碎同煎服一帖減去八九再服全安是方與鄰治陸氏之方大意相同妙在一用尻骨一用脊髓皆應手而愈故並記之案余於季冬忽然畏寒遍體不舒治驗予於己卯季冬天氣過冷午後忽覺畏寒之極遍體不舒知其脾陽不運又為風寒所侵以溫中散寒合和榮衛之法用四逆湯加桂枝湯去芍藥增蘇葉煎服約寸香之久隨吐寒痰頃之畏寒漸減至燈後夜膳周身爽快次日霍然矣足徵藥原有益於病特恐不識病耳淡乾薑八分炒淡附子五分桂枝一錢半炙甘草六分蘇葉一錢半加生薑二片大棗兩枚去核案梁士奎臍腹作疼治驗並外用熨法梁士奎年三旬己卯春臍下小腹脹悶且疼曲腰低頭氣滯於下食填於中攸關肝脾法當舒運生香附三錢酒炒淡茱萸六分小茴香一錢沉香五分薤白三錢山楂炭三錢萊菔子三錢炒青皮一錢枳殼一錢半加生薑三片外用大皂角三挺生薑二兩青蔥三兩三味切碎用河水煎滾以棉布浸透絞乾熨臍腹上下冷則再溫再熨服藥並熨後痛脹俱減大半反覺胸前氣悶且疼知其宿食未下也用二陳湯加瓜蔞全香附神麯枳殼山楂木香沉香等煎服服後胸悶且疼俱緩時有矢氣知是氣松而宿食有運動之象再以瓜蔞薤白木香枳實赤苓萊菔子楂肉青陳皮等煎服據述服後藥性行至小腹自覺上部松爽次早大便結糞成堆胸腹頓寬而愈案周玉如脾濕中阻口吐涎沫治驗周玉如脈形右關濡軟脾濕中阻口吐涎沫自覺從兩腮湧出半月前不過偶吐三日間涎湧無時不酸不苦自有一種氣味難言一日約吐四五盞頻頻而出自予觀之涎沫由舌底左右二竅而出者有之經云左金津右玉液者此也自去冬四末常生㾦㿔如小豆漸破出水纏延今秋手腕足指大小重疊水出漸愈愈後又報綿綿不已亦皆脾濕為患猶是小事惟涎沫上湧日漸增多為慮耳細審之素貪濕面肥肉好啖咸物即菜素葷腥內亦必加增鹹味病之從來非無自也積久傷脾脾土虛而不能攝涎耳焦冬朮二錢茅山術一錢五分炒茯苓四錢炙甘草八分製半夏一錢半淡乾薑五分炒白扁豆三錢炒加沉香三分同煎服午刻進藥至戌初涎沫漸少臨臥時更少次日早上並無涎沫至吃粥後始有幾口耳再劑如前後以六君子湯稍佐溫舒之法而收全功案程秉維幼子痧痘之後便泄神倦氣短面㿠不食垂危治驗程秉維子兩歲痘後繼之以痧質弱多汗又失調治便泄半月未止神倦氣短面㿠時睡不貪食惟哺乳皆虛象也速治猶恐鞭長莫及人參三分另煎沖焦冬朮八分茯苓一錢炙甘草五分木香五分煨五味子二分研加赤石脂五分禹餘糧五分上方煎服兩劑便泄頓減漸可進粥再三劑大便已結喜進飲食極險極危之症得余方五帖而收全功快矣快矣案胡恆大勞力吐血治驗胡恆大去冬勞力損膜以致吐血今夏復發診得脈象過硬知其素性剛勇遇事不耐性急火升此血之所由來也從此耐性庶可無虞今血止之後忽爾得食即嘔吐者胃病也細審之吐血時前醫過用寒涼之劑血雖止而胃土為寒涼所遏以故食入即吐不容少待余以治嘔藥中而佐溫胃之法故一劑而嘔吐立止效如桴鼓之相應也快哉生薑汁炒半夏一錢半鹽水炒橘紅一錢旋覆花二錢生絹包紮生薑汁炒生山梔一錢半鹽水炒枳殼一錢半代赭石三錢煅紅醋淬上藥六味如法煎服未三時進飯一盞半嘔吐頓止案宋兆奎臍腹上下僉痛胸悶塊攻治驗宋兆奎山西年二十七歲道光元年三月初九胸悶塊攻臍之上下俱痛西人素好食麵不忌生冷寒與濕食交阻脈息沉滯宜於溫舒制香附三錢木香六分乾薑六分炒神麯三錢炒萊菔子三錢炒枳殼一錢半楂肉三錢炒陳皮一錢半淡茱萸三分麥芽三錢炒烏藥一錢半煎服一劑痛勢減半胸腹未爽小溲仍赤復診初十日製厚朴一錢木香六分藿梗一錢半薤白三錢赤茯苓三錢甘草六分穀芽三錢炒楂肉三錢炒小青皮八分加雞內金二錢炙服此溲淡痛止案山西任光鬥白濁症溺竅溲出疼痛治驗山西介休任光鬥白濁症溺時疼痛難忍進瀉肝法溺時痛減兩日後小便頻數出少而時刻欲解莖中疼脹此濕火內郁議升清降濁法雲茯苓二錢豬苓一錢半澤瀉一錢半木通一錢黑山梔一錢半柴胡五分升麻三分甘草梢一錢加乾荷葉一小個托底煎藥服前方兩劑小溲爽快而長疼脹若失案歙縣李載揚兩足浮腫治驗歙縣李載揚年五十三歲兩足浮腫朝退夕腫脈右軟滑不速治防成中滿焦冬朮一錢半茯苓二錢苡仁三錢炒製半夏一錢半大腹絨一錢半木香六分切片白扁豆三錢炒生甘草六分陳皮一錢半加砂仁末三分沖服五劑足腫漸退原方去陳皮甘草加乾薑赤小豆蜜炙升麻三分再五劑兩足腫退痰亦減復以六君子湯加山藥苡仁砂仁雞內金荷葉等煎服數帖而收全功案海鹽上舍張鐵珊由怔忡症兼臍上脹痛肝胃氣阻宜先治標之驗上舍張鐵珊道光元年六月十四病原氣出於中焦而行於遍體貫注百脈往來不息近緣怔忡時發心榮不足胃土失養肺氣因而不充肝木乘之以故三日間每至四鼓氣由臍而上達於胸並緊不舒且脹且疼必得手捺重按而後漸散種種情事合之脈象之浮而不沉似與病象不符惟兩關細小兼弦又未嘗不關乎肝胃而其源實由於心榮之不足中氣之有虧也經云緩治其本急治其標宜乎先治其標再為探本窮源之法鹽水炒香附二錢鹽水炒青皮一錢麥冬一錢半內填硃砂二分線扎泡淡吳茱萸二分廣藿香梗一錢半沉香五分加代赭石五錢煅紅米醋淬三次上方如法煎服一劑至四鼓氣不上並不脹不疼次日復診據述口苦舌乾卻不多飲原方去青皮茱萸加茯神黑山梔鹽水炒烏藥等全愈案張耀文小溲涓滴不爽溺底痠疼刺痛病發無時得之少不節欲奇驗張耀文年逾四旬小溲頻頻欲出出而不爽溺後竅底痠疼刺痛病起有年得之少不節欲舉發無時遍治罔效以致精力不充食飲漸減於辛巳六月二十四始邀予診治脈息右寸關浮數左關尺虛數濕火下注兼之相火不靜當從肺肝腎三經落想元武板五錢炙北沙參三錢知母二錢酒炒黃柏二錢鹽水炒上肉桂二分去粗皮用鮮荷葉一小個托底煎藥服前方兩劑小溲早晨稍稀夜來仍如前六七次惟妙者小便後竅底痠疼刺痛難忍之狀大減二十六日復診原方去沙參加西黨參四錢麥冬一錢半去心五味子二分研服此小便稀而長惟出時不大通暢而小便後之疼痛已全無矣換方六月二十八日復診大生地四錢粉丹皮一錢半炒知母二錢酒炒黃柏二錢鹽水炒西黨參四錢上肉桂二分去粗皮青皮一錢鹽水炒加鮮荷葉一個托底煎服兩帖小便通暢復診六月三十日方用六味地黃湯去澤加知柏麥冬西黨參加荷梗七寸同煎服三劑安妥如前當用益陰以降火養水以滋木之法而全愈案旌德周仁山癉瘧奇效旌德周仁山道光壬午歲七月十八日風暑相搏單熱不寒發為癉瘧每於午後熱至酉後熱漸退但退時無汗必待睡著汗出如淋醒後始知席濕不堪每夜如斯已六七日矣服藥罔效特求治於予予診得脈息弦細小數午後熱時心熱如焚口渴喜飲熱退無汗眼一閉而汗出頃之睡著盜汗淋漓陽盛陰弱榮衛兩傷水中火發與溫瘧何異豈可作泛泛瘧治淡黃芩一錢半知母一錢半葛根一錢半甘草八分小生地三錢麥冬一錢半去心赤苓三錢加淮小麥三錢服前方兩帖瘧至熱減三之一且熱退時有汗非前之熱退無汗而夜出盜汗可比服藥兩劑熱退汗來而盜汗全無妙矣妙矣自覺身中爽快神識稍靜大有轉機加意圖之淡黃芩一錢半知母二錢麥冬一錢半去心甘草七分花粉一錢半青蒿子二錢小生地四錢塊滑石三錢小麥三錢加生薑一片黑大棗一枚去核服後瘧止盜汗全無食飲復而全安矣案葉含青肝胃氣腹脹無時治驗葉含青道光壬午歲七月右脈虛軟左脈弦細素有肝胃氣邇來腹脹無時由下而上肢倦食減或噯氣或轉失氣則腹中漸爽其氣自胸腹而上升必得頭項舉直則氣能噯出而胸頓寬或轉失氣下亦然大便不結不溏每解不暢此氣虛氣滯而脾陽不溫也當用理中湯加益智仁廣木香茯苓木瓜續斷等加沉香汁二分沖服此三帖腹脹減半惟腿膝痠疼腰間板滯未減且呵欠無時亦脾陽之不運速治之免成中滿七月二十一日診又復診二十四日方用附子理中湯加味西黨參三錢焦冬朮一錢半熟附子六分炙草八分淡乾薑六分炒杜仲三錢炒川續斷一錢半炒木瓜一錢半加沉香汁二分沖服前方四劑腹脹頓止大便亦爽又七月二十八診仍用附子理中湯加鹽水炒黃耆歸身山萸肉陳皮等煎服五劑精神愈健至八月初四日用香砂六君子湯加玉竹南棗建蓮女貞青皮兼以養肝舒木取肝脾並調土木合德而收全功案徽歙豐干庭症由嘔惡腹疼誤治垂危治驗徽歙豐干庭年二十六歲道光壬午七月二十九日延診症由六月二十五多啖濕面而起次日覺胸悶不飢身倦微熱嘔惡腹疼醫不審起病之因誤作暑濕治以致吐瀉交作投利濕藥不應又以清暑益氣法甚至腹塊內攻復更醫又以疏通法數帖病益增又有用芩連檳枳等清攻並投病延月餘奄奄一息始求治於余其人肌瘦肉削不飢不納日嘔清水口乾喜飲熱湯到口即吐不嘔時又吐白沫兼之腹疼水瀉晝夜約二十餘次純是薄水小溲少出時甚熱脈右細軟左小弦脾不運胃不和以致上嘔下瀉而中宮阻滯不舒也先理中宮為亟亟也製半夏一錢半淡乾薑八分炒藿梗一錢半苡仁三錢炒旋覆花一錢半生絹包廣木香八分赤苓三錢防風一錢半白芍藥一錢半炒陳皮一錢半加烏梅肉五分臨服入生薑汁七分沖服此瀉止痛平而嘔吐未止服後約未一時藥亦嘔出且不貪食又增呃忒雖有停止大非所宜此胃氣之逆也細審之數日間尚啖炙肉病日加深肌體骨立奈何奈何又八月初一日診調脾溫中冀其嘔止呃停庶有生機焦冬朮一錢半白扁豆三錢炒苡仁五錢炒茯苓三錢製半夏一錢半淡乾薑六分炒木香六分川椒十粒炒開口生薑渣一錢半加母丁香五隻柿蒂五隻上藥煎好去渣入左金丸五分研細沖服此嘔始止腹仍不疼不瀉呃忒亦減夜間小便兩次且長赤而熱出時陰頭小疼小便之長而暢莫過於今日此亦濕邪從小腸而出故大腸之泄瀉止矣又八月初二日方今晨進粥一盞並無嘔意諸恙安妥惟脈息仍細耎無力體倦神疲為慮耳焦冬朮二錢淮山藥三錢炒苡仁五錢炒赤苓三錢姜水炒竹茹一錢半鹽水炒橘皮八分滑石三錢木香六分半夏曲一錢生薑渣二錢加母丁香七隻柿蒂六隻臨服入左金丸五分研細沖服此呃忒又平小溲如前之暢出時不疼飲粥如前又八月初三日方養胃生津佐以舒運生西洋參一錢焦冬朮二錢扁豆三錢炒苡仁五錢炒廣木香六分益智仁八分赤苓三錢玉竹三錢生薑渣二錢廣藿梗一錢半沉香二分切片南棗兩枚去核加生穀芽六錢同煎服此諸恙向安口乾喜飲大減胸悶亦鬆惟少腹稍疼此中宮健運日前之宿滯漸有欲下之勢故覺疼也且大便必然結糞無疑何以知之於前之泄瀉可知泄瀉甚而小溲少小便多而泄瀉平矣今連進調中養胃之劑脾胃漸健肺金得令通調水道下輸膀胱此小便之所以長而暢也既長且暢則大便之結硬更可知矣仲景傷寒中論之最詳當明辨之茲不細注又九月初四日方用理中湯加鮮石斛橘紅木香生薑渣等引以生穀芽南棗河水煎服服後當解結糞兩段小便暢食粥又增少腹稍悶微疼宿垢猶未淨盡結硬之糞足徵前之豫斷不誣也又九月初五日方用四君子加木香砂仁青皮雞內金八味加薑棗煎以和營衛因呵欠多也服後又大便一次不結不溏惟神疲肌瘦肉削脈息軟弱為慮耳又九月初六日方用六君子湯加建蓮肉青皮烏藥沉香補而兼舒俾胃氣旺而脾土運再為之計服兩劑大便又解結糞食飲更貪小腹不悶不疼再劑如前又九月初九日方益氣調中俾氣血榮潤肌體漸豐人參四分沖於白朮一錢土炒茯苓一錢半茯神二錢歸身一錢白芍藥一錢半炒陳皮八分炙甘草八分加大南棗兩枚去核服前方三劑精神日健睡臥漸安原方加黃耆益智仁輩再三劑而病霍然矣後以歸脾丸調理收功案休邑上舍程梅溪感寒挾食治驗休邑上舍程梅溪道光二年壬午八月中秋感寒挾食先寒後熱小溲多此寒感於下焦也脈息浮緊年近八旬輕舒為宜蘇葉一錢半防風一錢半半夏曲一錢半獨活一錢神麯三錢炒楂炭三錢橘紅八分甘草五分廣藿梗一錢半加蔥一枝生薑兩片服此一帖寒熱退次日用和胃法而愈於二十四日歸鄉以享老來之福案門人金書山外痔脫肛治驗門人金書山道光壬午九月素有外痔好酒喜茶忽然肛脫如雞卵大脹墜痛如雞啄起坐不能睡臥不安大便欲解疼痛難忍此痔也脈形右關尺並數知其濕火注於大腸非清不能散非通不能除其脹墜疼痛亟治之免其癰漏之虞薏苡仁五錢炒當歸尾一錢半槐角子三錢研地榆二錢條芩一錢半皂角子八分炒生甘草八分加鹽水炒生大黃七分清解大腸之濕火九月二十七日方據述燈後煎服少頃痛止漸自脹平墜緩夜睡安寧次早視之肛脫如卵者縮小其半可以起坐而未能步行者仍以前方再劑次日侵晨登廁先結後溏礙動外痔痛甚頃之漸平肛門口有兩塊長圓如荔核式此奶痔也究屬濕火下注未能速消內外兼治可也九月二十九日方附後大生地四錢川黃柏一錢歸尾一錢半苡仁五錢赤芍藥一錢半半夏曲一錢半條芩一錢半槐角三錢研生大黃八分赤茯苓三錢上藥十味河水煎服外用白芷甘草朴硝各二錢煎滾先熏後洗拭乾用人中白兒茶黃柏薄荷研粉入冰片一分和勻搽上干則以唾調搽之服藥後並熏洗搽藥肛痔兩枚其一已縮小如黃豆大十去其七八其餘一枚色淡黃者據述此素有之此刻略增大耳稍可步行惟大便時仍疼又九月三十日方用四物湯加山梔連翹槐角地榆赤苓半夏條芩蜜炙升麻輩煎服外熏洗搽藥如前服三帖肛傍素有之一枚又脹痛極坐立不安乃陽明戊土之風熱化燥大腸庚金之濕火下注況舌苔白膩中焦不舒則下焦壅滯良有因也議防風秦艽湯出入之十月初三日方秦艽一錢半防風一錢半皂角子一錢炒枳實一錢槐角子三錢研條芩一錢半車前子一錢半炒赤苓三錢桃仁三錢研歸尾一錢半赤芍藥一錢半炒苡仁五錢服此肛門氣疏便通外痔之脹痛亦寬小便亦暢次日再劑惟大便時氣阻肛門仍有坐立難忍之勢中宮有似飢非飢心嘈不寧之狀又十月初五日方肛脫漸收外痔將平腸中偶而見紅坐立不克自如未免心煩食減診其脈右脈耎短關中見數按之不足左關弦而按之軟自是弦非真弦數非真數得其意者於此中消息之庶乎盡善大熟地四錢焦冬朮一錢半炒歸身一錢升麻二分蜜炙西黨參一錢半皂角子一錢半炒槐角子三錢研柴胡三分蜜炙小青皮八分上九味河水煎服服三劑諸證平妥食飲如常又拾月初八日方大便又有急墜之勢欲解不能並緊難忍權擬一方暫服之生首烏五錢柏子仁三錢炒麥芽三錢炙草八分大麻仁三錢研大南棗三枚去核元明粉六分沖大黃一錢制是方也以仲景麻仁丸合甘麥大棗湯出入用之乃潤燥通幽之法也妙在首烏南棗益陰調中仍不外乎脾腎交通之意歟服後至初更時解結糞如彈丸者四枚解時肛門疼痛至早漸平初九日即於前初五日之方去升柴加柏子仁地榆輩再進二三劑後朝用歸芍六君子丸每服五錢滾水送下午後以後方煎服之用生地首烏歸身女貞柏子仁條芩槐角子郁李仁等煎服計服煎丸半月而收全功矣案昭文邑宰金訒齋先生脘腹脹痛奇驗江蘇昭文邑宰金訒齋先生壬午十一月二十七日脾土不運食滯中宮肝木橫衝腹脹且痛七旬老人脈軟大無力不飲不納中焦氣餒亟宜溫中以和之深慮中滿之虞熟附子七分淡乾薑五分沉香三分淡茱萸三分山楂炭三錢大腹絨一錢半青皮八分加生薑兩片南棗兩枚去核服後痛緩腹仍脹有轉失氣欲大便而未能宜以溫潤法二十八日方用薑附淡茱萸同前加烏藥當歸柏子仁生首烏八錢雞內金等煎服一帖痛脹俱減大便十日未解仍宜溫中運食緣年高脈弱未便擅投攻伐二十九日方用淡附子六分淡乾薑四分烏藥一錢半炒檳榔一錢枳實炭一錢薤白頭二錢陳皮一錢半大腹絨一錢半加雞內金二錢炙服一帖次日早上解不結不軟之糞兩長條胸腹頓寬且不痛脹知飢能納而全愈門人書山謂余曰胞叔抱病有日脹痛異常得先生溫中法一劑知二劑已三劑便通而霍然矣何其神也若斯曰非神也證與脈合藥與病對是以效如桴鼓之相應也書山欽服案休邑詹寅賓子寒熱嘔吐治驗休邑詹寅賓子癸未季春寒熱骨節痛兩鼻熱氣直衝舌苔膩白噁心嘔吐當用蔓荊子防風秦艽半夏曲藿梗橘紅楂肉輩以解表邪服之熱退骨節疼止惟食入仍嘔小腹微疼不喜飲小溲短赤以二陳湯減甘草加藿梗穀芽黑山梔淡茱萸旋覆花等服一帖嘔止痛平而全安案山西宋大成得湯即嘔胸胃作疼治驗山西宋大成癸未孟夏湯水下咽即嘔胸胃作疼脈象沉小左弦細寒氣內蘊食阻於中宜以溫之和之方用蘇梗香附豆豉陳皮木香半曲赤苓神麯藿梗生薑渣等河水煎服一帖減半再帖全愈案李兆文胸悶腹疼治驗李兆文年三旬六月十七日胸脘閉悶腹中小疼舌胎白膩脈象細小小便赤大便四五日未解此濕阻上中二焦治宜溫舒姜厚朴一錢半枳實一錢半夏曲一錢半赤苓三錢廣木香六分陳皮一錢半焦穀芽三錢烏藥一錢半加砂仁末三分沖生薑二片服一帖胸脘頓寬腹不疼小便長遍體爽快惟大便欲解未解十八日用疏通潤腸法少頃大便即通十九日以和胃法而病痊矣案溧陽金元愷溺血成條几危治驗溧陽金元愷年逾二旬道光三年六月二十八得溺血證日三十餘次中夾血條約長四五寸去後莖管中始松少頃或尿血或純鮮紅血忽又出血條如前或弩力睜出尿管中漸鬆頃之覺管中空冷如冰應心而疼腰腿痠軟食飲無味大便欲出不能緣前陰之血去過多後陰之腸燥不潤耳脈右細小乏力左手反關弦細小數深慮神疲難支議益氣養水去瘀生新之法以冀轉機炙黃耆二錢大熟地四錢山藥三錢炒丹皮一錢半炒炒黑蒲黃一錢半炒黑荷葉二錢丹參三錢炮姜三分炒黑柏葉四錢炙甘草八分血餘五分沖人中白八分漂淡服藥三劑據述溺血減半食增便通惟溺管中仍覺冷疼細審之炮姜三分未用因藥店人云此物性熱故去之甚矣不知妙在此君豈可不用乎又七月初二方進前方溺血減半脈仍細軟無力試思人身血有幾何而能當此之去血過多也陰固虧而陽亦傷血之瘀條尚有莖中仍覺冷疼人第知血之熱而不知虛冷而見瘀也庸工焉能明此近代惟薛立齋深得其旨照方服之毋得妄為增減炙黃耆三錢大熟地三錢大生地三錢丹皮一錢半炒黑荷葉二錢炒黑柏葉四錢旱蓮草二錢降香一錢炮姜三分血餘五分沖炙甘草八分丹參四錢服三帖溺血十減其八成條之瘀血頓止惟有點滴未盡莖中疼緩溲出少有不爽食飲漸增再三劑尿血止而安妥如常後以氣榮兩補之法未一月而精神漸復食飲倍增而收全功矣案太平吳卓人泄瀉兩月極險治驗太平府吳卓人年三旬甲申七月初四泄瀉兩月未止且痛食納脘中不爽惟飲粥無妨脈形沉細無力日夕數次脾土大憊豈可渺視之乎焦冬朮一錢半白扁豆三錢炒苡仁四錢炒山藥三錢炒煨木香八分茯苓一錢半炙草八分陳皮一錢淡乾薑六分引罌粟殼去蒂醋炙八分服後晝夜泄瀉只三二次初七日仍以原方去粟殼加煨訶子肉六分再兩劑全愈案溧陽金元愷溺血全愈因二便不暢誤治腹痛難忍睪丸脹大食不喜進幾危治驗溧陽金元愷前曾溺血調治全愈仲秋因二便不暢他醫以通利二便之法前陰稍通後陰仍秘復又往藥鋪告其所由竟用涼膈散內大黃用五錢服後大便仍未通而反增大小腹俱痛劇難忍睪丸脹大食毫不進面青有浮油光起兼之畏寒身熱有頃刻垂危之勢伊叔渭川張燈扣門求救繹其病情實為寒涼攻伐所誤診得脈象細軟無力左脈反關弦緊中下二焦為寒涼所遏表裡不和以故外則畏寒身熱內則卵痛偏左勢屬險途治在溫舒冀其轉機八月廿三日案方附後老蘇梗一錢半桂枝梢一錢淡附子七分甘草八分山楂核三錢小茴香一錢半淡茱萸三分烏藥一錢半生香附二錢小青皮一錢加蔥須五枚服藥後至天明大小腹痛止左睪丸之疼亦減皮內覺熱牽引小疼二十四日診方附後侵晨已飲粥兩盞小便利口淡無味用制香附柴胡升麻赤苓澤瀉山楂核荔枝核小茴香金鈴子青皮豬苓甘草加生穀芽鮮荷葉等同煎服服後大便通胃口漸和能進粥飯惟睪丸尚墜小疼牽引胯內腫硬大小便出時甚熱體虛濕火內郁宜以卻濕兼之清舒冀其速退為最二十六日方附後小生地四錢川石斛四錢赤苓三錢車前子一錢半炒金鈴子三錢研淡茱萸二分黑山梔一錢半通草八分荔枝核三錢生甘草六分橘核二錢澤瀉一錢半加鮮稻葉四錢鮮荷葉一小個服後睪丸墜痛胯內腫硬俱已平妥反覺其癢陰囊起白皮胃和食貪再劑而安然無恙矣是證因庸工誤投寒涼重加攻伐而致劇痛異常幾乎垂危得餘溫舒之法痛勢頓平亦甚幸矣設仍遭若輩之手更不知如何形狀也甚矣醫之難矣案詹介臣目疾治驗詹介臣八月二十日因目疾而肝火內郁喜啖雞蝦引動內風風火煽而左頤漫腫兼之牙疼宜散風火為最方用蔓荊子荊芥白芷薄荷池菊青皮甘草佐蟬蛻加鮮荷葉一小個同煎服服後腫消大半牙疼亦減再劑而霍然矣案妹倩王履安吐血垂危治驗王履安妹倩道光三年十月初十日診素有血症因咳而吐者居多忽於立冬前三日嘔血幾口漸止至初八日夜驟然大吐據述約有四五大菜碗甚至血湧不及吐以致從鼻內噀出當飲童便血勢少平是日夜深在城中過宿初九買舟送歸已夜至初十日邀余往診身壯熱頭少疼咳嗆氣逆痰稠舌胖苔白不飢納少面帶浮光痰中挾血脈見芤數按之無力氣血大虧深恐汗脫亟宜益氣養榮法以固之生黃耆三錢西黨參四錢大生地五錢炮姜五分側柏葉四錢炙人中白八分漂真降香八分白芍一錢半炒旱蓮草三錢炙甘草八分茯神二錢加白花百合二兩煎湯代水煎藥服此熱退自早至未時進粥兩盞惟脈象仍空虛無力為慮耳痰血漸止復診十月十一日生黃耆三錢西黨參四錢元武板四錢炙鱉甲三錢陳阿膠二錢蛤粉炒淮山藥三錢炒巴旦杏三錢去皮尖炙草八分雲茯苓一錢半款冬花三錢血餘四分沖百合二兩如前服此咳嗆氣逆漸減飲粥如前痰血將停復診十月十二日炒熟地四錢西黨參五錢北沙參三錢山藥三錢炒茯神二錢炒棗仁二錢巴旦杏三錢去皮尖紫菀二錢天冬一錢半去心五味子三分炙甘草八分南棗三枚去核服後咳嗆氣逆十減其七痰亦甚少惟脈右軟大無力食飲未健入夜心神不靜交陽分漸安仍將前方略為加減再服四劑昨大便一次不結不溏舌苔白退口苦亦減仍不知飢復診十月十七日炙黃耆一錢半丹參三錢北沙參三錢炙草八分白茯苓一錢半茯神二錢款冬花三錢歸身一錢柏子仁三錢遠志一錢去心炒淮山藥三錢炒海石三錢五味子三分研加白花百合五錢服後咳減痰少早進粥盞許午吃飯半盞夜飲粥如前再劑夜睡漸安胃口漸開復診十月十九日胃氣漸和脾土未運仍宜先調坤元少佐養心益陰之法再為之計斯時食飲漸貪滋陰膩補之劑緩進為妥若以為血吐四五大碗而重投滋補群陰之品固恐膩膈生痰亦慮胃氣難復脾土壅滯耳起初緣大血去多氣血兩傷之際陰火擾亂之時固氣中暫佐滋陰者取氣血並固權擬之法也又不可一概論之西黨參四錢丹參三錢淮山藥三錢炒茯苓一錢半炙甘草八分歸身一錢黑芝麻三錢石斛三錢枸杞子三錢山萸肉一錢半北沙參三錢柏子仁三錢加白花百合五錢復診十月二十三日氣血漸和食飲漸增咳嗆大減惟兩寸脈究嫌細耎難尋夜寐不安左尺虛濡法宜榮衛並治佐以養神安魂為善耳西黨參四錢焦冬朮一錢半茯神二錢炙草八分大熟地三錢歸身一錢炒遠志一錢半去心炒龍齒三錢煅柏子仁三錢左牡蠣五錢煅百合五錢南棗兩個去核復診十月二十七日服前方頗合自覺左乳下板滯不疏夜間痰中挾血幾次幸食飲未減速止為妥西黨參四錢北沙參三錢山藥三錢炒茯苓一錢半人中白七分漂淡炙甘草八分柏子仁三錢降香八分叭噠杏三錢去皮尖款冬花三錢元武板五錢炙血餘五分沖服一劑痰中仍有血再劑血止復診十月二十九日炙黃耆三錢北沙參三錢丹參三錢山藥三錢制首烏三錢巴旦杏三錢去皮尖茯神三錢天冬一錢半炙鱉甲三錢炙甘草八分白花百合五錢血餘五分沖加老枇杷葉三大片去毛蜜炙復診十二月初九日吐血之後調治頗宜食飲如常精神漸健遵俗見藥補不如食補圖口腹之慾而竟忘氣血之未充精神之未旺耶停藥月餘漸自咳嗆氣逆稠痰盈盂從此食減舌色呆白胃氣攸關脈右急關滑皆無力左關弦兩尺浮濡乃病後氣血大虧又值嚴冬水冷金寒之際子母並虛已屬棘手若再見血尤非所宜生黃耆三錢北沙參三錢山藥三錢炒炙草八分雲茯苓一錢半巴旦杏三錢陳阿膠三錢蛤粉炒桔梗一錢枇杷葉三錢去毛炙廣皮白八分黑南棗三枚去核百合四錢服此當夜咳緩次日再劑夜間咳止痰亦全無惟飲食未貪十一日原方去阿膠桔梗陳皮加制首烏歸身款冬花加北五味子三分同煎服後日間咳嗆大減稠黏之痰亦甚少服六劑大為合宜惟身中氣榮兩虛有畏寒發熱之勢復診十二月十七日入晨畏寒午後微熱衛陽虛而榮陰虧日咳痰出則夜必安小便如常大便兩日一解解時氣急難忍服藥數日咳減其半知飢食有味而精神未旺究宜加意調攝不致前病復發為善耳炙黃耆三錢西黨參四錢山藥三錢炒炙草八分鹿角霜二錢淡蓯蓉一錢半大熟地五錢歸身一錢半制首烏三錢白芍藥一錢半炒五味子四分研大棗三個去核黑芝麻三錢炒加生薑皮五分服七八劑虛寒虛熱之象大減所咳之痰皆自左乳下上升俟痰咳出方平痰不升則不咳所咳之痰稠薄有小沫余思胃之大絡出於左乳下究屬脾胃大虛肺氣不固也當用異功散加首烏熟地叭噠杏芝麻歸身山藥輩取其扶土生金固氣養水亦宗經旨脾腎交通金水相生之意云囑服三四劑後至來年新正用歸芍六君子丸每清晨服四錢滾水送下晚間以都氣丸五錢開水送之暫停煎劑三二日復診道光甲申正月初四日案咳嗆氣喘因痰而至痰去咳平宜乎治痰為最然脾肺久虧者又不專乎治痰為先蓋脾虛生痰氣虛發喘金不生水相火易升初六交春深慮喘汗交加為此時計究宜益氣調中加之養榮以冀喘咳漸平庶乎可也人參五分沖炙黃耆三錢焦冬朮一錢半茯神三錢歸身一錢制首烏四錢柏子仁四錢炙草八分山藥三錢炒五味子四分研海浮石三錢加蛤蚧一錢去頭足用尾尖酥炙黑大棗三枚去核服後至立春夜半稍有喘汗之勢幸而得免足徵固氣養榮之力歟正月初九日原方去蛤蚧大棗山藥海石以黨參易人參加大熟地天冬等十一味照煎方分量十倍內黨參五兩五味子一兩其餘照煎方十倍如常法煎膏候至滴水不散貯瓶內置井水盆內一宿退火氣每晨用膏五六錢隔湯燉溫服服此後咳痰俱無食飲漸復睡臥安寧惟多步勞力則左乳下轆轆有聲行至中脘即有氣急之勢沒不遠步多勞則精神如常甲申三月十七日又定丸方於下是方頗有至理照方制度修合得血肉有情之品而同治之不無小補云爾生黃耆二兩用防風一兩五錢煎濃湯同黃耆拌透曬乾焙研西黨參三兩用北沙參二兩煎濃湯拌透黨參曬乾同焙同研焦冬朮二兩干百合四兩山藥三兩炒巴旦杏三兩去皮尖大熟地六兩用砂仁末一兩同搗元武板四兩炙天冬一兩半去心五味子一兩白醜筋四兩切片砂炒豬脊髓五條蒸熟搗歸身一兩半酒洗炙甘草一兩半雲茯苓一兩半白芍藥一兩半炒陳皮一兩半上藥十七味為細末先將熟地脊筋同搗入藥加煉白蜜再搗和勻丸如桐子大每服五錢清晨滾水送下此丸服畢諸恙向安矣案歙縣吳聲振高年濕毒癢無寧刻治驗徽歙吳聲振年七十五歲道光癸未九月初十日診因長夏生肚疽收功後兩股腿胯及肢臂灣內俱生濕毒小㿔癢極難忍抓無寧刻惟浴後稍安隔夜依然終無治療喜其食飲精神如常特求余視知其濕毒未楚當以生地丹皮萆薢苦參甘草白朮苡仁黃柏輩以涼血解毒卻濕法治之外用乾蟾蜍皮二兩干浮萍草四兩青蔥五兩蒼耳子四兩白芷二兩共五味量加河水煎湯置大盆內不可加水候稍熱氣稍減用板放盆邊上將身坐上先熏後浴以棉布蘸湯淋洗下體候湯溫坐盆內遍淋周身惟頭目不可淋洗浴後拭乾避風為最兩日後延治孫女據述當服余方並浴後甚妙每夜癢極難忍之勢十去其八再以前方減半如法浴之而癢若失矣妙乎不妙即此觀之有一證必有一方惟人不識證所以用藥無功也明乎此則治證如拾芥耳案徐云坡子房勞感寒治驗徐云坡子年廿歲癸未十一月初四日下焦感寒停食手足逆冷腰疼足蜷尺脈沉緊其為受寒於房勞之後也無疑細繹之曰誠然當用穭豆皮獨活香附木香杜仲神麯楂肉木瓜蔥須等煎服服後腰疼足蜷頓平惟頭眩不飢胸悶餘邪宿食未清次日用蔓荊子蘇梗穭豆皮枳殼製半夏神麯麥芽木香加蔥白二枚煎服全愈案余於癸未九秋心嘈咽塞治驗余於癸未九月間心嘈咽塞得食稍緩早平晝覺夜發二三次夜半偶有之得糕餅果物下咽似緩頃之又至胸脘緊束牽連咽管似噎並氣結氣一下達則喉中有泛泡之聲下行即平中午吃飯一二口偶而咽塞氣噎難忍得氣下行即已或以湯淘食則無所苦此噎之漸也每發在季秋間午後喉舌乾燥卻不喜飲幸飲食如常睡臥安寧先調心脾庶乎漸安當以五味異功以茯神易茯苓加炙黃耆歸身遠志棗仁代赭石大棗等十一味河水煎服四帖日間固平即夜半亦大減再用歸芍六君子湯四五劑晝夜俱安惟天明後稍有一二次適大便不結原方加扁豆服之便結不溏舊恙未發半月後因勞碌夜間又有脘腹氣緊咽塞之勢即以原方加扁豆之方服之頓平案南京李燦明腸紅治驗南京李燦明年四十九歲癸未孟冬素有腸紅今冬復發月餘未止每大便必有血不便卻無亦不拘拘於糞之前後醫作濕熱治間有以固澀兼補者而總不離清火涼血之法故俱罔效先大人云凡下血腹中不痛謂之濕毒驗之屢屢余診其脈右關虛軟左關弦細此脾不能統肝不能藏當從肝脾治是為探本窮源之法西黨參四錢於白朮一錢半炒白扁豆三錢炒炙草八分丹參三錢炙鱉甲三錢側柏葉四錢炙血餘五分沖百草霜一錢荷蒂包紮同煎陳棕灰二錢存性伏龍肝三錢藕節七枚上十二味河水煎內血餘研細沖服服此初帖侵晨大便腸血稍減次日再帖早上大便血止惟兩乳脅傍少有不舒之象亦關肝胃之不和也又復診方生黃耆三錢鹽水炒焦於術一錢半白扁豆三錢炒苡仁四錢炒廣木香五分丹參三錢歸身一錢半陳皮一錢半炙鱉甲三錢伏龍肝三錢百草霜八分荷蒂包紮血餘五分沖上十二味如前法服後兩乳脅下松爽每大便腸血全無又復診方肝脾並治氣榮兩補服此數劑而收全功生黃耆三錢鹽水炒西黨參三錢淮小藥三錢炒苡仁四錢炒伏龍肝三錢制首烏三錢炙鱉甲三錢木香六分側柏葉三錢炙陳皮一錢半歸身一錢炒加血餘五分研極細沖案休邑程宏元腹痛難忍寒與蟲並治驗休邑程宏元年十九歲十一月初七畏寒腹痛痛在臍之上下其痛據述如拔腸之痛忽止忽痛痛甚口角流涎唇紅舌膩脈象弦細病起數日外有寒而內有蟲也先宜散寒止痛為妥方用桂枝蘇梗淡茱萸乾薑木香烏藥小茴香楂肉陳皮青蔥等兩劑畏寒止臍腹痛如前復診用後方制香附三錢苦楝子一錢半研淡乾薑八分炒烏藥一錢半廣木香五分切片淡茱萸四分半夏曲一錢半檳榔一錢半烏梅肉一錢半加開口川椒二十一粒同煎服三劑痛止八九再劑全愈案呂毅庵餘熱未清誤投寒涼以致嘔吐治驗呂毅庵五月初三日寒熱未罷餘邪未盡誤投寒涼以致嘔吐無時舌苔膩厚小溲短赤不飢納少延綿半月素體陰虛而邪郁陽明未便擅補宜先和胃佐以清舒庶無變幻生薑汁炒半夏一錢半生薑汁炒生山梔一錢半老蘇梗一錢半防風一錢半赤茯苓三錢苡仁四錢車前子一錢半加雪梨肉八錢同煎服一劑寒熱退嘔吐頓止舌苔膩厚減半溲淡且長漸可進食次日以二陳湯加鮮石斛黑山梔苡仁生穀芽砂仁等以和胃兩帖而愈矣案木川文學吳磊齋素好飲酒以致得食即瀉迄今半載肌瘦體羸危症治驗木川文學吳磊齋年三十八歲道光甲申五月二十三日延診細繹病情素好飲酒邇年尤喜火酒每日數餐以致肌體羸瘦咳嗽喉疼便泄直溜得食即瀉晝夜數餘次業已半載諸治罔效告治於余診得脈形虛濡面色痿黃知其濕熱傷脾而土弱虛火爍肺而金哀此便泄咳嗆等證之所由來也宜戒其酒而治以藥則可治以藥而加之酒則不可請問醉翁之意何在西黨參四錢淮山藥三錢炒芡實三錢炒炙甘草七分大南棗五錢去核建蓮肉三錢去心炒款冬花二錢禹餘糧三錢赤石脂三錢加北五味子三分研同煎進前方兩劑日瀉三四次夜僅兩次最妙者食後不瀉即瀉亦非前之滑溜而不自覺者可比且連日無小溲盡歸大腸而出自進予方後小便頓暢大小分利夜間好眠之極其腰疼腿痠等亦不自覺即咳嗽喉疼亦從斯緩矣又復診五月二十五日據述食飲倍增早上飲粥中午可進飯半盞並啖醬炙肉三塊因瀉減而即恣啖厚味吾嫌其早貪口味猶恐變端疊出緣久病之軀必得食飲健旺氣血充和肌體易復豈圖厚味而能愈疾也仍以原方加煨木香五分用河水三飯碗將前赤石脂禹餘糧原方同煎至一碗半服多煎者取其性之柔和濃厚而留戀於腸胃且得石脂餘糧之黏著則腸胃更不至滑溜也制方之意頗妙服後果如桴鼓之應自愈之後並不加意圖維數月間酒性復萌縱啖厚味以致於病復難挽誠可惜矣案王宗華甥暑熱症治驗王宗華甥甲申六月初九得暑熱症忽然畏寒頃之身熱頭脹當用疏解午後又寒復熱至晚嘔吐次日熱退午前畏寒肢冷一二時周身仍熱手足亦溫飲湯不嘔舌苔白膩脈象浮弦乃邪伏募原究未達表故膚燥則遍身不松汗出身潤則周體松爽矣治宜解表和中俾邪外徹為最用竹茹瓜蔞皮小生地丹皮青蒿子地骨皮蔥汁炒防風薑汁炒半夏薄荷赤苓等服後身熱稍減日晡略增仍少噁心舌苔白膩胸脘氣短不能提起此邪郁陽明宜以退熱解肌和胃之法冀其得汗而解小生地三錢粉丹皮一錢半地骨皮一錢半赤苓三錢葛根一錢半半夏曲一錢半瓜蔞仁三錢黃芩一錢半鮮石斛五錢陳皮八分加藕一兩半同煎論暑月身熱四日未解理宜竟用清涼除熱之法而其中晡時加甚少頃又緩舌苔白膩噁心尚存究竟邪猶鬱於陽明胃土治法當從清涼退熱中佐以葛根半夏之解肌和胃俾其邪由肌解而熱自退制方之意妙在二味燈後進藥更余時周身戰慄頃之遍體汗出如雨漸漸熱退身涼三更後飲粥而安快甚快甚案山西介休張旭升臍腹上下痛甚治驗山西介休張旭升六月二十四臍之上下作痛痛甚塊結如石伏於脘底左右俱有按之稍緩寒與氣食交阻病起二旬脈來沉緊小滑顯有明徵擬溫中法用厚朴香附乾薑草蔻木香陳皮赤苓甘草萊菔子輩煎服一帖痛稍緩塊亦漸小大便溏糞一次又復診六月二十五日方制香附三錢熟附子五分淡茱萸三分神麯三錢炒炙甘草六分廣木香五分烏藥一錢半陳皮一錢加雞內金二錢炙服後痛與塊俱減十之八次日用炒焦扁豆木香陳皮烏藥茯苓元胡索淡茱萸甘草益智仁山楂肉等煎服痛止塊消而全安案歙縣鮑云樵痰症丸方調理治驗計三方歙縣鮑云樵先生丸方道光甲申閏七月初一日案年三十九歲原任浙江玉泉場證脈合參素好濃茶痰吐盈盂精薄囊冷攸關脾腎脾土虛而濕痰上溢腎陽虧而精氣不充無怪乎痰多精清而囊冷也此右關之所以虛弦弦主痰飲尺脈遲耎左關尺弦細虛濡顯有明徵法宜厚培坤元大壯坎宮不涼不熱不潤不燥其中水火宜平而不宜偏取水旺而木滋相火自靜火足而土溫濕痰自除正合脾腎同治之法豈僅愈疾已也從茲氣血融和精氣貫注百脈流通純陽子云精養靈根氣養神於此中消息之他日充閭之慶可較商瞿之有後矣充閭注賈充始生父逵曰後當有充閭之慶故名充字公閭商瞿注商瞿年三十八無子孔子曰無隴也瞿過四十當有五丈夫今果然家語制首烏八兩元武膠三兩炒成珠甘枸杞三兩懸火焙仍要紅色山藥三兩炒山萸肉二兩菟絲子四兩蒸熟於白朮二兩土炒再以黑芝麻一兩同炒同研茯苓二兩人乳拌曬益智仁二兩製半夏一兩半線魚鰾三兩牡蠣粉二兩同炒杜仲二兩鹽水炒炙甘草一兩半新會皮一兩半陳醬油炒上為細末用西黨參八兩大有黃耆三兩同煎膏代蜜為丸如桐子大每服五錢清晨滾水送下或橘餅湯送亦可此方服之甚妥據云服畢照方又合一料服後諸恙向安惟痰仍多素好之茶未能戒耳又復診丸方乙酉二月十三日制首烏八兩元武膠三兩炒珠鹿角膠二兩炒珠山藥三兩炒覆盆子二兩酒拌炒淫羊藿二兩酒拌炒枸杞子三兩焙勿黃芡實三兩炒山萸肉二兩杜仲二兩鹽水炒砂仁一兩半上十一味為細末煉白蜜為丸如小綠豆大曬令極干外用西黨參四兩於白朮一兩半土炒茯苓一兩半炙草一兩半夏曲一兩半沉香一兩勿經火牡蠣粉三兩煅七味各研極細粉用新會皮二兩煎湯灑疊為衣曬乾每服五錢清晨滾水送下是丸服畢吐痰十去其八惟陰囊之冷如前其餘俱平妥又復診丸方乙酉九月二十二日連進前丸諸恙悉減得子甚艱證脈合參水火併濟保腎固精即種子之良法也治法戩榖頗有至理存焉制首烏八兩龜板膠三兩炒珠鹿角膠四兩炒珠天冬二兩去心菟絲子三兩酒蒸曬沙蒺藜四兩酒拌蒸線魚鰾三兩牡蠣粉同炒茯苓二兩柏子仁三兩去油覆盆子四兩去蒂酒拌蒸曬五味子一兩五錢連核肉焙懷牛膝二兩陳酒蒸枸杞子四兩製法附後揀紅潤者用陳酒河水各半杯和勻浸枸杞子約三時取出曬乾分為四分以一兩用川椒一錢半拌焙乾揀去川椒以一兩用小茴香一錢半拌焙乾揀去茴香以一兩用黑芝麻兩錢拌焙乾不揀去芝麻以一兩同青鹽二錢同焙乾不揀去青鹽焙法以繩掛銅盆懸火三四寸不住手將銅盆旋轉焙至燥要枸子仍是大紅焙焦則不靈各研極細和勻前藥同丸上藥十三味法制為末用羊內腎一對外腎一對俱以鹽酒拌蒸熟搗入和勻量加煉白蜜和丸如梧桐子大每清晨用五錢臨臥用三錢俱以淡鹽湯送下服此一料冬間畏冷及陰囊之冷俱大減食飲便溺如常頗為合宜復診十二月十五日即於原方中略為損益之再加黨參黃耆煉蜜丸如桐子大每服五錢清晨滾水送下案鮑氏價人怔忡治驗鮑氏價者怔忡有年心蕩無時邇來胸膺氣築不食少緩食稍增則肚臍收縮吊緊背曲兩乳下有似筋抽難狀之勢頭眩足浮脈象細小進後方六帖心蕩大減食後臍腹之收縮頓平背曲頭眩俱緩方附下丹參四錢茯神二錢遠志一錢去心炒沉香五分柏子仁三錢歸身一錢半木瓜一錢半元參三錢加白檀香一錢五分同煎復診仍以原方加西黨參二錢煎服數劑而痊案山西介休張仁伯胎瘧間發治驗山西張仁伯胎瘧間發寒輕熱重午後始至已發五六次舌苔白膩如粉小溲色赤大便稀糞水果濕面不禁腹中有塊邪食內蘊脈象弦硬正值九秋速退瘧邪以免變幻擬清脾飲出入之姜厚朴一錢半柴胡一錢黃芩一錢半炒甘草六分山楂肉三錢半夏曲一錢半青皮一錢滑石三錢車前子一錢半炒大麥仁三錢炒草蔻仁一錢炒加生薑二片松蘿茶葉二分今系瘧發之期服一劑即止次日原方加減佐以和胃兩帖而痊案山西任承山風邪外襲頭痛畏寒治驗任承山山西介休年二十二歲九月十二頭疼畏寒發熱骨節疼舌苔膩脈來浮緩風邪外襲治宜於散羌活一錢半防風一錢半蔓荊子一錢半甘草六分秦艽一錢半神麯三錢炒半夏曲一錢半陳皮一錢半川芎一錢山楂肉三錢炒加生薑二片蔥白兩枚服後寒熱頓退案山西宋鑑堂胸脘脹痛嘔吐酸水治驗山西介休宋鑑堂四月初九胸脘腹脹悶且痛難忍嘔吐酸水舌苔白膩小溲赤疼脈右沉緊左小弦擬溫中定痛止嘔之法方用厚朴薑製半夏木香豆蔻菔子赤苓橘紅麥仁車前子等煎好去滓用左金丸五分煎藥湯送下服後嘔酸腹痛頓止惟胸脘脹悶未平次日復診用熟附子七分薑製厚朴一錢白蔻仁八分茯苓二錢陳皮一錢大腹絨一錢半砂仁殼一錢上七味加雞內金一錢半炙同煎據述服後未一時即覺胸脘脹悶頓松次早再劑豁然而愈至半月後以丸方調理用香砂六君子去半夏四物湯去川芎加山藥山萸肉女貞子等十三味為細末煉白蜜和丸如桐子大每服五錢清晨滾水送下案蕭鬥光陰虛吐血幾危亟救治驗蕭鬥光年逾二旬道光丙戌五月九日診素體陰虧驟然血吐兩三盞申後又吐如前之多今早復吐兩盞兩日間約吐七八盞特求救於余診得脈形虛芤左弦數無力深慮汗脫亟亟扶正猶恐鞭長莫及後方服兩劑午後約痰紅數口再五六劑而血停食健矣大生地七錢元武板八錢炙西黨參四錢丹皮一錢半側柏葉四錢炙炙鱉甲四錢淮山藥三錢炒麥冬一錢半陳阿膠三錢蛤粉炒叭噠杏三錢去皮尖北五味子三分研茯神二錢加藕節七個血餘八分研沖
