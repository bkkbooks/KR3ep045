body:
  text: 卷之五案山西梁濟生氣食相凝臍腹脹痛兼嘔治驗山西梁濟生丙戌五月二十日氣食相凝臍腹脹痛得湯即嘔小溲短赤脈象沉滯宜以溫舒薑半夏一錢半淡乾薑七分炒神麯三錢炒生香附二錢廣木香六分廣藿香一錢半楂肉三錢炒車前子一錢半炒研枳殼一錢半赤茯苓三錢加生薑三片服藥後痛脹頓止嘔吐減小溲長再劑霍然矣案介休任富泰冒風霖雨濕侵腠理臂痛如割兼寒熱間瘧汗出過多神虛見鬼危瘧奇驗介休任富泰丙戌六月初八冒風淋雨濕侵膚腠始則臂腕痛如刀割繼而寒熱交作當服卻濕疏表之劑兩日間轉為太陰濕瘧熱甚於寒間日一發據述昨午臨期寒少熱多口渴喜飲舌膩溲赤因無汗而加棉被以遏之頃之汗出如雨豫深囑其不可遏汗況暑天乎何西人之性躁若斯不思水濕暴雨侵於皮膚而取之以汗者宜徐而少得微汗則濕邪漸解此正仲師治濕之妙法非比風寒之邪可一汗而解也濕分表裡治里濕以利小便為第一義治表濕以取微汗為第一義瘧雖太陰而脈象弦細右關浮緩而細細者濕也浮而緩者風也豈非風濕之感於肌膚而侵於太陰濕土者乎然脈左之細弦是又少陽而兼乎太陰者有之仲景云瘧脈自弦由少陽而兼他經者亦有之謂他經而全不涉少陽者則不成其為瘧矣旨哉斯言於是用小柴胡湯加草果藿香車前滑石赤苓青皮輩早上煎服午後瘧至寒熱俱輕轉為單日發時惟腕臂仍痛較前減半而痛時仍不能耐即於原方加減瘧日減輕來亦漸早三四日來每瘧至腕臂必痛復診六月瘧邪漸減寒熱俱輕第脈息軟大無力左關弦細連發有日汗出過多正氣不足陰氣又虧發時臂痛傷神汗乃心液神更傷矣不飢不食胃土又傷頗屬棘手議養陰祛邪以冀瘧停醋炙鱉甲四錢制首烏三錢青蒿子一錢半當歸二錢酒炒常山一錢煨草果一錢栝蔞根一錢半黃芩一錢半炒醋炙青皮一錢生甘草六分赤茯苓一錢半加生薑二片黑大棗一枚去核服一劑瘧止臂腕之痛亦大減所恨者天明病者心煩啖西瓜碗許頃之腹中難過呻吟午前瘧復來當用西瓜汁一盞半生薑汁半酒杯和勻用二陳湯加清舒和胃之法以前汁同煎至一半服服後瘧又止縱啖西瓜而瘧復豫即以西瓜汁煎藥治之而瘧立愈此中微妙與楊介治宋徽宗用冰水煎藥之意同也昔徽宗食冰太過病脾疾國醫不效召楊介進理中丸上曰服之屢矣介曰疾因食冰臣請以冰煎此藥治受病之源也果愈復診昨瘧復雖停而心中煩躁擾亂食少妄語目瞑見鬼無算脈象虛豁似空知其陰氣虧而陽不能入於陰也究非陽虛見鬼而致汗脫者可比也病者於床中向余跪哭求救當以和陽益陰斂神法以救之制西洋參二錢茯神三錢炒棗仁一錢半麥冬一錢半五味子四分研甘草七分左牡蠣五錢煅塊遠志八分去心加大南棗兩枚去核生薑兩片服前方頃之安睡半日醒後鬼不見矣隨飲粥盞許倦而不煩復又飲粥頗安是證見鬼因前汗出過多心榮有虧加之瘧止而余蘊之邪尚未淨盡故心煩攏亂神不守舍而致見鬼也前方服之如響斯應設或真陰內虧虛陽外越而致見鬼者又當以回陽法急固之豈此方所能治也當深辨之前方加減二三劑食增神安便溺未暢睡臥漸平後以異功散加生地麥冬歸芍輩調理數劑津液漸復脾胃漸健再以歸芍六君子未匝月而全愈案廬州張耀宗堂弟不服水土縱啖葷腥以致嘔吐泄瀉轉筋極險治驗廬州張耀宗堂弟年三十五歲道光乙酉八月十二初次來蘇水土不服縱啖油膩葷腥泄瀉日數餘次迄今四日忽然轉筋於兩腿足跗此緣瀉久傷脾脾虛肝乘而致筋轉也脈象虛弦右脈沉細舌苔白膩中宮又為寒阻以故進湯即嘔幸不腹痛病勢匪淺宜以和胃止瀉舒筋為最煨葛根一錢半煨木香一錢白蔻仁八分藿香一錢半制香附三錢半夏曲一錢半枳殼一錢木瓜一錢半防風一錢半白芍藥一錢半加生薑一錢半蔥白二枚燈後進藥少頃嘔吐宿食並蛔蟲兩條至於泄瀉一夜平安次日早晨僅瀉二次申刻復診並未一瀉轉筋亦停方用薑厚朴薑半夏木瓜煨木香神麯楂肉赤苓陳皮枳殼烏梅肉等加炒開口川椒十粒煎服兩帖而愈案吳菊圃內侄蔣世兄伏暑誤治以致身熱不徹邪陷耳聾臍下痛溺時疼極險奇效吳菊圃內侄蔣世兄十三歲乙酉八月十七日身熱一旬未解始投清疏不應復以生地羚羊翹梔青陳牛蒡地骨皮輩服後仍熱再進便溏胸悶藥投數劑以致耳聾臍下疼溺時竅痛溲赤病日加深特延余診其脈左弦細右小舌白如粉胸前氣悶溲短赤色邪陷耳聾此伏暑症也當用香薷飲加赤苓木瓜蔻仁蔞皮等煎服身熱漸減氣悶稍寬白苔漸化小溲仍赤又復診伏邪晚發頭額潮潤則熱勢必清設不潮潤則身中乾熱不爽足徵伏邪內陷可知證脈合參沖齡陰虧邪陷議益陰徹熱法冀其轉機青蒿子一錢半炙鱉甲三錢半夏曲一錢半葛根一錢半前胡一錢半赤茯苓三錢車前子一錢半炒甘草八分枳殼一錢半加白蘿蔔汁半酒杯沖服前方潮潤適意胸前氣悶亦爽自早至申飲粥三盞小溲赤減耳聾漸輕大有生機復診原方去前胡枳殼加白通草陳皮再劑熱退諸恙若失後以養胃生津調理收功案山西梁茂千寒凝氣阻泄瀉腹痛治驗梁茂千年三十四歲西人喜啖濕面加之寒凝氣滯以致腹痛不止自服牽牛等甚至泄瀉無度痛劇防厥慎勿藐視生香附三錢廣木香六分乾薑八分半夏曲一錢半白蔻仁六分赤茯苓三錢陳皮一錢半山楂炭三錢六神麯三錢炒加生薑二片上藥煎服一劑痛止次日復診舌苔尚膩食滯未清原方去香附蔻仁加藿梗萊蔔子砂仁等兩帖而愈案山西董湘文兩脅脹疼波及肩背腰胯外受風寒內挾食積治驗心中寒者其人病心如啖蒜狀山西董湘文兩脅作脹兼疼舌苔白膩如粉肩背腰胯痠疼不已體倦欲睡溲便不爽皆外受寒濕內挾食積溫舒為宜秦艽一錢半茅山術一錢半炒生香附三錢木香八分白豆蔻七分六神麯三錢炒大腹絨一錢半枳殼一錢半大麥芽三錢炒淡乾薑七分車前子一錢半炒加生薑三片服一劑兩脅脹大減腰胯肩背痠疼已平惟胸中作痛愈甚舌苔仍白如粉自覺脘中如啖蒜之味此濕去而寒未撤也金匱云心中寒者其人苦病心如啖蒜狀即是謂耳余用蘇梗桂枝乾薑草蔻砂仁香附枳殼淡茱萸木香陳皮生薑等煎服一劑而痛頓止余以溫舒而治脘中之寒如啖蒜之味者與仲聖暗相符歟案餘次子茂常仲夏出正痧極重治驗餘次子茂常年十九歲道光丙戌五月出痧於初四五日身倦微熱至六七日覺眩不飢目眶疼至八日用疏解藥兩顴額少有紅點隱隱咳嗽食減仁端録云熱至六七日而痧始出矣又必出現三日身和色淡漸沒為佳至初九日再劑身熱漸增於初十早晨始現正痧頭面兩顴色紅點現及鼻梁手臂滿布日三四潮胸背稍稀兩足甚少舌苔淡黃溲赤當用前胡杏仁桑皮地骨皮蟬衣桔梗連翹薄荷穀芽滑石甘草西河柳等煎服至夜眼淚始出並清涕至十一日痧將齊熱未除早晨痧點如昨覺喉干兼咳小腹微疼大便三日未解舌苔膩黃小溲仍赤方用前胡杏仁蘇子桔梗牛蒡枯芩桑皮地骨皮連翹赤苓甘草西河柳等煎服至點燈後頭面甚熱咳嗽喉疼痰不易出是晚又以葛根前胡蘇子杏仁牛蒡馬勃桔梗甘草薄荷貝母黃芩枳實煎去渣置碗內入生大黃六分泡藥碗內蓋須臾服未幾即瀉稀糞二三次至十二日寅卯時身熱如昨手臂足之痧點較頭面愈增滿布自早至午又瀉二三次痧仍日潮兩次巳後疼止瀉平痧正齊透十三日用生地羚羊角牛蒡連翹薄荷葛根川貝甘桔木通等煎服後熱緩痧點紅減至十四日早上熱始大減痧點漸退用瀉白散加銀花知母石膏元參蘆根等煎服至十五日熱平痧退鼻中清涕常有再以清養肺胃之劑調治全愈案徐繩武咳嗽匝月痰出不易治驗徐繩武年逾二旬咳嗆匝月痰不易出午後發熱口乾小溲赤法宜潤燥寧嗽再咳防血丙戌七月十六日方老枇杷葉三錢去毛炙桑白皮一錢半蜜炙黑芝麻二錢炒前胡一錢半白杏仁三錢赤茯苓二錢車前子一錢半炒研蛤殼三錢加藕二兩切片同煎服兩帖咳減痰肯出午後熱緩原方加減再兩劑而全安案歙縣孝廉洪季威先生仲秋得伏暑極險治驗歙縣孝廉洪季威先生年逾四旬於丙戌仲秋得伏暑症據述病情前月遠出天氣炎蒸舟中過啖西瓜寒涼阻胃素體豐肥濕痰中虛途中冒暑貪涼八月上旬回蘇後漸有畏寒舌苔膩白自服薑附各一錢半又蘇葉三錢佐桂枝厚朴等溫熱之藥過重巳後舌苔白退而復白至十六日始問治於余診得脈象軟小而濡左脈沉細而弦知其暑伏濕阻連日口渴喜飲溫湯汗出如雨胸前悶身微熱小便短赤舌苔糙白得湯即嘔時吐稠痰夜有昏語眼閉即夢證脈合參暑濕感於盛夏發於深秋治法未當疾反增重亟宜祛痰以止嘔利濕以清暑為緊要關頭薑製厚朴一錢旋覆花二錢絹包炒半夏一錢赤苓三錢薑汁炒黃連五分鹽水炒橘紅七分塊滑石三錢車前子一錢半炒加鮮西瓜子四十粒不落水共藥九味河水煎好去渣入生薑汁八分沖服服後嘔止痰減熱退舌苔漸薄口仍喜飲小便仍赤三四日不能進粥又兼肝鬱夜不能寐擬和胃舒肝法用二陳湯加鮮石斛生穀芽旋覆花絹包扎沉香白蔻仁鮮荷葉等煎服臨服入川鬱金四分磨沖服之當晚即能安臥次日再劑小便色淡口不渴矣又解結糞如彈丸者數枚惟食飲仍未貪耳復診細審之諸恙俱減惟食未貪自覺胃中冷氣上衝左脘有一塊氣阻不爽此胃土不溫而肝木不舒也議溫胃舒肝之法方用建蓮肉三錢去心茯苓一錢半大南棗兩枚去核川淡附子三分淡乾薑四分焙香附一錢半小青皮八分生穀芽四錢煎服兩帖夜能多寐上衝之冷氣並左脘之塊俱不覺矣余因其不貪食囑其以鮮芡實搗爛絞汁燉滾調如漿粥少加白糖沖服清香開胃之良法余屢驗之或再以炒米粉間服如法行之可日進二三盞大小便通利神識漸安惟覺其食少而人軟倦乏力耳復診生西洋參一錢半建蓮肉四錢去心生益智仁七分茯苓一錢半生苡仁五錢金石斛五錢小青皮八分甘草六分大南棗兩枚去核加陽春砂仁二分沖服前方三劑漸能進食且知飢安臥四鼓可進建蓮桂圓一盞清晨飲粥盞許午前進飯鍾許中宮得食漸有運動之機復診用四君子湯去白朮加山藥歸芍南棗木瓜青皮烏梅等服之日進粥三盞午前吃飯一盞知飢有味四鼓時進食如前後以五味異功加味合歸脾湯法調理一月而痊案王慶書濕溫症寒熱頭疼欲嘔兩脛冷治驗王慶書年逾二旬道光乙酉五月二十三濕溫症先寒凜後發熱熱無巳時似汗非汗口乾喜飲卻不渴舌苔膩白小溲短赤頭痛欲嘔未病前曾食冷飯胸悶不飢晨輕午後煩兩足小腿覺冷脈象濡細此濕溫也服清暑等劑不應特延余診治當用蔥汁炒豆豉三錢半夏曲一錢五分蔓荊子枳殼藿香赤苓各一錢五分楂肉神麯各三錢白蔻仁六分加生薑皮六分蔥白二個煎服服後兩脛不逆冷欲嘔止舌苔轉淡黃仍先寒凜而後熱熱無停期頭重痛目紅腫復診五月二十四日方防風皮一錢半羌活一錢半葛根一錢半半夏曲一錢半焦穀芽三錢神麯三錢炒連翹一錢半去心赤茯苓二錢薄荷一錢半白蔻仁五分研加生薑皮五分蔥白兩枚服此畏寒止熱稍減大小便利稍可進粥頭痛胸悶背脊遍體不爽俱未一減復診五月二十五日方防風皮一錢淡豆豉三錢佩蘭葉一錢半挪熟羌活一錢半白通草八分霍山石斛三錢塊滑石三錢薄荷一錢秦艽一錢半瓜蔞皮一錢半連翹殼一錢半藿香一錢半上藥十二味河水煎服服後小便甚長諸恙若失當用和胃法二陳湯加石斛砂仁殼鮮荷葉蒂兩帖而痊案餘次子茂常孟秋頭痛寒熱咳嗽成瘧治驗餘次子茂常懸壺於胥門程氏於丙戌七月二十二日忽頭痛寒熱咳嗽自服疏解之劑次日有延診者仍然轎出申後回寓病發如前至二十四日午後又頭疼畏寒寒後復熱隨即肩輿至家余適往楓鎮歸已三鼓知其發瘧因未進藥二十五日侵晨診脈右浮左弦知其風暑搏而成瘧當用蔓荊子防風半夏曲柴胡黃芩草蔻仁神麯青皮加六一散煎服服後至申正仍先頭痛畏寒約半時即熱熱至更余汗出而熱漸退二十六日用小柴胡湯去參加煨草果青皮赤苓焦穀芽車前子等薑棗同煎服後仍如前發至更余大汗淋漓而退次日仍用原方再劑瘧即止小溲長而清自此諸恙全瘥矣案南京孫云衢胸脘痛脹痼疾五載奇效並詳論治法南京孫云衢年二十五歲丙戌季冬胸脘痛脹痼疾五載春減夏愈秋髮冬甚今正舉發胸脘刺痛痛劇則脹漸橫至臍腹早緩午甚夜間更增天曉漸減得食亦稍減脘中時響脈右沉細而緊此皆沉寒痼冷脾陽之不運所致也是以交春而減者寒得溫氣而痛緩矣逢夏而愈者寒得熱氣而痛解矣至秋而發者寒得涼氣而痛作矣遇冬而甚者寒得冷氣而痛益增矣議附子理中湯加味治之庶可立起積歲沉疴永免終身大纍非曰仙丹理可信耳西黨參二錢生冬朮一錢半熟附子一錢乾薑八分炒炙甘草七分上沉香四分五靈脂一錢炒加荔枝核三錢炒黃研上藥八味河水煎服服兩帖痛脹減半且痛脹時亦俱覺寬鬆非前之拘束難忍可比再脘中有臭腐之味出小溲色赤想皆得溫中之力歟再以原方去沉香荔枝核加茯苓木香淡茱萸三味內附子用一錢五分煎服兩劑痛脹十去其八腐穢之味亦減仍用附子理中湯加首烏女貞茯苓木香等煎服兩帖晝夜痛脹俱止腐穢之氣全無後以理中湯加制首烏歸身木香茯苓草蔻仁輩調理收功案山西曹門人風痰閉絡胸悶背臂痠楚治驗山西曹門人胸悶刺痛腹疼背臂痠楚皆前之風痰閉絡之餘波也擬疏氣和血調中之劑為妥制香附一錢半當歸一錢半片薑黃一錢半赤苓一錢半廣木香六分陳皮一錢半夏曲一錢甘草六分薏苡仁四錢炒加雞內金一錢五分炙三劑而安案徽州曹雅堂風溫症誤治身熱不解治驗徽州曹雅堂三月初三診病由寒熱而起他醫未經疏解早投寒涼以致身熱不退病勢增重迄今半月始求治於余此風溫症也寒熱頭脹胸悶口渴不喜冷飲舌苔中心絳邊白無津耳聾脈小溲赤防邪內陷亟亟祛邪冀其熱退為穩瓜蔞皮三錢小生地四錢竹捲心三錢黃芩一錢半鮮石斛四錢黑山梔一錢半車前子一錢半炒麥冬一錢半石菖蒲六分焙生甘草六分加水梨肉二兩同煎服一帖熱漸緩其半日進粥二盞舌仍干耳仍聾又用小生地丹皮麥冬甘草花粉赤苓滑石元參薄荷川石斛加雪梨肉二兩煎服後熱始退清舌之絳胎漸轉淡黃且潤澤安臥復診生西洋參一錢半小生地四錢元參三錢麥冬一錢半知母一錢半塊滑石三錢甘草六分陳皮一錢半澤瀉一錢半加燈心三尺服此舌之黃胎退盡耳聾亦減小溲亦長食漸增再以養胃生津之劑二三帖後繼以六味地黃加味服之耳聾全安又用四君子湯加熟地枸杞元武板柏子仁砂仁山萸肉南棗輩煎服調理半月而康案黃云泉大兄咳嗽喉癢晝輕夜重治驗黃云泉大兄丁亥三月初五咳嗽喉癢夜甚於晝天明漸已痰出稠黏脈右軟左弦細宜清補肺胃之陰俾其火降而自平北沙參三錢款冬花二錢百合三錢苡仁五錢炒巴旦杏三錢生蛤殼四錢芡實三錢炒炙草六分天冬一錢半去心加老枇杷葉三大片拭去毛蜜炙上藥十味河水煎服五劑全安案文學汪書蕉二兄上下齒齦偏左作痛治驗文學汪書蕉二兄道光丙戌四月初九上下齒齦作痛偏左左脈細小兼數心肝虛火上炎法宜養陰以降火方用小生地元參薄荷茯神甘草青皮當歸頭加雪梨肉二兩同煎服三帖大減尚有悠悠而痛再以六味地黃湯去澤瀉加女貞子炙甘草等三帖而痊案海鹽鄭淡園次子內疝誤治以致腹膨有塊小腹疼由陰囊上衝夜來發熱足腫肌瘦骨立迄今九月幾危救蘇奇效極驗海鹽鄭淡園次子丁亥五月初五年十一歲內疝誤治幾危於去秋九月發三瘧三發而止已後漸自腹膨有塊小腹疼痛由陰囊而上衝小腹土醫誤作蟲症治反增食少體瘦肌皮骨立夜間發熱足腫迄今九月矣於端陽日特求余治診其脈右關浮軟左弦細症屬內疝任脈為病病根深沉不此之求藥餌妄投恐有虛損不測之虞先以和肝法冀其病緩再為良圖荔枝殼一個剪開去其肉核內填搓軟荷葉一團線扎同煎元胡索一錢五分烏藥一錢半小青皮七分鹽水拌炒柴胡三分川楝子二錢打碎車前子一錢半炒用百勞水兩鍾煎至一鍾服揚百遍即仲景甘瀾水也進藥後痛從小腹而牽引兩旁至臍而止塊堅腹脹惟陰囊中未痛是其妙處夜來發熱足腫如前復診五月初六日方制首烏三錢歸身一錢炙鱉甲三錢青皮七分川楝子一錢半肉桂三分去粗皮五靈脂八分炒炙草六分元胡索一錢半醋炒小茴香一錢仍用百勞水煎法服後據云痛未減次日再劑痛緩且有停時腹未脹塊尚在足仍腫夜竟未熱大為合宜仍宜原方加減方用首烏女貞歸芍五靈肉桂烏藥木香小茴香加荔殼如前填扎同煎服三劑小腹之痛十去其八且不由陰囊而上衝小腹更奇者其堅塊作脹竟不知消歸於何有矣再以四君子湯加首烏歸身女貞白芍益智仁茴香等煎服五劑而收全功案金六吉濕溫症誤治幾危治驗金六吉年逾二旬丁亥五月初八濕溫症誤治幾危是病由受涼停食而起以故身熱胸悶按之而痛未經解肌透表早投陷胸繼又妄用承氣服後大便先軟後溏不但熱不除而反增重業已六日口渴喜飲舌苔糙刺無津陰液涸矣且愈熱愈渴日飲茶數十甌而究未能解其一渴脈息左弦徑右滑數此溫邪留戀於氣分也緣誤治而至此極議仲聖竹葉石膏湯法出入之生石膏五錢竹捲心三錢麥冬一錢半去心黃芩一錢半炒生甘草六分加陳粳米百粒用百勞水煎服後頃之睡著約一時而醒醒後嘆氣一聲問之答曰周身松爽少緩遍體汗出熱從斯退自此渴止溲長病若失矣次日清養胃陰用生地石斛黃連麥冬山梔甘草輩煎服以清虛熱耳案陸琴軒乃弟吟軒痛痹症迄今三載治驗陸琴軒乃弟吟軒年十九丁亥四月二十五胸膺痛痹症由勞力而得迄今三載舉發無時右脈弱左脈細澀血凝氣滯也當以養榮祛瘀佐以疏之和之庶乎漸安丹參四錢歸身一錢半五靈脂一錢半生半炒乳香一錢去油玄胡索二錢醋炒牡蠣六錢加舊鐵器兩許同煎服前方三劑痛減三之一再以原方去歸身乳香牡蠣加香附良薑山梔甘草等煎服後胸痛減半再三帖而痛止矣案山西武之文胸腹奇痛濕與寒並治驗山西武之文胸腹俱痛舌苔膩白根黃小便短赤進厚朴溫中法頃之即吐痛仍如前左脈細小難尋右關中按小數再以溫涼並進以和之方用香附木香陳皮枳殼檳榔烏藥良薑生山梔甘草楂肉等服之脘腹痛始減而舌苔仍膩白如粉口不覺干知其濕與寒並服後方一帖上下痛止方用茅朮良薑青皮各一錢香附滑石萊蔔子各三錢烏藥生山梔各一錢五分甘草白蔻仁各四分一劑而痛頓平案萬松岩大兄脾濕症六載沉疴治驗並附丸方八珍粉方萬松岩大兄年五十八歲丁亥六月初七日脾濕症素體肥胖好酒貪葷邇來肌瘦其半業已六載腹有時膨足有時腫肢節亦有時作痛屢進燥濕之劑終未克奏績因求治於余診得脈形軟細先宜調中卻濕佐以疏運再為之計鮮蓮肉一兩薏苡仁四錢南棗五錢去核金石斛四錢生穀芽四錢雲茯苓一錢半砂仁五分上藥七味河水煎服少頃用更衣丸一錢半陳酒送下大便七八日未解服後始大便結糞兩次後帶軟復診進前方脘腹漸鬆便結已解而食仍未貪惟日飲粥二三盞證脈合參法當養胃生津以圖胃氣旺而食飲漸貪人參四分另煎沖茯苓一錢半麥冬一錢半去心大南棗兩枚去核炙甘草五分陳皮六分荷梗五寸服後多進粥盞許頗妙仍以原方加新蓮肉一兩木香四分再兩劑食飲漸增小溲漸淡又用五味異功加建蓮益智仁南棗苡仁輩服數劑胃土稍和飲粥之後稍可進飯半盞而體倦欲睡晡後小腿足跗浮腫猶未減也再議補中益氣湯加南棗進四五劑後精神稍健清晨可先進鮮芡實搗漿燉熟如米粉少和白糖可吃一盞少頃再飲粥一二盞足徵胃口有醒豁之機是以足跗浮腫亦漸有退象仍以原方再兩帖臨臥前即以二煎湯送二神丸一錢服後安妥如前上半日健下半日漸倦復診舌苔滯白口淡溲赤不喜飲脈象耎小究屬脾土不運命火不足以生之論口淡似胃熱而按脈審症當理脾胃兼補腎中之陽為上策方用桂附八味丸每晨空心服三錢滾水送下午後用健脾丸三錢炒米湯送下服丸五日精神稍健食飲稍貪食後少腹每多作悶亦減口淡溲赤亦漸減惟舌苔之白未減也復診仍以桂附八味丸四錢空心如前服午後之健脾丸亦如前服再進五日諸恙減可食飲漸增脘腹俱無悶象四五日來兩足小腿發出雲頭細點滿布癢極抓之有滋水出自余觀之此向年脾濕內蘊之根得余補火生土溫腎健脾之法知其脾腎交通濕氣下降而從兩足小腿出之耶亦極妙之事也再擬香砂六君丸四錢午後米湯送下清晨仍以桂附八味丸三錢滾水送下再服五日外用川椒白芷苦參等煎湯淋洗腿足四五次而癢止腫消矣清晨仍用桂附八味丸三錢午後以六君子丸三錢和三妙丸一錢五分同服以淡薑湯送下再服五劑繼以丸劑調補仍不外乎脾腎之意耳丸方九月初六日定大熟地三兩元武板一兩炙鹿角霜一兩半山藥一兩半炒山萸肉一兩半上肉桂五錢去粗皮補骨脂一兩半炒當歸一兩枸杞子一兩半焙砂仁六錢上為細末用煉白蜜為丸如小緑豆大曬令極干外用西黨參二兩焦冬朮一兩半陳皮一兩半楂肉二兩炒大麥仁一兩半雞內金一兩半炙上六味共研極細用荷葉煎湯灑疊為衣每服五錢清晨滾水送下又八珍粉方九月二十五日定鍋焦心三斤炒建蓮肉一斤炒苡仁一斤炒芡實一斤炒六神麯五兩炒雞內金三兩炙陳皮四兩烘砂仁四兩去內衣不烘上為細末篩極細如粉每用粉兩許少加白糖用滾水調如稠糊每早空心服一盞如法調服二三月易飢食增且前丸服後精神日健肌體漸豐步履如常亦再生之幸也前丸服至十一月初旬將畢因初五冬至復診定方余即以前方出入仍不外乎脾腎雙補之法況值水冷金寒身中之元陽未充加以固氣護陽之法尤不可少也西黨參三兩生黃耆二兩鹽水炒大熟地六兩山藥三兩炒鹿角霜一兩半鹿角膠一兩半炒珠補骨脂二兩酒炒歸身一兩半肉蔻仁一兩麵包煨白醜筋二兩切片砂炒山萸肉一兩半砂仁一兩半新會皮一兩半上為細末煉白蜜為丸如桐子大每服五錢清晨滾水送下案陸琴軒六兄痛痹症治驗陸琴軒六兄丁亥十一月十一日痛痹症中虛氣壅壅則痛痛則不通脈象沉滯當和其中調其氣氣舒而痛緩食自貪矣制香附三錢良薑一錢木香六分甘草五分焦穀芽三錢陳皮一錢楂炭三錢烏藥一錢半白通草六分加雞內金二錢炙兩劑痛立止案寧波蘇成章左頭角刺痛如錐治驗寧波蘇成章年六十八歲丁亥仲冬二十七左頭角刺痛如錐風邪上侵少陽攸關病起六日速以祛風和血法蔓荊子一錢半川芎一錢歸頭一錢半薄荷一錢制殭蠶一錢半甘草七分青皮一錢池菊一錢羌活一錢半加青蔥白兩個同煎服一帖而安案山西焦永盛高年身熱泄瀉動即出汗垂危治驗山西焦永盛年六十六丁亥九月十七身熱泄瀉危症兼之面紅口乾喜飲腹痛動輒汗出神識模糊虛中挾滯表裡俱病恐其驟變亟以退熱止瀉以冀轉機用葛根黃芩黃連湯法加減之葛根二錢煨黃芩一錢半小生地四錢麥冬一錢半澤瀉一錢半木香六分赤茯苓二錢甘草六分半夏曲一錢益智仁一錢生薑一錢陳皮一錢上十二味河水煎服服後身熱大減瀉止六七神識漸清稍可飲粥口乾亦減小腹尚痛仍以原方再劑諸恙漸平痛亦止矣後以和胃運食法五劑而痊案門人金書山滑精之後忽又閃腰不能舉立治法頗奇立效門人金書山丁亥季秋滑精之後偶因舉手取物閃腰當時不覺至晚間忽然尾骶骨板滯痠疼牽引腰胯骨不能舉立惟曲腰彎膝稍可步行次日侵晨肩輿索方余以後方一劑霍然而愈大熟地五錢獨活一錢半穭豆皮三錢杜仲三錢炒全當歸一錢半木瓜一錢半上藥六味用陳酒河水各一盞和勻煎藥煎至一半去渣再煎滾聽用取雄蟹一隻如茶杯口大者洗淨搗爛即將煎滾藥湯乘熱衝入蟹內蓋少頃帶熱飲湯服畢以被遮臥約兩時之久起身步行病若失矣尾骶骨一名尻骨又名窮骨腰胯骨一名腰髁自十六椎而下俠脊附著之所也案山西李世安中脘脹悶食不能進晝夜不安先進溫舒再以通幽立見奇驗山西李世安年近三旬戊子四月中脘脹悶食不能進晝夜不安舌苔膩白小溲色赤少腹微疼薤白三錢萊蔔子三錢沉香六分枳殼一錢半楂肉三錢車前子一錢半炒乾薑一錢炒烏藥一錢半赤苓三錢加砂仁末三分沖服後少頃腹中響轉失氣下至酉後脹悶頓寬夜可安睡食飲漸進兩日後腹中發熱溲赤大便欲解不能已六七日時有轉失氣議小承氣加味服後方一帖大便即通從此而愈薑厚朴一錢生大黃一錢半枳實一錢半赤苓三錢陳皮一錢半甘草七分加沉香末三分沖案孝廉洪季威先生左足次指生疽極險用灸法奇驗孝廉洪季威四兄先生戊子八月中浣得左足發疽極險治驗於足左次指甲後腫如黍朱疼痛異常瘍科妄作疔治用拔疔散治據述疼痛尤甚血水淋漓足不履地苦無寧刻於二十八日始問治於余余視其瘡頭胬肉平扁不松四邊血水頻頻出痛傷食減非灸不能治因取艾圓如黃豆大者先將生薑片切如三錢厚者放於瘡頂以艾圓鋪於薑上點火灸之灸至數壯瘡內始知熱氣至二十一壯方覺瘡中刺痛如是停灸用家制紅雲散摻膏藥上貼之日換一張內服托裡排膿之劑一切灸法用薑用蒜俱宜橫切當如三文錢厚至八月三十日延診視之瘡內胬肉發鬆且有厚膿非前之日出血水可比腳能垂下亦不覺痛細視根腳猶未大松仍如前灸灸至十六壯始覺瘡痛停灸膏蓋同前九月初二延診胬肉腐其一半以剪取下仍如前灸灸至八壯知痛而止膏蓋同上煎劑如前至初五日其餘胬肉始盡脫落細視瘡邊尚未大松仍如前灸灸至六壯覺痛而止膏蓋如前內服參耆朮草佐歸身牛膝銀花貝母大棗輩煎服初八復診瘡之四圍肉色鮮紅邊起白衣有生新之勢中間胬肉去而潭深此處指末氣血罕到之所仍用艾圓灸如前法五壯而止其艾圓如緑豆大前之艾灸引毒外出故灸後瘡頭即高聳而胬肉即脫今日之灸助其生新故艾圓宜小而壯數宜少灸法之妙活法在人非僅提毒已也膏藥同前九月十二延診第六次瘡口四圍新肉漸生中間之潭亦漸平不必再灸當用生肌膏貼之三日後瘡口已平用家制青雲散摻之膏蓋肌完而收全功案屈世泰沖年仲秋患夜熱及四肢唇裂齦血延綿周年幾成童怯之驗屈世泰年十四歲戊子仲秋夜間內熱波及四肢口唇燥裂牙齦出血脈來弦細小數脾陰虛而榮血不足纏延周年沖齡陰弱尤防骨蒸勞熱亟宜調攝勿得忽視大生地五錢炙鱉甲四錢丹皮一錢半炒茯苓一錢半地骨皮二錢山藥三錢炒炙甘草六分元參三錢加黑大棗兩枚去核服兩帖夜間內熱減半唇裂齦血俱止仍於原方內去元參加麥冬女貞子元武板等再三劑而全愈矣案黃埭顧文元滯下紅白濕熱交阻治驗黃埭顧文元年五十四歲戊子季秋滯下紅白晝夜二十餘度迄今三月體瘦食減所下汙穢異常肛門甚熱小溲短赤脈形濡數鄉人長夏田野勞苦濕熱釀成久痢脾虛而兼濕熱為患者究宜調脾祛積兼清濕熱庶乎盡善焦冬朮二錢苡仁五錢炒白頭翁一錢半秦皮一錢半煨木香八分赤苓三錢椿根白皮二錢升麻五分醋炙五穀蟲一錢炙桔梗一錢炙甘草八分煎服三帖一晝夜滯下五六次食飲亦漸增再三劑十減其七八原方去升麻加扁豆楂肉再三帖而痢止後用香砂六君子調理收功案蕭山胡福堂鼻衄如注極危奇驗蕭山胡福堂戊子季秋年四十六鼻衄如注幾危治驗左鼻出血十有二日晝輕夜重每至二鼓頻頻而滴約有盈盂之多陰氣彌傷他醫妄投苦寒如犀羚知芩加以涼膈散輩屢投不應衄血反增而致舉頭即眩朝輕暮盛脈形細數右脈虛芤究關陰火潛然非實火可知再衄防暈亟議啓玄子益陰濟陽以救之玄武板一兩炙丹參五錢側柏葉四錢炙降香一錢半漂人中白一錢老枇杷葉三大片去毛桑白皮一錢半上藥七味用新汲水即井泉水兩鍾緩火煎至一鍾去渣入血餘灰一錢沖服外用大蒜一瓤搗爛貼左足心血止即去之當日照方煎服據述服一帖夜間鼻衄仍然一茶杯許惟血色轉淡紅次日再劑是夜血止連進三帖衄止全愈案蕭二泉三瘧年餘正虛邪戀治法極效蕭二泉年逾五旬季秋二日診三瘧年餘發於子午卯酉日先寒後熱熱甚囈語綿綿口渴喜飲至半夜後始得汗而解寒少熱多肌瘦食減便結溲赤脈形軟滑左關弦細正虛而瘧邪留戀也治在肝脾當用六君子湯加首烏鱉甲黃芩草果車前子輩薑棗為引服六劑臨期寒如前熱漸減原方再六劑臨時寒甚輕熱至點燈時微汗而退仍以六君子加首烏歸芍黃芩烏梅肉等仍以薑棗為引又六劑至期寒熱更輕食飲倍增第坤土將健食宜節制庶幾脾氣得令而能上歸下輸水精四布五經並行矣設因能食而多餐致令脾土壅而腹膨氣滯豈非自誤也慎之慎之又以六君子加首烏鱉甲青皮女貞烏梅肉等又六劑轉失氣更多且臭極足徵脾土因壅滯而致太陰三瘧今以六君子加味連進數十劑瘧止而脾土始健此轉失氣之極多者皆得於補脾之功非淺也年餘之瘧肌瘦食減若不細心揣摩何能知之深而效之捷也案汪書蕉二兄素好飲茶脘痛欲嘔治驗汪書蕉二兄戊子正月脘痛已久午後尤甚且有泛泛欲嘔之勢素好飲茶右脈細小左關尺濡小先理中焦再為之計制香附三錢淡乾薑八分炒淡茱萸三分茯苓一錢半半夏曲一錢半女貞子三錢廣皮白一錢青皮七分加九香蟲一錢半焙荔枝核四錢炒服此兩帖痛減七八再二劑而止矣案王店屈文炳胃氣作楚感寒嘔酸治驗王店屈文炳素有胃氣作楚感寒而發痛即嘔酸擬和胃舒肝法薑半夏二錢木香六分陳皮一錢半青皮八分淡茱萸三分草蔻仁一錢半茯苓一錢半沉香三分加生薑兩片服兩帖嘔痛頓止再劑中宮之氣舒暢而食飲貪矣案袁履安喘症危候臥不著枕痰出不易便溏食減屢進滋陰病增立刻救治漸自回生之驗袁履安五十九歲道光戊子十一月十八診喘症極險危篤治驗素有吐血症邇來因喘兼咳月餘來臥不著枕痰不易出口燥舌乾大便溏薄食飲日減脈象虛軟按之細數議益氣定喘化痰冀其漸緩庶乎盡善北沙參三錢蛤粉炒阿膠三錢白花百合一兩山藥三錢炒款冬花三錢叭噠杏仁三錢去皮尖黑蘇子一錢半炒天冬一錢去心炙甘草八分海浮石三錢薏苡仁五錢炒茯神三錢復診八月二十日方茅山術一錢半炒薑厚朴一錢薤白三錢枳實一錢半淡茱萸三分山楂炭三錢木香七分陳皮一錢炙甘草五分五穀蟲一錢炙服一帖脘腹響動少頃解絳色糞成堆自午至夜計解三次末次尤多自此而腹痛若失次日再以四君子湯加扁豆苡仁杜仲續斷歸芍等五帖全愈案王採堂虛羸咳嗽內熱便泄肌瘦肉削救生之驗王採堂虛羸危症救蘇治驗道光庚寅年十七歲陰虛體質內熱咳嗽上氣纏綿年餘肌瘦肉削脈息濡小右軟脾胃日損便泄不止食飲維艱虛損之門已露先機矣更兼鼻衄常發陽絡又傷胃氣難復日投滋膩之品坤元愈耗無怪腸滑不固亟宜扶脾保肺為正本究源之法九月二十日診人參六分另煎沖山藥三錢炒款冬花三錢茯神三錢南棗兩枚去核百合四錢杜芡實五錢炒天冬一錢去心甘草六分水炙加紫衣胡核肉一枚連鬲板用服兩劑喘咳稍減原方加西黨參三錢再兩帖痰減三之一復診西黨參三錢山藥三錢炒苡仁五錢炒茯神三錢蛤粉炒阿膠三錢炒棗仁一錢半炙甘草八分南棗三枚去核浮海石三錢款冬花三錢五味子三分研巴旦杏三錢去皮尖加白花百合一兩半服六劑喘咳漸緩痰亦稍易漸能著枕惟夜半咳痰必坐起方安食飲稍增中午可吃飯一碗又半大便日一次帶溏仍宜脾肺並治少佐滋腎養肝之法用四君子湯加苡仁芡實首烏女貞款冬巴旦杏五味子等引以南棗白花百合煎好去渣入生薑汁六分沖服數帖頗安復診服前方頗合因方中無熟地滋陰以為不能速效以故復延前醫用熟地枸杞歸身附子霞天曲茯苓黨參白朮五味子白石耎輩三四帖喘咳反增而且日間尤甚於夜痰咳不易食減不能臥始知余藥對症復求診治脈右虛耎左弦硬較前病增自取之也其人意中老年續絃自揣腎虛極矣非熟地不能補殊不知脾肺久虛重用熟地輩滋泥之藥徒然膩膈滯脾又何取乎早投況便溏日久更非所宜今雖深悉其如喘咳已增重矣議益氣定喘法生黃耆二錢鹽水炒西黨參三錢山藥三錢炒苡仁五錢炒蛤粉炒阿膠三錢海浮石三錢茯苓一錢半炙草八分五味子四分研款冬花三錢巴旦杏三錢去皮尖扁豆三錢炒加大南棗三枚去核銀杏十四粒去心衣同煎服前方四帖喘咳頓減足徵扶脾肺尤甚於滋腎肝也原方再六劑神健食增便結喘平咳痰亦十去其七八矣復診己丑正月初五日去冬進藥諸恙向安殘冬停藥自覺氣稍逆痰稍增據述即於前方中去黨參加人參五分又服三劑甚妥今延診定方於下炙黃耆三錢西黨參四錢鹿角霜一錢半茯苓一錢半大熟地四錢淮山藥三錢炒焦冬朮一錢半炙草八分巴旦杏三錢去皮尖北五味子五分研廣皮白八分牡蠣八錢煅塊加建蓮肉五錢去心同煎調理十五劑全愈案山西楊國楨食後臍下作脹胸悶嘔酸治驗山西楊國楨年六十二歲戊子季冬食後臍下作脹脘中閉悶噯之不暢酸水時嘔黏痰並出病經匝月大便祕結二三日一解脈象兩關弦細土製於木當以二陳湯合溫舒之法不應又以旋覆代赭法出入亦不應於初九日仍用二陳湯加沉香三分砂仁六分同煎去渣以湯送左金丸六分服後酸水黏痰頓減臍下之脹亦緩再服兩劑嘔酸止矣大便結糞已解脹減三之一再以二陳湯加苡仁砂仁生山梔一錢五分用生薑汁拌炒淡茱萸三分雞內金二錢炙同煎兩帖而愈案管芝亭吐血三載夢泄五年體瘦食減治驗管芝亭年二十五道光己丑季春向有吐血症已三年矣又有夢泄病迄今五載矣吐血屢發刻下雖日吐無多而體瘦食少究非所宜況又有夢泄耶案云脈右軟左濡上則吐紅下則遺白病經有年屢發無時攸關坤土之不足坎水之有虧而脾惡濕腎惡燥二者最難調攝善治者於先後緩急輕重間而求之斯為善矣生黃耆三錢鹽水炒丹參五錢山藥三錢炒天冬一錢半去心玄武板五錢炙側柏葉三錢炙茯苓一錢半炙草八分真降香一錢劈加參三七四分磨沖藕汁一酒杯沖服兩劑血止未吐惟痰中血絲未淨耳復診西黨參三錢淮山藥三錢炒建蓮肉四錢去心芡實三錢炒玄武板五錢炙漂淡人中白一錢生黃耆二錢鹽水炒茯苓一錢半天冬一錢半去心炙甘草八分加參三七四分磨沖藕汁一酒杯沖服前方五帖痰中之血又止矣案歙縣洪季威孝廉四兄先生病後動輒冷汗頭眩欲僕陽虛陰弱危險奇驗歙縣洪季威四兄先生己丑五月初六診病後中氣不足動輒冷汗舌苔肥白尾骶骨即尻骨痛脈形細耎不能鼓指左三部濡小不足陰氣虧而衛陽不護當扶陽益陰冀其汗止庶免虛波之虞人參一錢另煎沖於白朮二錢土炒茯神三錢炙草八分熟附子一錢淡乾薑一錢炒生黃耆三錢北五味子五分研進藥後頭與手臂冷汗未出稍動即有小汗食仍未貪胸中氣悶額心脹疼有上輕下重之勢又有頭眩欲僕之象前方益氣護陽斂汗頗為合宜而食飲不貪舌苔膩白胸悶額疼亦須兼治進谷乃昌亦是緊要關頭據述向年痰發薑附服過四十餘帖而奏績自信虛寒之體就餘論之藥以治病對證便是良方陰虛體質而兼陽弱者又非概以溫熱之藥為法也昨方之用附子理中法者亦救急從權之治也暫用取效分量多寡不同隨證脈而增減斯可矣復診五月初七日方人參六分另煎沖於白朮一錢半土炒淡附子六分乾薑五分炒茯神三錢炒棗仁三錢干石斛四錢南棗兩個去核炙草七分左牡蠣五錢煅白池菊八分陳皮一錢五味子五分研上藥煎服諸恙漸減惟動輒汗出或食即出冷汗甚至髮根亦有幸不如珠之滴亦不淋漓直流稍能進食然究宜速止其汗為亟亟也復診五月初八日方生黃耆三錢鹽水炒於白朮一錢半土炒元參一錢半白芍一錢半炒薑半夏一錢半炒棗仁三錢木香六分茯神三錢石決明四錢鹽水煅塊炙甘草八分陳皮一錢烏梅肉七分麻黃根六分服一帖早上吃粥未出汗頭眩額脹舌胎糙亦漸減而食飲亦漸貪矣原方再劑動輒汗出十減六七轉側頭眩欲僕等狀亦減大半矣大便六七日未解緣汗多腸燥無足慮舌尖及兩旁漸轉淡紅色此胃土漸和之象也復診五月初十日方用五味異功加歸芍丹參柏子仁木香遠志北五味子小麥加麻黃節六分同煎服兩帖諸恙漸平食亦喜進再以歸脾湯出入調理心脾間佐以六君子湯不數日而收功案湖廣周正璉暑濕症誤治幾危奇驗湖廣周正璉年五十三己丑八月十四日診暑濕症誤治幾危治驗病由七月間暑濕內侵寒熱胸悶醫以清疏卻濕熱雖退而胸悶痰多溲赤便祕未減更醫醫以清涼佐大黃芒硝等服之大便仍未解又以消導佐更衣丸亦不解又有用麻仁丸等法不應醫更數手非但便祕十餘日不通反增口糜咽乾舌胎淡白濕潤上齶兩頷乾燥無津刻吐白痰黏膩如膠狀若瓜子大時吐無寧刻小溲短赤大便十餘日未解食飲甚少細審之因口苦黏膩痰膠滿嘴牙齦白腐上齶乾涸以故粥難下咽惟用炒米泡湯咽下以充飢非不欲食者可比於八月十四延治診其脈左沉細如絲右脈稍大於左亦在沉小弦細之間知其中焦阻膈上則口糜下則便祕概以通幽攻伐非惟大便不通徒傷中氣無怪乎口糜腐而乾涸喜飲也當以厚朴蔞仁二苓麥斛阿膠南棗元參輩服之肢體少有微汗身中漸有活動之機次日原方去厚朴阿膠加二原地麻仁等服後有轉失氣而大便仍無似覺精神稍健其口苦黏膩白痰齦腐乾涸喜飲刻吐黏沫無已俱未一減經云膈腸不便上為口糜下則便溺不爽者是也治陽明而兼治少陽冀其中焦和而口齒利食飲貪而大便通矣八月十六日方附下小生地四錢瓜蔞仁三錢淡乾薑八分炒殭蠶一錢半灸地骨皮三錢廣藿香一錢半鮮石斛三錢柴胡八分薄荷頭一錢歸身一錢半生甘草六分上藥十一味煎好去渣入生白蜜六錢沖用此以潤大便之燥結服此一帖口糜若失黏膩之痰竟不一吐且口舌上齶乾涸齦腐亦不自覺矣次日原方去歸身薄荷加麥冬赤茯苓等再劑胃和食增惟大便半月未解仍宜養胃生津潤燥以通幽方用生首烏玉竹柏子仁歸陳麥斛枳實山楂等煎服一劑午後大便結糞成條早晚兩次解之甚暢諸恙向安矣月餘之病醫更數手因妄通大便而致口糜肉腐甚至食難下咽幾乎誤事得餘十六日方一劑而口糜等全愈再劑而食進神安又以生津潤燥一劑而半月之便祕頓通用藥若有神助全賴心領意會間非筆舌所能罄其長也案韓晚香類中症幾危又兼滯下後重之驗韓晚香先生年六十三己丑八月初十日類中症體豐身健勞神會計兩妾子幼每夜飲酒半斤之酣忽於初十二鼓時身蜷語謇畏寒身熱痰聲如鋸連瀉數次舉家倉皇於十一日侵晨乃甥陸琴軒六兄特邀余診治余至問答無知神識模糊敲齒視舌舌苔白膩中心淡黃診脈時手臂牽掣忽然轉里有徑厥之象脈形軟小左弦細類中之萌深恐昏厥權擬溫中卻濕除痰之法俟其轉機再商薑厚朴一錢薑半夏一錢半草蔻仁一錢炒赤苓三錢廣木香六分豬苓一錢半澤瀉一錢半橘皮一錢淡茱萸三分引竹瀝六錢入生薑汁兩小匙沖服服後寒熱退神識稍清泄瀉未已體倦不飢復診八月十二日方薑厚朴一錢煨葛根一錢半薑半夏一錢半赤苓三錢煨木香七分薏苡仁四錢炒白通草八分澤瀉一錢半淡乾薑六分炒生甘草六分陳膽星六分加竹瀝六錢生薑汁二匙沖服服此諸恙漸安神識清而語言爽並能自坐問答明白大有轉機笫泄瀉而轉白痢裡急後重腹痛即痢又非輕候況自早至申已十有餘次溺短赤舌苔滑食不貪此脾傳腎之賊邪險候也慎勿渺視十三日復診方列下薑厚朴一錢薤白三錢豆豉三錢木香七分半夏曲一錢半五穀蟲一錢半炙赤苓三錢滑石三錢淡茱萸三分甘草六分加白扁豆花十四朵洗鮮稻葉三錢服後腸中稍松爽今轉紅白痢晝夜約五十餘度裡急後重十四日復診用扁豆苡仁二苓滑草檳陳枳桔木香等十一味加生穀芽五錢紅白扁豆花各十二朵洗淨同煎服後如前因天氣炎熱床側窗中冒風至夜半忽然身熱煩躁痢勢尤甚口乾喜飲便急甚速所瀉者水多積少不飢小溲短少十五日復診用煨葛根蘇梗半夏曲石斛二苓甘陳芩芍升桔穀芽木香等十四味煎服服一帖熱退痢緩口渴亦減食漸貪惟紅白痢兼裡急後重之勢未減也復診八月十六日方川黃連四分白頭翁一錢苡仁五錢炒赤苓三錢半夏曲一錢半廣木香七分豬苓一錢半通草八分赤芍藥一錢半炒加生益智仁五分生穀芽六錢鮮荷葉一小個托底煎藥服後痢又減一晝夜約三十餘度十七八九三日仍於原方出入一日可進粥二三盞自早至夜痢勢較前減半而究有裡急後重之勢復診八月二十日方焦冬朮一錢半山藥三錢苡仁四錢炒歸身一錢炒焦穀芽三錢白芍一錢半炒楂肉三錢炒桔梗一錢炙甘草七分服前方兩帖裡急平後重未已進食如前積少糞多一日夜約數次睡安復診八月二十二日方玉竹四錢扁豆三錢炒苡仁四錢炒酒炒條芩一錢水炙甘草六分白芍一錢半炒柴胡三分蜜炙升麻三分半夏曲一錢半加陳粳米一撮同煎絹包扎倒河內服三帖痢止每解一二次無積純糞知飢能納再以六君子加建蓮山藥輩以調坤土精神漸復數日後用歸芍六君子調理收功案蕭山胡福堂鼻衄期年復發治驗蕭山胡福堂己丑八月鼻衄復發去秋衄血幾乎昏暈而脫得余大劑壯水而痊記前三百五十一頁內可檢閲之今正期年復衄先覺胸悶不爽三四日而鼻衄隨至右脈浮軟左弦大相火上升治宜養陰降火兼之逐瘀大生地五錢元參三錢茜草一錢半漂淡人中白一錢真降香二錢劈甜梨汁一酒杯沖藕汁一茶杯沖血餘炭六分沖上五味煎好去渣入二汁和血餘沖前藥湯內服如冷再隔湯燉溫服服一帖當夜未衄至次日早上又衄血直衝盈盂原方再劑而血止案山西康上珍戌初氣逆腹脹噯腐下行便泄有聲寒與濕食交阻並論藥服有時乃效之驗山西康上珍食入至戌初腹中之氣必上逆噯出腐氣或朝食原味之氣中宮奔響腹脹氣從下行即便泄有聲迄今匝月脈息兩關沉細寒與濕食交阻久防成膈法宜溫中卻濕運食為妥益智仁一錢半草蔻仁一錢半苡仁五錢炒赤苓三錢雞內金二錢炙山楂肉三錢炒神麯三錢炒半夏曲一錢半加生薑兩片藥服氣逆愈增細審之西人放債朝出暮歸藥服於氣逆之時故難建績次日復診原方再劑囑其午前服藥方可圖功服後至戌初氣逆十減六七且噯氣胸中松爽並無腐氣原味於此觀之用藥固宜對病為最而服藥之先後亦要明白其理始能見效如斯症藥服於氣逆之先故效速復診用淡乾薑草蔻仁木香陳枳二苓澤瀉砂仁等加生薑二片同煎服三帖諸恙俱安矣案顧建功痛痹症外寒引動內濕治驗顧建功己丑十月初七日痛痹症五日前畏寒舌白素好濃茶頭微熱食無味由外寒引動內濕驟然腰胯股腿足膝皆痛步履維艱屈伸不能法宜舒筋活血解寒除濕為最也獨活一錢半秦艽二錢續斷二錢炒杜仲三錢炒穭豆皮三錢蠶沙三錢木瓜一錢半苡仁五錢炒茅山術一錢半炒當歸二錢蘇木節五錢黃松節即茯神心木三錢加嫩桑枝一兩服一帖腰股腿俱漸鬆稍可以立畏寒微熱俱不覺矣原方去蠶沙續斷加威靈仙懷牛膝再劑如前安妥復診十月初九日方制香附三錢歸身二錢秦艽二錢杜仲三錢炒薏苡仁五錢炒木瓜一錢半茯苓三錢炙草六分蘇木節五錢紅花一錢半懷牛膝一錢半蠶沙三錢加嫩桑枝一兩五錢杉木節五錢服前方諸恙皆減兩脅刺痛未已原方去秦艽蠶沙蘇木節加焦冬朮虎脛骨漢防己等再劑兩脅不覺刺痛矣復診十月十一日方焦冬朮一錢半苡仁五錢炒續斷一錢半炒松節三錢炙甘草七分歸身一錢半茯苓一錢半陳皮一錢半黃松節即茯神心木三錢懷牛膝一錢半薑半夏一錢半杜仲三錢炒虎脛骨三錢炙加嫩桑枝一兩半服兩帖痛痹日緩食入有味睡臥不痛起立稍便腿足跗之痛俱平惟右膝腿灣及左腰胯處仍覺板滯不舒自知在肌肉之間非前之痛在筋骨間也惟步履究不能自如更宜養血舒筋復診十月十三日方制首烏三錢歸身一錢半木瓜一錢半乳香一錢同炒松節四錢虎骱骨四錢酥炙陳皮一錢半茯苓二錢苡仁五錢炒懷牛膝一錢半五加皮三錢炙甘草六分加白醜筋一兩錘扁水浸軟剪短用河水三盞煎去一半去筋將湯代水煎藥煎至一半服服後前症更減步履漸自活動再劑更妥隨用四君子湯加當歸木瓜苡仁女貞子虎腰骨杜仲五加皮輩仍以牛筋如前煎湯代水煎藥服五帖而痊案金嶽山頸肩痠疼轉側維艱寒濕上侵治驗金嶽山六十四歲庚寅正月初二日診寒濕上侵頸肩痠疼轉側維艱波及兩臂脈象浮緊右滑防有痛痹之虞擬舒風活血法秦艽二錢防風一錢半羌活一錢半桂枝一錢片薑黃二錢嫩桑枝一兩黃松節三錢當歸一錢半製半夏一錢半加蘇木節五錢乳香一錢去油箬包押煎服此兩帖頸肩之牽疼十去其八惟兩肘臂尚疼痛咳痰則胸膺牽痛氣逆初四日復診用旋覆花秦艽製半夏片薑黃茯苓當歸陳皮杏仁甘草苡仁木瓜五加皮等三劑而全愈案王履安妹倩舊恙屢發氣逆痰鳴治驗王履安妹倩年五十二庚寅正月初五日診虛羸有年頻發無時氣逆痰鳴舌白無苔胃陽虛而食飲不貪榮陰虧而夜寐少安肌瘦肉削脈息軟弱深慮虛波之險大有黃耆二錢西黨參三錢鹿角霜一錢半