大痛大吐大瀉如此一夜次早以湯飲下咽頃之即嘔因用黃連湯治之下咽未幾嘔痛立至於是以旋覆代赭石湯煎服嘔吐始平而痛勢仍未一減非但不減而反增腹脹臍突宛如小鍋覆於大腹之上痛緩漸平痛劇即高起得湯仍嘔惟瀉漸停自覺痛甚欲絶因延同事老醫陸君診視方用金匱腎氣丸每服三錢開水送下服後痛勢漸減腹脹臍突之勢亦緩次早仍服之而痛勢又甚午後仍然腹脹臍突且嘔青黃水復延診治仍以前丸惟用水泛者三錢服之仍然大痛臍腹脹突頭汗如雨奄奄一息至更余時豫默坐靜候索想久之面青少神其脈左關肝部沉弦小數原於忿怒傷肝氣結火鬱無疑假外因而發故初起似寒似熱似瘧非瘧從乙木而波及甲木表裡並至甚至肝木橫衝直撞木乘土位以致腹脹臍突大痛而吐瀉並作也色脈諦詳深知脾土之受困於肝也匪淺陸先生所定腎氣丸似屬中窾故初進小效而再服則不應矣蓋腎氣丸乃肝脾腎三經之藥也雖有桂附而究不能專主於脾也諦思良久時已三鼓必得以和中之法為最當曾記先大人曰凡上下不和者當擊其中而首尾皆應也旨哉斯言於是以理中湯合黃連湯少佐柴胡煎好徐徐服服後未幾即漸睡著時已天明痛陳漸緩至辰初仍然一嘔盡是酸黃水覺口齒痠軟雖嘔未瀉而痛陳已緩兼之瀉停自是藥之對症也原方去柴胡而稍為增減日逐漸安痛減嘔平乃去黃連而總不離於理中湯之出入或四六君之加減間佐歸芍輩調治之中間偶用向陽陳壁土四兩淘淨澄清以此水先同陳皮一錢五分水二鍾半煎至兩鍾去陳皮入藥同煎至一鍾服此法在嘔痛減半之時用過數次頗妙取向陽土得陽光之氣以土扶土土能解諸臭可祛胃中之穢濁和以陳皮可疏脾土之氣滯煎湯代水可助脾胃之生氣也調治月餘諸恙向安偶爾胸脘不爽似有小疼之象自制一方名茱萸丸每服五分食後滾水送下服五六日漸自平妥而食飲仍不大貪因以陳白米煮飯隨所喜可口之物烹炊作肴當覺有味從此食飲漸貪不半月胃口大開食飲倍增脾胃健旺精神日充氣血和而肌體豐潤通計藥投兩月之餘始覺平安如常大病回春誠再生之幸也豫室人陸氏起病時次子鳳生將及半周彼時尚有乳汁可吮已後病增乳汁全無迄今兩月病已全愈氣血融和精神健旺疼愛小子常抱於懷而吮以乳未數日而乳哺果有漸自充足哺之有餘正所謂母安而子受蔭矣快哉孫竹亭識自制茱萸丸治胸脘氣阻不爽或受寒嘔痛或肝脾氣滯不疏者皆可用之竹亭鄰注淡茱萸一錢五分不經火淡乾薑一錢五分炒紫沉香一錢二分不經火上三味各研極細和勻用神麯打糊為丸如小緑豆大每服五分滾水送下此丸如前云或受寒嘔疼脾肝氣滯不疏等症即用一錢亦可如只胸脘不爽氣阻小疼其丸不過服五分耳案談秉衡乃堂肝胃痛兩脅塊攻危症奇驗談禹範襟兄乃堂素有肝氣去冬偶發今交春令不時常發二月間痛甚氣逆兩脅塊攻腹脹必得以滾水灌之漸引其嘔嘔出新谷腹中稍覺平和著人揉摩腹脅始覺塊平腹軟土醫作肝氣治以檳沉枳朴輩疏氣間有用旋覆花代赭石加諸破氣之品服之亦間或奏效者第不日仍然大發如前有時新谷未入即嘔出舊谷覺酸醫用左金丸加歸芍金鈴子石決明佐降氣法延至三月初旬痛勢更甚以至頭汗如雨四肢俱冷仍以滾水灌之引其自嘔一嘔稍寬加以揉腹人事漸蘇神識漸安日來食飲維艱大腹有膨脹之勢兩顴浮腫病象沉重始求治於余其脈右關細軟無力左關弦細按之不足病由痛起痛甚傷肝木來乘土脾胃已虧痛極引嘔嘔時似快而脾胃則益受其纍矣以致不飢納少痛發無時頭汗淋漓四肢厥冷土為木賊乃極險極危之候也幸胃氣未絶還圖一線方用代赭旋覆湯去生薑大棗加乾薑青皮吳茱萸一劑是晚安妥未痛次日用六君子湯合附子理中湯加代赭石三分煅研沖服後如前未痛食飲漸貪肢暖汗止再劑如前安逸再以五味異功散合附子理中湯加女貞子砂仁至半月後買舟就診據述服前方兩劑諸恙向安停藥有日痛症又發較前稍緩證脈合參究屬脾陽不運肝木乘之肝氣過旺肝亦自傷為之扶脾溫中兼之養肝舒木加意調治自爾平可西黨參三錢淮山藥三錢炒茯苓二錢炙甘草八分熟附子三分淡茱萸三分半夏一錢半炒旋覆花一錢半包女貞子三錢制首烏三錢加橘絡一錢服兩劑痛止未嘔自覺安靜復診方附下西黨參三錢玉竹三錢炙甘草七分益智仁一錢半柏子仁三錢歸身一錢半半夏曲一錢半炒淡茱萸二分廣木香六分白芍一錢半炒加橘絡五分服五劑如前不痛不嘔食飲漸增再以五味異功散加苡仁益智仁制首烏歸身吳茱萸二分泡淡煎服十劑調理而愈案湖州程錦堂室人經行腹痛腰疼等症治驗程錦堂乃室家居湖州買舟就治年四十一歲素體肥胖貪涼惡熱喜冷飲向有痔症此脾虛挾濕肝虛血少夜熱口乾經行腹痛腰腿痠疼四肢虛浮腹塊有年小溲短赤種種見證皆肝脾為患況右脈虛小左脈虛數又顯有明徵耶盍早圖之西黨參三錢制首烏三錢炙鱉甲三錢香附三錢穭豆皮三錢鹽水炒赤茯苓二錢炒麥冬一錢半秦艽二錢懷牛膝二錢杜仲四錢炒川木通一錢加橘絡八分服兩劑諸恙漸減惟四肢之浮及手指刺痛未減耳壬申四月初六日又初八日方西黨參三錢苡仁四錢炒制首烏三錢炙鱉甲四錢青蒿梗一錢半歸身一錢半香附制三錢川續斷二錢炒懷牛膝二錢木瓜一錢半赤茯苓二錢杜仲三錢炒加陽春砂仁三分研沖兩劑夜熱口乾更減手指刺痛亦緩且稍可彎曲其腹塊之疼腰腿之痛小溲之赤亦俱減半再用六君子湯加首烏鱉甲青蒿女貞子益智仁吳茱萸三分五劑諸證向安後以八珍湯加制香附廣木香調經而健案西跨橋吳氏婦傷胎後氣逆頭眩煩躁治驗西跨橋吳氏婦胎懷三月據述以傷胎藥一服當晚即下惡血甚多兩日後血漸少氣逆上衝噁心頭眩延余診視其脈虛數不靜煩躁微熱氣從下而逆上已屬險途再鄉僻之地又不能避風節食更兼所進下胎之丸如此效速必有毒藥餘氣未清均未可知合色脈而諦詳氣血兩傷惡血未盡務宜氣營兩固佐以溫疏為最否則恐其鬱冒痙厥之虞壬申三月二十四日西黨參三錢炒鬆熟地三錢歸身一錢炮姜二分炙甘草八分半夏曲一錢五分炒陳皮一錢蘇梗一錢半加沉香三分磨沖服一劑氣逆噁心稍平自覺內熱煩躁此血去多而陰氣驟傷也外仍微熱又二十五日方炒鬆熟地四錢歸身一錢西黨參三錢炙草八分生鱉甲四錢丹皮一錢半炒青蒿子一錢半蘇梗一錢代赭石三錢煅加生穀芽六錢進兩劑身熱漸退煩躁內熱已止惡血全無惟覺體倦幸食飲漸貪胃氣漸和佳兆也又二十七日四君子湯加熟地鱉甲各四錢丹皮歸身各一錢五分丹參三錢生穀芽六錢兩劑後食飲漸增諸恙俱平二十九日用八珍湯加丹參南棗五劑全瘳案陸守愚幼女溫邪內蘊壯熱不解治驗陸守愚內阮之女四歲壬申四月溫邪內蘊壯熱不解宜以清疏免其痙厥葛根一錢前胡一錢薄荷一錢赤茯苓一錢五分連翹一錢去心甘草四分橘紅六分鉤藤鉤三錢後入楂肉二錢炒加青蔥一小枝進一劑汗出熱退便解神清案陸我齊三女感寒停食身熱無汗治驗陸我齊舅兄三女九月二十八日感寒停食身熱無汗沖齡質弱宜於輕表得汗為妙蘇葉一錢半防風一錢半蔓荊子一錢半連翹殼一錢麥芽三錢炒楂肉三錢炒橘紅八分生甘草五分加生薑皮三分服後至半夜熱甚天明汗出熱減其半食飲不貪大便三日未解又二十九日方青蒿子一錢半防風一錢半桂枝八分赤茯苓二錢半夏曲一錢半炒秦艽一錢半枳殼一錢半炒焦穀芽三錢加生薑皮四分黑大棗一枚服後身熱退清大便欲解未解三十日用鮮石斛赤茯苓各三錢鮮首烏五錢大麻仁杏仁各三錢神麯三錢甘草陳皮各七分服後大便結糞已解食飲漸進繼用養胃生津之劑而愈案陸守愚內人經水適來寒熱間作治驗陸守愚內阮乃室四月十三日經水適來寒熱間作隨即經止卻無腹痛脹悶之勢因有小官哺乳經水無多惟頭眩且痛咳嗆身熱熱無定期非瘧也乃溫邪外襲夜熱不止邪在陰分疏解為宜蔓荊子一錢半荊芥穗一錢半前胡一錢半杏仁三錢研黑蘇子一錢半炒製半夏一錢半桔梗一錢陳皮一錢加姜皮三分蔥白兩枚服後身熱稍減其餘如前又十四日方老蘇梗一錢半蔓荊子一錢半豆豉三錢枳殼一錢半炒半夏曲一錢半炒白杏仁三錢研前胡一錢半連翹一錢半去心薄荷葉一錢半加梨肉一兩服此身熱頭眩嘔惡咳嗽等俱十去其八繼用清解和胃之劑兩帖而痊二十四日足指縫濕癢難忍起已有年外用茅朮黃柏苦參各四錢石膏明礬各一兩白芷川椒各一錢七味煎濃先薰後洗拭乾搽余家白牡丹散如濕水出癢不已再以藥手捻擦之癢止水乾而愈案孫府女陰虛邪乘夜間身熱骨節疼痛治驗孫女年逾三旬素體勞役惡熱貪涼微冒風邪陰虛邪乘夜間身熱骨節疼痛食少體倦連發兩日診其脈浮而緩按之小數知其邪入於陰用後方一劑半夜汗出身涼骨節疼痛等症俱平矣秦艽一錢半防風一錢半青蒿子一錢半地骨皮一錢半藿梗一錢半甘草六分半夏曲一錢半炒生鱉甲三錢加青蔥一枝案吳氏女牙齦腫痛內如針刺咽疼口乾治驗吳女年二十四歲壬申五月牙齦腫痛內如針刺更兼咽疼口乾經水未期脈象浮小治在輕清元參三錢薄荷一錢半桔梗一錢牛蒡子一錢半炒馬勃一錢麥冬一錢半去心甘草八分川貝母一錢半去心加水梨肉一兩半服後牙齦咽痛俱稍減又二十日方服後方一劑咽疼已止牙齦腫痛減半蔓荊子一錢半薄荷一錢半桔梗一錢生甘草八分元參心三錢連翹一錢半去心白芷五分細生地三錢加水梨肉二兩又二十一日方進前方咽疼止牙齦之腫痛亦十去其五再以薄荷山梔黃芩連翹各一錢五分細生地熟石膏各三錢白芷五分甘草八分一劑腫消痛減牙癰可免餘火未盡繼以生地元參心各三錢川黃連三分甘草八分桔梗一錢赤苓薄荷各一錢五分川通草八分服後全愈案黃埭吳豫得女內熱咳嗽痰紅腹塊經閉治驗黃埭吳豫得女年十八歲壬申八月二十六日病由內熱咳嗽而起痰中漸帶紅絲夜來寒熱不飢納少經停四月醫更數手肌體日瘦腹左塊攻病勢日增買舟就治於余診其脈右部數急左部弦緊知其肝陰不充血海無潮胃陽久弱賁門納少色脈合參虛怯之徵已露先聲矣且議養陰退熱之法俾寒熱退咳嗽緩再為之計生鱉甲三錢青蒿子一錢半地骨皮一錢半歸身一錢炒叭噠杏三錢去皮尖生蛤殼三錢炙甘草八分加藕汁半酒杯沖進兩劑寒熱咳嗽俱稍緩又八月二十八日方制首烏三錢生鱉甲三錢青蒿子一錢半麥冬一錢半地骨皮一錢半款冬花三錢叭噠杏三錢去皮尖炙草六分銀柴胡四分制香附三錢研加生薑皮八分大棗兩枚服三劑微寒之勢已停夜熱亦緩咳嗆口乾及左腹塊痛上升之象亦俱漸平九月初二日前方去款冬香附柴胡加女貞子蛤粉炒阿膠老枇杷葉去毛蜜炙各三錢服三劑夜熱十退其八食飲漸增中午可進飯兩碗夜來飲粥或飯亦不覺脹他如口乾咳嗆等亦俱減半又九月初五日方北沙參三錢山藥三錢炒款冬花二錢制首烏三錢炙鱉甲三錢麥冬二錢去心青蒿子一錢半叭噠杏三錢去皮尖炙甘草八分貝母一錢半去心加老枇杷葉三錢去毛蜜炙三劑夜熱退清左腹之塊天明時不上攻矣又初八日方藥投數劑諸恙漸平但脈右之數雖緩而左部之弦徑未平總是氣血未旺八脈未和故中宮亦時有微疼之象也加意圖維俾陰陽和而經事轉斯可矣西黨參三錢淮山藥三錢炒茯苓一錢半炙甘草八分制首烏三錢女貞子三錢叭噠杏三錢去皮尖款冬花三錢炒麥冬二錢益智仁一錢半加老枇杷葉三錢去毛蜜炙是方扶脾保肺用四君子湯去白朮加山藥者因術性兼燥不利於咳嗽肺燥之人佐以首烏女貞以養肝腎之陰加麥冬之甘寒降火而生津使火不爍金再以款冬杏仁枇杷葉之治嗽除痰順氣而清秋令之燥均為肺家之本藥也又用益智仁者緣脾陽不運中宮時而覺疼取其醒脾和胃心脾同治火土相生之妙也合而成方頗有至理存焉服五劑咳嗆又減中宮不疼食飲日增天明喉舌不幹汗少塊平藥頗合宜十三日原方去麥冬益智仁加炒歸身一錢百合三錢蛤粉炒阿膠三錢服七劑諸恙皆安惟經事未轉耳二十日再以五味異功散加熟地阿膠女貞子紫衣胡桃肉一枚不去衣連鬲板服數劑而痊繼以丸劑調理收功吳豫得女調經丸方色脈合參年將十八經停五月胃陽弱而賁門少納肝陰涸而血海無潮寒熱交作咳嗆痰紅腹塊攻痛脈右數急左則弦徑乾血之徵已露先機矣念其路途遙遠望治情殷不得已而用乙癸同源之治侑以退熱生津之法不數劑而寒熱止矣再以補肺養肝兼益脾腎之劑塊平咳減又以扶土生金滋水養木之法食飲漸增氣血漸和諸證向安治法可徵繼以丸劑以為行經之計據述每多趲前一月兩至似屬血熱而脈症並參究關中氣之大虛蓋氣為陽血為陰經云陽生則陰長也自宜益氣為爭先之著少佐和血通經之法亦不可缺也西黨參五兩炙黃耆三兩於白朮二兩土炒茯苓二兩大熟地四兩制香附四兩一用米泔浸一日一用米醋浸一日一用鹽水浸一日一用陳酒浸一日川芎一兩柏子仁三兩去油紫石英三兩火煅醋淬七次研末水飛用白芍一兩五錢酒炒粉丹皮二兩酒炒當歸身一兩五錢酒洗炙甘草一兩陳皮一兩五錢上為細末煉白蜜為丸如桐子大每服五錢清晨滾水送下或桂圓湯亦可案程梅溪繼室懷胎五月子嗽治驗程梅溪繼室壬申九月懷胎五月咳嗽頻頻證名子嗽正值胃土養胎之際宜於肺胃並調南沙參二錢冬桑葉一錢茯苓二錢叭噠杏三錢去皮尖老蘇梗一錢半生甘草六分橘白八分川貝母一錢半去心加青蔥尖三枚三劑而安案昆邑朱廷光室人妊娠下痢垂危奇驗昆邑朱廷光乃室丙辰九月十六日妊娠三月痢下紅白晝夜百餘度點滴後重知飢納少痢起數日年三十五歲醫用痢門套藥治甘苦寒涼備嘗之矣奄奄一息適渠戚程君薦豫診治其脈沉數而滑重按無力知其正虛邪實攻補兩難蓋攻之恐其傷胎補之又恐邪毒不去索想久之幸胃氣猶存一線生機尚可圖救不得已而用攻補兼施之法取其輔正驅邪保母留胎未始非一舉兩得之法也經云有故無殞亦無殞也正此謂耳人參五分另煎沖大熟地八錢廣木香五分磨沖甘草八分大黃五分用荷葉一小個托底煎藥服後約兩時痢下成堆非前之點滴者可比且不後重從此痢減胎安漸能進粥不嘔不痛次日原方去大黃加五穀蟲一錢五分於白朮土炒一錢條芩一錢仍以荷葉托煎兩劑痢頓止矣十九日脈浮小而不沉數按之少有力矣日進粥六七碗糞帶焦黃色早晚一二次當以四君子湯加黃芩芡實廣木香仍用荷葉托煎兩劑全安繼以香砂六君子湯調理五劑而愈案鄒氏婦腹痛嘔吐治驗鄒氏婦年六旬又三腹痛且嘔脈沉而細氣食交阻痛甚防厥制香附三錢廣木香八分陳皮一錢半當歸一錢半元胡索一錢半白蔻仁五分神麯三錢炒甘草五分加蔥一枝外用香櫞青蔥各一兩大皂角兩挺生薑一兩半四味切碎煎湯用棉布浸透絞乾尉腹進前方如法尉之全安案張榮廷乃室産後三月咳嗽氣逆畏寒治驗張榮廷乃室年逾二旬癸酉正月産後三月咳嗆延綿氣逆痰稠日間畏寒醫作冬溫誤投疏表不應更醫用小柴胡湯加鮮生地輩致病日增始問治於余診其脈右部虛小左部虛濡乃氣血兩虛表氣不固易於畏寒咳嗆當益其氣調其營衛兼以降氣化痰痰自除而氣自不逆服四劑咳嗆畏寒可自平矣如數服之而瘳生黃耆一錢半北沙參三錢建蓮肉三錢去心炒蘇子一錢半炒鹿角霜六分款冬花三錢白花百合五錢炙草六分紫衣胡桃肉一枚連鬲板雲茯苓一錢半旋覆花一錢半生絹包扎加煨生薑五分黑大棗兩枚去核案李朗夫女經止寒熱噁心頭項痛治驗李朗夫女十五歲癸酉三月天癸四日經止寒熱醫用蘇梗桑葉鬱金連翹大豆卷等作風溫治身熱反增因邀豫診視案云寒熱起於經行之後血室空虛邪乘虛入是以熱而無汗也經曰奪血者無汗正此謂耳頭痛項強口乾噁心舌膩邊白遍體疼痛雖屬溫邪而治法則以和解為妥十一日蔓荊子二錢淡豆豉三錢廣藿梗一錢半秦艽二錢防風皮一錢半半夏曲一錢半炒鮮竹茹二錢姜水拌炒青皮一錢赤茯苓二錢加生薑皮三分黑大棗一枚服後更余時煩躁嘔吐頃之汗出周身卻非大汗可比從此熱緩頭項遍身俱不疼痛且不喜飲二便通利因豫往鄉停藥一日頗安又三月十三日客邪已解少有頭眩腹疼仍宜和之老蘇梗一錢半廣藿梗一錢半半夏曲一錢半炒赤苓三錢川通草八分砂仁殼一錢小青皮一錢川芎一錢加雞內金一錢半炙服後邪退體倦食飲漸貪惟臍上稍疼得溫暖即已頭眩少減再以霍山石斛三錢焦穀芽三錢炒甘菊一錢半青皮一錢半夏曲一錢半炒淡乾薑五分炒淡茱萸一分半山梔一錢炒加荷蒂一枚兩劑而愈病愈停藥二十有五日行經後乾咳無痰脈象浮數按之不足肺金之虛火不寧治宜清潤議喻西昌清燥救肺湯損益之四月初八日北沙參二錢冬桑葉一錢半黑芝麻一錢半炒蘇子一錢半炒枇杷葉三錢去毛蜜炙炒麥冬一錢半去心巴旦杏三錢去皮尖炒甘草五分款冬花三錢加蛤粉炒阿膠三錢進三劑乾咳全愈案黃埭陳氏女産後咳嗽有年近冒暑復發治驗黃埭陳氏女年三十歲咳嗽有年起於産後舉發無時近感暑濕之邪咳嗽兼嘔氣逆痰稠骨節疼煩脈象浮小咳甚防血七月十四日旋覆花二錢生絹包黑蘇子一錢半炒半夏曲一錢半炒甘草六分塊滑石三錢廣藿香一錢半廣皮白一錢杏仁三錢香薷一錢加老枇杷葉三錢去毛蜜炙服三劑痰減嘔緩其餘如前又十七日方干百合三錢款冬花三錢旋覆花二錢生絹包扎橘白一錢生蛤殼三錢黑蘇子一錢半炒薏苡仁三錢炒杏仁三錢秦艽二錢加老枇杷葉三錢去毛蜜水炙服三劑嘔止咳嗽氣逆骨節疼等俱減半二十日原方去百合苡仁加沙參赤苓半夏曲甘草再三劑咳嗽疼痛更減又二十三日方北沙參三錢款冬花三錢杏仁三錢蘇子一錢半炒生蛤殼三錢半夏曲一錢半炒苡仁三錢炒百合三錢廣陳皮一錢加老枇杷葉三錢去毛蜜水炙服三劑咳嗽全安再三劑諸證平矣案陸我齊乃室經行後欲嘔遍體不疏治驗陸我齊舅兄乃室癸酉十月五日寒熱一日緣經行而寒熱止日來遍體不疏食飲無味口吐清水舌膩欲嘔脈按之則數其為邪之蘊於內者無疑治以和解使其微汗潤澤邪自退矣蔥汁炒淡豆豉三錢廣藿梗一錢半生穀芽四錢生薑汁炒半夏一錢淡茱萸二分雞內金一錢半炙加鹽水炒黑穭豆皮二錢服兩劑而愈案章氏幼女痘出三朝極險危症章氏小姐五歲癸酉五月二十日方案列下年將五歲痘出三朝點來繁密顆粒不分樹小花多咳逆嘔惡便祕不食毒火內壅大險之候慎勿藐視速宜清火解毒以俟高明然否生大黃三錢紫草茸一錢半荊芥一錢半桔梗一錢牛蒡子一錢半炒川木通一錢甘草八分連翹一錢半去心赤芍藥一錢半小青皮一錢紅花一錢半楂肉三錢炒加地龍干三條蘆根一兩去節香菌五錢案胡氏幼女復感夾食治驗胡氏女八歲寒熱未盡復又感冒夾食沖年質弱速宜退熱進疏解藥兩劑寒熱如前隨用小柴胡湯加青蒿子楂炭穀芽陳皮白蔻仁姜皮五分大棗兩枚兩劑而寒熱退矣案文學張敬齊室人調經兼論諸證換膏方並附膏蜜成規嘉定文學張敬齊乃室年逾三旬癸酉仲冬延診色脈合參見證多端沖為血海任主胞胎二經俱虛無怪乎經前之趲前而生育之維艱也時而肝火內動不耐煩勞一眩暈而眼底模糊恍如倦鳥翻云之後一惱怒而胸中跳躍宛似游魚脫水之初十指覺麻腰背痛而身如刺百脈兼疼肢節痠而筋似抽他如口乾唇燥肌膚索澤或有時而外寒或有時而內熱種種情事皆衛陽虛而營陰不足也為之固表以扶陽和里以益陰則氣血充而陰平陽祕矣何必枝枝節節而求之西黨參五兩炙黃耆二兩焦冬朮二兩防風一兩半大熟地八兩搗入陳阿膠三兩敲碎炒珠當歸身一兩半白芍一兩半炒女貞子四兩制香附四兩青蒿子三兩甘菊二兩地骨皮二兩叭噠杏四兩去皮尖炒炙甘草一兩半白薇二兩酒洗上藥如常法煎膏稍加煉白蜜和收放磁器內隔水浸一晝夜退火氣每晨空心用五六錢白滾湯化服自定煎膏加蜜法附後煎膏加蜜成規凡藥一兩煎膏三錢每膏一兩加白蜜二錢此成規也如少煎膏薄則藥味不及多煎則太過蜜加或多或少又非所宜取中和之道庶與病相符方內倘有現成膠如阿膠龜膠之類不在此數內算之嘉慶十八年癸酉歲竹亭定案陸熙堂乃妹肝氣感寒胸悶脊痛治驗陸熙堂內阮二妹年近二旬癸酉春正兩關沉緊素有肝氣今又感寒氣與寒並以致胸悶脊痛頭不能舉痛非輕候防厥瓜蔞全三錢酒拌炒淡豆豉三錢薤白三錢青皮八分制香附三錢炙甘草六分加白酒釀汁一小杯服後胸背之痛稍有緩時大便結糞一次又脈象沉緊漸減仍宜疏理肝脾痛自平矣制香附三錢淡豆豉三錢瓜蔞全三錢木香六分元胡索一錢半白蔻仁八分江枳殼一錢半炒甘草六分大麥仁三錢炒山楂炭三錢加生薑八分蔥一枝服此臍腹之痛背脊之疼俱十去其七八原方去瓜蔞豆豉蔻仁加乾薑五分半夏曲一錢五分溫中和胃而疏氣再兩劑而痛愈三日後因多食夜來經行腹痛用木香化滯湯去紅花枳實柴胡加香附元胡索神麯淡茱萸廣木香八分歸尾一錢半白蔻仁六分甘草六分半夏曲一錢半炒陳皮一錢半制香附三錢神麯三錢炒元胡索一錢半茱萸二分滾水泡淡三次加煨姜一片雞內金二錢炙一劑痛止經通案陸氏婦癲症氣鬱痰凝治驗陸氏婦年四十八歲己巳三月氣鬱痰凝挾火而升譫語妄言不時歌泣脈數而虛癲也非狂女貞子五錢鹽水炒甘菊花二錢製半夏二錢蘇梗一錢半制香附三錢海蛤粉三錢黑山梔一錢半麥冬三錢硃砂拌加生明礬五分松蘿茶三分兩劑而痊案星士胡寶光長媳産後垂危再生始末奇驗胡寶光星士長媳福堂之妻癸酉四月懷胎七月因身熱泄瀉胎動小産素體質弱産後惡露無幾雖不腹痛自覺膨脹不無瘀阻微熱口乾便泄未已頭汗體倦骨節疼煩求救於豫診其脈左關弦緊右脈浮數如綿知其惡血停留虛陽外越色脈諦詳神倦汗多便泄症屬險極亟宜益氣養陰兼除惡露以防汗脫四月十五日方西黨參三錢丹參三錢炒炒熟地四錢歸身一錢炮姜五分川芎八分血餘六分沖青皮六分炙甘草六分加藕汁一酒杯沖據述余診後復延一醫診視以為因身熱而小産者究屬客邪挾食方用舉卿古拜散加歸芍山楂藿梗香附神麯茺蔚子等又一醫立方之意與前醫方相倣佛皆以余方為斷不可用福堂喬梓精於星卜而不精於醫因爾自卜以決疑乃尊占豫方甚好泰卦變需卦翁曰需者須也用也竟用豫方服之少頃安妥身熱漸緩飲粥一碗又半神識清爽午後便泄三次至二更時復有身熱胸悶腹膨口乾欲飲必須滾熱湯飲之胸中方快即此可知虛熱而非客邪實熱愈明矣十六日用黨參熟地鱉甲青蒿歸尾香附炮薑桃仁等又十七日診服昨方身仍大熱不解便泄數十次不止口乾喜飲滾熱湯氣急神倦腹膨鼻煽惡露全無脈右數大而軟左脈弦緊而數徹夜不安主家知其危篤業已治凶具矣勉求立方余見其頭汗漸減惡露未行合之色脈尚有一線生機方用扶陽益陰以退熱溫中逐瘀斂陰固腸俾惡露行而便泄止若能應手尚可無虞西黨參四錢炙鱉甲四錢歸身一錢半白芍一錢半炒炙甘草一錢煨木香八分炮姜五分陳皮一錢半紅曲三錢上藥九味河水煎好去渣加童便一小杯沖服再用禹餘糧五分赤石脂五分俱研極細調和粥內飲之如服畢照數再用為最用此調服取其立止便泄顓固下焦之脫也況腸胃空虛滑溜非二味不復其黏著之性所謂下焦有病人難會須用餘糧赤石脂者職是故耳煎劑之功在於扶陽益陰和營逐瘀溫中厚腸最妙者以紅曲佐之取其色赤入營而治産後之惡露未盡者合之童便之補陰散瘀誠有奇功歸芍得木香甘草調脾和營以厚腸合之炮姜之溫通陳皮之疏中則惡露未有不從斯而行矣然不有益氣養陰退熱之黨參鱉甲為君者合而用之亦難圖其成功也所謂君臣相宜真足法矣豫立方後因病危篤又延他醫亦云脈急促危在頃刻方用荊芥黑豆皮琥珀歸芍丹苓炮姜輩主人見渠方與豫方大不同戚友議論紛紛舉家倣徨無措福堂之嶽母素信觀音大士將余方卜之神靈隨示大吉之簽始敢煎服先將稀粥帶熱照數調和赤石脂禹餘糧與服服後即覺便泄大減隨將煎劑與服服未兩時覺神識不定病者又欲飲滾燙之粥仍用二末調和服一碗之後漸漸睡著微微之汗約睡三時至酉時方醒醒後壯熱頓退神識安靜便泄亦止至夜半惡露漸下色紅且多從此腹亦不膨飲粥兩碗語言清爽面色之浮光亦退諸恙悉安惟覺其疲倦乏力何足慮焉設兩日間病家狐疑誤投他劑其不立斃者幾希自此守服原方三劑粥內二末自此而止日來惡露將停食飲漸增後因下床勞力復又壯熱便泄飲入即瀉福堂喬梓又甚惶惑豫曰此氣虛勞復固病後常事補中益氣湯加赤石脂禹餘糧煎服三劑而霍然矣繼以歸脾八珍等劑調理收功案王氏婦三陰瘧治驗王氏婦年四旬壬戌秋患三陰瘧每發在戌初先寒後熱熱甚於寒口渴喜飲舌苔白膩脈左弦右滑迄今半月已發五次小柴胡湯加減柴胡八分葛根一錢半黃芩一錢半炒製半夏一錢五分花粉一錢半青皮一錢知母一錢半白蔻仁五分研甘草四分草果五分煨加生薑五分大黑棗兩枚去核煎好去滓露一宿明日臨期侵晨隔湯燉熱服如法服之而瘧果止案文學汪書蕉室人嘈雜症治驗文學汪書蕉乃室年逾三旬甲戌孟秋胸中嘈雜攸關心脾議歸脾法西黨參三錢柏子仁三錢研茯神一錢半遠志七分去心炒當歸身一錢半酸棗仁一錢半炒炙草七分陳皮一錢加桂圓五枚三劑而痊案文學張敬齊內人外感泄瀉治驗文學張敬齊乃室身熱頭疼噁心不飢兼之泄瀉日數行舌苔白脈沉小左弦細此夏感暑濕熱交秋而發治宜解表疏里葛根一錢半蔓荊子一錢半半夏曲一錢半炒滑石三錢飛枳殼一錢半炒山楂炭三錢生甘草六分澤瀉一錢豬苓一錢半加白蔻仁五分蔥白二枚一劑而熱退再劑而泄瀉止案陸半峰乃堂脾虛泄瀉帶下治驗陸半峰乃堂年五旬又八脾虛挾濕此便泄帶下之所由來歟用香砂六君子丸每服四錢食後滾水送下進十劑便泄十減七八而帶下仍然再用蜜丸補中益氣丸十劑便泄固止而帶下亦瘳矣服法附後補中益氣丸蜜丸六兩每早空心服三錢滾水送下晚間臨臥前再服三錢炒米湯送下案張竹坡乃室經停兩月畏寒頭痛嘔吐治驗張竹坡乃室經停兩月時值仲冬畏寒頭痛得食即嘔腹中有塊左右相攻此食填太陰法宜疏表運食止嘔十一月二十日老蘇梗一錢半藿梗一錢半桂枝一錢廣木香八分淡茱萸二分神麯三錢炒楂炭三錢小青皮八分生甘草五分加蔥白兩枚川椒五粒炒出汗又二十一日進昨方畏寒漸減腹塊不攻得食仍嘔嘔出酸水食物大便六日未解先須解肌止嘔使上部松而大便自通老蘇梗一錢半半夏曲一錢半炒陳皮一錢半茯苓一錢半廣木香八分烏梅肉三分桂枝八分神麯三錢炒江枳殼一錢半炒加左金丸五分藥湯送服後欲嘔之勢頓平少頃進飯亦不嘔不吐大便亦解甚結且暢腹塊已消惟頭疼畏寒之勢未罷二十二日用羌活秦艽蘇梗半夏枳殼陳皮各一錢五分川芎一錢茯苓二錢焦穀芽三錢一劑而遍體小汗從此畏寒頭痛若失矣案滸關李東陽內人小産壯熱危症治驗滸關李東陽乃室年二十六歲胎懷七月五月下浣因時熱小産産後熱勢更甚頭疼胸悶舌苔糙膩口渴喜飲腹中微痛惡露全無脈虛大而弦邪乘虛入若因壯熱而誤進寒涼危在反掌當以生化湯加味俾惡露行而熱漸退庶有生機當歸尾三錢川芎一錢桃仁泥三錢炮姜四分生甘草六分葛根一錢半淡豆豉三錢陳皮一錢炒炒荊芥一錢半防風皮一錢半元胡索一錢半炒加蔥白兩枚前方歸芎桃薑草五味即生化湯也後六味豫增之翌日復診果然熱緩血下渴減解結糞成堆當進粥兩碗今晨又進如前小腹尚陳痛痛則血塊隨下仍用前方去葛根豆豉防風加黑豆皮廣木香再劑而熱退血止神識安靜食飲倍增繼用異功散加歸芍丹參五劑精神愈健再以八珍湯調理數劑而痊
