body:
  text: 竹亭醫案女科卷一首尾二頁破爛只好綴數言於眉間勿責乃荷人漫塗於定慧寺之東齊女科名醫醫案記載甚少余搜羅數更寒暑未曾一睹此三卷治驗洵可觀也其症候雖輕重不等而大小靡遺醫家可奉為圭臬矣卓翁乃表兄曹智老人室弟子好學不倦余所欽佩即表兄亦嘗談及為門弟子中不可多得之人才荷蒙假閲一過特志數語為酬勿嫌塗鴉有汙好書為幸光緒丁未夏濟臣金揚採塗婦女經産雜症案朱南山內人行經飲冷小腹刺痛治驗朱南山妻年近三旬少腹刺痛得之行經時飲冷茶而起連痛五六日飲熱酒則痛愈甚飲熱茶則痛稍緩知其寒鬱血分兩尺沉遲下部寒鬱更無疑矣然既是寒何以飲熱酒而痛愈甚飲熱茶而反稍緩也為酒性熱而寒邪格拒故相激而痛更甚茶氣雖熱而性則寒以寒為引用得熱茶之氣而痛稍緩矣豫於此而得熱因寒用之法以從治之獨活一錢五分鹽水炒小茴香一錢五分元胡索一錢五分醋炒肉桂一錢二分去粗皮生甘草五分制香附二錢通草八分加蔥須一錢五分煎好涼服初劑痛減大半再劑全愈案胡耀文乃室咳嗽過甚鼻衄不止治驗胡耀文妻年五十九歲鼻衄六日每日約五六次每出約杯許色紫血瘀右寸關虛數肺胃血熱上溢衄之不止法宜清降元參三錢小生地三錢丹皮一錢五分炒茜草一錢五分甘草八分人中白一錢漂淡通草八分血餘一錢沖加藕汁半酒杯沖服後至次日午後鼻衄一次雖仍帶瘀血較前甚少又細審病情惟咳嗽過甚鼻衄即出甚至口內俱有今擬清肺降火以止咳少佐去瘀之法衄自平矣白花百合一兩洗款冬花三錢小生地三錢丹皮一錢五分元武板四錢炙人中白八分漂懷牛膝一錢五分甘草八分炒黑蒲黃一錢五分血餘一錢沖加藕汁半茶杯沖據述午後鼻衄一次頃之又衄兩次服此之後衄血頓止咳亦大減又衄停咳減心中似痛非痛難以名狀左寸虛浮右寸關虛數此血去過多虛火上升之徵也議養心營兼清肺胃自爾痊可丹參三錢歸身一錢五分元參三錢白花百合一兩海蛤粉三錢煅冬桑葉一錢半柏子仁三錢研酸棗仁二錢炒麥門冬一錢半加建蓮肉三錢炒降香末一分沖案葛明揚乃室新産之後感冒發熱治驗葛明揚妻年三十歲新産之後感冒風邪脈帶浮緩身熱欲嘔少腹疼痛惡露未消兼之咳嗽治宜輕疏侑以散瘀荊芥穗一錢五分防風一錢五分前胡一錢五分蘇子一錢五分廣藿梗一錢五分歸尾二錢元胡索一錢半甘草八分益母草二錢加青蔥一枝服後熱停嘔平痛減七八復以調理肝脾藥兩劑而安案蔣奎光弟媳懷胎五月兼染瘡毒附洗浴方蔣奎光襟兄三弟媳其夫素有毒瘡傳染於內據述下體一瘡滋水常有尚未完口邇來手臂及腿足點粒漸增且癢兩日間喉痛懸壅垂下右畔頸項亦痛病情病狀染毒無疑第懷孕五月治毒而不保胎究非上策保胎而不治毒又非善治毒者為此時計先治喉痛兼用洗浴法解散膚腠之毒正所謂治毒而又不礙乎胎也最善喉痛煎服方元參三錢麥冬一錢半去心桔梗八分馬勃五分押煎川貝一錢半去心薄荷七分人中黃五分河水煎服洗浴方蒼耳子一兩蛇床子一兩白芷五錢青蔥二兩川花椒三錢生甘草五錢羌活五錢用長流水煎滾稍緩先熏後洗洗後避風兼忌雞蝦海鮮等物案文連萬內人兩目脹痛羞明治驗文連萬妻年逾四旬兩目脹痛羞明午後更甚上部覺熱下部足冷病經二旬脈象浮數風火內郁治宜清散俾邪外達則脹痛羞明自已也荊芥穗一錢半防風一錢半夏枯草一錢半甘菊一錢半薄荷頭七分桔梗八分淡黃芩一錢酒炒加蔥白二枚服一劑脹痛減半再劑減去七八且不羞明白珠微有紅意即前方去荊防桔梗蔥白加蔓荊子石決明麥冬赤茯苓兩帖全瘳案高茂千女肝脾兩虧經停半載治驗高茂千女年十七歲肝陰素弱脾陽久虛脾何以久虛火不溫也肝何以素弱水不養也經停半載氣血兩虧脈之左關尺虛弦右寸關虛弱顯有明徵盍早圖之西黨參三錢淮山藥三錢炒茯苓一錢半白芍一錢半炒制首烏三錢炙鱉甲三錢當歸一錢半蘄艾二錢制香附三錢炮姜一錢炙草八分加桂圓肉七枚服三劑經水已行藥用對症效若桴鼓案豫老母頭面浮腫痛癢無定治驗豫老母歲在甲子年正古稀時值仲冬忽然頭面浮腫痛癢無定不時火升肌肉如針刺髮根有疙瘩搔之即滋水淋漓服後方三劑浮腫痛癢減其五六再二劑而平蒼耳子一錢五分白芷一錢小生地三錢丹皮一錢五分炒元參三錢甘草八分河水煎服頭面不時覺癢外用元明粉化水搽之取其咸能軟堅消癢定癢而又不過於鹹寒誠良法也搽之果然應手而愈快極案崔誠一幼女外感身熱誤作痘治變症治驗崔誠一女七歲身熱八九日醫妄作痘治用羚羊角連翹赤芍青皮蟬衣蘆根牛蒡子等服後反增頭痛亂語身熱不退因邀余治豫點燈細照頭面胸背手足並無點粒且身熱八九日來並未見噴嚏一二兩顴花紋不見擅投寒涼妄作痘治兒命遭枉良堪痛也豫知其風邪外束食飲中停理當疏解緣庸工誤進寒涼以故反增頭痛亂語豫於疏解藥中重加厚朴以溫中溫中者溫散中宮寒涼之氣也服後方兩劑熱退身涼霍然而痊何快如之羌活一錢五分防風一錢半荊芥一錢半枳殼一錢炒厚朴一錢半薑汁製穀芽三錢炒橘白一錢甘草三分加蔥白兩枚河水二鍾煎至一鍾服以藥治藥正所以治病也案豫胞妹牙痛無時午後尤甚治驗豫胞妹上齒時痛數日來痛無寧刻至午後尤甚上齒雖足陽明所屬而齒乃骨之餘亦未嘗不關乎腎況尺脈虛數非無以也大生地四錢當歸頭七分元參二錢甘草五分香白芷五分獨活六分加薄荷頭三分臨服放碗內泡一劑痛減半再劑全瘳案許元明內人時熱誤治結胸危候治驗許元明妻年三旬得時熱證延余診兩次即更醫醫以犀角大黃茅根蘆根芩芍夏陳枳殼麥芽佐荊防等服後瀉溏糞二次而身熱胸悶如前醫至兩候病勢沉重復求治於余身熱未解舌邊白中黃口渴喜飲胸悶按之痛時邪為寒涼所遏脈象浮數症兼結胸擬小陷胸加味以冀轉機小川連六分製半夏一錢半瓜蔞全三錢青蒿一錢半淡豆豉三錢肥知母一錢半鮮竹茹一錢甘草七分加生薑五分進藥後大便結糞一次且多胸脘悶痛俱停身熱退舌中黃苔亦減其大半又進前藥便解身涼脈象小數是以汗多口渴舌色淡紅稍兼噁心固餘火之未清亦胃土之未和也小川連五分鮮石斛四錢淡竹葉一錢半麥冬一錢半製半夏一錢赤茯苓一錢半黑山梔一錢半服後汗少渴減漸能進粥次日去川連半夏加廣藿梗陳皮白引鮮荷梗四寸案陸佩佐內人病後復感腹痛塊攻藥尉治驗附尉陸佩佐妻年三旬病後體虛又冒風邪微熱舌白食凝氣滯少腹痛甚塊偏臍右按之愈痛痛劇塊攻約長五寸闊有四寸右寸浮小關脈沉滑此冒風而兼氣食交阻非溫疏難以去疾荊芥穗一錢半防風一錢半薑製厚朴一錢半烏藥一錢半元胡索一錢半神麯三錢炒大腹絨一錢半麥芽三錢炒加煨生薑一錢五分服此並尉熱退痛減又尉藥方陳香椽一兩五錢大皂角三挺打碎蔥一兩半切姜一兩切上藥四味煎湯尉痛處其法用棉布四折浸藥湯內略絞乾乘熱放痛塊上初次不覺據云再次稍覺三次則腹中之塊覺暖兩布更換至四次腹中覺響痛亦稍緩晚間再尉塊小痛減次日塊痛俱十去七八主家稱為仙丹余亦甚快鄰按痛極難忍手不能按之時若以熱布挪腹恐病者痛愈難忍故將手巾棉布四折浸透略絞置痛處兩布更換待藥性乘熱入腹俾氣食得暖而自消散再加疏通消食之劑服之其有不效者乎又塊痛僅存二三便結溲短宜以醒胃運食疏氣通泄為法廣藿梗一錢半制香附二錢焦穀芽三錢甘草六分六神麯三錢炒江枳殼一錢炒新會皮一錢半通草八分赤茯苓二錢加煨姜五分外仍照前尉之次日復診痛止塊消大便已通小溲漸長後以參苓白朮散出入收功案程小山室人四肢浮腫骨節疼痛治驗程小山妻年四十六歲七月初九日診四肢浮腫骨節疼痛病起旬日風濕走注速宜疏散久恐成痹防風二錢茅山術一錢半炒秦艽二錢川桂枝一錢五分桑枝三錢鮮浮萍四錢蠶沙三錢炙甘草八分加杉木梢二錢青蔥一枝服一劑轉覺痛熱四肢更腫似乎桂枝之過而實則此藥之外散也初十日復診案立後又案云風濕外散理脾疏肝自爾痊可香薷一錢半廣藿香一錢半木瓜二錢當歸全一錢半秦艽二錢絲瓜絡一錢半酒焙滑石三錢杉木梢四錢用節甘草八分加蔥一大枝服兩劑腫痛俱減八九且能步行就診食飲亦貪設疑初劑不合即便更醫亂投豈不有誤十二日原方去香薷藿香絲瓜絡加白扁豆苡仁新會皮服三劑全愈案吳聖揚乃室腰疽瘡頂不起振盤散大吳聖揚妻腰疽延診據述起於閏六月二十五日如黍米大初亦不以為意漸覺腫痛至七月初八日自己將頭挑破後即腫大如盆延瘍科調治不知外治所用何藥閲煎方一派寒涼甚至犀連丹苓芩翹鮮生地輩不可勝計服此等五劑內則躁熱難忍而外反不見大熱邀余診治其人年近五旬瘡頂不起四圍散漫知其為寒涼遏抑案云營氣不從逆於肉理乃生癰腫此外症之大概今則脈數見於沉分右關尤甚知其暑濕鬱於土中發之不透根盤散漫膿未成而孔多自非輕候幸按之尚熱但不可早投寒涼以致遏抑治宜托之散之清之和之隨症脈而變通之合外內之道也生黃耆三錢防風一錢煎湯拌透焙乾全當歸二錢川山甲一錢半炙角刺一錢獨活一錢半廣藿香一錢半制香附一錢半連翹一錢半薄荷五分甘草節六分煎好投金銀花露半杯溫送案胡氏婦下焦感寒停經腹痛瘀血內蓄治驗胡氏婦下焦感寒停經腹痛不止血塊時下年近二旬病起四日脈左牢大瘀血內蓄細審之痛因行經房勞而起脈症相符治在溫疏八月十二日元胡索一錢半歸尾一錢半白芍一錢半炒炮姜一錢制香附二錢烏藥一錢半紅曲二錢甘草六分加蔥須一錢五分血餘四分沖服服後半夜痛平即能飲粥兩碗且能睡至天明覆痛痛甚血下色紫形如西瓜子發時腹中塊攻如雞子大又經行房勞下焦受寒血紫塊攻痛劇防厥脈左牢大前劑小效藥力尚輕再以溫經散瘀佐以疏通通則不痛而瘀塊自消矣制香附三錢熟附子一錢半炮姜一錢半懷牛膝二錢五靈脂八分生蒲黃一錢烏藥一錢半炙甘草八分加血餘五分沖服一劑痛平血止並臍腹下之硬塊全無誠良方也然必須按脈審症的信經水為下焦寒鬱成瘀方敢重用溫通散瘀之法不然仲秋時附子炮姜各用一錢五分如此重投豈不有誤即是深冬經非寒鬱不過氣滯血凝作痛惟有疏氣和血而已亦不敢用此重劑如前初用元胡歸尾之方原是輕劑後方之用因有血塊攻痛形跡合脈左牢大而用之也閲斯者宜細心體會而詳辨之竹亭自識案李玉山內人寒熱咳嗽半載幾成虛怯治驗李玉山妻季冬九月年二十三歲經水過期乍寒乍熱頭疼咳嗽氣逆食減病經半載右寸浮小左關帶弦風邪內閉速宜疏解若得邪退咳平庶免虛損之門秦艽二錢防風一錢半桂枝一錢杏仁三錢研蘇子三錢研甘草六分桑葉一錢半橘紅一錢穀芽三錢炒加生薑二片黑大棗兩枚去核又進前方三劑寒熱俱減食飲漸貪惟咳嗽氣逆未大減耳十二日換方秦艽二錢防風一錢半桂枝一錢製半夏一錢五分草果七分煨青皮一錢黃芩一錢半炒焦穀芽四錢甘草五分炙加生薑兩片黑大棗兩枚去核服此一劑寒熱即止再兩劑咳嗽停食飲如常十五日買舟復診病已痊可欲再調理三五劑當以二陳湯加苡仁穀芽廣木香雞內金等和胃運食不用補劑者因鄉居僻地不避風寒藜藿之婦體氣強健補反無益所以病起半載得余疏表之藥六劑奏績虛乎實乎可以想其情矣究竟因脈症之不虛而不用補劑非論鄉僻藜藿之人而概不用補劑者言也竹亭自識案豫老母下牙齦腫痛畏寒治驗豫老母乙丑仲冬下旬右邊下牙齦腫痛兩日身中畏寒咳嗽痰稠於腫處刺血隨用金鑰匙藥摻上自覺涼快當服煎方秦艽二錢蔓荊子一錢半白芷八分荊芥穗一錢五分杏仁三錢廣橘紅一錢薄荷八分加白蘿蔔汁半酒杯沖服後明晨牙痛畏寒等俱止矣用秦艽者固取其辛散風邪亦取其止牙痛齒下齦屬手陽明大腸經張潔古云秦艽能去下牙痛正謂此也佐以群藥無非取其散寒退腫止嗽消痰之功也故一劑而諸恙平矣案木川陸獻村乃室嘔吐半載危症治驗附丸方丸方內用金華香附丸專治調經用椿皮丸以治帶下甚妙陸獻村乃室己丑正月二十一日木瀆鎮年逾二旬經水過期兩關虛弦嘔吐半載其味帶酸食入即吐或少緩即吐食甜物亦吐正嘔家不喜甘也夜來身熱口乾所吐之痰沫俱帶冷氣此肝經抑鬱不疏正當春令木邪侮土扶脾養肝佐以止嘔為法緩緩調治匪朝伊夕也建蓮肉四錢去心炒大南棗四枚去核制首烏三錢炙鱉甲三錢製半夏一錢五分廣藿香一錢五分小青皮一錢二分白蔻仁五分研沖加左金丸六分藥湯送下據述每日約嘔吐三四次早飲粥兩碗少緩即嘔吐中午食飯夜來進粥亦必嘔吐迄今半載土醫調治竟無一日之未吐未嘔也服豫前方三劑據述服初劑只嘔吐一次進二劑竟未嘔吐至三劑嘔吐一次又正月二十四日復診議養胃和肝法建蓮肉四錢去心炒製半夏一錢五分雲茯苓一錢五分新會皮一錢五分廣藿香一錢五分川黃連五分淡茱萸二分泡三次旋覆花一錢五分絹包加雞內金八分炒黃服三劑進食良久惟嘔吐清水一次味仍帶酸口覺乾燥此胃土久虛津液未復不足慮仍宜肝胃並治俾其嘔止再商探本窮源之法又正月二十七日方薏苡仁五錢炒旋覆花一錢五分絹包製半夏一錢五分廣藿梗一錢五分小川連五分生薑汁拌炒吳茱萸一分滾水泡三次雲茯苓一錢五分焦穀芽三錢新會皮一錢五分加醋煅代赭石末一錢沖服三劑嘔吐止又正月三十日方即前方去藿梗穀芽加山藥川石斛服三劑亦未嘔吐又二月初三日方嘔吐將停脾胃久虛扶脾養胃加以疏運正合斯時之治焦冬朮二錢白扁豆三錢炒雲茯苓一錢五分新會皮一錢五分旋覆花一錢五分生絹包焦穀芽三錢川石斛四錢煨木香六分加代赭石五分醋煅研末沖又二月初六日方嘔吐停已數日正值經行腹痛泄瀉兼之腰疼法宜扶脾調經侑以溫疏則泄瀉腰疼自已也淮山藥三錢炒苡仁米五錢炒制香附三錢研全當歸一錢五分川芎一錢白芍藥一錢五分炒煨木香一錢杜仲三錢炒炮姜七分服前方三劑腹痛泄瀉漸止再二劑經水亦停矣又嘔吐已停月餘偶爾動怒稍有噦意或吐酸水一二口而止每逢經期前覺內熱骨節疼痛此屬脾胃虛而肝陰不足再議六君子湯去甘草四物湯中減川芎加制首烏炙鱉甲煎服十劑再酌又半載嘔吐病已痊可繼以丸劑以善其後案云經行遲速無期或二旬或四旬一至午後發熱經行之前則尤甚骨節痠疼帶下綿綿不已細按脈象右寸關虛軟無力左關尺虛弦小數自是肝腎之陰弱脾肺之陽虧又恐補脾不利於肝腎滋腎不利於脾胃以脾惡濕而腎惡燥也今處兩方分早午服之不無小補第仍宜節食戒怒庶乎盡善生香附八兩分四處四制一用米泔水浸兩日搗碎焙乾一用陳酒浸兩日搗碎焙乾一用米醋浸兩日搗碎焙乾一用黑山梔二兩煎濃汁去渣入香附浸兩日搗碎焙乾大熟地四兩制首烏三兩炙鱉甲三兩歸身二兩酒洗白芍藥二兩半炒牡丹皮二兩酒炒澤蘭葉三兩酒洗良薑三錢炒成灰存性海螵蛸三兩焙川黃柏二錢炒黑川芎一兩二錢椿根白皮一兩五錢去外粗皮上為細末煉白蜜和丸如桐子大每服五錢清晨淡鹽湯送下此方系四物湯加香附澤蘭海螵蛸名金華香附丸專治調經合椿白皮白芍良薑黃柏四味名椿皮丸以治帶下豫於此二方中加首烏鱉甲丹皮兼治陰虛內熱一舉三善神明變化又何必拘泥於古方也午後丸方用六君子加香砂木瓜調和脾胃少佐土中疏木之法水泛為丸每服三錢食後逾時炒黃米湯送下案王應奎乃室懷胎五月鼻衄如湧治驗王應奎姻翁乃室胎懷五月咳嗽二旬昨因咳嗆喉癢稍見鼻血今日侵晨鼻衄不止血至午後瘀血成條偏於鼻左茅花塞之血從口出適延豫診視四郎出痧因血過多主家倉皇隨告救治余見其衄血太湧兼有血條外用大蒜瓤搗爛塗左足心血止即去之內用藕汁一茶杯稍溫入漂淡人中白研粉沖服一錢五分服後未一刻鼻衄立止再投煎服方案云右寸小數左關弦大鼻衄偏左瘀血成條相火上逆第懷胎五月未便遽投寒涼急宜養陰降火俾血下達以免虛暈之虞大生地四錢丹皮一錢半炒血餘四分沖炙甘草六分黑山梔一錢半炮姜三分陳皮一錢炒炒黑蒲黃一錢加漂淡人中白五分沖服後衄血仍無又衄血昨已停止今晨因咳嗆而氣逆左鼻稍有一滴脈之弦數已緩無足慮也大生地四錢丹皮一錢五分炒白芍一錢半炒枯黃芩一錢五分炒黑芝麻三錢炒桑葉一錢五分川貝一錢半去心海浮石三錢加人中白五分沖服後咳嗆全愈案張宏川女喘咳屢發治驗張宏川女年十九歲喘咳時發痰食相凝治宜疏肺佐以豁痰消食前胡一錢五分蘇子二錢炒杏仁三錢橘紅一錢麥芽三錢炒海浮石三錢楂肉三錢炒桔梗六分加青蔥一大枝進兩劑喘咳十去五六前方去前胡杏仁加旋覆花再兩劑全瘳正值農忙勿貪涼飲冷以免經行腹痛舊疾復發為最耳案豫先慈牙齦上下腫痛治驗豫老母牙齦上下腫痛無論湯水熱冷入口俱痛如此四五日時值九月初旬用後方一帖腫痛減半次日原方去當歸加熟石膏三錢再帖全愈細生地四錢元參二錢薄荷一錢當歸八分香白芷三分獨活八分桔梗八分此症與前仲冬下牙齦腫痛似乎相同而方則大不同矣非方之不同也實症之各別耳當與前案同玩便悉案沈廷柱內人暑濕痢裡急後重治驗沈廷柱妻丙寅仲秋患痢年逾四旬頭痛畏寒身不熱胸悶舌膩腹痛不飢裡急後重暑濕內蘊痢症初起速宜疏解來勢匪輕蔓荊子一錢五分香薷一錢五分豆豉三錢薤白三錢大腹絨一錢五分神麯三錢炒桔梗八分山楂三錢炒煨木香一錢加生薑八分服一帖痛減七八裡急後重亦減其半據云服藥後腹中時有響聲並未大便至夜間方解兩次亦非前之痛墜難忍可比又痢減痛緩余垢未清前方去蔓荊子香薷山楂加廣藿香新會皮服兩劑全愈案談禹範乃堂血崩危症立救奇驗談禹範襟兄乃堂血崩治驗家居木川年逾四旬嘉慶丙寅歲時值仲夏下浣血崩不止病急延診方案列下經水淋漓月餘未止頭汗如雨劑頸而還胸中嘈雜舉動則頭暈眼花不能安臥六脈虛小乏力關脈見芤去血過多陰固虧也陽愈弱矣亟宜益氣扶陽蓋有形之血不能速生無形之氣在所急固若不此之求而概以純陰之品究非所宜速用固氣以統之猶恐鞭長莫及慎之慎之西黨參五錢炙黃耆三錢淮山藥三錢炒茯神一錢半炙甘草八分旱蓮草一錢五分炒黑當歸五分陳皮一錢半炒黑荷葉一錢半炒黑蒲黃一錢加真降香二分研細沖服一劑經血立止頭汗亦少夜能臥食漸貪胸中之嘈雜大緩動輒之頭暈眼花亦從斯而平矣有一症即有一方有一藥即有一理方中用異功散以山藥茯神易苓術合之黃耆固氣養神樹幟中州以助脾胃之生氣佐以當歸炒黑引入心脾肝而導血歸經也僅用五分者因其頭汗如淋雖有參耆究嫌辛散故宜輕用他如旱蓮草之甘鹹汁黑得蒲黃荷葉之炒黑者一取性澀一取升清最後加降香之溫和皆有治崩止血之功能也合而成方法備理明故一劑而血崩頓平矣快哉竹亭自識又五月二十二日方炙黃耆三錢西黨參五錢焦冬朮二錢茯苓一錢五分丹參四錢大麥冬一錢五分去心五味子八分研甘草八分炙旱蓮草一錢半炒黑荷葉一錢加真降香二分研細沖服兩劑崩血仍無頭汗眩暈嘈雜等俱全愈又五月二十四日方用歸脾湯加建蓮肉四錢服三劑安妥如前進粥兩碗又半日進三四次又五月二十七日方前因崩血月餘頭汗劑頸幾乎欲脫不得不急固氣以統之今血停七日日進粥數碗脈象虛小猶當調和脾胃為最俾飲食得運氣血漸充此際不宜過補過補妨食恐反難以運化也遂以五味異功散加廣藿梗煨木香生穀芽服七八劑食飲倍增安臥如常至六月初五日延診用八珍湯加制香附調理收功案黃萬程媳小溲涓滴溺痛手背漫腫奇驗附淋方黃萬程媳丙寅四月初六日新嫁月餘小溲涓滴溺時甚痛又兼尿血經水遲速無定醫用龍膽瀉肝湯尿血雖止而小便之難溺時之痛則更甚於前忽又於六日前夜間手腕郁筋痠痛難忍仍邀前醫伊以為手發背內服煎方如前出入外用敷藥腫勢更增尤加痠痛程梅溪翁薦治於余余細閲外象漫腫無頭自手背至腕後俱熱即用白棉料紙一小方以水浸濕貼於手背上亦不見有即干之象如其是瘡漫腫無頭一時難辨即以濕綿紙敷上先乾者即是瘡頭此則非是實緣郁筋而起他醫誤指手發再治之弄假成真豫按脈象左關尺弦細小數下焦濕熱為患小溲涓滴溺時痛甚此淋症也服以分清卻濕之劑敷以活血疏筋之法則外之疼腫內之淋痛皆可從斯而緩矣何必節外生枝草菅人命耶煎服方生苡仁八錢二原地三錢木通八分甘草梢五分元胡索一錢五分鹽水炒海金沙一錢烏藥一錢半鹽水炒加蔥須一錢五分敷藥方用沖和仙膏加蔥白頭數枚拍碎炒熱同搗和勻敷手背腕處自然腫消疼止據述服此並敷手背之腫漸消熱勢及手腕骱之痠疼俱大減此敷藥之功也至小便之涓滴溺時之熱痛亦十去其三此又服藥之建績也又細生地五錢川萆薢三錢川黃柏八分鹽水炒甘草梢五分元胡索一錢半鹽水炒塊滑石三錢川木通八分石韋一錢加人中白三分沖服後溺時痛去七八淋洗手腕方用紅花五錢桑枝一兩蔥二兩香附三錢四味用水四碗入滴醋一茶杯同煎濃候稍溫淋洗洗後避風據云淋洗三次手腕骱之痠疼十減六七又經行趲前亦陰虛而相火旺也幸溲出疼痛之勢大緩不致從中阻礙議以和肝養胃兼之清泄下焦之餘波亦一舉而兩得之矣大生地三錢赤芍藥一錢五分炒白扁豆三錢炒麥冬一錢半赤茯苓一錢半元胡索一錢五分炒川萆薢一錢半滑石三錢白通草八分加人中白三分沖外用淋洗手腕方照前法服此並淋洗後內之淋症除外之腕痛止竟稱仙丹豫何愧哉案豫內人懷胎足月正産腹痛瘀血停留治驗豫內人年二十七歲嘉慶乙丑五月懷胎足月草一二日腰疼下墜似欲即産而臍腹尚未一痛知其非正産之候乃氣虛下陷耳至二十三日辰刻方才腹痛而腰疼下墜更甚先大人用人參五分當歸二錢川芎一錢服此痛陳連至約半時即見血碗許又半時隨下水漿至午初生女順極産後嚴露更多點燈時腹痛難忍痛後血塊方下每痛臍下必起硬塊亦有痛而無血者審得痛時拒按必其瘀血停留問按生産常規起自臍腹痛甚必至腰重痛極眼中如火穀道挺並漿出血下方是正産之候則腰痛是必産確據也然腰雖痛而腹未痛於正産之候尚缺一層故以氣虛下陷斷之而於芎歸外加補氣藥嘉慶十年五月二十三日七十九歲老人雨香問識晚間又用生薑汁炒鬆大生地三錢當歸二錢川芎七分元胡索二錢炮姜五分服之至五更時痛減五六塊亦活動而小惟覺兩腿痠冷臍腹小痛卻可忍非昨晚十分難忍之痛可比又五月二十四日方用西黨參芎歸熟地元胡索紅曲破故紙炙甘草制香附等服之小塊自臍移至少腹痛時則見不痛亦不見也惟兩腿仍覺痠冷又二十五日方此方尤甚於二十四日之方也西黨參三錢當歸二錢川芎八分元胡索二錢丹參三錢白芍一錢炒炮姜六分熟附子六分加血餘一錢沖服之少腹痛時塊又小兩腿痠冷減半再劑痛塊全無兩腿亦不痠冷矣先大人曰産後惡露平矣當以歸脾湯合八珍湯出入間佐丹參杜仲輩調理而痊孫竹亭識案木川陰佩南內人懷胎七月食入即吐治驗陰佩南妻胎懷七月食入即吐兼嘔酸水兩關雙弦肝胃不和胎氣為患宜安胎中少佐和胃疏肝焦冬朮二錢淡黃芩一錢炒製半夏一錢半茯苓一錢半川黃連五分淡茱萸一分廣橘皮一錢半服前方一劑食入未吐並無酸水而痊可案顧承天內人素多勞役脹痛停經半載治驗顧承天妻年三十二歲素多勞碌飲食不節經水過期或四五十日或兩月一至今於四月二十八日經行至五月間忽喜食茶葉每日約食泡熟茶葉二三碗如此月餘隨發瘧疾即不喜茶葉已後瘧漸愈心中如懊憹之狀食飲似貪非貪時欲噁心口乾腹脹而時痛家居黃埭於嘉慶丙寅十一月十三日買舟就治懊憹素問瞀悶懊憹又痛悔也實鬱悶不疏之謂經停半載有餘切脈審證並非胎象始因食茶而起不無蟲積繼而停經腹脹時痛欲嘔病屬肝脾夫肝藏血脾統血今火鬱於肝濕鬱於脾無怪乎兩關沉細而經水不行也因經而致病者究宜調經解鬱為主俾經血通而諸恙可平不然恐有蟲血二蠱之虞制香附三錢茅山術一錢半炒白芍藥一錢半炒枳殼一錢半炒元胡索一錢半製半夏一錢半淡乾薑八分炒青皮一錢吳茱萸一分泡淡生山梔八分服前方三劑經水即行諸恙悉除案豫妹新産頭痛難忍治驗豫妹於丙寅十一月十六日新産次日清晨覺頭左右中間俱痛靜則稍安動則痛甚惡露雖有卻不腹痛惟頭痛難忍於十八日邀余診治余細審病情知其靜則安動則痛得食減而閉目默然少緩此乃産後大血去多值仲冬嚴寒微風乘虛上侵而致頭痛也如果外感頭痛痛無停止又何能靜則安而得食即緩也方案列下頭痛雖分九宮而新産之後氣血兩虧又當別論右脈虛大無力左脈浮小而芤於氣血並補中少佐一二輕疏最穩九宮雙丹宮明堂宮泥丸宮流珠宮大帝宮天庭宮極真宮玄丹宮太皇宮各有神以主之謂之元首九宮真人也西黨參三錢炙黃耆三錢大熟地三錢當歸一錢川芎一錢蔓荊子一錢白池菊一錢煎好去渣投薄荷三分於藥碗內泡蓋須臾服服後頭痛據云減三分十九日復診因産前咳嗽未痊今每咳則頭愈痛其咳又因喉癢而咳即於方內去池菊加元參二錢人中白七分漂淡新會皮八分服後頭痛又減又十一月二十一日方西黨參三錢大熟地三錢歸頭一錢川芎八分白芍藥一錢半炒蔓荊子一錢薄荷七分川貝母一錢半去心加桂圓肉九枚服三劑據述頭痛已愈九分尚有一分未除又用八珍湯加炙黃耆二錢白甘菊花一錢五分得此一帖頭痛始稱十分全愈矣呵呵案木川郭渭南內人經水淋漓不止治驗附丸方郭渭南妻年二十一歲丁卯正月十六日據述向已小産四胎每産俱三個月素體瘦弱天癸初來即痛甚而至已後每逢經至必大痛即未至之前二三日亦痛每痛俱在臍下今停經七十日於正月初五日經水方至痛之不止淋漓數餘日尚未停止家居木川買舟求治於豫方案立後素屬氣血兩虧經行腹痛氣虛血少可知今停經兩月餘忽爾經行腹痛腰疼數日來猶未停止雖因虛而不能固亦關滯而不能舒此所以痛而兼淋漓也脈左虛澀右則細弱痛在臍下衝脈為病先治其標俾經止之後再為治本惟其氣虛所以氣滯故作痛淋漓而不爽也制香附三錢元胡索二錢醋炒炒黑蒲黃一錢半炮姜八分白芍藥一錢半炒川續斷二錢炒炒黑荷葉二錢杜仲三錢炒炒黑當歸一錢五分存性烏藥一錢五分加伏龍肝三錢用西黨參五錢煎湯代水煎藥準繩云伏龍肝為止血之聖藥取其燥可去濕也豫先大人曰血崩方中或去濕熱或去寒濕隨證配藥皆可用之據述服一劑經止痛緩再二劑俱未見血痛減七八食飲亦貪惟白帶未已耳是方也妙在開首一舒氣最後一固氣中間溫之和之止之斂之而加以導引之法無非為血之不能歸經而用之者也服後果然血停痛平效如影響妙乎不妙竹亭鄰識又西黨參三錢焦冬朮二錢制香附三錢當歸二錢丹參三錢鹿角霜一錢半白芍藥一錢半炒川芎一錢蘄艾一錢半制烏藥一錢半鹽水炒加黑大棗三枚去核煨生薑一錢服五劑臍下之微疼不覺矣白帶亦止隨用歸脾湯去遠志加丹參白芍服十劑安妥如前繼以八珍湯加四制香附廣木香烏鰂骨以作丸調理而愈案豫先慈素有咳嗽寒痰閉肺丸劑調理治驗豫先慈年七十三歲嘉慶丁卯五月初六日素有咳嗽交冬頻發甚則咳喘交加三椎覺冷寒痰閉肺肺穴攸關春夏緩而秋冬甚病關脾肺蓋土虛不能生金而肺弱肺弱衛疏易於冒風是以秋令交而咳嗽易發發則稠痰盈盂似有畏寒之象故每發用輕疏一二劑而緩隨以玉屏風散加味而表氣即固喘咳亦從斯而減秋來又定調理丸劑服後頗合今交夏令將前方稍為損益預為秋冬之計俾土旺金生水自足藉肺金清肅之令下行則腎氣自不上逆母可隱於子胎而喘咳可平矣生黃耆三兩用防風一兩五錢煎湯去渣拌黃耆置飯上蒸曬五次焙用建蓮肉四兩同芡實四兩和勻用生薑汁三兩浸透飯鍋上蒸曬五次焙用西黨參五兩淮山藥三兩炒百合四兩茯苓一兩五錢款冬花三兩柏子仁三兩乾薑一兩炒陳皮一兩五錢黑芝麻四兩焙叭噠杏三兩去皮尖炒甘草一兩五錢上為細末煉白蜜為丸如梧桐子大每服五錢清晨滾水送下此丸服後秋冬咳嗽氣喘大減食飲如常頗屬合宜於十三年戊辰秋九月朔日原方加百部二兩煎膏加煉白蜜和丸如前服案朱景如內人痰厥腦痛喪明咳嗽延綿奇驗朱景如妻年四十五歲自去年四月間忽爾發厥痰迷不知人口歪牙緊漸漸蘇醒之後覺頭腦及兩太陽痛甚每痛即覺內熱口乾遍治罔效以致右目喪明而頭痛至今未愈昨又發厥齧唇朝輕暮重於六月十五日延余診治方案列下肝腎陰虧內挾痰火而上升巔頂以致腦痛喪明昨又發厥齧唇朝輕暮重脈象弦滑兩尺虛數惟左尤甚病經年餘虛痰挾火匪朝伊夕法宜壯水滋肝佐以降火豁痰冀其厥止再酌靈樞顛狂篇厥逆為病也足暴清注指尖冷謂之清元武板一兩炙炙鱉甲八錢制首烏八錢半夏二錢制代赭石三錢煅生明礬五分煬化松蘿茶三分加西瓜子二兩煎湯代水稍冷服因內有明礬礬得熱則行速冷則行遲而能助藥力也此言藥宜冷服非指藥中俱用冷藥也細閲中風門侯氏黑散之用法便悉明礬得松蘿茶亦取其行之遲而不速也凡煎劑中用明礬宜藥煎好去渣投入煬化服之綱目云風痰癇病化痰丸生白礬一兩細茶五錢為末煉白蜜為丸如桐子大一歲一丸茶湯下大人五十丸久服痰自大便出斷病根服前方一劑厥止一夜安靜小便亦不頻數惟頭腦仍痛痛即內熱口乾如前又厥雖止而痰火未靖仍宜昨方出入兼治頭痛大生地四錢制首烏五錢炙鱉甲五錢歸頭一錢半白芍藥二錢炒蔓荊子一錢半白甘菊二錢川芎一錢鉤藤鉤四錢後入大麥冬一錢半去心加明礬三分松蘿茶六分此方即古方名加味四物湯豫於方中又加首烏鱉甲鉤藤麥冬治之神明變化存乎人耳服兩劑據云頭痛全愈又六月十八日進前方頭痛即除兼有咳嗽未已仍求速愈追問病情答曰因頭痛年餘痛苦異常求其一效而不可得雖兼咳嗽無暇問及今得遇良方一劑而痰厥頓止再二劑而頭痛又痊仍存咳嗽一症乾咳無痰朝輕夕重倘能一身沉疴盡徹感戴深恩豈內子一人已也小子幼女不至啼飢此身不至隻影皆藉厚德成全銘感肺腑豫應之曰醫乃仁術性命寄於指下立起沉疴乃分內事也何足感之第此咳嗽非如翁言頭痛之外另有咳嗽一症也自豫觀之今之咳嗽亦緣前之相火挾痰引動內風上升過肺乘金而來也即此知頭痛而致咳嗽者有之非咳嗽而致頭痛也明矣分之似二合之則一或曰既如是云何頭痛痊而咳嗽未除也豫曰前重用滋腎養肝之品而輕佐上升之藥以治頭腦之痛藥證相符頭痛頓愈其咳嗽未止者因內風將靜相火雖不上達巔頂而猶沖肺爍金此咳嗽之所以未已也曰名言也豫今以清燥救肺中少佐祛風意雖風靜痛平而相火未央者究宜防之所謂一而二二而一者也枇杷葉三錢去毛蜜炙霜桑葉一錢半叭噠杏三錢去皮尖薄荷一錢海蛤粉三錢煅明天麻六分煨六味煎好去渣投西瓜汁一茶杯萊蔔汁一酒杯藕汁一酒杯三汁和前藥湯內溫服服一劑乾咳稍緩少有薄痰又六月十九日元武板八錢炙北沙參三錢元參三錢川貝母一錢半去心大麥冬一錢半去心廣橘紅一錢甘菊一錢海蛤粉三錢煅明天麻八分煨加藕二兩萊蔔汁一酒杯沖服兩劑咳嗽十減六七夜咳亦稀痰亦易出又六月二十一日方咳嗽後稍有頭痛制首烏三錢炙鱉甲三錢北沙參三錢麥冬一錢半款冬花三錢叭噠杏三錢去皮尖炒冬桑葉一錢半加萊蔔汁半酒杯沖服兩帖乾咳已十去七八頭痛之意亦平又二十三日制首烏三錢炙鱉甲三錢元武板五錢炙元參三錢冬桑葉一錢半川貝母一錢半去心大麥冬一錢半去心甘菊一錢加藕二兩服八劑咳嗽全安隨用都氣丸每晨空心服五錢調理收功案徐瞻君侄女幼年背心痠疼腹痛發厥奇驗附丸方徐瞻君侄女年九歲三四年來背心痠疼無時每發必著人撲背摸鼻則痠疼稍緩左腹有塊不時腹痛痛甚則厥每朝吐痰痰如破絮土醫治療毫無奏績家居橫塘買舟就治於余余細審病情兼察色脈每發必起於背俞三椎痠疼而波及於鼻夫三椎乃肺之穴而肺竅又開於鼻故疼則俱疼痠則俱痠前後相應也其所以如斯者實風痰痹於肺穴也更兼飲冷傷脾脾土壅而生痰故每朝必吐痰如敗絮之狀或吐青色稠痰此脾肺虛而木來侮土乘金是以或受寒或冒風或停食飲冷亦必如前而發病經四載屢受肝木侵欺然肝木過旺肝亦自傷所以塊起左腹痛劇發厥是脾肺而又兼乎肝也久矣邇來常厥內風挾痰此右寸關之所以虛滑左關之所以弦數者又顯有明徵耶為今之計急則治標扶脾和肝兼祛風痰少佐引經之法為亟亟也俟其少安再為治本可耳嘉慶丁卯七月二十三日方制冬朮二錢製半夏一錢半茯苓一錢半鉤藤鉤五錢後入石決明五錢煅天竹黃一錢橘紅一錢加豬脊髓兩條引經妙法服四劑據述厥未發每日吐痰一塊如敗絮者竟不見矣左腹之塊漸消又七月二十七日方制香附二錢元胡索一錢歸身一錢白芍一錢炒熟半夏一錢牡蠣粉三錢茯苓一錢半陳皮一錢加雞內金二錢炙服此四劑每朝無痰背脊三椎痠疼全愈厥止塊消唯腹痛尚有三分又八月初二日方制香附二錢淮山藥二錢炒半夏曲一錢半炒乾薑六分炒廣藿香一錢半陳皮八分生甘草五分烏藥六分白通草八分加雞內金一錢炙服數帖腹痛止諸恙如前安妥並不一發又進前方諸證全愈治其標也再立調補之劑以治其本用六君子湯加建蓮肉制香附煨木香輩再服十劑繼以丸劑調理收功丸方用歸芍六君子湯加山藥乾薑制香附另加豬背脊骨自大椎骨起約五寸長蜜水塗炙脆研磨如粉和入前藥末內用荷葉煎湯灑疊成丸每服四錢清晨炒米粉送下九齡幼女沉疴積歲非不終朝醫治而治之者概作濕熱濕痰或作肝氣肝風如此妄治無怪乎病日加深而愈發愈勤也皆緣審證不明而又未能盡切脈之巧是以終無成功也豫於斯症於四診中詳諦之知其年幼之女症非七情所關唯於六氣內傷中合參之定為風痰痹肺四字求治加以調中疏氣為活法先治其標藥投四劑果然中的再數劑而收全功矣四載沉疴數日而霍然全瘳瞻君謂豫曰誠神方也令人口張舌縮豫曰非神也理也豈有理明法備而藥不應者乎案黃埭許氏女咳嗽寒熱經水五月未通治驗黃埭許氏女年十八歲十一月三十日診自七月初旬經水行後至今五月未通夜來咳嗽寒熱每至天明必大汗出後熱漸退迄今月餘營衛兩虛脈右浮小左虛弦法宜養陰和衛速退寒熱冀其經轉庶免成怯生鱉甲三錢青蒿子一錢半地骨皮一錢半桂枝八分制香附一錢赤茯苓一錢半大麥冬一錢去心甘草六分服四帖寒熱稍輕其餘如前又十二月初五日制首烏三錢炙鱉甲三錢青蒿子一錢半蘇子一錢半炒地骨皮一錢半銀柴胡六分大麥冬一錢半去心當歸一錢半加生薑五分黑大棗兩枚去核服四劑寒熱俱停天明汗止咳平自覺體健食飲喜進初十日即原方去青蒿蘇子地骨皮加白芍陳皮炙草制香附服四劑如前安妥食飲又增精神更健十四日又用八珍湯加炮薑蘄艾服十二劑經水方至於十二月二十六日仍以八珍湯加丹參制香附作丸培補氣血而痊案汪鳴吉室人咳嗽肌削經停五月虛怯治驗汪鳴吉乃室咳嗽幾成虛怯治驗年二十三歲寒熱起自丁卯孟冬月餘方止已後漸自咳嗽口乾痰中見紅食飲漸減肌體日瘦經停五月交春咳嗽日增氣急喉鳴濃痰甚夥日約二三盂午後欲睡夜來盜汗腿痠腰疼白帶淋漓日進二地阿膠歸芍知芩及二冬參苓輩屢進滋陰之劑少佐益氣之法濃痰益增食飲益減幾乎成怯於戊辰季春之十日始告治於余余細審病情合參色脈形羸氣喘咳嗽聲啞食飲維艱面色痿黃右寸關細小兼滑左寸關弦澀而徑兩尺虛浮小數知其五臟皆虧惟脾為最蓋土虛不能生金而肺氣弱金虛不能生水而腎水虧水虧不能滋肝木而相火炎上爍金以致咳喘交加食飲下咽盡變濃痰肌體骨立經事不行而更加之以嘈雜怔忡痰紅盜汗又關心液之不足由肝而波及其心此豫之所謂五臟皆虧也為此其所以尤重於土者何也以土為萬物之母胃為水穀之海六腑之大源也坤土一虛諸證蜂起矣為今之計亟宜扶土保金佐以清燥寧嗽冀其食增咳緩濃痰日減漸次加入養心滋肝補腎調經之品至於其中標本後先緩急輕重之法又在臨時辨脈審證而權衡之亦無能預料其必然也北沙參三錢制洋參三錢白花百合一兩款冬花三錢川貝母一錢半去心叭噠杏仁三錢去皮尖炒生蛤殼三錢海浮石三錢加枇杷葉膏二錢沖服兩劑嗽咳稍減夜來睡安即原方去貝母加山藥茯苓旋覆花再二劑如前安妥濃厚之痰稍薄盜汗漸平痰紅不覺氣喘喉鳴頓止又西黨參三錢淮山藥三錢炒芡實三錢炒茯苓一錢半制首烏三錢炙鱉甲五錢天冬二錢柿霜八分款冬花三錢叭噠杏三錢去皮尖炒海浮石三錢炙草八分加白花百合二兩煎湯代水服四劑咳嗽減去大半痰之厚者亦漸薄而少非前之日咳二三盂者可比日來口不覺干盜汗已止藥病相符原方去茯苓款冬加玉竹歸身再四劑據云濃痰十去其五咳嗽減去六七喉音清精神爽食飲亦貪漸能知飢足徵脾胃之精氣漸復而能上歸於肺下輸膀胱也以故日逐應手而奏功甚捷也雖肌體骨立之軀而藥中肯窾未有不從斯而挽回生機者也又西黨參三錢嫩黃耆二錢淮山藥三錢炒鱉甲三錢炙制首烏三錢柏子仁三錢研瓜蔞仁二錢陳皮一錢海浮石三錢芡實三錢炒加白花百合二兩煎湯代水服六劑肌膚潤澤不比前之乾燥向來午後必睡自服余方午後不欲睡矣益見脾土之漸運是以怔忡嘈雜腰疼白帶等亦從茲而平矣又西黨參四錢嫩黃耆二錢鹽水炒山藥三錢炒茯苓一錢半大南棗三錢炙甘草六分沉香五分陳皮一錢益智仁一錢左牡蠣三錢煅龍眼肉五枚同煎服六劑自夜至晨咳痰不過三四口大如彈丸較前大相遠矣惟午後咳嗽稍增其飲食精神俱覺健旺面無痿黃之色肌有豐潤之形前方去沉香益智牡蠣加沙參叭噠女貞子仍以白花百合煎湯代水再六劑並不咳嗽惟清晨乾咳幾聲午後咳痰亦稀又病起五月醫更數手百無一效得豫扶土保金益氣養陰而更加以壯水滋木之法藥進三十劑病除十有八九再以前方出入俾氣血融和脈絡貫串血海流通冀其經事之轉為最耳西黨參三錢嫩黃耆三錢鹽水炒建蓮肉五錢去心炒南棗三錢龜腹心三錢炙炙鱉甲三錢柏子仁三錢茯苓一錢半當歸身一錢半叭噠杏三錢去皮尖炒炙甘草八分陳皮一錢加白花百合二兩煎湯代水服六劑服三帖據云經水已至色淡小腹微疼又三劑經水止腹中平和痰嗽僅見一二原方去黨參歸耆叭噠杏加人參沙參三劑如前安妥又肺脾將旺氣血漸和緣食鰣魚忽然便溏引動痰嗽以五味異功散加扁豆山藥款冬煨木香三劑便溏即止而咳嗽痰多比之三日前反增此便泄之後肺氣下降肝火上升究竟虛勞之根未除是以右寸關軟小無力左關尺虛濡小數仍當益氣扶陽養水滋木為法庶乎戩榖以補肺湯去白蜜加百合陳皮粳米方列於下西黨參四錢炙黃耆三錢大熟地三錢紫菀二錢桑白皮一錢五分五味子四分研干百合五錢陳皮一錢加陳倉米三錢生絹包扎同煎渣倒河內補肺而用參耆熟地者以脾為肺母腎為肺子也取虛則補母勞則補子之義丹溪曰補水以制相火其痰自除且熟地亦化痰之妙品也其餘之藥清潤兼斂合而用之又取補土以生金壯水以滋木則咳嗽可除痰火可清矣回環照顧藥豈輕投哉此唯肺虛咳嗽者為宜若實火咳嗽者固非所宜即嗽而無關肺腎之虛者亦非所宜識認不的寧可不用之為穩也服十劑夜間痰嗽俱無侵晨少有咳痰仍用補肺湯去白蜜桑白皮加山藥炙草款冬花兩劑而安繼以歸脾湯去遠志木香煎送都氣丸每晨五錢服一月而全愈案通邑文學顧萃芙先生令媳癇症丸劑調理顧萃芙先生令媳癇症嘉慶丁巳時屆秋令先大人命豫回通拜祭祖先兼探學臺考試之期仲秋三日聞豫回里特延診治萃翁先生與先君子同庠契友也令媳素有癇症邇來不時舉發因立方案以應之癇症有五治法不一細審病情每發時必先從左足筋惕而起痰升氣逆耳有聞而目無見也退則如故診其脈左關弦數而滑按之不足知是肝病無疑蓋肝主筋而行屬木震為足而位居東東方木鬱生火火鬱生風風火煽而痰升痰火沖而氣逆急則治標不外乎此而探厥本源定屬肝虛虛不受驚驚則魂飛虛不耐煩煩則氣越不此之求而重投疏風破氣降火消痰之劑如虛虛何而氣火風痰亦不可盡置不問也制首烏四兩炙鱉甲四兩歸身三兩酒洗木瓜一兩五錢制香附三兩川鬱金二兩一錢醜筋三兩切片砂炒鉤藤二兩女貞子三兩松蘿茶五錢生明礬九錢上為細末煉白蜜和丸如梧桐子大每服五錢清晨滾水送下案海門廳尊李枚九先生令姐嘔吐危症治驗海門廳李枚九先生令姊寡居年逾六旬嘔吐兩月無論粥飯進胃即嘔或嘔而帶酸或吐而挾痰藥投罔效諸醫束手乾隆乙卯五月二十日乃延治於豫診其脈兩關雙弦按之不足知其木乘土位犯胃則嘔嘔吐久而胃氣彌傷肝木愈強木強者肝亦自傷且為之養胃和肝俾其食入不出再為之計用六君子湯加炒川椒十粒煎送左金丸一錢兩劑嘔吐減半再劑嘔止惟痰中仍兼酸意此胃中之正氣漸復肝家之鬱火未清仍以六君子湯加薑汁炒生山梔子一錢五分臨服沖沉香汁三分三劑痰中之酸意無矣原方去山梔沉香加歸芍女貞子養胃補肝治其本也十劑而安繼用八珍湯加制香附作丸調理兩月全瘳案毛家鎮沈炳文乃室梅核氣症奇驗海門毛家鎮沈炳文乃室年二十四歲得梅核氣症土醫無識藥餌亂投致病深沉於乙卯仲秋二日至署懇門上俞姓轉請豫往診豫至其家細審病情症由濕火內郁痰氣凝結所致方案附後下指脈沉氣也沉而兼數火也數而帶滑痰也形如梅核不隨胃氣為往來狀似桃膠直阻咽關之出入經停三月或以為胎似也而有胎之脈胡為乎沉細余作梅核氣治而不用礙胎之品即曰有胎亦何不可方用越鞠丸五錢飯後進三錢臨臥服二錢俱以橘皮泡湯送下服一劑覺胸胃間時有響聲且常曖氣問豫何故豫曰此即向之氣結於上脘者漸有舒通之機佳兆也原方再二劑據述服後胸胃不響不噯惟響在臍腹之下而咽中咽食之窒塞呼吸之哽礙則俱不覺矣即糕餅湯飲下咽亦自松爽而無妨於事也第所慮者臍腹之下響聲不輟似有墜動欲溲之勢得毋小産之徵歟豫曰大凡胎象三月脈必滑疾何反沉細前案中論矣況所進之丸亦無關於胎也前亦言之而其所以臍腹響而墜墜而欲溲者正為美事何反慮其響墜而妄疑其胎也渠慮之吾取之取其氣與痰火皆由上而下達臍腹臍腹乃下焦膀胱之地也知其濕鬱之火有從氣化而出之象也其所以猶未能出者藥力未足功虧一簣耳仍以前丸用荷蒂二錢煎湯送之自然通泰矣如言服之果然小溲即出出時熱而且赤約三四次後漸轉清白而收全功矣數月之病四日而瘳始終藉一丸之力而前以橘皮湯下後以荷蒂湯送此中微妙可為知者道耳間半月復來延診問其症答曰內子經轉始悟非胎今已七日經水色淡綿綿不止少腹微疼仍求良治豫診其脈右寸關軟小按之不足左三部緩澀無力此氣虛不能統攝耳當以益氣和肝則血自歸經無足慮焉於是以四君子湯去茯苓加黃耆炮薑炒黑當歸醋炙青皮伏龍肝等兩劑經止痛平案通邑王東山薦治林姓室人嘔吐兩月治驗豫於乙卯桂秋自李公署中延診病痊告辭回通遇故鄉親友攀留借榻於錢甥之家未幾接先君家書命豫返吳正欲束裝行帆適表兄王東山聞豫至通買舟延豫至三十里鎮渠親林姓之內患嘔吐症七十有日遍治罔效病勢甚劇特求豫救夜深不及解纜翌早同舟而往豫至細審素易動怒經水愆期嘔吐兼咳病逾兩月年近三旬方案列下木強乘土犯胃則嘔木勝侮金沖肺則咳須知肝氣過旺肝亦自傷此左關之所以弦且澀也疏肝平木治其標養肝滋木治其本見證雖多不必枝枝節節求之用制首烏女貞子各四錢歸芍各一錢五分茯苓一錢五分叭噠杏三錢款冬花三錢生薑汁炒小川連七分煎好去渣入生薑汁兩小匙徐徐飲一劑而嘔吐減再劑而咳緩三劑霍然矣隨用左歸飲加百合歸身女貞子囑服二十劑攀留六日解纜而行左歸飲加味附後大熟地四錢淮山藥三錢炒茯苓一錢五分炙甘草八分枸杞子二錢山萸肉一錢五分百合三錢當歸身二錢女貞子三錢水二鍾煎八分食遠溫服案江云洲乃媳寡居厥症有年丸劑調理收功江云洲乃媳寡居無後厥症有年不時舉發服後丸劑竟不再發方案列下丁巳六月望後三日定左關脈弦數而虛右寸關不任重按知其病起於肝而波及脾肺也蓋肝火素郁發則沖肺爍金木氣過強甚則侮脾剋土土虛不能生金而肺弱金虛不能平木而肝強且肝邪過旺肝亦自傷不此之求而專於降火消痰疏風破氣不過稍緩須臾而究非善後之策也為之扶土以生金金氣足而木有所畏兼之養肝以疏木木氣調而火不能升由此而厥逆漸停癲癇幸免豈謂沉疴積歲無計可施耶雖然氣鬱之病女子為多其所以散慮逍遙不盡歸功於用藥者建蓮肉六兩去心一半用甘草一兩煎湯拌蒸曬炒一半用荷葉一個煎湯拌蒸曬炒生香附三兩去毛一半用鹽水浸炒一半用好醋浸炒西黨參四兩制首烏四兩全當歸二兩酒洗茯神二兩酸棗仁二兩炒炙鱉甲四兩白芍藥二兩醋炒遠志一兩半去心甘草水浸上為細末煉白蜜和丸如小緑豆大曬令極干外用川鬱金末一兩五錢生明礬末八錢松蘿茶末五錢龍齒一兩五錢煅研四味研粉和勻為衣用荷葉煎湯灑疊成丸每服五錢清晨滾水送下案戴元魁乃嬸痛症不治案戴元魁乃嬸痛症不治案痛分九種而氣鬱之痛女子為多孀婦更甚苦如尊嬸其孀居之尤者乎即此夫亡子喪淚灑空閨姑老家貧寸腸百結無怪乎沉疴積歲百藥無靈而豫有說焉退一步多延片刻光陰耐三分省受百般痛苦是固不藥之藥無方之方也請自度之案潘莘莊三女天癸未通大腹膨脹塊攻治驗潘莘莊三女年十四歲天癸未通素喜飲冷食酸以致大腹膨脹痛塊攻衝狀如筆管起於右而行於左病經數月邇來甚至食入即痛體瘦食減醫治罔效於戊辰六月二十三日乃延余診方案附下食入即痛氣滯不舒也痛而復脹脾陽不運也此右關之所以沉而且遲者不為無自宜以附子理中湯加味治之西黨參三錢於白朮二錢土炒熟附子八分乾薑七分炒炙甘草八分元胡索一錢半醋炙加舊鐵器兩許煅紅藥湯內淬服服一劑痛脹減半再劑全愈據述自起病至今口無痰吐服此藥後常吐冷痰自覺脘腹松爽足徵脾陽之不運由於寒痰之中停溫中誠為對症之劑而其中痛塊攻衝又不無暗受肝木之侵欺以故佐醋炙之元胡入肝而疏血中之氣滯以煅紅之鐵假金氣而平木則土不受木侮而脾土愈得其令矣即內經亢制之義故一劑知二劑已也仍以前方內薑附各減去二分再二劑不第冷痰全無且素有之塊如筆管者亦自不覺其有矣論藥附後立方時莘莊謂豫曰如此熱天用此熱藥可無妨乎豫曰有是症用是藥經云舍時從症何足慮焉及服後奏績又曰冷痰尚多薑附索性重用為妙豫曰減之則可增之則不可蓋藥以治病中病即已過則誤人莘莊深服案時象明側室頭髮脫落丸劑調理時象明側室年近三旬頭髮脫落丁巳桂月八日頭為陽之首發乃血之餘頭皮何以癢血以熱而風生也髮根何以腐血以熱而濕蒸也血何以熱血虛故也血虛何以發脫或因新沐當風或因頭汗濕鬱邪氣襲虛而真陰不能固濟也再請驗之於脈左關弦浮卜肝風之上擾右關濡數知脾濕之上蒸左尺沉澀而虛益見腎陰之不能上達況經事不調後期而至其為血虛也何疑大生地六兩不切先用當歸三兩川芎一兩五錢白芍一兩五錢陳酒煎濃汁去渣煮生地候發鬆時取出先曬後蒸九次為度余汁留入藥用生首烏四兩先用馬料豆四兩水煮濃汁去豆入首烏煮熟切片先曬後蒸九次為度余汁留入藥用羊腦一具用荷葉包裹蒸熟去荷葉搗入藥羊腦須用生羊腦晚蠶沙二兩用真黑芝麻二兩同炒同研生香附四兩一用醋浸兩日搗碎焙研一用陳酒浸兩日搗碎焙研一用米泔浸兩日搗碎焙研一用鹽水浸兩日搗碎焙研鮮旱蓮草搗汁煎膏三兩元武膠三兩熔化鹿角膠一兩五錢熔化白蒺藜二兩酒炒血餘五兩建蓮肉四兩去心炒上為細末量用西黨參炙黃耆等分煎膏代蜜為丸如桐子大每服五錢清晨滾水送下案陸平莊幼女兩胯滋水及汪氏方氏女治驗陸平莊舅兄次女周歲戊辰六月兩胯滋水淋漓孔如蜂房因癢自抓滋水更甚前用白牡丹散搽之嫌痛多哭今自制黃龍散豫與搽之卻不多哭方用伏龍肝煅牡蠣為君佐黃柏鉛粉密陀僧合成一方命名黃龍散內用苡仁茅朮銀花連翹滑石甘草煎服外以金銀花甘草節各三錢青蔥十枝煎湯候溫淋洗拭乾再敷黃龍散孔深處以麻油調搽三日後兩胯滋水十去其八再次全愈又汪氏女年十四歲左口吻生瘡滋水淋漓痛癢交加瘍科治療反增如胡桃大結蓋自脫而滋水如前淹纏四月求治於豫此濕毒浸淫豫以黃柏少佐甘草研細如粉先用銀花甘草煎湯淋洗拭乾搽藥有水即乾摻之如無滋水即以麻油調搽如法用之不五日而痊並未服藥命其名曰甘黃散又方氏子病咳血延治方畢渠女兄年二旬患口吻瘡兩月滋水淋漓邀瘍醫治皆不應手三日來口吻結緊食難進口虛火易升為此求豫煎劑調攝豫應之曰食難進火易升皆為口吻瘡也治此甚易何必服藥且不勞豫思索即以甘黃散麻油調敷少頃滋水蓋脫再敷之口吻勿緊而食能進從此水止肌生而痊矣案女貞觀百壽師濕毒潰爛藥誤幾危治驗女貞觀百壽師正月十七日年逾二旬經水應期於去冬十月間患濕毒手足腿股潰爛成瘡大者如盆小者如杯癢甚則抓抓則水出他醫皆指為瘋癱症有用麻黃羌防而兼涼血者有以芩連生地銀花羚羊角輩而清火解毒者俱不應手更奇者有粗工用銀花苦參大風子各五錢煎服據云服之內覺熱極難忍幾乎喪命今始少平特買舟求救豫聞之深為悲痛不思大風子性熱燥痰傷血惟外治瘡癬疥癩豈可用此內服即一錢五分尚不敢輕投況五錢乎以人命當兒戲庸工之作孽罪莫可逭也豫從症脈合參知其脾家之濕毒肝經之鬱火外用解毒生肌收水定癢之法內以燥濕扶脾涼血清火之功何患其不瘳也薏苡仁八錢炒茅山術二錢炒秦艽一錢半粉丹皮一錢半炒全當歸一錢半甘草節八分連翹一錢半去心雲茯苓一錢半廣陳皮一錢半外用家制東里膏搽擦勿間服煎劑五日並搽藥後瘡不覺癢並無滋水二十二日診原方去秦艽