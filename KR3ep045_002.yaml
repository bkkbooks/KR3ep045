下半斷已退本色舌根尚膩熱緩惡露少見痛定漸能飲粥又正月二十九日診進昨方諸恙漸減惟動輒汗多口乾耳鳴此氣血兩虧血海未清胃陰未充故痰稠兼咳暫以固表養營佐以疏運之法生黃耆三錢炒歸身一錢元參三錢茯神二錢炒棗仁一錢半半夏曲一錢半炒青皮五分醋炙牡蠣五錢煅叭噠杏三錢去皮尖加炒池菊一錢服後惡露停熱止頭痛大減舌之光剝退清又二月初一日診固衛養陰生黃耆三錢大生地三錢炒元參三錢麥冬一錢半去心女貞子三錢柏子仁三錢歸身一錢半遠志一錢去心炒炙甘草七分炒棗仁二錢茯神二錢橘白八分加生薑六分黑大棗三枚去核服兩劑汗出漸減頭角不疼口乾耳鳴亦緩惟夜睡時醒咳平痰尚多自早至晚可飲粥四五盞知飢口淡兩足不溫脈右虛大無力左三部虛小微數氣血兩虧虛火漸降理應峻補而胃氣未旺脾土未健肝腎之陰雖虛而滋補膩膈之藥究嫌其驟且以益氣扶陽佐以養心寧神之劑再為善後之謀潞黨參三錢生黃耆三錢山藥三錢炒歸身一錢半柏子仁三錢去油炒棗仁一錢半茯神二錢炙草八分製半夏一錢半五味子五分研蘇子一錢半炒茯苓一錢半加左牡蠣五錢煅塊紅棗五枚服兩帖耳鳴止睡亦安諸恙俱平惟兩足未溫汗仍時有原方去山藥半夏蘇子茯苓加焦冬朮一錢五分白芍藥一錢五分再三帖汗出甚少食飲倍增兩足漸溫初八日即此方加玉竹四錢去牡蠣紅棗加薑二片黑棗二枚服兩劑汗止再劑兩足不覺其冷矣又十一日方新産之後氣弱血虧脈細無力諸恙俱平大便數日未解而血海空虛腸燥便結者又未便擅用通幽之法使虛者益虛必得益氣以充之養血以潤之佐以溫腎以達之便自通矣潞黨參四錢歸身二錢柏子仁三錢研郁李仁三錢去皮尖制首烏三錢生首烏八錢松子仁三錢去衣黑芝麻三錢炒肉蓯蓉三錢泡淡陳皮一錢二分煎好去渣入清阿膠二錢煬化二三滾服服後晚間解結糞如彈丸者據述約數枚未暢次日再一劑又解結糞成條而安十三日以氣血並補法調理收功方用八珍湯略為增減人參四分另煎於白朮一錢土炒茯神一錢半酸棗仁一錢半炒熟地三錢當歸身七分白芍一錢炒炙甘草六分南棗三錢去核加桂圓肉四枚兩劑新産十日頭疼身熱腹痛耳鳴汗出無時口乾咽疼咳嗆痰稠種種見端似屬外因之象而證脈合參究關氣血兩虧豫專作新産論治隨機應變逐日平可深中肯窾此其所以收功之捷也歟案海鹽王芝嶠側室咳嗽吐血漸成虛怯症海鹽上舍王芝嶠如君庚辰正月初旬延診年逾二旬咳嗽吐血起自上年醫治罔效漸成虛怯症脈右細耎無力左脈寸澀關脈弦數尺脈濡小知其素體陰虧陽弱腹塊攻痛白淫綿綿任脈為病日來咳嗆痰血顴紅口乾痰沫常吐虛怯之徵已露先聲矣色脈詳審自是相火上炎水不養木宜乎滋陰為最而脾肺久虛者概以滋陰降火又恐不利於脾必得土旺金生使木不侮金金氣充而腎水自旺為今之計亟宜扶脾保肺佐以養肝是為上策初七日方白花百合一兩款冬花三錢淮山藥三錢炒南棗三錢去核雲茯苓一錢半炙甘草六分制首烏三錢橘紅三分炒參三七三分研沖加飴糖一錢熔化又十二日診進前藥咳嗆漸緩就色脈而詳諦之陰固虧也陽亦虛矣陽何以虛由於氣之不充陰何以虧由於火之上炎是以喉乾舌燥咳嗆痰紅至於腹塊攻衝腸鳴白帶雖關任脈然亦未嘗不關乎脾陽之不運耳無怪乎右脈虛軟左脈弦細極也且再調治肺胃佐以養肝斯為善矣生洋參一錢白花百合一兩款冬花三錢紫菀一錢半淮山藥三錢炒雲茯苓二錢叭噠杏三錢去皮尖蘇子一錢炒女貞子三錢制首烏三錢人中白八分漂淡炙草六分煎好去渣投枇杷葉膏一錢五分沖服又十六日方始也咳血繼也驟吐經云陽絡傷則血上溢是肺氣虛而胃土不充也前案已詳易之彖曰大哉乾元萬物資始至哉坤元萬物資生坤屬於土乾屬於金未有氣不充而血能固者亦未有土不足而血能統者此豫之所重在肺胃者近是證脈細審行經趲前刻在臨經之際驟然一吐是屬倒經之象也不然何脈不見數急而神識反安靜也議益氣養胃侑以疏之調之而運動之庶乎可也至於塊之上攻腹中雷引白帶綿綿而下亦無非氣不充而清陽不升也一以貫之不必枝枝節節而求之西黨參四錢淮山藥三錢炒茯苓一錢半炙甘草六分清阿膠三錢蒲黃同炒金石斛四錢降香三分人中白八分漂白扁豆三錢炒天門冬一錢半去心橘絡八分大南棗三枚去核加白花百合一兩五錢煎湯代水煎藥案崇明夏建中內人腸覃症詳論治法夏建中內人年三十三歲腸覃症嘉慶庚辰四月崇明人渡江來蘇就治於豫據述自二十二年十二月生産至二十三年春間於左腹起一小塊日漸長大遍延醫治有作瘀血治或作癥瘕治用消堅破積以及行血逐瘀等藥服之塊更堅大所幸者飲食睡臥如常乳汁充足吮乳不缺延至二十四年冬塊移當臍狀若懷子惟曲腰不便其餘無他苦至十二月經事已轉至二十五年春經行應期季春至蘇曹先生用補血削堅佐製大黃桃仁輩服後經事趲前幾日月水稍多其塊如前復定丸方方用四物湯合調胃承氣湯加三稜莪朮檳榔枳殼香櫞香附蘇梗烏藥丹參元胡索雞內金冬朮茯苓澤瀉為丸主人緣煎劑進數余帖不見應手且嫌丸劑中有硝黃等猛厲之藥因求治於豫案云塊由産後而起寒氣客於腸外與衛氣相搏氣不得營因有所繫癖積於內瘜肉乃生始如雞卵日以益大狀如懷子按之則堅推之則移月事以時下此腸覃症也病經兩載攻伐非宜當宗經旨調氣以溫之王道迂徐無近功也四月十八日診病在氣而不在血故月事不斷應時而下如石瘕則生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下可導而下與此腸覃有別也胞中即子宮也男女之通稱前通關元後通命門男子陽動於此泄精女子陰靜於此受胎之處也是論豫細注於時百珠囊卷二之三十一頁皆詳論諸家之説合而注之以正景嶽之誤認胞中即命門之説非是黨參三錢淡乾薑八分炒熟附子六分木香八分冬朮一錢半炒制香附三錢上肉桂六分去粗皮青皮八分炙草六分加血竭一錢乳細沖服三劑後腹中響動自覺溫暖松爽塊亦軟和非前之緊急可比也細按當臍之塊豫以手隔裙拊摩其塊大腹膨急如臌腹皮內宛如棕草之聲又似隔布摩木賊之音此言可以意會而難以言語形容也姑假形似以揣摹之耳能於不可言傳中而獨得其意則治病之道可以深中肯綮矣又二十一日診腸覃有年緩圖可消若因塊堅而速投峻厲之劑恐反節外生枝證脈合參宗羅氏寶鑑方出入之庶乎盡善焦冬朮一錢半熟附子六分元胡索一錢當歸一錢半大茴香八分制香附三錢上肉桂六分去粗皮檳榔一錢半桃仁泥二錢炒雲茯苓一錢半廣木香八分切片炮薑七分小青皮八分加紫沉香五分劈碎同煎服五六帖合宜即以此方十倍為丸淡薑湯打糊為丸如梧子大每服三錢空心炒米湯下或淡薑泡湯送下亦可案陳儀山女癇症常發治驗附紫雪丹陳儀山之女癇症年餘發則眩仆倒地昏不知人口眼牽動痰涎作聲手足抽搐叫若罔聞甚至遺尿五癇中之極險者況年將二八天癸未通痰隨火升心火不降故月水難至耳邇來一月三兩發氣血更受痰火之纍矣盍早圖之嘉慶丙寅三月十二日薑汁炒生山梔一錢半鹽水炒橘紅一錢半石菖蒲八分礬水浸松蘿茶六分曬乾不炒硃砂拌麥冬一錢半去心製半夏二錢抱木白茯神二錢去心遠志肉一錢炒紫沉香四分切片進四劑癇病未發自覺喉中痰少體健食增原方加天竹黃一錢五分再四劑癇病仍未發渠家因藥頗合如前再服仍不再發精神更健喉中痰聲全無口舌並不乾燥二便通利知飢能納脾胃調和復診之左脈之弦數者大減惟右寸關反覺其滑而少力耳當用二陳湯加焦冬朮柏子仁歸身遠志沉香煎送白金丸八分服十五劑癇病霍然全愈天癸亦通精神健旺肌體未復向豫索調理方豫以歸脾湯去木香加熟半夏制香附用荷葉煎湯灑疊成丸每服五錢食後滾水送下昔先君子治李氏婦癲疾來勢頗重將暮先服紫雪一分燈心湯化服癲勢漸平一更時服鬱金瓜蔞杏仁橘紅麥冬山梔海蛤粉等加茶葉五分明礬五分沖上八味煎服一夜安臥已後仍以平肝降氣消火消痰之劑而漸瘳因癲勢頗重先進紫雪丹分許而癲勢漸平用意極妙竹亭注案費氏嫗胃氣作楚近感暑風嘔痛並至治驗費氏嫗年四十一歲六月望日診素有胃氣作楚近冒暑風痛而兼嘔得湯則劇手足麻頭小脹舌胎膩白有汗惡風六脈沉小議和中法佐以辛苦薑製半夏一錢半廣藿香一錢半防風皮一錢五分香薷一錢白蔻仁五分淡茱萸二分小川連六分薑汁炒滑石三錢加炒出汗川椒十粒揀去閉口者服後嘔痛頭脹俱止舌轉淡黃苔口乾喜飲又復診方鮮石斛四錢鮮荷葉四錢鮮藿香二錢枳殼一錢半炒焦穀芽三錢半夏曲一錢半炒宣木瓜一錢半陳皮一錢加西瓜翠衣一兩服兩劑口舌不幹漸進粥大小便通利繼以養胃和中調治而安案昆邑徐云坡內人寒熱頭脹腰疼腹膨治驗昆邑徐云坡室人庚辰六月日晡寒熱得汗而解頭脹噁心小腹膨急溲便不爽舌苔白膩合之脈象似瘧而陰陽未分也素屬陰虛挾痰經行一月兩至兼之腰疼內如針刺遍身不疏先以解暑卻濕少佐治本之法初四日方香薷一錢防風一錢半半夏曲一錢半炒白蔻仁五分研滑石三錢秦艽一錢半鮮藿香三錢赤茯苓三錢青皮八分橘白六分杜仲三錢生薑汁拌炒加鮮荷葉三錢薑皮八分松蘿茶二分服後寒熱頭脹腰疼俱減其餘如前因其得效據述又服一帖而胸悶噁心反增此方原不可接服因有疏解藥也又初六日方寒熱腰疼俱緩而小腹尚急疼大小便不爽胸悶噁心暑濕之邪未盡也脈左弦細而數防經水驟至擬和中法佐以舒之運之薑製厚朴一錢白扁豆三錢炒淡豆豉三錢蘇梗一錢半廣藿香一錢半半夏曲一錢半炒穭豆皮三錢青皮八分臺烏藥一錢半宣木瓜一錢半加益元散三錢鮮荷葉邊一小個正欲煎藥果然經行著人延豫豫將原方去木瓜加制香附三錢余如前服後寒於二更時作鼓頷戛齒少頃熱至至天明得汗而退昨未服藥前經至腹疼血下兼塊小腹尚急二便通利初七日方案列下寒熱有期漸轉暑瘧胸悶稍減而尚嘔惡腹疼舌膩糙刺擬清解法冀其寒熱漸退不致熱入血室為最耳薑製厚朴一錢薑汁炒半夏一錢半淡黃芩一錢半炒柴胡七分淡茱萸二分赤茯苓三錢炒楂肉三錢青皮八分江枳殼一錢半炒加藕一兩五錢服後未寒少有熱象即退仍然嘔惡口乾舌膩經水未停少腹仍疼血塊仍有腰胯痠軟左脈小數兼弦右脈小滑胃不和而少陽之邪未徹也還防寒熱又初八日方鮮竹茹二錢薑汁炒薑製半夏一錢半藿梗一錢半青皮八分元胡索一錢半炒川鬱金六分歸尾一錢半赤苓二錢黑山梔一錢半加左金丸五分藥湯送下服後嘔惡即止寒熱仍未至口舌尚干經水未盡原方去半夏藿梗加花粉麥冬再兩劑而諸恙向安矣繼以養胃和肝調理而健案徽歙洪季威夫人體虛感邪誤治幾危治驗徽歙孝廉洪季威夫人年四十二歲體虛感邪誤治幾危嘉慶庚辰九月望後問治於豫方案列下素有肝胃氣食飲甚少肌體不豐經水色淡每臨期約四五日方停今經行三日而止於九月初五六日覺頭疼身熱齒痛有汗延曹先生治以為風熱化燥用荊芥連翹枳殼桔梗薄荷山梔牛蒡鮮生地輩涼之而熱不減次日仍以原方出入總不離乎清涼醫治七八日仍然身熱有汗頭疼齒痛胸悶欲嘔偶爾吐出風沫痰似覺胸前稍松頃之仍然少飲稀粥碗許今早解出結糞一塊齒疼稍平而頭疼身熱有汗一毫不解於十六日延診案云頭疼責之太陽齒痛責之陽明左右脈俱沉細小弦邪由表達里仲聖云身熱頭疼有汗而熱不徹者此營弱衛強陽邪內陷況在經斷後得之其為營虛邪陷更無疑矣兼之舌苔白膩胸悶欲嘔二目羞明邪閉未能出表豈是小恙議調營和衛佐以豁痰解鬱以冀熱退汗止庶幾無虞大生地四錢全當歸一錢半丹皮一錢半炒白芍一錢半炒川桂枝一錢瓜蔞全三錢酒炒川芎一錢甘草五分地骨皮一錢半加梨汁八錢生薑汁一錢前藥煎好去渣將二汁衝入再煎一二滾服照法煎服據述至三更時汗出遍身至膝惟小腿下未到當即熱退頭疼齒痛頓減少頃飲稀粥一盞漸睡至天明後而醒醒後安妥非昨之煩躁可比至辰刻又少有熱象卻不煩躁大便稀糞一二次胸脅尚有不舒之狀時欲噯氣則松小溲甚少出時甚熱時有轉失氣據述極臭究屬陽明宿垢未清餘邪未盡吐痰盈盂右關脈稍起左脈弦細如前正虛挾滯痰濕中阻先宜舒中卻濕再為之計十七日方沉香汁三分開水磨沖鹽水炒橘紅八分砂仁五分瓜蔞仁三錢炒黃半夏曲一錢半甘草五分赤茯苓三錢廣藿香梗一錢五分炒黃枳殼一錢半加車前子二錢炒研晚診據述午前進前方服後安妥至戌初大便結糞一次至更時陡然手足厥冷上至腕下至足跗譫語胡言已後默默不語豫至診脈脈左如絲右脈稍起氣凝痰厥用竹瀝薑汁陳皮半夏沉香汁沖服服後頃之厥回又十八日診神虛火升相火隨之舌苔焦黃干糙轉失氣時下燥屎中阻然氣營兩虧而津液不足者又未便峻攻當宜清降肝火佐以水火相濟之法最為穩妥候季威四兄先生自裁羚羊角三錢鎊小生地四錢連翹心一錢半元參二錢川黃連五分白芍藥一錢半炒薄荷頭一錢半甘草五分小青皮八分煎好去渣送更衣丸一錢服後神安語清睡著多時心中一團火熱之勢亦無惟大便未解夜不安寧至雞鳴漸睡睡有三時而醒醒後神清小倦自昨至今晨仍不時轉失氣小溲後似有欲便之象而未能出十九日原方去連翹薄荷加當歸柏子仁再劑至二更時解結糞兩塊兼些少稀糞而下天明睡醒飲粥一盞口乾喜飲米湯腹中稍覺鬆爽又二十日診右脈虛耎左寸細澀關脈弦數尺則濡小氣營兩虧水不滋木肝火易升心煩亂語舌苔中央膩滯轉失氣仍時下宿垢猶未盡也證屬虛實相兼議益氣養水佐以清降庶幾兩擅其長矣人參三分另煎龜腹心三錢炙元參心二錢連翹心一錢半遠志一錢去心柏子仁二錢去油羚羊角一錢半鎊肥知母一錢半棗仁二錢炒當歸身一錢叭噠杏三錢去皮尖臨服衝入沉香汁三分未時進藥時醒時寐至三更時直睡至天明醒後仍少有亂語自覺軟倦舌胎仍膩口乾喜飲又二十一日診人參三分另煎大生地三錢天門冬一錢半去心麥冬一錢半去心元參二錢木茯神二錢炒棗仁二錢白芍一錢半炒歸身一錢半炙甘草六分申正服此少頃即睡多時醒後稍有煩躁卻無亂語飲粥盞許漸睡安妥至酉戌時少有煩躁之象較前安妥多矣小溲日三四次轉失氣仍時下二十二日原方加丹參三錢柏子仁三錢服後安妥如前而煩躁之勢究未盡也又二十三日方腎水虧而心火不靜肝陰虛而相火易動腎不交心水不養木理應峻補第客邪雖解肝火未徹宿滯未清又未便遽投重補當宜壯水以滋木潤燥以通幽佐以降火生津則宿垢除而虛火退自無遺蘊矣生洋參一錢大生地三錢元參三錢麥冬一錢半去心龜腹心三錢炙柏子仁三錢研棗仁一錢半炒白芍一錢半炒當歸身一錢半木茯神二錢麻仁三錢研煎好去渣投梨汁八錢再二三滾服進藥後夜間安睡一無煩躁至次日辰刻大便結糞成條據述約長五寸色帶焦黃解後腹中松爽人頗安靜又二十四日方益陰寧神養胃生津宗前方損益之大生地四錢龜腹心四錢炙川石斛五錢天冬一錢半去心川貝母一錢半去心麥門冬一錢半去心黑山梔一錢半茯神二錢柏子仁三錢研酸棗仁二錢炒加梨汁五錢沖沉香汁二分沖服後安妥如前可以坐起梳髮食飲漸增睡臥漸安惟醒後覺口舌乾苦喉中黏痰小溲日二三次出時稍熱此病後之餘波未清無足慮也耐性調攝自爾平可原方再三劑餘波漸徹又二十八日方病後胃陰未復食不加餐法宜養胃生津胃土自旺大生地三錢金石斛四錢麥冬一錢半去心花粉一錢半大南棗三錢去核廣皮白七分茯苓一錢半炙草七分加雪梨肉一兩五錢生穀芽五錢進兩劑胃陰復食漸貪舌中之膩黃苔始退清矣精神漸健睡臥亦安又十月初一方益氣養胃西黨參三錢白扁豆三錢炒山藥三錢炒麥冬一錢半去心雲茯苓一錢半半夏曲一錢炒炙草六分南棗三錢去核加陳倉米半合絹袋包扎同煎陽春砂仁二分研細沖進四劑諸證咸除調理而痊案王錦堂乃媳産後停經兩載幾成虛勞治驗太學王錦堂乃媳年二十八歲於嘉慶二十三年四月生産至七月間經行一次已後漸轉寒熱月餘方退退後食減體倦延綿日久至二十四年秋間小腹堅硬有塊腹中不爽至二十五年三月間忽發寒熱自産後經轉一次至今二載未行每於申酉時微寒漸熱熱至五更方退日輕日重食飲少進身倦體瘦醫治無效於六月中旬始求治於余案云産後停經迄今兩載日晡潮熱脈象浮大按之不足兩尺沉遲左關弦細肝陰涸而血海無潮胃陽衰而賁門少納纏綿有年將涉虛損之門矣盍早圖之全當歸一錢半白芍藥一錢半炒丹皮一錢半炒銀柴胡七分地骨皮一錢半生鱉甲四錢醋炙炙草八分加生薑