至戌初而漸熱熱時口渴喜飲飲則汗出而熱不止至二鼓而漸退迄今五六發服前醫方瘧不減二日前因便祕治瘧方中佐麻仁丸始解結糞夜半腹痛繼解溏糞是以瘧至寒熱更盛因請治於余診其脈左弦細小腹有塊且疼此瘧邪內伏體瘦食減正不勝邪豈可妄攻細閲前方尚用桂枝解肌又加以茅朮石膏連進二劑瘧勢愈劇就此時汁究宜和陰陽冀其寒熱速減為最草蔻仁一錢半炒常山苗七分酒炒青蒿子二錢藿梗一錢半薑半夏一錢半淡黃芩一錢炒滑石三錢赤苓三錢豬苓一錢半甘草五分鮮石斛四錢加生薑皮五分松蘿茶三分服藥於瘧發之前一時來時寒戰鼓栗之勢已緩熱仍二更而退復診用小柴胡湯加知母煨草果塊滑石檳榔青皮赤苓瓜蔞仁等煎服瘧來寒熱俱漸減大便亦結食亦稍貪小腹之塊亦稍軟非前之膨急不爽可較也然寒時仍凜凜熱至尚渴飲無比仍從少陽陽明和解退邪為善復診方列下柴胡八分葛根一錢半黃芩一錢半炒知母一錢半花粉一錢半草果一錢煨青皮一錢滑石三錢赤苓三錢甘草六分檳榔一錢半穀芽四錢加生薑二片大黑棗一枚去核服後寒熱俱減半冷而不戰熱不甚渴至起更而熱退小腹之塊疼亦漸軟而鬆矣再以原方去檳榔穀芽加鱉甲黑山梔薑棗煎服之瘧至寒熱更輕且不渴飲再以小柴胡湯去半夏加鱉甲當歸花粉麥冬滑石陳皮知母酒炒常山八分煨草果一錢加薑棗煎又用烏藥一錢以兼治少腹之塊其疼已止服此瘧止諸恙俱平繼以調脾養肝三四劑而收全功矣此胎瘧也庸工誤投蒼朮白虎致瘧增劇申後寒來戰栗鼓頷約一時而轉熱熱至渴飲不已較寒加倍至二鼓始退自服余方後寒熱日減得力於小柴胡湯加減其功匪淺案常熟胡在德六年前腹痛異常今復發奇驗常熟胡在德年近四旬細繹病情素好飲酒又貪濃茶五六年前於臍之上下四圍氣壅不爽作痛異常已後未發直至於今而復發痛極難忍服他醫調治脾陽之藥反甚於道光庚寅五月二十五日特求治於余案云繞臍作楚脈形弦緊寒為氣阻舊疾有年今始復發業已十日溫舒為宜滯下積存奇效方載後制香附二錢玄胡索一錢半赤茯苓三錢青皮三錢淡茱萸四分廣木香六分薤白頭三錢當歸一錢半加檀香木四分進藥後頃之臍之四旁響動不已約一時痛緩欲大便未一刻解白凍一塊如胡桃大十日之痛從此頓失矣復診制香附三錢元胡索一錢半淡茱萸三分甘草六分草蔻仁一錢半炒白芍藥一錢半炒炮薑四分檀香四分服前方兩帖又解寒積白凍成堆六月初二用四君子加扁豆木香炮薑等調理全愈案陸吟軒虛羸幾危詳論治法奇驗陸吟軒年逾二旬庚寅五月虛羸幾危治驗陰虧體質潮熱匝月頭眩眼花腰疼腿痛食少肌瘦舌絳喉疼兼之咳嗆脈形右虛軟左弦徑尺濡小金虛水虧木旺火升而心神不靜也心何以不靜相火內動也固宜養水亦須保心而心尤難言之矣禪機云赤肉團上有一無位真人誠哉是言惟無位乃稱真人設有位則仍為赤肉團矣於斯而守真於斯而求治冀其心腎交而水火濟速退潮熱庶乎榖轂九真藤三錢即首烏藤又名夜交藤生鱉甲三錢青蒿子一錢半麥冬一錢半去心北沙參三錢地骨皮二錢炒黑歸身一錢茯神三錢水炙甘草六分金石斛四錢加藕二兩切片同煎蔗漿六錢沖服兩帖潮熱退其七八惟喉疼頭眩眼花食少未平耳復診原方去沙參加龜板元參制西洋參池菊炭六分引換南棗兩枚去核服此五帖潮熱退食貪眩暈咽疼俱平復診玄武板三錢炙炙鱉甲三錢西黨參三錢茯苓一錢半淮山藥三錢炒山萸肉一錢半女貞子三錢陳皮一錢半炙甘草八分煎服數劑全愈案山西張景章腹痛誤攻增重治驗山西張景章五月下浣腹痛症因氣食濕交阻以致胸悶骨節疼舌苔白私進大黃及青麟丸輩致令腹痛甚劇坐立難忍脈象沉細法宜溫舒草蔻仁一錢半炒木香六分乾薑七分楂炭三錢半夏曲一錢半枳殼一錢半滑石三錢橘皮一錢半赤茯苓三錢淡茱萸四分服後痛漸緩仍用原方再劑痛勢大減臍腹塊攻大便欲解不能食阻氣滯之故耳當用二陳湯加木香枳殼楂肉麥芽神麯等煎好去渣送更衣丸三錢少頃大便結糞成條後兼溏糞而止再以和胃調脾使其能食而不脹滿是為上著服之果然即愈案陳旭岑三令郎暑濕症誤治危篤救蘇奇驗陳旭岑先生三令郎年逾二旬病由暑熱挾濕而起醫妄投川連厚朴繼又早進犀羚翹連病增更醫又進竹葉石膏湯佐芩連輩而熱仍未解因大便祕用麻仁丸等始解先結後溏身熱稍緩究未盡徹兩耳失聰口乾喜飲西瓜汁據述飲時似乎喉舌覺爽不飲頃之唇舌仍干喉中黏痰時吐惟飲米湯粥不喜進小便短赤獨賴西瓜汁以潤喉舌之干醫更數手病勢日增於庚寅六月初九始問治於余診其脈右浮軟無力左關弦細尺濡知其暑熱為寒涼遏抑陽明胃津已涸是以口乾喜飲弗克少待兼多咳嗆痰黏不喜納穀種種見證一身津液盡為寒涼所傷無怪乎喉舌乾而熱終未能退徹也病延匝月之久當以養胃生津之法冀其津回而食自貪不治熱而熱自退矣弗此之求變端莫測藥豈輕投哉制西洋參一錢半大麥冬一錢半去心鮮蓮肉一兩去心衣甘草六分川貝母一錢半去心白花百合一兩生穀芽四錢南棗兩枚去核緑豆皮一錢半加鮮稻葉三錢洗淨同煎服前方口乾頓除熱亦退矣再以原方去百合緑豆皮鮮稻葉加北沙參石斛蔗漿六錢沖藕一兩同煎服三劑諸恙霍然矣案鎮海倪秉綱忽然泄瀉晝夜無度治驗鎮海倪秉綱六月二十九日年逾三旬驟然泄瀉晝夜無度脈息沉細受寒挾濕法從溫舒草蔻仁一錢半煨木香六分苡仁五錢炒赤苓三錢陳粳米五錢絹包扎煎陳皮白一錢豬苓一錢半甘草六分澤瀉一錢半加鮮荷葉一小個托底煎藥服一帖泄瀉立止案張竹坡長子友卿暑濕病復犯房勞險症治驗張竹坡長子友卿年逾二旬暑濕症復犯房勞治驗病得之六月二十七身熱而起次日尚啖葷面再日又食肉點至二十九日又犯房勞少不節欲陰氣虧而暑濕之邪留戀於內未克達表以故身熱忽輕忽重亦無定期也加之食阻中宮口乾喜飲水濕之邪未得從膀胱氣化而出同走陽明大腸而便泄也有時足冷固由陰氣之不充亦關濕阻於足脛二者兼有之也明知證非輕候況脈象濡細顯有明徵而其所以猶可治者邪達陽明陽明為多氣多血之鄉於斯而求治或可免其變幻之虞矣道光十年七月初六診煨葛根一錢半青蒿子一錢半淡黃芩一錢半炒赤苓三錢煨木香六分栝蔞根一錢半鮮石斛四錢滑石三錢薏苡仁四錢炒廣藿香一錢半豬苓一錢半澤瀉一錢半加鮮稻葉五錢洗淨同煎服此熱勢漸緩便溏僅一次口不甚干小溲短少脘腹微疼余如前次日用煨葛根丹皮黃芩車前石斛二苓通草地骨皮等九味加陳粳米一撮絹包線扎用鮮荷葉一個小者托底煎藥服之如前無增減惟夜半少有心煩昏語之象復診七月初八日方小川連五分水炒淡黃芩一錢半薑半夏一錢半赤苓三錢青蒿子一錢半地骨皮二錢鮮石斛四錢甘草六分加陳米一撮絹包線扎同煎服昨藥後至夜間煩躁昏語房中女伴傳言內戚次早延諸庸工以為夾陰傷寒必得溫燥之藥方能挽回幸竹坡兄深信余言伊等之方不許煎服內戚袖手無法又特代延曹樂山兄診視告知於竹坡竹坡惟云既蒙代請一診只可至於立方則斷斷不用所服之藥惟余定之方必竹坡親視煎之何信之誠也是日樂山至亦以為暑濕夾食因奪精之後邪難速退亦云不可作夾陰傷寒論而妄投燥熱之劑方用生薑瀉心湯加減用醋炙半夏黃芩生西洋參各一錢半黃連甘草各六分杏仁瓜蔞全各四錢赤苓三錢生薑渣二分是方未服仍用余前方煎服服後夜間似煩天明熱勢大緩大便不溏喜飲不渴稍進稀粥胃土漸有運動之機復診七月初九日方小川連五分薑半夏一錢半黃芩一錢半甘草六分細生地四錢粉丹皮一錢半地骨皮二錢赤苓三錢加陳粳米一撮如前煎服此熱已漸減朝退暮增十去其半夜無昏語復診七月初十日方病經十三日熱勢大衰口乾不多飲舌絳兩邊微白而有小沫此胃中之濕濁未淨也今晨鼻衄些少大便中兼有瘀血如瓜子式一二塊此長夏炎蒸時過啖涼粉瓜果積而成瘀與暑濕熱相混而並於肺胃以故上下見血也胃與大腸同屬陽明肺與大腸相為表裡理固然也法宜退熱生津兼清肺胃之火為妥西洋參一錢半去皮細生地四錢桑白皮一錢半赤苓三錢金石斛四錢地骨皮二錢生穀芽五錢丹皮一錢半炒生甘草六分加藕汁一酒杯沖服此熱退七八上下血止再劑而熱退清矣又用養胃生津之劑食貪睡安繼以調補肝腎之陰不數日而全愈矣是證初起至夜煩躁漸有昏語房中女伴傳言內戚議論紛紛次早延諸庸工診視以為夾陰傷寒非溫燥之劑不能救非茅朮厚朴薑桂之藥不能治立方深囑早進遲恐不及使竹坡狐疑幾誤大事然竹坡素信於余特問余能治不應之曰能治第須依余用藥庶可無虞蓋此證重在暑濕夾食兼之房勞不過陰氣有虧然年壯邪盛究宜祛邪外達不使內陷為最縱是熱盛不過較平常之熱增重耳以陰虛陽往乘之也如果症為夾陰所感必有脈證可憑不得概作陰症之治以誤人使冤鬼夜嗥誠堪痛惜竹坡深信余言悉屏他醫將性命寄於指下餘一力擔承前案可鑑仍以前法出入清舒運滯俾邪解食消熱退津生不數日而全活設當時輕信旁議竟遭若輩之手而以溫燥為法其性命不知何有矣此皆竹坡兄為善之報歟與余何功焉汪訒庵云人惟知有外傷寒而不知有內傷寒訛作陰症非也凡冷物不宜多食不獨房勞為然也周揚俊曰房勞未嘗不病陽症頭痛發熱是也但不可輕用涼藥耳若以曾犯房勞便用溫藥殺人多矣諸書從未有發明及此者世醫皆罕知之周子此論可謂有功於世矣由此觀之足徵余之治張子之夾陰傷寒而不用溫燥之劑可鑑矣案胡在德滯下早投止澀攻痛匝月幾成休息之驗常熟胡在德庚寅八月十九日滯下未幾積垢未除早進鴉片煙而積止止雖止矣積滯猶存月餘來攻痛無寧刻時欲登圊至圊積減淹纏不已轉成休息速宜溫通幸勿藐視前有繞臍作痛症記前三百八十六頁內薑厚朴一錢淡乾薑七分炒製大黃三錢枳實一錢水炙甘草七分廣木香六分陳皮一錢半五穀蟲八分焙服此一帖一晝夜攻痛如前直至天明解結垢成堆頃之痛緩據述十去其七腹中松爽而胸脘尚有氣悶之勢細審之素好飲酒喜茶又不無濕阻加紫衣胡核肉一個連鬲板用服藥兩帖便泄已減日僅一次非前之日三四度可比余如前復診九月二十三日方原方去天冬加薏苡仁五錢再服兩劑便泄仍一次咳嗽亦減食飲稍貪頗為合宜復診九月二十五日方人參六分沖黃耆一錢半鹽水炒茯苓二錢炙草六分於白朮一錢半土炒芡實四錢炒益智仁八分木香七分煨巴旦杏三錢去皮尖大南棗三枚去核款冬花三錢加白花百合二兩煎湯代水服四帖精神稍健安妥如前復診二十九日方西黨參四錢生黃耆三錢鹽水炒山藥三錢炒扁豆三錢炒柏子霜三錢款冬花三錢茯苓一錢半炙草六分煨木香八分大南棗三枚去核加白花百合二兩如前法服四帖便溏間一日解一次比前更妥復診十月初四日方西黨參四錢生黃耆三錢鹽水炒焦於術一錢半扁豆三錢炒薏苡仁五錢炒白茯苓一錢半巴旦杏三錢去皮尖炙草七分訶子肉一錢煨大南棗三個去核加白花百合二兩如前法服此四帖便泄止雖不結亦不溏咳嗽漸減食飲稍增惟脈象仍軟濡舌苔絳剝究關胃津未復脾氣未旺咸由咳嗽內熱他醫日投養陰滋膩之誤也自九月二十日問治於余診脈察色首重脾胃為緊要關頭蓋土為萬物之母胃為水穀之海坤土一健則肺金得令而便泄咳嗽皆可從斯而向安矣此藥之所以效如桴鼓之應也復診十月初八日方西黨參四錢炙黃耆三錢焦於術一錢半土炒山藥三錢炒雲茯苓一錢半炙甘草八分訶子肉一錢煨芡實三錢炒款冬花三錢煨木香八分加白花百合二兩如前法服此四帖大便始結十二日復診原方去訶子煨木香加益智仁女貞子等服六帖如前安妥惟咳嗽未大減鼻洪仍常發復診十月十八日方西黨參五錢炙黃耆三錢蛤粉炒阿膠三錢山藥三錢炒巴旦杏三錢去皮尖白茯苓一錢半炙甘草六分芡實三錢炒薏苡仁五錢炒天冬一錢半去心加紫衣胡桃肉兩枚連鬲用服此方六帖咳嗽自此而止食亦增半大便日解結糞一次惟鼻洪常發自幼有之兩日來血衄成條甚則鍾許少則杯許二十四日用四君子湯內人參用六分加沙參玄武板降香漂淡人中白等煎服四帖而血止兩足常冷如冰天寒愈甚再用四君子湯加女貞子枸杞子左牡蠣鹿角霜等服之如前之妥再以歸脾湯加減至歲暮嚴寒脈象虛軟間以益氣養榮之法調理收功從茲體丰神健亦再生之福也案廣東南海錢小汀淋症溺時痛如刀割治驗廣東南海四錢小汀庚寅仲冬淋症痛劇難忍治驗年三旬好酒貪色寓所潮濕忽然小便淋閟涓滴難忍內如刀割出時腰彎背曲脈形弦數濕火內郁用後方兩帖而霍然矣木通一錢赤苓三錢豬苓一錢半澤瀉一錢半青皮一錢黑山梔一錢半萹蓄一錢半瞿麥一錢半甘草梢六分車前子一錢半炒十味順流水煎案孫永徵脾土久虧喜啖厚味脘腹脹痛治驗休寧孫遠齋翁六十四歲素好酒喜面縱啖厚味脾土久虧邇來脘腹脹痛得食愈增舌苔厚濁膩滯大便三日不通小溲短赤出時熱臭脈息濡細僉因氣壅而兼濕食交阻也急則治標先以舒通法道光庚寅九月初八日診制香附二錢萊蔔子三錢炒枳實一錢半檳榔一錢半廣木香六分小青皮一錢烏藥一錢半豬苓一錢半煎好去渣入生白蜜六錢沖服後脹痛頓緩七八轉失氣始有惟大便未解小便仍如前復診是症大便不通明知非結糞也因其濕阻氣壅酒濕厚味填塞中焦以致脹痛異常加之誤投溫補中宮之氣愈壅愈滯釀成溏糞致令大便難而小便熱赤且臭也必得大便一解黏著之宿滯頓下則腹中之脹痛盡徹也當用製半夏神麯木香萊蔔子赤苓黑山梔淡蓯蓉大腹絨山楂肉雞內金等服之果然黏膩之糞早晚兩次脹痛頓失矣繼以冬朮苡仁扁豆木香萊蔔子製半夏赤苓生穀芽大腹絨廣皮白等加雞內金砂仁末沖補脾運食煎服五劑調理收功病愈後至仲冬胸脘作脹小腹兼疼知飢不敢多進因其脹也於近處就醫治之不問因又問治於余診其脈右關細硬左脈弦徑氣壅濕阻上脹下疼病在脾而波及於肝宜以溫中運濕舒補兼施庶幾無妨西黨參一錢半生冬朮一錢半乾薑八分炒陳皮一錢半淡茱萸四分廣木香七分檳榔一錢烏藥一錢半炙甘草五分紫沉香四分加雞內金二錢炙服兩帖脹痛之勢頓止食飲如常矣又用歸芍六君子加乾薑益智仁木香山楂麥芽等共十三味為細末用蒸餅打糊為丸如桐子大每食後以炒米泡湯送下五錢方中分兩未載臨時觀虛實而酌之案門人金書山怔忡極險奇效奇驗並詳明病原治法門人金書山年五十三得怔忡極險症奇效屢驗素屬中虛陰虧之體每早喜啖濕面至夜又好飲酒酒後食飲可進可無向來如斯忽於數日前覺胸中搖蕩初不介意漸自火升頭目不爽舌尖刺痛喉音不清少頃心蕩漸平則諸恙如失忽而又至則前恙復作三日前更增左乳下跳動異常以手按之內如沸羹尤奇者脈亦三五不調自治罔效於庚寅十二月初二日特求治於余細繹病情胸中搖蕩此怔忡病也火升頭眩兼之左乳下跳動異常穴名虛里胃之大絡也脈象忽遲忽數忽止忽來靜則神安煩則火升土虛木搖水虧火起病關心脾腎肝豈是輕候慮其跌僕神迷經云胃之大絡名曰虛里貫膈絡肺出於左乳下其動引衣宗氣泄也動之應手者無常耳乃知無常之脈指左乳下之動脈為言有常則宗氣不虛無常則宗氣大虛而上焦之氣始懨懨不足也西黨參四錢制首烏四錢女貞子四錢茯神三錢遠志肉一錢炒焦冬朮一錢半炙甘草六分池菊一錢川黃連五分水炒代赭石四錢煅紅醋淬加大南棗兩枚去核服一劑諸恙俱平惟面色仍紅舌尖尚絳中有裂紋原方加元參三錢再劑如前安妥初四日方記後仍用四君子湯如首烏鱉甲棗仁遠志女貞子元參等加梨汁六錢沖服服兩帖心不蕩則頭眩火升亦平惟早上心跳火升易飢必得多進食物始安復診十二月初六日方今晨又覺心蕩頭眩火升易飢有飢不待食之勢有上重下輕欲僕之象土虛木搖內風挾痰火合而為一擬標本兩治之法羚羊角一錢半鎊川黃連五分鉤藤鉤四錢後入天麻一錢煨西黨參三錢天竹黃一錢生白芍二錢橘紅一錢炙甘草五分加飴糖三錢沖服此一帖諸恙若失雖飢亦非昨之飢不待食可比惟右脈弦硬左脈未靜究宜加意圖維復診侵晨未曾進食漸覺心跳引動虛里頃之進食而平頭雖不眩較昨稍增方用四君子湯加羚羊角黃連石斛沉香天竹黃等服後頗安再用六君子加鮮石斛薑汁炒山梔牡蠣南棗輩服之至午未時又有心跳火升虛里穴亦然從此面紅頭眩心平卻非前之飢不待食可比午未兩時正是心脾攸關之際復診西黨參四錢炙黃耆三錢焦冬朮一錢半炙草八分茯神三錢鮮石斛五錢川黃連七分沉香六分加代赭石四錢煅紅醋淬服兩帖心蕩火起跳動毫不覺矣原方再加柏子仁霜三錢煎服四劑如前安逸復診西黨參三錢炙黃耆三錢焦冬朮一錢半茯神三錢建蓮肉三錢遠志肉一錢半炒大南棗兩枚去核炙草六分金石斛五錢炒棗仁二錢服此四帖甚妥仍以四君子湯加黃耆龜板女貞子歸身遠志元參南棗等補心脾而兼養腎肝之陰是治其本也服數劑果然應手交春在即仍於此方略為加減調理收功病痊之後於辛卯二月復發心一蕩則火升面紅有脫衣去帽之勢舌中心裂紋兩邊紅齒舌潤口苦卻不喜飲惟有胸悶氣阻火欲升而不能欲降而不得必須胸脘氣松自知火降神安證脈合參前治可鑑其所以屢發者固關中虛陰虧亦由心思過度鬱悶不舒而又難以告人者是以越想越郁以故病發則心蕩火升面紅舌裂胸悶不爽等情隨至必欲胸脘一爽則氣順火降矣今心事鬱結因感而觸之者無怪乎易復也最難調治所謂實病易治七情難療信不誣也就症脈而詳諦之升降不靈也用仲景黃連湯先治其標再為治本小川連五分生薑汁拌焙淡乾薑六分炒製半夏一錢半炙甘草六分西黨參四錢上肉桂一分去粗皮大南棗兩枚去核上藥七味用河水一盞二分煎七分服據述未服藥前胸脘煩悶無一刻之安速煎服畢即覺脘中轆轆之聲直奔而下頃之胸中舒暢氣順火降而霍然矣數日間虛里又覺跳動脘中閉悶即於原方內去南棗加鹽水炒黃耆焦冬朮各二錢整塊硃砂三錢用絲棉包扎同煎服後胸悶頓松連進四五劑病未一發仍如前以扶脾養肝之法調治頗合間以四六君佐肝腎同治之法而全瘳再論治病必明標本六氣六氣者風寒暑濕燥火與人身相應也是症於三月十八日怔忡復發胸中搖蕩氣壅不舒濕氣上騰二目如煙雲籠罩正值地之濕氣上升試觀室中之礎磉潮如露滴成流之時病發更甚豈非人身與天時相應也因以六君子湯加茅山術一錢半炒川芎一錢白池菊薄荷各八分松蘿茶四分等煎服一劑而病頓緩再二劑而胸寬目爽又三帖而病痊矣方中終不離於四六君者治其本也而治標之法亦何可少也方中非佐以燥濕治標之法則胸中濕氣難以立除足徵治病之要當深明標本六氣之因而求治無不奏績矣案嘉興王芝嶠滯下寒熱腹膨面目虛浮險症之驗嘉興上舍王芝嶠兄年逾五旬於庚寅十二月初三患紅白痢極險治驗滯下晝夜三十餘度至圊積減寒熱腹膨面目虛浮有表裡兩感之勢第素有喘咳痰飲之症房幃不節之軀更兼體弱肌瘦食飲不貪脈象浮之小中按沉滯再按無力險在此耳姑擬煨葛根蘇梗楂肉桔梗枳殼神麯木香五穀蟲赤茯苓等藥於平淡中見神奇妙妙服二帖積減熱緩腹痛稍平原方加減自述痢勢日輕白早夜不過三四次仍兼紅白至初八晚診宿垢漸減面浮顴紅食少不寐操勞過度心榮肺衛兩虧先議調脾養胃為主人參六分沖另煎於白朮一錢半土炒川石斛四錢茯苓一錢半木香六分切片水炙甘草六分生穀芽五錢半夏曲一錢半加大南棗兩枚去核服前方兩帖宿垢大減舌苔漸薄飲粥漸增原方去半夏加益智仁七分服之食飲漸貪十一日用四君子加建蓮金石斛穀芽益智仁芡實南棗服兩帖大便溏糞日一次無積面浮顴紅足跗等虛浮俱減口舌時干不喜飲此津不足也十三日用四君子湯加生黃耆皮一錢五分南棗三錢金石斛生穀芽各五錢麥冬一錢益智仁七分陳皮白六分牡蠣五錢煅塊等服兩帖每次可進飯兩盞日二次夜可再粥大便如前可以下樓少步二目內眥連白珠甚紅亦虛火上升耳復診十二月十五日方人參一錢煎沖黃耆皮二錢茯神三錢茯苓一錢半炙甘草六分焦冬朮一錢半池菊一錢沉香四分大南棗三錢左牡蠣五錢煅塊服兩帖大便已結二目紅減原方再二劑甚妥十九日用四君子湯加炙黃耆苡仁金毛狗脊炙去毛等煎服四帖飲食如常目紅足浮俱退仍於原方損益之再五帖而諸恙平矣於十二月二十八日用人參一錢熟地四錢黃耆歸身益智仁炙甘草各一錢杜仲茯神山藥各三錢金石斛大南棗各四錢等調補收功案山西梁瑞之臍腹絞痛寒與濕食交阻治驗山西梁瑞之年逾二旬辛卯正月望後忽畏寒身熱漸自臍腹絞痛小便赤大便祕舌苔滿白脈象沉緊寒與氣食交阻法宜溫散方用蘇葉秦艽草蔻木香夏陳楂麥芽烏藥枳殼乾薑等煎服寒熱減臍腹脹痛如前復診正月十七日方草蔻仁一錢半炒半夏曲一錢半木香六分檳榔一錢半山楂肉三錢炒大麥仁三錢炒枳實一錢半陳皮一錢半大腹絨一錢半赤茯苓三錢加生薑二片服此脹平痛緩惟大便未通小溲仍赤再以制香附木香穀芽麻仁烏藥楂炭枳實薤白赤苓車前子等加砂仁末三分沖服之痛止便通案胡世安風溫寒熱頭痛乾咳無痰治驗胡世安年近二旬二月初二風溫上受寒熱頭脹胸悶乾咳無痰宜於輕舒蔓荊子一錢半瓜蔞仁三錢蘇子一錢半炒連翹一錢半去心淡豆豉三錢生甘草六分橘紅七分前胡一錢半薄荷葉七分加白蘿蔔汁一酒杯沖服兩帖寒熱胸悶頭脹俱退咳痰易出非前之乾咳可比原方去蔓荊前胡豆豉薄荷加苡仁桔梗茯苓等再二劑而安案山西榮盛華胸脘臍腹痛劇危症治驗山西榮華盛四十七歲辛卯四月十六痛症幾危治驗胸脘臍腹作痛迄今數日食少溲赤舌膩苔白體素瘦痛劇防厥脈形細耎證頗棘手當用厚朴蔻仁半夏木香赤苓車前陳皮薤白淡茱萸輩加生薑煎服後臍腹痛稍減胸脘仍痛如前因大便不解西人最喜通便且擅用丹丸如青麟丸九龍丹及木香檳榔等丸弗論年之強壯虛弱概以通為法誠愚人之見也況脈軟痛甚食少體弱倘經攻伐便泄汗出而脫咎將誰歸豫深阻之惟有溫理中宮免其痛厥為最耳薑厚朴一錢制香附三錢木香七分乾薑八分炒淡茱萸五分白蔻仁一錢陳皮一錢半楂炭三錢九香蟲一錢焙大麥仁三錢炒甘草六分加雞內金二錢炙砂仁末三分沖服藥後脘腹痛十去六七再劑痛平食貪舌之白苔轉為淡薄大便一次小溲亦淡又以養胃和中之劑二帖而愈案欣州連湧泉咳嗽痰不易出氣喘不能臥治驗欣州連湧泉四十八歲辛卯二月十八咳嗽痰不易出氣喘不能臥胸脘不爽痰火閉於肺胃氣雍於上不能下降耳議降氣化痰定喘法黑蘇子二錢炒製半夏一錢半款冬花三錢橘紅一錢旋覆花三錢生絹包扎桑白皮一錢半蜜炙萊蔔子三錢炒前胡一錢半白杏仁三錢雞內金二錢炙加白蘿蔔汁一酒杯沖白冰糖三錢沖服一劑喘咳大減可以步行非前之動輒氣逆可比且知飢漸能進食再劑而愈案紹興王學興痛症數年發於臍之左右治驗紹興王學興年三十八歲痛症數年舉發無時每痛於臍之左右甚則嘔吐食物脈象沉滯肝胃為病法宜溫舒草蔻仁一錢半炒淡乾薑七分炒淡茱萸四分烏藥一錢半薑半夏一錢半黑山梔一錢半制香附二錢赤苓一錢半水炙甘草五分加雞內金一錢半炙服前方一帖痛頓止矣再二劑而食貪睡安案李芳園腸紅見於糞後治驗李芳園庚寅十月十七日腸紅見於糞後此遠血也脈息濡軟關小弦坤土虛而震木不滋也兼之素好濃茶又不無濕阻中宮法宜肝脾並治槐米四錢側柏葉四錢炙炒歸身一錢半白芍一錢半炒伏龍肝四錢薏苡仁五錢炒炒黑荷葉一錢半存性女貞子三錢半夏曲一錢半加建蓮肉四錢去心炒服一劑血即止再二劑而安臥如常案汪書蕉二兄滯下逼迫濕火下注治驗汪書蕉二兄庚寅七月十四滯下逼迫水多於糞晝夜十有餘次腹痛裡急至圊一響稀糞隨出而仍有後重之勢脈象弦細暑濕挾積阻滯作痛宜於舒通通則不痛於是以薤白豆豉神麯赤苓各三錢五穀蟲大腹皮陳皮各一錢半木香六分加雞內金一錢五分炙煎服兩帖逼迫稍減水漸少糞色紅仍然腹痛即痢痢時肛門覺熱濕火下注也宜以導滯兼清濕火方用薤白川連木香紅曲楂炭大腹皮赤苓甘草陳皮等加扁豆花十四朵洗同煎服之滯下日四五次逼迫之勢大減腹仍痛肛仍墜小便赤次日仍用原方去大腹皮加五穀蟲再兩帖痛平積松日二三次有糞少有逼迫之象而無後重肛墜之意溲長食增再以調脾和胃之法三劑而愈案萬松岩大兄大病愈後調理丸方並詳明調治善後之法萬松岩大兄丸方年六十三歲辛卯六月二十四日大病幾危調理病痊脾胃久虧由飲食不節縱啖厚味酒濕過度而起漸自食少肌瘦體倦四肢無力溲少便溏口乾舌苔黏膩面色痿黃小腿浮腫朝輕暮重起自正月纏綿半載得豫調補脾胃之劑間佐疏運之法以後食飲漸貪而漸增脘腹之脹悶亦漸減可大便之溏薄亦漸結而且可間二三日一解小溲漸多精神漸健兩手腕之不能舉動顫振者亦漸有力矣皆得於調補脾胃之功非淺矣坤土既健始兼養陰以熟地首烏歸芍枸杞女貞輩合五味異功等法金土合德乙癸同源調治而愈繼以丸方而收全功亦甚快矣大熟地六兩搗入山藥三兩炒枸杞子二兩焙歸身一兩半山萸肉二兩杜仲二兩炒斷絲懷牛膝一兩半酒拌蒸破故紙二兩炒桃肉同搗胡桃肉三兩同破故紙搗入菟絲子二兩酒炒益智仁一兩半砂仁一兩半上藥十二味先將熟地搗杵再將故紙桃肉同搗入藥再以煉白蜜和勻同搗極爛丸如小緑豆大曬令極干外用西黨參三兩焦冬朮二兩茯苓一兩半炙草一兩半山楂肉二兩炒大麥仁二兩炒陳皮一兩半雞內金二兩炙上藥八味各焙研極細和勻用荷葉煎湯灑疊為衣每服五錢清晨滾水送下案王省齋大兄次郎質弱肌瘦調理丸方王省齋大兄次子年十三歲於辛卯六月二十六日因質弱肌瘦丸劑調理脈右軟小左濡細沖年質弱肌瘦食少咳嗽將痊宜以益氣以養陰則坎水自充所謂水出高源是也加以調脾運食則坤土日旺乾金愈足自爾食健肌豐矣西黨參三兩白扁豆三兩炒歸身一兩苡仁三兩炒制首烏三兩女貞子三兩山藥二兩炒炙草一兩半白燕窩一兩半水泡揀淨毛隔紙焙於白朮一兩半土炒砂仁一兩陳皮一兩半潼蒺藜一兩半金石斛二兩茯苓一兩半上藥十五味焙研極細煉白蜜為丸如桐子大每服四錢清晨滾水送下或建蓮湯送俱可此丸服畢據述頗宜案胞侄芳田濕溫夾食膠痰內阻亂語奔走治驗胞侄芳田道光七年閏五月初一日濕溫夾食極險治驗因數日前過啖厚味食填太陰適感溫邪身熱頭脹胸悶噁心骨節痛舌膩苔白滿布脈形浮滑當服疏解消食之劑病雖減而身熱胸悶俱未一減至初五日用清火退熱之劑至酉後神識半清半昧是晚一夜亂語忽起忽坐並出床行走初六日用小生地羚羊角麥冬茯神遠志龍齒橘紅黑山梔輩服之熱仍不解口乾喜飲痰黏如膠吐出不易神識似清非清行坐不定與昨無異初七日診得脈息滑數知其日前過啖厚味兼挾濕溫充斥身熱一候朝衰夜盛多語妄言奔走無寧胸脘不爽此皆向日之厚味宿食阻塞中宮釀成膠痰黏韌難吐與溫邪化熱是以痰火凝結不散亂語奔走而熱終不能退也亟宜清火化痰以冀轉機羚羊角一錢半鎊細生地四錢丹皮一錢半茯神三錢川黃連六分水炒瓜蔞仁三錢枳殼一錢竹茹一錢半陳膽星四分川鬱金五分開水磨汁沖真川貝三錢去心勿研橘紅一錢加佩蘭葉一錢半搓枇杷葉三錢拭去毛白茅根一兩去心上藥十五味午前煎服至戌時漸覺稍安是夜仍下床行走數次較之昨夜十減六七初八日晨診舌胎由老黃而轉紅色昏語減半原方去羚羊角枳殼竹茹鬱金加犀角尖五分開水磨沖滑石甘草引用佩蘭葉如前煎服昏語大減是晚一夜未奔走熱退痰清再以生津養胃和中之劑便解食貪而收全功又於次年戊子歲冬十月初三日因五六日前又過啖厚味外受風寒而致身熱胸悶初以散寒消食之藥二三劑身熱稍減而神識似清非清一夜亂語不止朝輕暮重起坐不安口吐黏膩如膠之痰白韌異常證與前次頗同脈形右滑數左弦細初五日用羚羊角生地丹皮瓜蔞仁川連茯神橘紅枳殼天竹黃等服之病仍如前毫不一減初六早晨用細生地五錢丹皮一錢半瓜蔞仁三錢麥冬一錢半菖蒲根六分陳膽星四分陳皮一錢茯神三錢遠志肉一錢半共九味河水煎服少頃亂語漸少至夜十減其八膠黏之痰亦從此少再劑遂愈細審之初五之方與初六方相仿而其一效一不效者前以清火為主消痰兼之今則祛痰為主清火兼之是以效速也孰謂藥之不靈也特恐人之不善用耳案門人金書山暑濕內蘊體倦好眠治驗門人金書山辛卯六月二十八日暑濕內蘊症於三日前頭疼如蒙身熱無汗自服疏散藥不應於是求診體倦好眠口淡多痰胸悶不飢脈形右大左小暑風挾濕熱不發揚邪內蘊也未可忽視祛暑卻濕為宜方用鮮荷葉鮮藿香鮮石斛瓜蔞皮豆豉陳皮赤茯苓連翹地骨皮加藕二兩同煎服後頭疼胸悶俱平午後熱甚及手心熱口淡等亦俱減半次日再以厚朴香薷扁豆滑石甘草藿香瓜蔞仁赤苓草蔻地骨皮加藕二兩同煎服之邪解熱退而安案妹倩王履安兄久病虛羸肌體骨立喘咳痰癖且兼虛浮鼓症極危急症再生奇驗妹倩王履安久病虛羸喘咳痰癖兼鼓極危奇驗五十四歲自數年前吐血幾危治愈之後失於調理漸自精力日憊咳痰纏延俯腰曲背肌瘦肉削脾肺久虛中氣大傷痰由臍左上達於虛里胃絡而至缺盆得運氣一咯而痰出大如胡桃韌而且滑設中氣無力咯聲不揚則痰停滯其間咯不出咽不下其苦萬狀必得俟氣少平呼吸稍利而始出數日間假傷風而起動輒氣喘臥不著枕惟於床側倦足坐睡倘一著枕即氣逆痰升而又不能吐出為最劇歷年受苦身中之大肉俱削誠所謂肌體骨立之軀也其所以猶存者胃氣未敗食飲尚可此其生機不可不盡人力以圖之於壬辰歲七月二十日用六君子湯加炙黃耆熟地歸身棗仁柏子仁紫衣胡桃肉南棗輩十三味煎服四劑喘咳頓減臥能著枕於是仍用原方略為加減半月而平已後竟不服藥僅以飲食調治月餘後至九月初五延診面目手足漸有虛浮之勢咳痰又增仍從臍左而上至脅即有漉漉之聲上虛里至缺盆而入咽嗌氣稍順則易於咯出一有阻滯則窒塞於咽嗌之間內如刀刺呼吸不靈厭厭一息必得耐久候脘腹中之氣漸從痰中透出然後始能出口即出亦要逐漸咳出倘或順利得中氣送出一塊凝結厚痰則適意極矣一日之難過如此而夜亦復如斯以故求生不能欲死不得於床中向余哭告求救情慘極矣不得已而蹙額頻思索想良久痰之生也皆有脾胃之不運腎氣之有虧也古人云脾為生痰之原胃為貯痰之器本此意而求治庶乎盡善惟脈息軟弱乏力為慮耳九月初五日方列下大熟地八錢天冬一錢半去心水炙甘草七分左牡蠣一兩煅塊沉香五分切片紫衣胡桃肉兩枚連鬲板用加青鉛一兩同煎煎好去渣投竹瀝六錢生薑汁一匙沖煎服兩劑痰自下而上頓減且咳亦易出不致內如刀刺之狀每至日晡火升口乾動怒痰升等狀亦毫不覺矣仍以原方去沉香加麥冬白芥子陳皮白三味引如前又兩帖痰減三之一精神漸健並無一刻難過之狀自云如服仙丹不過如是亦云至矣余細繹病象果然痰少易出日建奇績第食飲雜物尤宜節制勿因小愈而竟任意多啖或從此而停飲生痰或受涼而中宮不舒甚至前病復盛而致於不能挽回誠可惜矣保身者當自愛之九月初九日方列下大熟地八錢西洋參一錢半天冬一錢半去心左牡蠣一兩煅塊胡桃肉紫皮兩枚連鬲水炙甘草八分蘇子一錢半炒白芥子一錢焙建蓮肉三錢去心加青鉛一兩同煎煎好去渣投竹瀝六錢薑汁一匙沖服藥兩劑痰減其半食飲亦增並能出房行坐睡臥漸安復診九月十一日方大熟地八錢龜腹板五錢炙胡桃肉兩枚連皮鬲蘇子一錢半炒天冬二錢去心炙甘草八分瓦楞子五錢知母一錢半加靈慈石五錢煅紅醋淬三次服此四劑如前安妥至十五日忽然腹痛作脹便溏細審之因多啖食物及羊肉面等次日脹痛雖平而腹中究未爽快余前案深囑節食何自不量也幸咳痰未升食未減也當用六君子湯加牡蠣天冬紫衣胡桃肉輩服三劑安妥如前此刻惟面目小腿之虛浮漸增而波及小腹手足並陰囊亦有腫脹之象此又虛鼓將成之候也舊恙垂危進藥漸有生機今又繼以鼓症虛羸之體恐難勝任脈息微弱色脈同參脾土不溫坎陽不足豈不慮其一脫不得已而以溫中養胃之法調其坤土臨臥用金匱腎氣丸四錢陳皮泡湯送下此至當不易之法也至二十二日余甥至據云服一帖尊人嫌其丸中有桂附辛熱之藥不肯再進因氣逆食減面目手足臍腹腫脹愈增更難過者陰囊冷重而脹大陰頭腫大光亮如雞卵之大小溲甚少不能平臥危在頃刻復延求救嗚呼病極至此而尚自作主張無怪其三五日來病日加深夫腎氣丸者以能收攝腎氣使水不泛濫耳內用桂附所謂益火之源以消陰翳為腫脹之聖藥誠對症之良劑何自誤之而反謂痰積停阻必得峻攻為快尤屬可駭往視之證脈諦詳陽弱陰衰惟有背水一法死裡求生若再不遵余用藥則必不可活矣余甥求方於是用金匱腎氣丸加味治之大熟地八錢淮山藥三錢炒粉丹皮一錢半炒茯苓二錢淡附子七分上肉桂六分去粗皮山萸肉一錢半澤瀉一錢半懷牛膝一錢半車前子二錢炒左牡蠣八錢煅苡仁五錢炒上十二味河水煎服更余服藥一夜如前痰咳不爽不能仰臥至天明知陰囊稍暖午前陡然覺陰囊右邊頓軟下體亦覺輕鬆始信余言之不誣矣此九月二十七日方也復診九月二十八日方仍用前方略為加減分量亦稍增重大熟地八錢淮山藥四錢山萸肉二錢茯苓三錢淡附子一錢上肉桂七分去粗皮懷牛膝二錢丹皮二錢炒車前子二錢炒澤瀉一錢半陳皮一錢半椒目四分上十二味用河水三盞煎至一半分兩次服至燈後將藥渣再以水一碗半煎至一半服須忌鹽咸之味服此臍腹之腫脹面目手足之虛浮俱減其二三陰頭及囊俱軟三四最妙者小便三四次且長較前松其半矣次日仍以此方去椒目陳皮加破故紙一錢五分胡桃肉兩枚連皮鬲用內熟附子再加五分用作一錢五分余如前煎服服後小便更多臍腹腫退三之二面目手足退其七八食飲亦增細繹病象鼓勢大減漸有生機惟素有之痰窠積於左乳下數有年矣邇來每日升上難過無比痰不出則一夜難安滯於喉則一刻難過因欲與之兼治於九月三十正值霜降節日於是以附子理中湯去參加生黃耆因其畏冷而用之護表也合之五苓散取脾腎兩溫內附桂之分兩悉照昨方二方合用即前金匱腎氣丸之意而變易之方也亦各有深意存焉再佐以製半夏錢半膽星五分紫衣胡桃肉連鬲等河水煎更余服之未幾即覺腹中甚熱手臂牽掣目閉神呆喉中痰聲有發厥之勢張燈延余乘輿而至視其黏痰滿口唇吻間俱稠痰淋漓斯時問答尚清有吟詠之聲而無痰湧之勢脈尚緩和知其溫中之劑入胃與積痰相爭以致上則痰涎阻塞下則遺屎皆從溫熱之性相激而出也究非脫象如果是脫何遺屎而不見尿出耶要眼功在附子理中合五苓散之上下溫和佐以星夏之祛痰逐飲最後使以連鬲之紫衣胡桃肉者取其解膈內之痰飲連皮能收肺經耗散之氣連鬲能通命門之火故必加之也服後腹中大熱發厥不知者以為熱藥之誤即主家亦以為然豈知卻病回生即此一帖也以後小便日數次腫脹全消咳痰亦平安臥如常只此一劑而克起九死於一生快哉道光十二年壬辰歲冬日記是方也溫其中則積痰上溢化其氣則水濕下行外以調中護衛內以祛痰逐飲合而用之中原砥定頃成破竹之功皆得於生心化裁之妙有非筆舌所能傳者竹亭再識案徽州金六吉溫邪身熱誤治增劇治驗徽州金六吉年近三旬溫邪十日胸悶無汗口乾喜飲溫湯早投寒涼噁心頻頻黏痰阻喉舌胎淡黃無津脈象濡數不飢溲赤速宜達邪退熱免其內傳驟變議瀉心合陷胸法四月二十九日川黃連五分生薑汁炒淡黃芩一錢半瓜蔞實五錢打碎酒炒豆豉三錢蔥汁炒淡乾薑五分炒製半夏一錢半赤茯苓三錢麥冬一錢半去心生甘草五分滑石三錢加佩蘭葉一錢半搓軟服此夜能睡要飲米湯神清熱退惟胸前近喉下仍然氣悶黏膩之痰未除舌苔滯膩兩邊有細沫如芥子大此胃中之濕濁未清也前方去黃芩豆豉加牛蒡子殭蠶以清喉中黏膩之痰服之諸恙向安矣再以養胃生津法兩劑而愈
