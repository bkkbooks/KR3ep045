body:
  text: 竹亭醫案女科卷二婦女經産雜症案凌景揚內人乾咳無痰氣逆喉癢治驗凌景揚內人年逾三旬丙子正月下浣素有肝氣發時塊攻經事將行白帶甚夥於去秋咳嗽至今未已案云咳嗽起自去秋乾咳無痰氣逆喉癢午後先寒後熱口舌乾燥無津不飢食少陰虛內熱陽虛外寒氣血兩虧脈象細小無力還防涉虛損之門亟宜補肺生津俾咳緩思食庶可圖維幸勿視為小恙而懈怠之正月三十日北沙參三錢淮山藥三錢炒百合四錢款冬花三錢叭噠杏三錢去皮尖生蛤殼四錢天冬一錢半去心炙甘草五分麥門冬一錢半去心肥知母一錢半加老枇杷葉三錢去毛蜜炙進兩劑咳漸有痰口舌有津夜能睡寒熱盜汗俱減藥頗相宜惟脈仍如前耳又二月初二日方北沙參三錢玉竹三錢柏子仁三錢叭噠杏三錢去皮尖川貝母一錢去心茯苓一錢半炙甘草五分淮山藥三錢炒生蛤殼四錢天冬一錢半去心淮小麥四錢加老枇杷葉三錢去毛蜜炙服三劑如前安妥咳嗽更減氣不逆喉不癢又初五日方北沙參三錢山藥三錢炒款冬花三錢茯苓二錢生蛤殼四錢芡實三錢炒黑蘇子一錢半炒紫菀一錢半酸棗仁一錢半炒天冬一錢半去心加枇杷葉三錢去毛蜜炙服藥後乾咳十減七八口舌乾燥亦從此而津液生矣莫謂藥之不靈也特恐用之不當耳又初七日方西黨參三錢山藥三錢炒茯苓二錢炙甘草五分廣木香八分歸身一錢白芍一錢炒淡茱萸二分天門冬一錢半加黑芝麻三錢生蛤殼四錢服後寒熱已止非惟咳減津生即大腹塊痛膨脹之勢亦十去其半矣又初九日原方去白芍加扁豆款冬花女貞子各三錢服之咳嗽十去其八腹塊及膨脹俱平連日飲粥今已進飯碗許食後頗安再四劑咳嗽痊可諸證向安惟少有白帶未已十六日用益氣生津治帶之法調理而愈方以黃耆黨參百合款冬各二錢生地牡蠣茯神各三錢二冬各一錢五分炙甘草六分椿根白皮二錢南棗三枚十劑而安案陳元隆妾因咳嗽噴嚏以致鼻衄常發治驗陳元隆側室嘉慶乙亥八月年近三旬素有鼻衄不時舉發經水應期常多白帶邇來因咳嗽而致鼻衄者居多亦有時緣噴嚏而來者亦不少夫鼻乃肺竅咳嗽噴嚏皆屬於肺肺為五臟之華蓋而屬金金虛木旺木挾火勢而乘金金叩則鳴此咳嗽噴嚏之所由來耶甚至氣逆火升此又鼻衄直注而出也再驗之脈右寸虛數左脈虛弦又顯有明徵耶先治其衄再商善後八月二十四日白花百合二兩側柏葉四錢炙丹參三錢知母一錢半漂人中白一錢旱蓮草二錢降香一錢甘草五分炙先將百合浸去浮沫用河水四碗先煎百合煎至兩碗去渣入後七味同煎至一碗去渣入藕汁一酒杯沖服服後鼻衄即止噴嚏減半進第三劑因稍有噴嚏鼻衄又出些少即止再劑仍無共經四劑甚妥經水昨至亦無他苦又二十八日方服後方六劑鼻衄全愈北沙參三錢側柏葉四錢炙人中白一錢降香一錢白茯苓二錢桑白皮一錢半枇杷葉三錢去毛炙丹參三錢天門冬一錢半加炒黑荷葉一錢五分案張敬修內人寒邪客肺身熱咳嗆無汗治驗橫山張敬修內人年二十五歲季冬初五日診平常經水約草餘日即至自去年出嫁之後經水愈覺趲前或半月或數日一至今於前月二十九日畏寒發熱骨節痠疼咳嗽不已延鄰醫治用輕疏不應隨用玉竹白薇丹皮黃芩紫菀赤苓旋覆花等治咳而咳轉劇始問治於余診其脈右寸浮緊寒邪客肺身熱六日咳嗆不已舌苔膩白經水適來寒鬱營分亟宜疏肺以免變遷擬麻黃湯加味兼治經水麻黃四分去節杏仁三錢研桂枝八分生甘草五分歸尾一錢青皮八分加生薑五分白蘿蔔汁半小酒杯沖進藥未幾即漸微汗咳嗆頓除經水停而病霍然矣案汪書蕉乃嫂身熱煩躁胸悶嘔吐治驗文學汪書蕉乃嫂寡居乙亥季秋肝火內郁舊恙也身熱煩躁新病也新病與舊恙相爭發為寒熱舌絳口乾胸悶兼嘔木火鬱而心神擾亂肝風動而手臂顫振語言錯亂面容帶笑右寸浮小左寸關弦數勢非輕候深慮痙厥擬逍遙散意九月初六日柴胡七分薄荷一錢半鮮竹茹一錢半淡黃芩一錢半赤苓二錢青皮一錢廣藿香一錢半天竹黃一錢半丹皮一錢半炒山梔一錢半炒加梨汁一小酒杯投生薑汁一匙沖服服後身仍乍涼乍熱左足小腿熱腫色紅亦肝經氣鬱下注而成腳氣又恐挾肝火而上升見厥惟心煩欲笑之勢減兩手臂顫振之勢亦緩又初七日方兩關弦數舌絳嘔吐肝火鬱而陽明之肌熱不解法宜解肌和胃疏肝用柴葛芩夏生地麥冬輩不應又初八日方得湯則嘔身熱七日不解朝輕暮重入夜壯熱無汗欲笑心煩擾亂口齒乾燥卻不渴飲不飢不納兩關弦數知其肝火上逆犯胃則嘔邪閉血分入夜熱甚法當清解血分之熱佐以疏肝和胃解鬱使其嘔止熱退庶免痙厥之虞鱉血炒柴胡八分小生地三錢丹皮一錢五分炒麥門冬一錢半去心川鬱金七分青皮八分當歸一錢半炒川椒七粒煎好去渣送左金丸六分服後果然嘔止熱退藥用對症效如影響是方君以鱉血炒柴胡者因肝血不足而邪熱內陷於陰入夜尤甚者用之神妙得生地丹皮當歸麥冬涼血退熱而和肝再以青皮鬱金疏肝而解鬱用川椒者緣其得湯即嘔口多涎沫亦不無胃熱而蟲動蟲見椒則伏也制方頗善而猶恐肝火上逆而嘔吐故最後又以左金丸之入肝止嘔法備理明一劑而嘔止熱退矣又初九日方清理餘邪肝胃並調小生地三錢粉丹皮一錢半炒麥冬一錢半鮮石斛四錢天花粉一錢半小青皮八分通草八分生甘草四分加烏梅肉二分炒川椒五粒服兩劑夜能安睡食飲漸貪口不幹燥左小腿之紅腫腳氣亦漸退再劑食飲更增又睡後易於驚醒多夢紛紜神魂不靜耳養陰安神治在心肝炙鱉甲三錢小生地三錢麥冬一錢半茯神二錢白芍藥一錢半炒酸棗仁一錢半炒遠志八分去心炒青皮八分半夏曲一錢炒黑山梔一錢半加砂仁末二分沖進四劑神安夢止精神日健諸恙俱平原方去半夏山梔麥冬加歸身女貞子再五劑而健案文學陸鑑亭伯嶽次媳齒衄不止治驗文學陸鑑亭四伯嶽次媳孀居丙子六月上牙齦齒衄不止陽明胃土火逆上行法宜清降以免眩暈之虞大生地四錢旱蓮草三錢側柏葉三錢炙甘草五分人中白八分紫降香一錢炒蒲黃一錢半血餘五分沖加活水蘆根八錢去節藕節五枚打碎服後衄血即止再劑霍然矣案上舍錢云峰側室腹痛嘔吐不禁治驗上舍錢云峰側室嘔痛症起自六月十四日湯水入胃即嘔大腹陳痛難忍甚至於手指厥冷二便不通胸悶不飢邀余診治細審病情昨晚忽然腹痛痛甚即嘔嘔不自禁六脈沉小氣鬱食阻舌中淡黃苔糙痛劇防厥素體質弱恐難勝任議和中法佐以定痛止嘔為最制香附三錢廣藿梗一錢半半夏一錢半薑製厚朴八分薑製江枳殼一錢半炒山楂炭三錢川椒五粒炒出汗赤苓三錢加左金丸八分研細衝入藥湯內服服後嘔吐即止痛亦漸減至次日午前痛止大小便俱通又復診嘔止痛停至夜半先寒後熱天將曉又復寒戰咬牙後又發熱口渴熱盛神昏不語至申刻熱勢方衰語言清爽面色帶紅舌苔淡黃濕阻於內小溲覺熱口乾喜飲始由氣鬱食滯中宮暑濕交阻服前藥嘔痛立止而暑濕之邪未解入里與陰爭故寒戰出表與陽爭故熱盛暑濕內伏營衛不和此寒熱之所由來也法宜和解以退寒熱柴胡六分葛根一錢半瓜蔞仁三錢半夏曲一錢炒藿香一錢半黃芩一錢半赤茯苓三錢小青皮一錢枳殼一錢半炒甘草四分薄荷葉一錢半加生薑一片松蘿茶二分進一劑寒止熱緩稍能納粥惟臍腹左右仍稍疼原方去薄荷枳殼加淡茱萸二分再劑痛停又經水適來頭疼熱仍未盡口乾不喜飲用小柴胡湯意柴胡甘草各五分黃芩青蒿當歸香附各一錢五分陳皮川芎各一錢瓜蔞仁三錢鮮荷葉一小個服後頭不疼經水漸停餘熱將清繼以養胃和肝之劑五劑而安案吳師瞻內人嘔吐腹痛氣脹垂危治驗木川吳師瞻內人嘉慶乙亥二月三十日診産後未滿百日始而經水淋漓繼而白帶綿綿至二月望前嘔而腹痛時作時止醫者皆作肝氣治概用香燥破氣疏肝之劑嘔痛愈甚以致湯藥入胃即嘔嘔之不止甚至黑汁從腸中泛出黃漿自胃底翻來愈嘔愈痛痛甚則胸腹氣脹兩臂直豎有角弓反張之勢舉家倣徨諸醫束手始求治於余豫諦審病情兼察色脈脈之右關虛而滯左關細而弦一嘔而痛劇難忍前症畢集危在頃刻惟囑家人備辦衣物後事且向豫哭告求救情慘極矣豫索想良久嘔痛起於産後脾土早已先虧更兼貪食啖葷野味不禁以致脾胃愈傷中宮阻塞痰凝氣壅以故嘔痛無已必須急則治標先以止嘔為最使嘔止而痛可漸平醫者不究嘔痛起於産後誤作肝氣治反以破氣止痛為先所以終無成功而嘔愈劇也豫於斯而深得病情莫妙於先理脾胃立止其嘔若不此之求再嘔必然汗脫吾何忍立視其斃哉於是以代赭旋覆湯略為更變立救其嘔以盡婆心耳西黨參四錢旋覆花二錢生絹包扎製半夏一錢半乾薑六分炒代赭石三錢煅紅醋淬淡茱萸五分紫沉香四分切片加開口川椒七粒炒出汗煎好去渣徐徐服更余時正值煎藥嘔痛欲絶少頃進藥徐徐服畢約一炷香後稍嘔幾口卻無藥汁隨又將原渣再煎服之即不嘔不痛且睡其兩時之久至雞鳴方醒醒後索飲米湯飲後並不一嘔神識安靜主人見藥效如響應鼓掌稱快深感妙手回生豫應之曰吉人天相也三月初一日進診病者言語清爽唯覺軟倦音低侵晨飲薄粥一杯亦未嘔痛原方加茯苓藿梗雞內金各一錢五分以醒脾胃之滯補中兼疏誠善治脾胃之妙法也非熟讀東垣立齋嘉言諸書不能深悉其中之妙旨也又三月初三日診服前方嘔痛俱止漸能進粥舌苔膩白中心微黃痰厚黏稠大便祕結小溲涓滴究屬脾土不運胃土未和法宜疏補兼施自然清升濁降不必多尋頭緒西黨參三錢薏苡仁四錢炒製半夏一錢半陳皮一錢赤茯苓三錢大腹絨一錢半旋覆花二錢絹包扎滑石三錢車前子一錢半炒研鮮石斛四錢加沉香汁五分枳殼汁六分檳榔汁五分三汁和勻衝入前藥湯內服之進一劑小溲如注出時且熱再劑至酉後大便解結糞如栗者四五枚飲粥碗許初五日清晨腹中又忽痛忽止至燈後又大便結糞成條者二三斷如此腹中松爽毫不痛矣戌初豫至病者自述今自早至晚飲粥四碗矣安妥如常惟嫌其脅背刺痛不在肌膚自覺其經絡中收束刺痛此亦關産後失調脾胃虛而氣血不和不能營養貫注脈絡滯澀之故耳方用西黨參歸身木瓜杜仲續斷山藥陳皮廣木香等五劑而前症悉除案張敬修乃室經水過多血下成塊治驗張敬修內人經水延綿血去過多業已八日猶未停止脈右虛小左脈虛大陰虧陽弱正值大暑血下成塊形如魚腸腥穢不堪肝脾兩傷亟宜扶土滋木引血歸經俾其速止庶無他虞建蓮肉三錢去心淮山藥三錢炒南棗五枚去核炙甘草六分制首烏三錢炙鱉甲三錢人中白一錢旱蓮草一錢半側柏葉四錢炙伏龍肝三錢牡蠣四錢煅塊加炒黑荷葉一錢五分血餘五分研沖三鼓進藥夜半下血兩小塊雞鳴時又下一小塊較未服前血下稍減塊亦稍小又復診方脈形如昨西黨參五錢山藥三錢炒杜芡實四錢炒茯苓一錢半制首烏三錢炙草六分女貞子三錢蒲黃一錢半炒黑山萸肉一錢半炮薑五分旱蓮草一錢半升麻三分蜜炙加伏龍肝四錢大南棗三枚去核進一劑至次日辰刻血塊停止且散血亦無又復診方昨以引血歸經法血止塊停西黨參四錢制洋參一錢半淮山藥三錢炒芡實三錢炙甘草六分女貞子三錢