front:
  text: 顧大田序竹亭先生崇川舊族遷蘇後以醫術著名精理內外大小各科尤於婦人科為特長暇日集所診定經驗方案若干卷顏曰綴珠編蓋先生儒而醫者也文章之事通於性命而得失之故貫於天人軒岐之道與孔門之道千古同一理也先都運公自致政歸家居二十載亦嘗喜讀靈素書猶憶初見先生時談頃即深相引重曰審君抱負道必大行及觀其書每多巧發而奇中可見心靈智巧而能用意精通誠有得乎倉扁元化之遺假有良史如子長承祚輩其必有采焉可知也春適侍側得聞庭訓至今不忘先生三十年來歷治險症活者甚眾方案特十之一二耳其中奇正相生變化不測所以嘉惠後學者不少立案則要言不煩用藥無一味虛設尤可寶貴異日付諸剞劂傳世不朽發揚光大救世無窮豈醫家以一技自鳴而墨守一隅者所共論也道光二十四年歲次甲辰仲冬吳門顧大田春林甫識竹亭先生生於乾隆卅年其尊人雨香生於雍正五年父子均享大年沈鳳生序先祖竹亭公一字亮揆原籍崇川遷蘇後醫道大行活人無算壽登八秩而猶手不釋卷當時臨證醫案積稿頗夥其捷如桴鼓效如影響者大半散佚只有什之一二匯為大方雜症六卷女科三卷置諸笥中歷有年矣是皆先祖手筆鳳生於臨診之餘披閱手澤深有所得竊思醫案取診治以成理而理由明得藥劑以成法而法自信俾後學者可以領悟而效用焉曾記吾祖竹亭公昔年撰句有命懸指下爭功險藥到腸中補過遲一聯以自警敢以就正有道亦見吾祖朝乾夕惕之意云爾時在光緒戊寅四年季春月孫男鳳生謹識於春雨樓卓序此編方案乃海內孤本未曾刊行者余喜蒐羅醫籍在春申舊書店以重價購歸曾呈我師鑑定亦頗讚許其用藥靈巧後進誠可效學洵是一部有實用之參考書也惜首卷數頁已爛破漫漶不能修補只可照錄二序脫字未補俟高才下筆彌其缺憾書邊有竺生鮑氏圖章必先收藏是亦有心於醫道者附志欽佩卓識李夢蓉序余少失學壯習醫中道而廢以所學不精恐誤人生命也往歲行道槎溪識顧子坤一於許氏宅中覺其道義過人為學不倦熱腸俠性有足多者後於海上重逢懸壺濟世不治生產室中醫書滿架四壁蕭條手不釋卷寒暑無間或於書攤冷肆獲得珍秘醫書餉予評騭予棄醫已久愧無貢獻第念交同水乳有類弟昆數十年無一違言次兒拜從門下獲益更多乃者以孫氏竹亭手澤綴珠編囑為抄錄原序殘缺之處加以篡改以不學如余將貽點金成鐵之誚然阿私所好或不見譏謹為修整如上云間李夢蓉識甲午重陽竹亭公手筆道光年間舊鈔本價值可貴勿輕視之蘭雪老人題醫門珍笈四字寶之寶之始於乾隆迄至嘉道間名醫竹亭孫公與南城顧雨田齊名顧郎大田從孫公遊因雨田先生先歸道山此事聞諸蘭雪老人蓋云洲公乃顧大田之入室弟子老人又云孫公之醫案曾未寓目今得見古人手筆真夢想不到快何如之豈獨眼福而已也又云此公心思靈巧先祖亦曾言及往往用藥有奧妙看似數味卻有奇效與時醫所常用之套藥迥別當時雨田惕人等諸名醫俱甚欽佩每逢疑難雜症必紹介於孫公也可見人之智慧大有不同辛亥仙誕日記後人寶珍勿輕示人
