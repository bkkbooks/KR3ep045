body:
  text: 卷之六案陳杏乾溼痰中阻誤治半載幾成寒熱滯下陳杏千上洋人年三十三歲嘉慶己卯十一月十六診素有濕痰脾陽不運腎陰有虧右脈虛滑左脈虛弦非無以也病起半載醫以滾痰丸三子養親湯輩徒以消痰為法脾土日虧病勢反增又有作濕火治投以苦寒輩清之致令腹痛不食瀉多白沫寒熱燈後畏寒病頗棘手乃尊甘谷特求治於余余細繹病情色脈合參證緣誤治日久中焦失運化之職先以仲景苓桂朮甘湯加木香半夏曲淡乾薑等煎服服後寒熱減腹痛瀉積積下紅白日五六次口不幹胸中悶舌白泥仍宜溫舒中宮十七日復診方列下煨葛根一錢半桂枝一錢薑厚朴一錢茯苓二錢神麯三錢炒半夏曲一錢半紅曲三錢甘草八分木香六分切片陳皮八分加青蔥管七寸生薑皮八分服初帖瀉積如前次帖積止腹痛未平舌白減半胸中漸爽身熱退尚畏寒偶食梨一二片即腹疼且響復診仍宜輕疏和胃以冀進食為妥用二陳湯加冬朮苡仁厚朴木香淡茱萸雞內金等加煨薑砂仁生穀芽等煎湯代水煎藥服此次日早晨大便成堆並不腹痛小溲赤少舌轉淡黃食飲漸增原方去厚朴茱萸加石斛澤瀉砂仁等煎服全愈案吳壽谷高年嗜酒痰多成膈粥飲入口即吐吳壽谷己卯十二月初二日診年七旬又六素好飲酒數十年來受纍於火酒也久矣哉細按脈息左小右大脾胃脈來弦滑中按無力知其胃土久傷津液不充胃中枯稿以致食入則噎甚至嘔吐稠痰粥飲入口即吐涎痰並出食難用飽惟日進火炙糕聊以充飢此反胃噎膈之漸也盍早圖之議定嘔化痰法急治其標旋覆花三錢生絹包薑半夏一錢半老蘇梗一錢半茯苓三錢廣藿梗一錢五分代赭石三錢煅廣皮白一錢沉香五分開口川椒十粒焙上藥九味用長流水兩盞煎至一盞去滓入梨汁六錢生薑汁二錢和勻再煎二三滾服服此三帖始能進粥不嘔痰涎十去其七自述三日來日進厚粥三餐每次四盞一日可進十二盞矣豫嫌其太過囑其少進爛飯據云吃下喉中尚覺阻礙故不敢進耳兩日來小溲漸有且長足徵中氣之漸運而水道得以下輸膀胱也復診仍用前方去藿梗橘白加黨參扁豆照前煎法仍以梨薑兩汁後投煎服服之如前安妥因停藥四日食粥復又嘔吐如前再以前方略為增減服後嘔吐又停是證年高脈弱火酒傷中致成噎膈既服藥應手理宜加意調治俾坤土得令庶幾可圖豈可性急欲速惜費停藥而自誤之耶然余用方之意頗妙桴鼓相應録案存之案徽歙姚樹良嘔吐奇疾垂危救蘇治驗徽歙姚樹良年四十歲庚辰七月十九嘔痛奇疾垂危救蘇自幼有痛症以後漸脹漸痛漸嘔水一嘔水自覺胸腹爽快宛然無恙不時舉發發則脹痛難忍必得胸中氣松嘔水即已屢屢如斯至嘉慶十九年則發之甚勤而痛脹嘔水更甚或味酸味苦或色青色黑色緑數十年來不能睡下惟坐靠而睡睡則水聲漉漉惟右更甚左右有塊於六月至今四十餘日毫無寧刻大肉消瘦肋骨皆見大腹膨而軟平臥於床以手拑腹右則水聲如鳴日來脹痛異常內如雞啄甚至發厥冷汗如淋危在頃刻自早至晚嘔出黃緑水一中鉢約有數余碗之多上有油麵薄衣浮於上宛似豆腐漿上之衣式惟色帶穢黑耳以箸挑去浮衣內俱青黃黏水右關脈來弦硬按之不足左脈弦細兩尺虛小按之如綿此屬懸飲之症水走腸胃之外膜原之間而不在臟腑之內獨成窠囊如孤軍懸處於僻遠之地攻伐之所不能遽及此由脾土久虛而太陰之陽微弱不能隨氣升舉消散故名之曰懸飲西黨參三錢焦冬朮一錢半小川連五分焙炙草五分淡乾薑六分製半夏一錢半上肉桂三分去粗皮加荔枝核一錢焙脆研細沖廣木香二分開水磨沖服後痛止未嘔自覺神健便結溲少復診前方去半夏肉桂加歸芍茯苓川椒元胡索大南棗去核內填烏梅肉二分線扎同煎服後嘔痛如前平因其安妥喜啖燉肉食飲稍增與親友敘談至三鼓而睡即此觀之其人之不能靜養調攝可知矣且久病在身去年尚生一子其好欲又可知矣再兼厚味不禁最喜食蟹諸如此類病深藥淺雖有良方恐難濟事辰初飲粥一盞半午前進飯半盞以糟魚過口至午後覺腹中小疼稍脹漸自痛增以指探吐又吐去如前之水小半鉢上有浮衣油麵俱與前同脈仍如前趺陽脈較前細小幸無頭汗發厥之勢人參五分另煎沖於白朮一錢土炒茯苓三錢炙甘草四分川連五分薑汁炒淡茱萸三分沉香三分薑半夏一錢半乾薑六分加荔枝核一錢半焙廣木香五分照方煎服嘔痛又停足徵藥之對症效如斯速注案存方以示小子門人輩細心參閲務得其中之肯綮庶乎可也今因其不嘔不痛又自停藥必待病發求醫病退恣啖原味縱欲無節善於多談好動惡靜無怪乎徒延歲月纍及終身何自輕命若是哉豫深惜之一切痛症痛止恣食痛必再作慎之慎之案幕友陸松濤咳逆嘔噦有年藥投罔效治驗幕友陸松濤年四十二歲素體清瘦作事明爽於嘉慶十五年間得咳逆嘔噦症迄今數年藥投罔效於己卯九月特求治於余方案列下初六日診細繹病情證屬嘔噦夫嘔噦者即反胃噎膈之漸也病經十載非不終朝醫治而治之不得其法病根難除據述素好飲酒酒後貪飲濃茶繼以水果坤土暗耗是知脾胃之受纍於酒也久矣哉吾於此而想其原由吾於此而卜其究竟或食前貪生冷寒氣傷胃或酒後喜濃茶寒氣歸腎或情不自禁每多內作之荒或力不能支尚行外強之樂以致坎陽不升離陰不降水火隔而心腎乖君相動而脾胃虛他如勞神會計心一煩而胸中鬱郁發嘔發嘔者反胃之徵也設或事不遂意火一升而胃底泛泛欲噦欲噦者噎膈之兆也又或食後遇事不快而即嘔酸吐食咳嗽喉癢種種情事其為坤土之不運也無疑再請驗之於脈兩寸細軟左關小弦右關虛軟乏力兩尺虛濡證脈合參病關脾胃而波及心肝肺腎者有之治脾胃而兼治他經則可治他經而不保脾胃則不可易曰至哉坤元萬物資生坤屬於土未有土不足而能生長萬物者此余之首重在脾胃者近是先理脾胃再為善後之謀庶幾病根可除而諸恙向安矣西洋參二錢制白花百合一兩五錢茯神一錢半麥冬一錢半去心雲茯苓一錢半柏子仁三錢北五味子五分研加梨汁六錢生薑汁一錢二汁和勻候前藥煎好去滓投入二汁再煎一二滾服服此三劑並未嘔噦咳嗆喉癢等頗屬合宜復診即於原方去洋參加西黨參山藥沉香仍照法煎好去渣投薑梨兩汁服之服後如前安妥平常大便溏薄自服豫方後大便漸結精神健旺服數劑後復診素多勞心會計預事心煩即覺胃中鬱郁不舒甚至嘔噦咳嗆喉癢等情作矣自進豫方後漸自平可脈形兩寸細小關脈虛耎先調心脾再為之計西黨參三錢丹參三錢焦冬朮一錢半茯神二錢遠志肉一錢去心茯苓一錢半酸棗仁一錢半炒乾薑七分益智仁一錢半橘紅五分炙甘草六分扁豆三錢炒加金華南棗兩枚去核服數帖安妥如前復診九月二十七日脈右關漸起而兩寸尺尚嫌濡軟氣血不充而真陽有虧也宜以調中益氣兼治心腎庶乎可也生黃耆二錢鹽水炒西黨參三錢山藥三錢炒焦冬朮一錢半鹿角霜一錢半白茯苓一錢半茯神二錢酸棗仁二錢炒炙甘草六分益智仁一錢半乾薑六分加梨汁五錢薑汁一錢如前法服前次方中佐薑梨二汁兼治嘔噦服後頗安今之加者緣喉中似有痰凝不爽之意舟中又有頭眩眼昏之象各有取意存焉服此方後周身溫和自覺鬆爽大便日一次食飲睡臥如常痰凝頭眩竟自平可仍以前方略為增減服數十劑而精神日健遍體溫和食欲漸增二便調勻惟偶因事冗心煩或食飲不節則似有噦嘔之勢於是以鹽水炒黃耆黨參於朮芡實歸身丹參遠志菖蒲菟絲破故紙五味子等加梨汁五錢生薑汁一錢五分仍照前法煎服服數帖諸恙向安而嘔噦之勢頓失矣據述症經數年自服豫方後並未見嘔誠快事也復診十月二十六日方藥停兩日便覺脾陽下溜此大便之時欲解也仍宜填離陰以益戊土壯坎陽以溫己土是為上策戊屬胃土以離中之陰火以生之己屬脾土以坎中之陽火以生之炙黃耆二錢西黨參三錢山藥三錢炒茯神二錢益智仁一錢半鹿角霜一錢半柏子仁三錢去油炙草八分破故紙一錢半炒淡乾薑六分炒五味子五分研加胡桃肉一枚連鬲板用服兩帖大便調勻連進數帖頗好再以六君子湯加山藥棗仁等煎好去渣投龜鹿二膠各一錢煎滾候煬服之服數劑而收全功至十二月初十日再定丸方調理列下木棉仁八兩鹽水泡一日取出候乾再以陳酒煮半日再蒸再曬以裡外黑如墨者佳大生地五兩先以水煮半日後加砂仁一兩陳酒五兩同煎半日取出再蒸曬九次聽用淮山藥三兩炒鹿角霜二兩菟絲子一兩半酒拌蒸茯神二兩遠志肉一兩甘草水浸酸棗仁一兩半炒柏子仁一兩去油山萸肉一兩半建蓮肉二兩去心破故紙一兩半陳酒浸蒸胡桃肉一兩同搗上為細末煉白蜜為丸如小緑豆大曬令極干外用西黨參三兩焦冬朮一兩半茯苓一兩半炙甘草一兩製半夏一兩半陳皮一兩半俱篩研極細末再以乾荷葉四兩生薑二兩用河水煎滾灑疊為衣每服五錢清晨用蓮心七粒陳皮三分泡湯送丸可也案海鹽周玉如由胸前脹悶漸自歧骨間起一梗如指粗長約四寸積歲沉疴迄今三載治驗海鹽周玉如年二十歲病起於嘉慶二十一年冬間樓下潮濕睡處褥下俱濕至次年春移於樓上而臥近於窗又為風寒所侵春間自覺胸前脹悶已後心窩下歧骨間俗名人字骨下起一梗如指粗長約四寸不動不痛纍月經年至己卯春天明胸前作脹食後胸悶悶則氣緊必得噯氣稍松夜間側睡於左則腹中時響若睡於右則不響病脈合參脈象虛細兼滑痰濕交阻凝滯脘中結郁成條有時微疼按之如長竿似屬伏梁之徵也症經三載沉疴積歲先議調中順氣治其標再商治本第匪朝伊夕之功也西黨參三錢新會皮一錢半炙甘草七分沉香四分磨沖枳殼八分磨沖烏藥五分磨沖上三味俱用開水磨沖上藥六味先將前三味以河水一盞二分煎至一半去渣以後三味汁和勻沖服服之氣緊之勢漸減其餘如前復診肝脾並調俾脹悶漸鬆再為善後之謀西黨參二錢焦冬朮一錢半乾薑七分炙甘草六分制首烏三錢炙鱉甲三錢炙沉香六分切片淡茱萸三分新會皮一錢半廣藿梗一錢半加代赭石三錢煅紅醋淬三次服此天曉胸口作脹十減其六惟食後胸悶氣逆呼吸阻礙自覺氣緊猶未平也夜側睡於左腹之響亦十去六七矣復診西黨參二錢焦冬朮一錢半山藥三錢炒茯苓三錢旋覆花三錢生絹包代赭石三錢煅乾薑八分炙草八分薑半夏一錢半新會皮一錢半加沉香汁三分枳實汁五分二汁俱以開水磨沖服後天明作脹巳止食後胸悶漸平夜側睡於左腹響亦去七八矣惟脘中素有之一梗如指粗而似伏梁者尚在復診案云脹停悶止脾土漸運至於日久成條之梗凝滯於胃脘者須當以扶土中而侑以舒運之法庶乎漸安用香砂六君子湯加蘇梗藿梗沉香等服如前妥再以理中湯佐茯苓香附炒廣藿梗鹽水炒枳殼薑汁炒生山梔等河水煎臨服衝入沉香汁三分服後小溲始赤胃中松爽日間偶有成粒厚痰咳出其胃中結郁成條如指粗之梗亦覺上粗下細之象頗屬相宜進方四五劑仍以原方略為變易又服數帖亦妥復診連日因病漸退食飲漸增食後又少有脹悶之象臍左覺響食後似疼非疼仍宜調脾溫中佐以和肝為法西黨參三錢焦冬朮二錢淡乾薑八分炒炙草六分淡茱萸三分黃連一分同炒枳實炭一錢鹽水炒陳皮一錢半上七味河水煎好去渣入陽春砂仁末二分沖前方進兩劑諸證咸安且脘中之梗亦覺其柔軟而不過現矣復診調脾溫中佐以疏肝養心為妥西黨參三錢焦冬朮一錢半乾薑七分沉香五分切片丹參三錢茯神三錢歸身一錢半白芍二錢炒薑半夏一錢半炙草八分煎好去渣臨服投生薑汁一錢沖溫胃和中卻痰妙在此味佐之服後起更時胃中不覺阻礙是以氣亦不緊不塞不響天明時如前松爽連服數劑惟此方尤覺得力口中有黏泥痰吐出又有如蟹吐沫之狀此即前之所謂痰濕久阻於脘中今得溫舒而漸出也復診再以歸芍六君子加炙黃耆廣藿梗枳實炭等煎好去渣仍投生薑汁一錢半沖服四劑胃中向有梗如指粗而長者漸自細小而軟矣再以前方略為增減去薑汁加生薑三錢切片搗渣同煎服二三劑其脘中之梗竟自消矣三年之疾藥投四十餘劑而收全功繼以膏滋方調理兼治夢泄最善炙黃耆五兩西黨參六兩大熟地八兩山藥四兩炒山萸肉三兩菟絲子三兩白茯苓二兩陳皮一兩半炙甘草一兩半廣木香一兩半左牡蠣五兩塊砂仁一兩半益智仁二兩上藥十三味用常流水如法煎膏先文後武煎至滴水不散收膏時入飴糖四兩和勻不可加蜜每服六錢清晨滾水煬化燉熱服之膏成須退火氣三日服之可也案滸關陸肯堂喘咳有年咳痰挾血復發之驗滸關陸肯堂年四十九歲嘉慶己卯十月六日診素有喘咳兼好飲酒於六年前曾嗆血挾痰逢節必發或勞心費神亦發幸食飲未減酒戒有年雖不時舉發尚無妨事今季春適友人傳方用連殼雞蛋四十枚浸尿桶內七日取起再埋地中七日然後煮熟每早食兩枚連服二十日共服雞蛋四十個從此喘咳不發嗆血全無而且步行草里亦不覺其氣喘勞力今半載未食其蛋日來舊恙復發咳痰挾血雞蛋將浸特延診治脈象虛細小數兩尺濡耎肺金虛而腎水不充相火升而氣逆嗆血幸胃脈尚平猶可圖維先治其標俾喘定血止再為扶本若徒以浸蛋之法而無調補之功恐非探本窮源之治參三七五分滾水磨沖百合四錢款冬花三錢紫菀一錢半叭噠杏三錢去皮尖茯苓二錢側柏葉三錢炙炙草八分黑蘇子一錢半炒人中白八分漂淡加老枇杷葉四錢拭去毛蜜炙案孫天池乃郎兩腿足腫面浮腹膨治驗孫天池子十八歲己卯年十二月朔日診由兩腿足腫至膝右膝覺疼繼又面浮波及大腹按之膨急右關虛弦左關弦急木乘土位病起兩月防轉中滿西黨參一錢半焦冬朮一錢半茯苓三錢陳皮一錢半枳實炭八分大麥芽三錢炒山楂炭三錢炒木瓜一錢半加荷葉一小個托底煎藥服四劑面浮足腫俱減其半復診原方去枳實加厚朴木香等再四帖而痊可案山西武良佐脈象沉緊畏寒舌白胸悶作痛得食即嘔吐極重治驗論治頗的細閲便悉山西武良佐嘉慶己卯年正月草五診六脈沉緊遍體不疏舌苔白泥如粉胸前閉悶食入氣逆嘔吐脘中時痛小溲色赤如血大便半月未解年近三旬病經月餘夜間畏寒尤甚比症得之冬間伏寒西人縱啖濕面致令中宮氣阻食滯痰凝有表面兩感之候豈可渺視之乎於是以秦艽桂枝製半夏瓜蔞仁柴胡枳殼白蔻仁甘草赤苓豬苓生薑皮等煎服服後次日午前稍松夜間依然如昨復診即於前方去半夏瓜蔞仁加厚朴乾薑以生薑大棗同煎服之囑其夜間臨臥再將復渣煎服服後至夜半周身有汗即覺胸悶稍平遍體疼緩畏寒亦止次日早晨解黑結糞四五枚小溲色淡舌苔白泥漸轉淡黃稍能進粥邪食未盡究宜小心調治復診伏寒雖解余滯未楚是以胸脘尚悶背俞覺緊而腹時痛也瓜蔞實五錢陳酒同炒枳實一錢薤白三錢青皮一錢制香附三錢製半夏一錢半萊蔔子三錢炒甘草六分新會皮一錢黑山梔一錢半加生薑三片服此午後便覺胸前悶減且知胸前一團結滯漸下至酉正大便甚爽成條而下頃之知飢食粥三盞至天明又覺飢甚飲粥始安小溲尚渾濁再以二陳湯加苡仁木香通草砂仁殼雞內金等煎服又解結糞一次次日再劑仍如前解是證日久表裡兩傷大便草餘日未解今於邪退後逐日解下結糞不傷正氣誠良法也案山西門人曹生乃尊伯侯兄腳氣屢發兩足腫寸步難行脘腹攻痛遍體不舒極重治驗山西介休門人曹生乃尊伯侯翁素有腳氣僑寓江南更多卑濕身長體偉西人好面濕痰常有於嘉慶己卯七月下旬腳氣病發由暑濕夾食阻滯中宮上下不疏以致兩足腫脹寸步難行脘腹攻痛頭脹舌苔糙泥遍體痠疼欲嘔不飢不嗜飲小溲少脈息細小治宜清暑卻濕和中香薷一錢半蔓荊子一錢半製半夏一錢半秦艽二錢神麯三錢炒廣藿香一錢半山楂炭三錢豬苓二錢木瓜一錢半廣木香一錢切川木通一錢青皮一錢加青蔥兩枝服前方兩帖諸恙鹹平可以下樓行動矣兩腿足之腫脹亦消矣再以和胃祛濕調中而康案黃安舒時行感冒頭脹耳聾咽嗌不爽治驗黃安舒道光壬辰六月十二時行感冒風火上攻頭脹耳聾且鳴病起九日大便七八日未解舌胎泥黃咽嗌不爽脈象浮緩小數是非輕候法宜清解荊芥穗一錢半薄荷一錢半連翹一錢半元參三錢細生地三錢桔梗八分麻仁三錢甘草六分牛蒡子三錢炒研加元明粉一錢半沖服一劑大便一次耳聾喉干俱減三之一復診即於原方去生地麻仁加柴胡貝母鮮荷葉等服之病減其半惟舌苔仍泥白中心淡黃牙關緊不能張大喉中黏痰未淨仍宜清降兼舒元參三錢桔梗一錢薄荷一錢半甘草六分連翹一錢半荊芥一錢半殭蠶一錢半川芎八分龍膽草一錢酒炒牛蒡子三錢炒研鮮荷葉三錢服此兩帖喉塞痰黏耳聾耳鳴諸恙俱平矣案治湖州周維豐兩足腿內側癢極難忍抓之滋水淋漓病經七載遍治罔效得余方制焙研細搽擦不數日而收全功稱為仙丹快矣快矣湖州周維豐年二十七歲道光癸巳診由右足大小腿內側漫腫癢極難忍抓之出水淋漓脾濕下注波及於左易曰震為足足屬東方木也證名濕毒浸淫從右移左攸關肝脾病經七載遍治罔效法宜扶土祛濕用生冬朮苡仁黃柏當歸木通甘草茯苓防己蒼耳子牛膝等煎服服五六劑後不過如斯間數日於仲冬望日再以外藥擦之方列下蘆薈一兩烘脆川椒末三錢焙甘草末一錢三味各研極細和勻用豬膽汁調和如糊以白棉布蘸藥擦之如濕而癢者即以布蘸干藥擦之亦可分早晚擦之不數日而癢極難忍之勢頓止且濕水全無結蓋而落七年之疾得此一擦而愈竟稱仙丹妙矣妙矣案山西趙士英濕鼓將成肢腿陰囊俱腫硬治驗山西趙士英西人好啖麵食南方地土卑濕脾土不運水濕浸淫肢體漫腫漸自腿足陰囊及莖俱腫脈息沉細軟小濕鼓將成便溏腹脹脾腎攸關朝用生黃耆皮茯苓皮五加皮大腹皮陳皮草蔻仁木香乾薑苡仁桂枝梢等加薑棗煎早服晚進金匱腎氣丸三錢開水臨臥送下服之據述夜間腹中溫暖適意四肢兩腿腫硬漸自寬耎按之成凹之象減去大半惟陰囊腫而疼小溲少而赤大便溏減復診再以理中湯加苡仁茯苓皮車前子豬苓木香萊蔔子等十味煎服臨臥仍用金匱腎氣丸如前服服兩帖如前安妥復診又以理中湯加淡茱萸川楝子大茴香車前子小青皮等九味午前煎服臨臥仍用金匱腎氣丸如前服進三劑陰囊腫疼俱退三之二且兩腿按之不凹隨手而起矣小溲亦漸增矣再三劑肢腿虛腫全退陰囊腫疼亦俱平矣案山東陶君懷貪涼飲酒夜半腹痛嘔吐治驗山東陶君懷道光癸巳七月十一診據述病情因昨遊虎阜貪涼飲酒回寓至半夜腹痛甚劇嘔之不暢吐之不爽天明叩門延治證脈合參暑濕挾食此屬霍亂治當溫舒方用厚朴半夏藿香青皮枳殼楂肉麥芽滑石赤苓木香豆蔻陳皮等十二味煎服未服前先進左金丸六分生薑兩片泡湯送服之吐瀉腹痛俱稍減次日復診附方薑厚朴一錢川鬱金五分磨汁沖沉香汁三分磨汁沖赤苓三錢薑半夏一錢半廣木香四分切片白蔻仁五分研陳皮一錢半豬苓一錢半枳殼一錢半山楂炭三錢麥芽三錢炒上藥十二味煎服未服前仍先用左金丸七分如昨法服服後胸脘氣悶頓松其吐瀉腹痛亦大減可再劑而瘳矣案王梧軒濕阻胃不和舌白不飢治驗鎮江王梧軒年四十五癸巳七月望前由濕阻中宮胃土不和心似蕩不知飢舌苔白膩脈息濡軟當理陽明為最白蔻仁七分研薏苡仁五錢炒赤苓二錢陳皮一錢半川石斛四錢廣藿梗一錢半半夏曲一錢半穀芽四錢雞內金二錢炙加砂仁末三分沖煎好去渣服三帖心蕩不覺漸知飢食漸增復診仍於前方略為加減再三劑而全瘳矣案嘉興汪嘯竹夢泄腰疼晡熱溲赤治驗並丸方嘉興汪嘯竹字錫蕃年五十二癸巳七月二十一日診案肝主疏泄腎主閉藏夢泄無時兼多腰疼晡熱溲赤固屬肝腎之有虧亦關心榮之不足脈形虛濡小數良有以也制首烏三錢女貞子三錢麥冬一錢去心茯苓一錢半青蒿子一錢半地骨皮二錢杜仲三錢炒石斛三錢半夏曲一錢加生薑三分南棗一枚上藥煎服兩劑晡熱漸減復診方附後併案晡熱漸退舌苔尚泥上則耳鳴下則精滑脈息濡數相火升而水不能濟當於心腎求之所謂心象垂滴腎象拱鞠而再得黃婆為之媒合安靖上下庶幾坎離交濟矣於斯論治可與談醫大生地四錢丹皮一錢半炒地骨皮二錢元參三錢鮮蓮肉五錢赤小豆三錢即赤豆杜芡實四錢不炒澤瀉一錢半左牡蠣七錢煅塊加大南棗兩枚去核服三劑晡熱十退其八矣白濁亦漸緩矣復診仍用前方增減大生地四錢丹皮一錢半地骨皮二錢元參二錢元武板三錢炙女貞子三錢茯苓一錢半陳皮八分杜仲三錢炒加鮮蓮肉五錢服兩帖晡熱退清精神漸健食飲日增惟白濁竅端未能淨盡此腎陰不足酒後花前相火易動固宜調攝亦須自己留神復診再以熟地山藥建蓮芡實金櫻子女貞子左牡蠣澤瀉車前子等加豬脊髓兩條去外硬皮同煎服後頗合再繼以丸方調理而收全功方案列下右脈虛軟左部濡下自是肺腎兩虧之徵歟蓋腎主水肺主氣氣上騰便是水水下潤無非氣一氣貫注百脈流通得其意者於此中消息之西黨參六兩新會皮一兩二錢量用河水煎膏代蜜為丸大熟地四兩切片炒元武板三兩炙山藥二兩炒丹皮一兩半炒菟絲子一兩半蒸雲茯苓一兩芡實二兩砂仁一兩炙甘草一兩線魚鰾一兩半用黃柏末同炒成珠龍骨一兩半煅五味子一兩半同核研磨上藥十二味磨細篩勻用前黨參膏代蜜為丸如桐子大每服五錢清晨淡鹽湯送下案海鹽周北園風寒濕痹周身疼痛治驗海鹽周北園癸巳仲秋三月診風寒濕三氣合而為痹四肢兩腿肩背皆牽引板滯動輒疼痛頭重轉側筋強舌苔泥白如粉脈象細耎左弦緊亟以祛風逐濕散寒溫中之法冀其漸鬆為妥羌活一錢半獨活一錢半桂枝梢一錢半厚朴一錢半穭豆皮二錢酒炒秦艽二錢制香附二錢木瓜一錢乳香同炒嫩桑枝一兩切煎好去渣服三劑後諸恙咸減大半舌苔泥白轉為淡黃惟左膝眼動則疼夕腫朝退非生瘡可比復診再以白蔻仁桂枝梢防風羌活片薑黃秦艽五加皮黃松節苡仁懷牛膝加薑棗煎服三劑諸恙悉退且手足皆可舉動惟膝眼動輒尚疼復診仍以原方去豆蔻桂枝防風薑黃四味加制香附當歸蘇木節木瓜等煎服外用沖和膏以蔥汁調敷膝眼用絹裹扎進方三帖前病霍然矣案安兆昱病後復感垂危救生治驗安兆昱壬辰五月二十六診大病之後復感溫邪迄今一候得大汗而解尚口渴喜飲昏語如前往外奔走舌絳痰多似清非清證脈合參痰火留戀又值復感虛實相兼難以穩許即用川黃連羚羊角天竹黃半夏曲陳皮赤苓膽星甘草黑山梔等煎服後次日依然如前大便一次先結後溏脫勢之象叩門乞方不得已擬助正生津以應之西黨參四錢茯神三錢大麥冬一錢半去心棗仁一錢半炒五味子三分研上五味煎服少頃神識漸清亂語漸止且能進粥再劑而全瘳矣案山西範永順痛症屢發無定痛劇難忍治驗兩案並論山西範永順年四十七歲道光甲午正月望日延診痛症有年屢發無時今感寒氣阻濕食相凝以致嘔痰畏冷胸脘痛劇難忍病經四日醫以疏氣活血之法不應因延余診脈息浮小用蘇梗蔓荊子草蔻木香神麯麥芽香附萊蔔子陳皮生薑等服之嘔吐即已而胸脘仍痛不飢復診用厚朴桂枝乾薑枳殼楂肉木香大腹皮麥芽陳皮萊蔔子穀芽雞內金等服之痛勢大減漸可進食畏冷亦減復診再以二陳湯加蘇梗藿梗木香楂肉穀芽檳榔砂仁殼等煎服後諸恙鹹平腑氣亦通而全愈至二月下旬脘腹痛發不嘔而痛勢異常坐立不安當用二陳湯加厚朴白蔻仁楂肉麥芽木香枳殼沉香生薑等服之痛減三之二次日前方去蔻仁加淡茱萸兩劑而痊案吳姓傷寒垂危救生治驗並詳論起病緣由吳姓三十五歲甲午正月草七日傷寒垂危救生治驗其人手工為業家貧母老少妻幼子傷寒垂危醫藥罔效其母往向日相幫之王氏主人處哭告獨子垂危之苦主人因許伊請封並囑人代往余處告診求救豫往視之細繹病情於去冬嚴寒衣薄深感寒邪更兼新正其母往向日之主人家恭喜賀節不無有年糕粉團攜歸其子任意縱啖又食葷腥濕面以致胸脘閉悶逐動伏寒甚至畏寒身熱狂言奔走繼又默默不語尿出無知病勢日增又為誤投寒涼神昏囈語人事不知診其脈浮小況滑食毫不進湯水與之少飲奄奄一息難以圖救惟二日尚靈活有神口鼻熱氣直衝卻非喘也其母哀哭淚下叩首乞方不得已索思良久其人冬寒內伏又加過啖黏糕肉食阻塞中宮始也畏寒身熱繼又食化為痰久之寒化為熱痰火內蘊致令神昏譫語而不知人病經兩候之久緣薦人之誠心代請伊母之叩首乞方不得不竭力圖之方用生地黃連川鬱金製半夏陳皮山楂麥芽萊蔔子瓜蔞實沉香石菖蒲等服後神識稍清漸可言語並可伸舌舌中心淡黃干糙無津小溲少大便不通轉失氣時下是邪陷心包宿食化痰而黏著於腸胃頗為棘手議退熱祛痰兼通腑氣以冀轉機小川連六分水炒淡黃芩一錢半炒陳膽星八分枳殼一錢半天竹黃一錢黑山梔一錢半瓜蔞全四錢楂肉四錢炒橘紅一錢薤白四錢茯神三錢加生薑兩片紅棗三枚服之身熱畏寒俱退其半余如前復診小生地五錢丹皮一錢半炒瓜蔞仁四錢黃芩一錢半炒麥冬一錢半茯神三錢大麻仁四錢枳殼一錢半沉香三分切片橘紅一錢製半夏一錢半山梔一錢半上藥十二味河水三盞煎去一半去渣投入元明粉一錢五分服後大便溏糞如膠如漆黏泥不堪病勢如昨復診邪閉心包絡神識昏昧似清非清囈語綿綿舌泥干糙無津喜飲兼咳服前方頃之解溏泥糞如膠如漆者甚夥攝拳手痙脈右軟小左弦大正虛邪戀棘手極矣擬輔正祛邪法西洋參一錢半淡黃芩一錢半炒麥冬一錢半去心陳膽星八分製半夏一錢半黑山梔一錢半花粉一錢半蘇子一錢半炒川石斛三錢生甘草五分沉香四分切片橘紅一錢河水兩盞煎至一盞服先將萬氏牛黃丸一丸用燈心泡湯化服服後即有欲睡之象頃之將前煎藥與服服後漸漸睡著少頃醒後少有吟詠之聲已後神識稍清應答稍明稍可進粥二三口咳嗽漸減次日午後復診觀其問答稍有明白能識伊母且能叫余頃之又有欲睡之象是倦怠而非脫勢可較按其頭臂熱已退其大半脈右如昨左之弦大已減再以昨方去黃芩膽星沉香三味如前煎服其萬氏牛黃丸仍照昨法先服服後日漸平妥若非對證之藥萬難一救余憐其極貧兩日不受請封肩輿往診自此兩劑而愈快矣快矣案金士元胎瘧初發寒甚於熱治驗金士元年十九歲嘉慶己卯七月二十四日診風暑相搏胎瘧初發寒短熱長似屬熱甚於寒而寒時戛齒鼓頷戰栗惡寒合之色脈則又寒甚於熱矣治法當先和榮衛俾寒減熱緩再為之計桂枝一錢柴胡一錢黃芩一錢半瓜蔞仁三錢乾薑六分甘草五分草果八分煨小青皮一錢滑石三錢加生薑兩片黑大棗一枚去核煎好去渣約瘧未至前兩個時辰溫服可也經云工不能治其已然為其氣逆也正此謂耳復診進昨方寒時戰栗鼓頷之勢已緩熱來口乾渴飲之象亦減惟熱時仍兼頭脹不清耳仍於前方去瓜蔞滑石加芎歸花粉三味再劑寒熱俱減其半據述三鼓進藥少頃瘧至天曉邪提陽分不日可停矣二十五日方復診七月二十六日方桂枝一錢柴胡一錢黃芩一錢半甘草五分草果八分煨知母一錢陳酒拌炒常山八分陳酒拌炒青皮一錢檳榔一錢加薑棗煎如前法服服後寒熱甚輕未一刻而退清繼以和胃生津而痊案文學汪書蕉二兄氣逆痰多丸方調理文學汪書蕉二兄丸方癸巳歲正月十九日案脾肺久虛土不生金而木寡於畏不惟傷土而且犯肺肺虛則表不固而感冒易脾虛則痰漸升而咳嗽頻痰壅氣逆宜乎口多涎沫而動輒多汗也脈象虛滑左弦尺濡顯有明徵法宜補土以生金因脾為肺母也滋水以養木因肝為腎子也從此水土合德金木相安又何慮夫咳嗽痰升而致多汗也生黃耆二兩防風一兩同焙淮山藥三兩炒西黨參三兩大熟地六兩玄武板五兩炙建蓮肉四兩去心山萸肉二兩雲茯苓一兩半木茯神二兩柏子仁三兩去油款冬花三兩巴旦杏四兩去皮尖左牡蠣五兩煅炙甘草一兩五錢新會皮一兩半上為細末煉白蜜為丸如梧桐子大每服五錢清晨滾水送下案山西範永順痛病復發嘔吐寒熱治驗山西範永順痛症復發正月初三告診昨於午後陡然寒熱背疼胸悶嘔吐不暢脘腹痛甚有汗脈形浮弦當用疏解法服後背疼止嘔平復診脘腹痛發痛劇甚至叫呼不已手指厥冷有汗稍可進粥半甌大便欲解不解口不喜飲脈息浮滑左弦細舌苔糙刺泥黃證豈輕候亟宜舒運安蛔止痛兼之潤燥通幽取通則不痛以冀轉機生香附三錢當歸二錢沉香七分陳皮一錢半淡茱萸四分小茴香一錢半檳榔一錢半青皮一錢川花椒六分炒開口赤茯苓三錢大麻仁四錢郁李仁三錢研煎好去渣入元明粉一錢五分沖服後痛勢漸緩小便赤大便欲解未解復診仍以舒通法瓜蔞全五錢沉香六分薤白三錢陳皮一錢半大腹絨一錢半木香六分淡茱萸四分赤苓三錢車前子一錢半炒煎好去渣倒碗內投生大黃二錢泡碗內蓋須臾服當服一帖未大便次日再帖少頃始解不結不溏之糞甚多腹中松爽痛平知飢進粥舌苔漸化再以調中養胃之劑而全愈凡痛症將止食飲宜節恣食略過痛必再作不可不知丙申夏竹亭識案劉姓右齒疼痛無寧治驗劉姓慈溪人壬辰歲仲春右齒疼痛無寧脈象浮弦風火上攻引動相火治在輕清獨活一錢半防風一錢半穭豆皮一錢半甘草五分元參二錢薄荷頭一錢中生地四錢白芷五分煎好去渣入人中白四分研沖燈前進藥少頃痛止捷於桴鼓快哉案倪愚溪濕痰中虛便溏有年近感客邪治驗兩案並注永義堂董事倪愚溪年六十六壬辰歲十二月十一延診素體虛肥色帶痿黃又多濕痰向來大便溏薄日來感冒客邪燈後寒至凜凜微熱不解無汗不飢舌苔糙泥迄今六日進他醫清解法精神日疲尿便不由自主脈息右弱左弦細高年人恐難勝任亟宜卻寒和中方用蘇葉防風桂枝陳皮豆豉枳殼麥芽秦艽楂肉半夏曲加薑蔥同煎服進一劑病若失矣已後至來年癸巳五月十六日因濕阻中宮致傷坤土食入脘中不爽大便溏泄則腹中舒暢便或結祕則脘腹滯塞不松數餘年來便溏日三四次或六七次無定規脈象右細耎左小弦此由脾及腎素嗜濃茶以故濕阻不化似覺便溏則爽便結反悶也然究其源實關脾陽之不運耳如果坤土健運何至便溏則爽結則反悶耶亟亟培養中宮為第一著茅山術一錢炒薏苡仁五錢炒熟附子七分炮薑六分益智仁一錢炙甘草五分雲茯苓一錢半陳皮一錢加生薑兩片服後脘中松爽便溏仍六七次復診五月二十日西黨參三錢焦冬朮一錢半煨肉果八分炙草六分淡乾薑七分煨木香七分益智仁一錢半加大南棗三枚去核上藥八味河水兩鍾煎至一鍾去渣服服兩帖次日大便不溏只得一次據云數年以來從未如斯誠妙方也復診用異功散加苡仁益智仁補骨脂砂仁殼廣木香等服之大便如前一次食飲稍增腹中寬鬆精神亦健已後調理仍不出前後兩方出入或理中湯合五味異功加菟絲子補骨脂等服之大便或二三次卻非向日之溏糞可比設少飲茶湯則大便仍一次者居多數年便泄得余煎劑兩帖而頓止繼以調理未一月而收全功藥到病除理明法備此其所以效如桴鼓之捷也歟案王英堂甥風暑挾濕忽寒忽熱從重轉輕治驗王英堂甥癸巳六月風暑挾濕忽然手足逆冷皮寒毛聳頃之漸熱熱至潮潤有汗則身中漸爽早晨熱微神安午後漸熱則心煩多語少頃又有忽寒忽熱之勢未病前一日走泄奪精病由是月初八冒暑奔走多啖西瓜晚歸自述腰疼足軟當夜始發寒熱初九延餘次子茂常往診進疏解法腰痛即平寒熱未減初十日特告治於余細繹病情知其先傷於暑暑必挾濕又為風搏是以先凜凜而後熱熱至有汗而漸爽頃之又復寒熱無定此暑為風搏濕鬱於中三氣交阻而未能疏泄也至於病前奪精不過陰氣虧而寒熱覺重耳第不可作夾陰論治而節外生枝也況於盛夏乎因以生地丹皮地骨皮黃芩通草黑山梔葛根蔥汁炒防風等加川鬱金汁五分沖服服後夜間煩躁欲寐即夢胸中氣悶噁心口乾喜飲至二更時大便結糞一次甚暢飲粥後漸睡至天明熱漸緩醒後氣悶已平仍有噁心之勢余俱如前舌苔糙泥淡黃小溲少色赤脈形浮軟尺濡復診仍於前方加減服之復診服後仍然一夜煩躁不寧胸脘悶熱口乾喜飲喉中黏痰不爽時欲噁心暑濕內蘊皮膚隱隱防發斑疹況陰虛之體更慮陷陰之變瓜蔞皮三錢丹皮一錢半炒青蒿子一錢半知母一錢半地骨皮二錢生鱉甲四錢製半夏一錢半杏仁三錢薄荷葉一錢升麻五分連翹殼一錢半牛蒡子三錢炒加益元散三錢生絹包扎同煎此散即六一散加硃砂也自服此方後熱緩斑見夜能睡不煩躁斑色紅大如芝麻稀疏無多此邪郁陽明由里達表故身熱頓緩而能寐也是好消息凡時熱症胸前氣悶有窒塞不爽之勢兼之噁心而身熱不解者乃邪熱內郁最防發斑疹或鼻衄齒血等情此皆邪郁陽明經來也不可不詳細辨之歲在道光丙申四月二十日七二老人竹亭識復診進昨藥熱緩斑見大便一次溏中夾結舌苔泥滯糙黃今頓轉淡薄苔且舌尖漸轉紅色邪漸退也連日噁心未平自服昨方始止今仍以清解化斑以冀熱退方用生地丹皮地骨皮牛蒡子青蒿子生鱉甲花粉羚羊角黑山梔加藕一兩五錢同煎服後安妥如昨惟熱退其半漸知飢進粥斑漸消矣復診鮮生地八錢丹皮一錢半淡豆豉三錢麥冬一錢半羚羊角一錢半知母一錢半甘草五分黃芩一錢半元參二錢薄荷一錢連翹一錢半緑豆皮二錢上藥十二味河水煎服服後身熱十退七八大便又解結糞甚暢知飢納粥舌色淡紅苔退有津斑已退清復診再以西洋參鮮石斛穀芽麥冬茯神棗仁遠志元參地骨皮鱉甲等煎服之熱始退清諸證咸安矣再以和胃生津之劑而收全功案周北園長夏濕阻手臂肩項動輒牽疼治驗周北園癸巳六月初七手臂肩項動輒牽疼舌苔泥白中黃脈右大於左長夏濕升胃土不和脈絡不利口黏溲赤皆有之也治宜和胃卻濕廣藿梗一錢半薄荷梗八分嫩桑枝五錢乳香三分炒羌活一錢歸身一錢半秦艽一錢半片薑黃八分苡仁五錢炒半夏曲一錢車前子一錢半炒白通草八分服一劑牽疼之勢頓減再二劑而痛豁然矣案任富泰濕阻氣鬱手足掣痛屈伸不便治驗山西任富泰癸巳五月下浣濕阻氣鬱熱體冒風手足四末牽掣作疼屈伸不便兩關弦急脾主四肢此脾濕而兼外風搏之也治以祛濕除風佐以舒肝為最用秦艽防風當歸香附赤苓木通續斷木瓜杜仲獨活萊蔔子等煎服一帖諸恙成安惟腰痛無寧肝腎攸關法從溫舒穭豆皮一錢半制香附三錢肉桂五分去粗皮杜仲三錢鹽水炒廣木香六分獨活一錢半陳皮一錢當歸一錢半加蔥須一錢煎服一劑腰痛頓減六七再兩劑而霍然矣案山西張兆文睪丸腫痛偏左證名偏墜治驗山西張兆文仲夏中浣睪丸腫痛偏左證名偏墜脈象沉弦受寒所致溫舒下焦為妥川楝核三錢研小茴香一錢半枳殼一錢半甘草四分山楂核三錢淡茱萸三分柴胡三分青皮一錢廣木香六分赤茯苓二錢加荔枝核三錢研炒黃煎服一劑墜痛大減即坐立步行亦大緩矣再劑全愈案乍浦沈三可五兄丸方詳論六載頭風治驗乍浦沈三可五兄丸方年四十五歲甲午九月二十五日診案列下六載頭風百治罔效想亦虛實未辨繆執成方耳細繹病情合參證脈體偉脈軟兩關弦細左尺濡小素好飲酒其為中虛挾濕之軀也頭風之因由鼻洪過夥驟然如湧治之不應後有以寒涼並進者漸自停止然雖止矣亦未盡善矣以故轉成頭風一症頭腦畏風須重綿固護始能稍安然必得汗方平是以逢夏則安遇冬則發也病情如斯實有至理存焉請論之夫頭為諸陽之首鼻氣通於天天者頭也肺也肺主一身之氣統諸經絡血脈上下貫串莫不本之於氣今血去過多氣不能統而陽絡大傷陽絡者胃絡也是以血從上溢也何以獨見於鼻右右屬西方兌金與陽明艮土為子母且陽明胃脈環鼻鼻通於腦腦為元神之府上有九宮同氣相應也外邪固不可侵內風亦不宜生也頭風之發每於春夏得溫熱之氣易於汗出而即不覺其脹也遇秋冬涼寒之氣腠理漸閉而即知其畏風且脹也其所以然者血去多而肺金之氣弗克上充於腦金土虛而肝木乘之內風易生氣虛表不固而外風易入與內風相煽頭脹隨之然風必兼火火必挾痰更兼素有之濕合而為一日積月纍無怪乎病魔久矣每多忘事或二目作疼內眥發紅多淚或小溲溷濁不清則胸中不舒種種見證上則內風生而痰火凝中則濕氣阻而升降不靈也病從肺胃而波及於心脾肝腎者有之治當益氣護表侑以引經之法俾氣升火降中宮健運六載沉疴或可從斯而平矣無再贅矣大豬腦兩具去淨油垢不落水入後末藥五味同拌同蒸聽用用辛夷末一兩蒼耳子末一兩羚羊角末五錢血餘末五錢蔓荊子末五錢五末和勻摻於豬腦內用新荷葉一個置大磁盆內將拌好豬腦子放荷葉盆內於飯鍋上蒸曬三日搗和後藥青羊眼三對計六隻不落水入後末藥三味同拌同蒸曬用用密蒙花末一兩白池菊末五錢黑山梔末五錢三味和勻拌於羊眼睛內用新荷葉一個置磁盆內將拌藥羊睛放盆內於飯鍋三蒸三曬用西黨參四兩綿黃耆三兩焦冬朮二兩防風二兩白芍藥二兩炒川芎一兩半枳椇子三兩歸頭二兩大熟地四兩元武板四兩炙車前子一兩半炒陳皮二兩澤瀉一兩半上藥十三味為細末同前制豬腦羊睛一齊搗和極勻加煉白蜜為丸如梧桐子大每服五錢侵晨食後滾水送下或茶清送亦可案胡啓坤淋症溲出莖中疼痛敗精留阻治驗胡啓坤溲出莖中疼痛敗精留阻頻出無時左脈弦數此淋症也妄作白濁治故無功宜以舒通通則不痛小生地四錢萹蓄一錢半地膚子一錢半木通一錢半瞿麥二錢川黃柏一錢鹽水炒甘草梢七分石韋一錢半澤瀉一錢半服三劑溲出溺痛大減敗精出而溺端無阻礙再兩劑而全愈案杭州陳北海病後脘悶食減腸燥便祕治驗杭州陳北海甲午九月草四病後失調食飲不節恣啖厚味徒傷坤土口乾津少以致食減脘悶腸燥便祕妄投攻伐脾胃更傷防其脹滿速宜調中運食庶乎漸安於是用焦冬朮苡仁陳皮麥芽歸身柏子仁山楂肉瓜蔞仁砂仁殼赤苓等十味煎服兩帖次日解結糞甚多胸脘頓爽知飢貪食兩日後又解結糞更暢再以養胃調中而遂愈案孝廉葉卓卿乃祖梅坡翁病後調理膏滋方孝廉葉卓卿乃祖梅坡翁八十歲甲午孟秋大病之後調理膏方附下併案大病將痊脾陽未復運化機遲榮陰不滋腸燥便閉脈形虛軟補其中調其榮而氣既充滿血亦流行陰陽和而英華髮高年恙後頗合時宜西黨參三兩生黃耆一兩半鹽水炒焦冬朮二兩茯苓一兩半制首烏三兩柏子仁二兩女貞子二兩茯神一兩半當歸身一兩半酸棗仁一兩半炒懷牛膝一兩蒸杜仲一兩半炒益智仁一兩半新會皮一兩半砂仁一兩炙草一兩上藥十六味如常法煎膏候膏成量加煉白蜜和勻用磁器收貯置井水盆內退火氣一宿每晨空心服五六錢隔湯燉服如膏厚稍和滾水沖服案塘口吳安吉脘痛八載奇效並附丸方塘口吳安吉年五十四歲甲午八月初五診脘中作痛在於歧骨間俗名人字骨下迄今八載邇來日漸作楚食入不爽有似於脹每痛發於午後早上猶可病關足陽明胃波及太陰濕土氣阻不舒中州失運化之職未免生濕成痰者有之此痛之所由來也還恐坤土弱而震木乘之致令嘔吐酸黃苦水直湧而出也預防云乎哉況脈息耎小左弦細尤顯有明徵耶制香附三錢研良薑一錢歸身一錢甘草四分廣木香七分元胡索一錢半醋炙淡茱萸三分山梔一錢生加陽春砂仁七分同煎服後未幾即覺脘中痛輕次日再劑痛有不覺之象數年之疾兩劑漸平病者欽服初七復診原方去歸身木香元胡索三味加藿梗烏藥蔻仁等再進四劑痛若失矣繼以調理丸方收功方用香砂六君子加香附良薑建蓮歸芍菟絲子等共藥十四味篩磨極細量用蒸餅打糊為丸每服五錢清晨滾水送下或炒米湯送尤妙案南潯李心葵素善飲夜間手足發熱治驗南潯李心葵年逾三旬甲午季秋二日診素好飲酒陰虧體質夜間手足發熱業已久矣脈來虛濡乏力防潮熱骨蒸之變亟宜退熱為最大生地三錢丹皮一錢半炒地骨皮一錢半歸身一錢半女貞子三錢山藥三錢炒炙甘草六分茯苓一錢半澤瀉一錢半加南棗兩枚去核服五劑夜間發熱減半復診原方去歸身炙草二味加龜板山萸肉等服五六劑而全瘳案阮萬資肺衛表疏易於冒風治驗阮萬資年近五旬脾土不舒肺衛表疏易於冒風頭額有時熱而有時疼鼻流清涕胸脘易悶食無味口不幹脈右細耎雖額熱頭疼時有時無合之脈象卻無風寒食阻究屬內因攸關脾土肺衛當護表和中再為之計生黃耆一錢半防風一錢半蔓荊子一錢半香附一錢半半夏曲一錢半藿梗一錢半生薑渣五分甘草五分砂仁七分橘紅一錢服前方兩帖頭額疼熱俱平人亦漸健知飢尚不貪食原方去蔓荊子藿梗橘紅三味加茯苓生穀芽等入蓽澄茄三分同煎服後食貪神健而康案葑門姚惠時脘痛經月痛劇幾危救生治驗葑門姚惠時年逾三旬道光十四年季冬二十日診脘痛經月胃絡大傷還防血溢舌苔中央淡黃泥濁邊絳痛劇傴僂難忍朝輕夕重藥餌亂投苦寒攻伐更非所宜脈息沉細難尋權擬溫舒法以冀轉機制香附三錢元胡索一錢半鹽水炒荔枝核四錢炒研良薑八分九香蟲一錢半炙製半夏一錢半生山梔一錢甘草四分上肉桂四分去粗皮當歸全一錢上藥十味用長流水煎服據述燈前服藥痛甚至二更後漸減而能少睡較之前日減可次日因溲便不利原方去九香蟲半夏加白芍枳實二味同煎再進一劑據述燈後之痛大緩較之兩日前痛減半矣舌苔中央泥濁呆白宛如煮熟蛋白之色此陽明胃土不醒故食後脘中必閉悶作疼者為此服後大便未暢小溲漸長舌苔之呆白轉為黃色知其胃土漸有醒豁之機即於昨方中減白芍枳實兩味加制首烏服後稍疼可耐至二鼓時亦不過如是漸自睡著頗安此時惟兩脅稍有疼刺不爽之勢右脘之塊日前大如雞卵兩日間化小如桂圓核大矣足徵胃中之積滯緣痛減而自消矣復診十二月草三日方制首烏三錢女貞子三錢制香附三錢炙草五分歸身一錢半薏苡仁五錢炒廣木香六分良薑一錢上肉桂四分去粗皮生山梔一錢半上藥十味用河水兩盞煎至一盞服服兩劑而痛全止再以益氣和榮之劑康復如常案鎮江劉馨堂痧後餘邪未楚幾成痧勞奇驗鎮江劉馨堂年逾二旬甲午十二月二十六日痧後二旬餘邪未楚藥餌亂投咳嗽痰厚咽嗌色紅上齶紅點滿布聲啞音低咽唾覺痛食減飲粥脈右弦數深慮痧勞之險斷斷不可忽視蛤粉炒阿膠四錢白花百合一兩二錢薏苡仁五錢炒叭噠杏仁三錢去皮尖經霜桑葉一錢半雲茯苓一錢半真款冬花三錢蜜炙甘草五分上藥八味煎好去渣入白蜜三錢沖服服前方一劑咳嗽頓緩且草餘日未能進飯服藥後午前即可進飯夜仍進粥極妥次日復診原方去茯苓桑葉加元參蘇子北沙參等煎服三劑全愈案石門沈姓冒風寒熱誤作伏邪治之增重治驗石門沈姓年未冠甲午八月初旬似寒似熱醫作伏邪治一派寒涼之劑屢進無功熱終不解而仍兼寒凜之勢食減神倦求治於余審證切脈沖齡質弱脈象浮軟似寒似熱外為風搏內為熱阻防甚轉瘧擬輕舒法老蘇梗一錢半防風皮一錢半廣藿梗一錢半豬苓一錢半半夏曲一錢半焦穀芽三錢川木通一錢陳皮一錢半塊滑石三錢加生薑皮五分藕一兩服此一帖午後未熱神氣漸爽足徵非伏熱也再以二陳湯加蘇梗苡仁砂仁木通生穀芽等九味煎服兩劑而瘳案紹興陸蘆汀病後濕蘊坤土發為黃疸治驗紹興陸蘆汀年十九歲七月草一診病後中虛濕蘊坤土發為黃疸身目俱黃指甲亦然色滯而晦脈息軟大左弦先從溫中卻濕治茅山術一錢炒製厚朴一錢秦艽二錢豬苓一錢半赤茯苓三錢車前子一錢半炒滑石三錢甘草五分陳皮一錢半薏苡仁五錢服三帖口乾稍喜飲大小便不利余如前復診原方去滑石甘草陳皮三味加茵陳乾薑木香等服兩帖身目黃色俱稍減小溲色黃退其半矣胸脘亦漸鬆大便仍祕復診生冬朮二錢淡乾薑八分炒半夏曲一錢半葛根一錢半秦艽二錢當歸一錢半生薑皮七分滑石三錢黑梔皮一錢半車前子一錢半炒生苡仁五錢煎服四劑面目遍身及指甲之黃俱已退其半溲出亦淡夜食稍多則腹中不爽足徵脾土之不運耳再以理中湯合四苓散加半夏楂肉砂仁殼木香等進四五劑而愈案陸碧畇虛鼓危症奇效病者自誤不終其用陸碧畇年四十七歲甲午七月七日延診虛鼓危症由病後屢復食飲不節早啖葷味睥土不運更兼陽弱陰虧之軀病後兩月於前月自足跗漸浮而致腿足皆腫按之成凹日來大腹亦腫拊之如鼓小溲甚少大便頻解溏薄日數次每解腹中必痛脾不運而成積滯脈左虛弦右軟滑無力鼓脹已成葷腥不禁最難調治方用厚朴苡仁木香大腹皮五穀蟲赤苓車前子滑石楂炭陳皮木通等十一味煎服兩帖便泄稍減解時腹痛大減小溲漸有兩足小腿之浮腫亦緩惟大腹之膨急臍凸俱未減如前復診焦冬朮二錢薏苡仁五錢木香一錢茯苓三錢大腹皮一錢半五穀蟲一錢半廣陳皮一錢半木通一錢塊滑石三錢山楂肉三錢炒車前子二錢炒上藥十一味服如前妥復診七月初十方焦冬朮二錢苡仁五錢山楂炭三錢陳皮一錢半半夏曲一錢半木香一四錢赤茯苓三錢烏藥一錢半上藥八味用河水一盞半煎至一半去渣送金匱腎氣丸三錢自服此方覺便泄日松糞多水少周體活動溫和惟大腹之膨急臍凸仍然次日復診用五皮飲加冬朮草蔻木香益智仁等以河水兩盞煎至一半去渣仍用蜜丸金匱腎氣丸三錢藥湯送服後遍身適意食飲稍增兩顴虛浮之勢漸退小腿虛腫拊之成凹者按之亦漸起矣更妙者今日小溲可以先解而不與大便齊至足徵清濁可以兩途而行矣據述自便泄後今始分利復診七月十二日方穹窿術一錢半炒薏苡仁五錢炒木香六分澤瀉一錢半生薑皮一錢五加皮二錢茯苓皮四錢通草八分雞內金二錢炙上藥九味煎好去渣仍以金匱腎氣丸三錢藥湯送下服之是夜大便未解至次日始解一次非前之日解數次泥滯腹疼可較兩足及大腹皮急俱松原方再劑甚妥病者因其效速胃口漸旺日思可口之肴多進食飲余深囑禁之戒之倘再復之萬無救焉於是用附子理中湯加補骨脂木香陳皮麥芽石斛等兩劑諸恙如前安妥惟大腹又有彭急不松之象究關貪食之故耳何不自量耶膨脝腹脹也古借用彭注正字通十五日復診仍用昨方略為加減以應之病者尚思燉鴨及南腿並云喜啖冬菜炒豆板等可否余回其萬不可食伊人有含怒之意誠所謂忠言逆耳也次日仍求診視豫直辭之附案於下是鼓也緣傷寒後不禁油膩葷腥等物致令病後屢復甚至腿足皆腫面目俱浮大腹膨脹臍凸漸自便泄日數行而小溲全無皆從大便中出清濁同行何至若斯亦為任意恣食縱啖無忌而變症蜂起矣鼓勢已成藥投罔效特求治於余余細繹病情合參證脈知其脾土日憊積滯叢生濕氣內蘊水凌土位而腫滿隨之此虛實相兼之鼓也治當先以扶土卻濕運滯俾濕滯漸鬆隨證脈而消息之不四五劑果然二便分利腫勢漸減食飲漸增皆得力於湯丸並進之功也病者因其效速漸自貪食縱啖之故態依然是日豫至診視自云昨進醃蹄葷味覺腹中稍不爽今食豆板炒冬菜素味甚美竟啖其一小盞矣豫深恨之次日告診據述昨夜腹中一夜不爽且增膨急足跗小腿益加緊硬脈形弦急豫曰皆自取之也其人即於枕旁取出火炙糕與余云自後不拘食何物必須先請教今就此糕到底吃得吃不得麼觀其色面紅動怒再與之言必反受其辱矣録此以為縱啖自誤者戒自此之後十七日伊親薦醫以針刺腿腹出水內進滲濕之劑至十日而逝此自作之孽無足深惜矣案孝廉華卓卿乃祖梅坡翁濕溫挾利危症治驗孝廉華卓卿乃祖梅坡翁甲午六月十八日延診濕溫挾利身微熱舌泥苔白表裡俱病業已數日年屆八旬氣榮兩虧深恐汗多涸津擬和中退熱為妥煨葛根一錢半淡黃芩一錢半炒製半夏一錢半赤苓三錢白蔻仁六分廣藿梗一錢半煨木香八分甘草五分山楂肉三錢炒生穀芽四錢加鮮荷葉一小個托底煎藥服前方熱勢漸緩午後稍增夜安寐利由泄瀉而起日夜數次便時一響而溜出色黃並不腹痛此濕阻也以故小便短少口不喜飲舌中心淡黃邊白也自進昨方夜間未解次早解一次少頃又解一次服藥頗屬應手惟高年脈來濡耎究防變幻復診十九日服後方一帖痢止惟微熱如昨小溲漸長大有轉機也青蒿子一錢半鮮藿香二錢苡仁五錢炒赤苓三錢豬苓一錢半淡黃芩一錢半炒滑石三錢大麥仁三錢炒山楂炭三錢製半夏一錢半川芎一錢生薑渣一錢加鮮荷葉一小個托底煎藥藥服頗宜可再服兩劑於前方內去豬苓黃芩川芎薑渣四味以荷梗易荷葉加扁豆生穀芽等服後早上頭額並不覺熱至酉正微熱似煩頃之肌膚潮潤而身爽矣復診六月二十二日利後虛熱將停惟舌苔尚白泥口不嗜飲小溲少而赤脘腹不舒素好濃茶濕蘊不化所致也亟宜祛濕和中冀其脹除溲利舌苔之白泥漸化自爾通泰矣穹窿術一錢麻油拌炒薏苡仁五錢炒白蔻仁八分研赤苓三錢大腹絨一錢半炒楂肉三錢車前子一錢半炒研通草八分砂仁殼一錢半夏曲一錢半加藕一兩同煎服此脘腹漸舒小便赤減最妙者舌之白泥苔頓覺化松再劑可吃飯盞許午後仍飲粥大小便利再以六君子加楂炭麥芽等調中運食又用養榮潤燥之法佐之緣素有腸燥脾約故耳案曹士英冬感風寒身熱舌白骨疼昏語治驗句容曹士英十九歲於十一月十一身熱胸悶舌苔膩白如粉骨節疼痛不飢不渴體倦昏語脈象細小風寒內閉食阻中焦治宜溫舒得汗為妥方用厚朴豆豉蘇葉桂枝半夏曲穀芽楂肉赤苓陳皮生薑等十味河水煎服一劑頃之覺煩煩後汗出遍身從此熱退胸寬繼以和胃運食而安案李芳園淋症溺疼莖中作癢治驗李芳園甲午七月患淋症草餘日溲出兼疼莖中帶癢大便祕結舊有痔疾脫肛脈形弦數按之不足陰虧挾濕火燈後濁甚靜則少動則多色帶淡黃擬益陰降火佐升清降濁法大生地五錢元武板五錢炙炙鱉甲三錢知母一錢半秋石化水炒川黃柏一錢半鹽水炒川木通一錢薏苡仁五錢炒上藥七味河水煎好去渣送補中益氣丸三錢服兩帖濁少溲出莖中痛癢大減照方再三劑諸恙俱平惟濁未淨盡用六味地黃湯去萸肉加車前子黃柏線魚鰾以牡蠣粉同炒成珠煎服遂愈案山東陶君懷求定丸方專解鴉片煙奇效山東陶君懷於甲午四月下浣特求定丸方專解鴉片煙飲余於宋氏方中去半夏紅糖兩味加檳榔白蕪荑烏梅肉等並增減分量之多寡甘草之製法而又以百部膏之代蜜為丸種種巧思非精於醫理者不能道隻字俱開列於下誠積善之良方也幸毋忽視人參三錢如無以高麗參一兩代之否則以西黨參三兩代之使君子肉四兩切片烘脆研鶴蝨二兩焙研檳榔一兩半焙研韭菜子二兩焙研川貝母一兩半去心焙大煙灰八錢研細生甘草五錢豬膽汁須浸透曬乾蘇合香丸四丸去外蠟殼白蕪荑一兩乾麵同炒黃烏梅肉一兩焙上藥十一味各研極細篩和用百部六兩煎濃膏代蜜為丸如緑豆大每次服一錢五分或加至二錢早晚二次滾水送下再每月初四日夜半約在寅時初刻用滾水送下二錢服後如小腹微疼不可即食糕點米粥等物必待其大便後看其桶內果有蟲物下然後進食可也照方修合服後果然神奇真是金針暗度之法歟丙申五月竹亭老人再筆案乍浦沈云嶠時氣嗌痛誤治喉腐危症奇驗乍浦沈云嶠六兄甲午五月初十診時氣喉腫身熱兩日前延瘍科治潰膿後痛緩熱平今忽復熱喉腐未痊由右移左相火升而風痰上擾舌苔泥白中心淡黃夜寐囈語脈息濡小法宜清舒退熱深恐變幻二原地四錢元參三錢殭蠶三錢炙貝母一錢半去心人中黃八分薄荷六分牛蒡子二錢炒煎好去渣入白蘿蔔汁半酒杯沖服外用家制紅爐雪吹喉頗妙進前方一劑喉中之風痰頓平疼痛立止飲食下咽一無阻礙快矣快矣鄰按此方之妙妙在殭蠶之治風化痰散結行經之功王貺云凡咽喉腫痛及喉痹用殭蠶下咽立愈無不效也大能救人綱目注案上舍戴琴磎時邪內伏身熱便溏幾誤治驗上舍戴琴磎甲午四月二十六午後忽然身中先凜凜而後熱胸前氣悶不爽舌苔白泥便溏病得於奪精之後自覺煩躁脈息浮小左手弦細時邪內伏陰虧之體最宜小心俾邪由內達外免其變幻製厚朴一錢川鬱金五分磨沖白蔻仁六分赤苓二錢廣藿梗一錢半半夏曲一錢半淡豆豉三錢橘紅一錢山楂炭三錢服此胸中氣悶減半身熱未解復診二十七日方薑厚朴一錢川鬱金五分磨沖白蔻仁六分薄荷六分半夏曲一錢牛蒡子二錢炒廣藿梗一錢半通草七分加白蘿蔔汁半酒杯沖服後身有小汗舌苔漸薄便溏溲少喉中痰減復診二十八日方身熱未罷仍宜舒表和里瓜蔞皮二錢地骨皮一錢半白蔻仁六分橘紅一錢廣藿梗一錢半山楂肉三錢檳榔一錢甘草五分半夏曲一錢加鬱金汁三分沖生薑汁一小匙沖服此身熱減半漸有轉機之兆也復診二十九日方時熱漸緩喉痰漸少咳減夜少寐不飢不納亦不嗜飲便仍溏究宜退熱為最方用生地連翹藿梗薄荷梗青蒿梗蘇子橘皮桑葉牛蒡子沉香汁磨沖服後身熱減其大半便溏已平復診五月初一方小生地四錢丹皮一錢半炒地骨皮一錢半枳殼一錢半瓜蔞仁三錢元參三錢藿梗一錢半甘草五分薄荷頭八分加白蘿蔔汁半酒杯沖服此身熱退清惟額熱未淨再以西洋參元參瓜蔞仁蘇子甘草萊蔔子生穀芽桔梗等煎服後知飢納穀諸恙向安繼以養胃和中而全愈案山西榮成森脘腹痛脹異常治驗山西榮成森年四十八歲西人素好濕面脘腹痛脹難忍脈形沉細寒與濕食交阻時值八月草有八日更余延診當用香附草蔻半夏萊蔔木香枳殼薤白陳皮等服後痛脹更劇復診臍腹上下痛脹甚劇舌苔中心淡黃小溲赤大便三日未解脈仍沉細未便遽投攻伐宜以溫舒以冀痛緩脹平為善薑厚朴一錢淡乾薑六分淡茱萸四分陳皮一錢半烏藥一錢半枳殼一錢半麥芽四錢甘草五分黑山梔一錢半建神麯三錢服此一帖痛脹俱減其半次日再劑更妥九月初二日原方去厚朴乾薑建曲加廣木香赤苓兩劑而愈案山西張日源臍腹作楚腰痛畏寒急症治驗山西張日源壬辰九月初四臍腹作楚腰疼畏寒舌苔糙黃業已五六日亟宜散寒止痛穭豆皮二錢獨活二錢老蘇梗一錢半砂仁一錢半夏曲一錢半白蔻仁一錢淡茱萸四分木香六分大麥仁三錢炒枳殼一錢半加青蔥一大枝服此腹痛腰疼俱減其半惟遍體痠軟舌苔糙黃濕濁未淨溫舒為宜初五日附方於下獨活一錢半秦艽二錢木香六分陳皮一錢半半夏曲一錢半淡茱萸三分杜仲三錢炒穀芽三錢炒草蔻仁一錢半炒萊蔔子三錢炒加生薑兩片服前方一劑諸證全愈藥之效靈快如桴鼓之應妙矣妙矣案周北園風寒夾食欲成滯下急症奇驗周北園海鹽人壬辰八月草八診風寒外束食飲中停兼挾濕阻腹痛欲解不能肛門緊逼有滯下之勢宜先舒表和里方用蘇防橘半楂苓薑蔥神麯蔓荊木香大腹皮等煎服服後寒熱漸退復診進昨方寒熱退舌苔泥大便解之不爽小溲亦然皆積滯濕阻所致當溫理中焦庶幾積松濕利從重轉輕為妥薑厚朴一錢瓜蔞實三錢薤白三錢五穀蟲一錢炙大腹皮一錢半山楂肉三錢炒桔梗一錢生甘草五分塊滑石三錢陳皮一錢半服兩帖解出白凍成塊且韌極另有紅積成堆始覺漸鬆自約十減六七尚嫌裡急後重小腹稍疼復診原方去瓜蔞大腹皮滑石甘草陳皮等五味加檳榔枳實當歸紅曲廣木香等煎服據述服一帖如前次日再劑腹中大響頃之瀉出稀糞甚多後出黃糞而止始覺脘腹爽快貪食後重之勢全止矣九月初四用二陳湯加苡仁扁豆木香砂仁山楂肉雞內金等調和脾胃從此全愈案乍浦沈星五風寒束肺客途暴病治驗乍浦沈星五年四十三壬辰十二月初一客途暴疾風寒束肺氣逆畏冷咳嗽痰稠舌苔白泥如粉脈象浮緊素有吐血症內虛之軀不可藐視蘇葉一錢半防風一錢半桂枝一錢杏仁三錢橘紅一錢赤苓三錢甘草六分楂肉三錢炒前胡一錢半加生薑一片蔥一小枝服後咳嗽畏寒俱減舌苔漸退稍可進粥次日原方去蘇葉桂枝加製半夏萊蔔子等再劑邪退咳平而痊案山西李正居淋症溲出尿管如針刺治驗山西平遙李正居癸巳三月初三診溲出痛如針刺淋症初起脈息弦數敗精留阻舒通為最川萆薢三錢山萸核一錢半木通一錢半豬苓一錢半赤茯苓三錢瞿麥一錢半澤瀉一錢半菖蒲六分甘草梢八分加藕一兩半服後溲出痛刺大減敗精較前更多是方之用山萸核佐之者非無意也次日原方去山萸核菖蒲二味加細生地小青皮等兩帖而痊安案王省齋翁次郎雅堂時邪轉為胎瘧奇效並論附竹亭自制松胡白蜜煎王省齋翁四令郎雅堂甲午五月十八日診時邪六日身熱忽輟忽作卻非壯熱胸脘稍悶微咳納粥舌苔中心淡黃年將冠主家有夾陰之疑醫者有濕溫陰虛之慮四肢清涼而以四逆散加葛根芩連梔豉茅根等服之不應又云陰虛之體防邪熱內陷等語總之不識病情妄聞主家之言而附和之殊屬可笑又投以清涼退熱之劑仍然寒凜而後熱又云膚中隱隱紅點猶恐邪陷主家倉皇特延余診細繹病象證於是月十三日夜在堂飲酒啖葷而歸當晚覺身中凜凜而後熱熱亦不盛脈形弦細小數感冒時痠所致非濕溫症也經曰暑濕相搏名曰濕溫是謂賊邪至於脈象必陽濡而弱陰小而急方是暑氣蒸濕也就色脈詳諦宜舒表和里轉瘧為妥不可概以濕溫論況小暑未至何來濕溫業醫者不宗內經傷寒開口便錯誤人匪淺方用厚朴豆豉杏仁桔梗牛蒡赤苓楂肉橘紅等未服之前先凜凜而寒四肢厥逆後復熱得汗漸鬆方服前藥夜間安逸次日延診熱緩諸恙減可仍宜表裡並調前方損益之服之頗安復診五月二十日胎瘧間發初次申初先凜凜而後熱未幾汗出熱退如平人即此觀之脈象弦細時痠之邪本伏膜原半表半裡之間今漸轉為時瘧益信豫之前言不爽也廣藿梗一錢半製半夏一錢半青蒿子一錢半赤苓三錢淡黃芩一錢半生甘草五分陳皮枳殼一錢半山楂肉三錢炒大麥仁三錢炒加薑皮五分松蘿茶二分服後安妥如前次日原方略為增減復診二十二日臨期二次申前先寒後熱申後診視熱尚未退時瘧發於間日寒熱俱輕人亦清爽第系胎瘧初發厚味濕面宜忌不可忽視方用二陳湯加川石斛藿梗楂炭通草黑山梔等加薑棗同煎服二十三日照方再帖復診二十四日臨期三次胎瘧間發今日臨期於巳時寒約半香之久漸熱至申時稍緩燈前退清是日汗出過多身背細點隱隱主家因昨兼咳嗽疑為痧疹燈後豫至細審非是因天氣過熱此熱㾦也涼風一至即退無足慮如此類者醫人不識輕信旁言竟作疹治誰之咎歟仍宜和解以冀瘧邪漸退耳鱉血炒柴胡一錢製半夏一錢半黃芩一錢半炒滑石三錢地骨皮一錢半山楂肉三錢炒青皮一錢蘇子一錢半炒白杏仁三錢整加生薑皮五分藕一兩半服後一夜安妥惟兼咳嗆便溏不戒葷味故耳復診前方略為加減再劑服之甚妙二十五日復診二十六日臨期四次間瘧臨期已初寒不一刻即熱至未末熱漸衰今日寒熱俱輕惟乾咳無痰兼治之青蒿子一錢半生鱉甲三錢黃芩一錢半炒蘇子一錢半炒勿研瓜蔞仁三錢小青皮一錢甘草四分杏仁二錢整赤茯苓三錢加老枇杷葉三錢拭去毛蜜水炙復診二十八日臨期五次胎瘧日漸轉輕發於巳初二刻未幾即熱至未初漸衰舌苔漸退胃土漸和食飲喜進所嫌者乾咳無痰夜甚於晝今日瘧發臨期肺氣逆而清肅之令不降兼而治之方用桑葉款冬茯苓蘇子川貝瓜蔞仁萊蔔子甘草蛤殼等服之瘧止咳緩停藥數日自覺心惕頭眩夜寐不寧咳嗆無痰總緣瘧後食無節制水果不禁所以乾咳無痰而纏延不已也議養陰潤燥法以生地沙參石斛歸身女貞苡仁茯神茯苓甘草等煎服外用竹亭自制松胡白蜜煎每晨午後或晚間臨臥前各用二三錢以滾水半盞化服此止嗽潤燥生津化痰之妙方也余素喜吃水煙致成咳嗽痰多服之神妙為此已戒煙久矣松子肉四兩去衣胡桃肉四兩不去皮須用紫者尤妙兩味同搗極爛如粉用白蜜二兩放銅勺內煎二三沸即和勻前膏內每服二三錢食後滾水點服豫即以此方與雅堂世兄服之未幾咳嗽頓減痰亦易出不日而收全功矣書云古人制一方而可活千萬人之病余於是方亦然案平湖進士楊蘋香先生冒風挾濕夾食治驗平湖進士楊蘋香先生甲午五月二十五日身微熱舌苔白脈象浮濡細小外為風邪所搏內為濕食交阻此腹痛水瀉之所由來耶薑厚朴一錢製半夏一錢半藿梗一錢半陳皮一錢半白蔻仁七分山楂肉三錢木香七分甘草五分薏苡仁五錢炒加生薑一錢拍碎同煎服後熱退瀉止數日後因便溏腹疼兼咳延診用沙參冬朮扁豆煨木香益智仁巴旦杏炙草茯苓等服四劑而痊六月初十復延診治便溏將平食入不運年近古稀坤土弱而坎陽不足以生之脈息虛耎咳嗆痰少先理脾肺再為善後之謀西黨參三錢山藥三錢炒白扁豆三錢炒百合三錢款冬花二錢茯苓一錢半巴旦杏三錢去皮尖炙草六分益智仁一錢半加老枇杷葉三大片去毛炙進方五六劑便結咳漸平復診原方加減調理全愈月餘後因不飢納少脈右軟尺弱議火土並治法服後方數帖始平復如常矣西黨參三錢補骨脂一錢半炒煨肉果八分玉竹四錢大熟地五錢砂仁五分同搗益智仁一錢研五味子四分研陳皮一錢炙甘草五分雲茯苓一錢半上藥十味河水兩盞煎至一盞服案方執衡由水瀉而轉紅白利危症奇驗方執衡歙縣甲申七月十二診水瀉四五日昨轉紅白痢日夜數十次暑濕下注由泄瀉而轉痢脾傳腎此賊也舌苔膩滯淡白知飢能納治宜舒通通則不痛也香薷一錢苡仁四錢炒神麯三錢炒薤白三錢木香八分桔梗一錢枳殼一錢半滑石三錢赤苓三錢甘草六分加紅曲三錢復診服昨方仍然腹痛即痢如前色兼紅白十三日方淡豆豉三錢草蔻仁一錢半炒木香一錢桔梗一錢製大黃一錢半山楂肉三錢炒神麯三錢炒藿香一錢半五穀蟲二錢炙六一散三錢加紅白扁豆花各十朵進此方腹痛減墜在肛門裡急後重日夜六十餘次紅白相兼小溲赤能納粥身不熱舌苔泥厚胸脘悶仍宜舒通十四日用豆豉檳榔紅曲桔梗厚朴楂炭生大黃一錢五穀蟲二錢木香一錢神麯甘草芍藥等十二味加紅白扁豆花各十二朵同煎服之痢減其半自辰至午未利而舌苔之濁泥厚垢仍未一減究屬險候復診十五日方薑厚朴一錢半條芩一錢半炒製半夏一錢半木香一錢薤白三錢紅曲三錢山楂肉三錢炒神麯三錢炒枳殼一錢半桔梗一錢半赤芍藥一錢半炒陳皮一錢半五穀蟲二錢炙煨葛根一錢半加紅白扁豆花如前上藥用河水四飯碗煎至兩碗去渣分兩次服服后里急後重之勢頓止積減其半神疲稍健惟舌苔厚濁未化食亦未貪次日原方再劑積又減十七日用藿香半夏石斛楂炭檳榔桔梗赤苓條芩大腹皮苡仁木香五穀蟲等十二味煎服後積止痛平舌苔漸化從此知飢進食再以養胃調脾之劑而痊可案王殿占暑濕夾食成瘧泄瀉治驗王殿占壬辰七月十八暑濕夾食成瘧寒熱俱長間日一發舌苔白泥得食即嘔胸悶且熱兼之泄瀉脈形弦細耐性調治香薷一錢半前胡一錢半薑半夏一錢半陳皮一錢半白蔻仁五分藿香一錢半赤茯苓三錢麥芽三錢炒六神麯三錢炒枳殼一錢半加鮮荷葉三錢是日臨期寒熱稍緩其餘如前復診淡豆豉三錢土藿香二錢半夏曲一錢陳皮一錢半枳殼一錢半澤瀉一錢半瓜蔞皮二錢滑石三錢黃芩一錢半炒赤苓三錢山楂肉三錢炒服兩帖瘧止瀉停再以和胃調中而痊案胡步佳身熱耳聾胸悶泄瀉治驗徽歙胡步佳年二十五歲道光癸未六月草一診身熱頭疼耳聾舌苔糙泥胸悶溲赤乃暑熱內蘊泄瀉日數次病起一候速宜退熱不可忽視用鮮荷葉香茹防風薄荷葛根澤瀉赤苓豬苓滑石楂肉藿香等十一味煎服熱勢稍緩泄瀉漸減小溲漸多耳聾亦減復診葛根二錢鮮藿香二錢黃芩一錢半炒赤苓三錢煨木香六分豬苓一錢半澤瀉一錢半陳皮一錢半加荷葉一小個托底煎服此身熱退其大半泄瀉漸止其餘漸平再以石斛藿香砂仁通草苡仁扁豆瓜蔞皮等七味合二陳湯煎服諸恙向安矣案山西陳良甫身熱胸悶腹痛嘔吐蛔蟲治驗山西介休陳良甫癸未五月下浣身熱胸悶腹痛嘔吐蛔蟲舌苔白泥脈息沉緊氣閉受寒溫舒為宜以蘇梗厚朴防風薑半夏橘皮白蔻仁赤苓枳殼萊蔔子開口川椒木香等十一味煎服後身熱漸退嘔平痛緩胸悶頓松舌之泥白漸轉淡黃薄苔次日原方去蘇防朴椒四味加穀芽滑石甘草等再劑而愈案山西黨達順胸脘得食即脹且疼等症奇效山西黨達順年五十八歲甲申十月初八診胸脘氣悶得食即脹悠悠而疼波及左脅腰腿兼之塊攻舌苔白泥口不喜飲小溲色赤脈象沉遲兩尺浮耎病經草餘日醫以旋覆花湯加新絳蔥管不應又以溫中通氣消食等藥數帖亦不應因求治於余余細繹病情脾土不運肝腎有虧先以扶脾溫中再為之計於是以溫中卻濕等藥治之罔效後用香砂六君法午前服之臨臥前再以桂附八味丸二錢滾水送自進此丸之後當夜腹中稍松並不脹悶西人性好啖麵食因其脹寬而多進之腹中又有反復不舒之象仍以香砂六君加熟地歸芍等養陰服之非但脹平且痛與塊皆從斯而散矣案門人曹曉峰乃尊伯侯兄痛痹復發治驗門人山西介休曹曉峰乃尊伯侯翁甲申仲冬下浣痛痹復發自不節食所致上部肩背手臂俱已不痛惟右腿膝壅滯不能下行脈來細耎小滑濕痰阻絡溫舒為宜制香附三錢川附子八分淡半夏曲一錢半木瓜一錢半絲瓜絡三錢酒炒懷牛膝一錢半薏苡仁五錢炒防己一錢半炙甘草八分當歸二錢松樹節三錢陳皮一錢半加黃松節即茯神心木三錢杉木節三錢服後氣頓下行諸恙若失竟可步行快矣快矣案王省齋翁歧骨間痛復發危症治驗兩案並論山陰王省齋翁年七十一歲乙未二月十五日診住居三吳自浙回蘇河中舟底漏水甚急驚嚇異常引動舊恙痛症歸家未幾朝輕夕重宛如刀刺在於人字骨下即歧骨間也太陰少陰所居之地久痛非宜還恐見血脈息沉遲不可忽視先以調氣和榮佐以溫舒為穩川鬱金五分沖滾水磨紫沉香七分切片上肉桂六分去粗皮良薑七分九香蟲一錢半炒炙甘草五分黑山梔一錢五分上方燈後煎服少頃痛頓減半再劑痛止又二月十八日痛症有年惟今發之最劇連日心嘈易飢得食漸平年高脈弱中氣久虛當益氣和中肺胃並治兼養心榮為最耳人參五分沖另煎肉桂六分去粗皮茯神三錢沉香三分磨沖金石斛五錢炙草五分黑山梔一錢南棗三錢去核自服參劑八帖氣短心嘈漸平食飲漸貪精神稍健停藥數日兼之勞心於三月初八日歧骨間痛又復發夜甚於晝氣榮交阻脈象沉滯權擬溫舒再為之計上肉桂六分去粗皮制香附二錢良薑一錢炙甘草五分元胡索一錢半醋炙黑山梔一錢五分加荔枝核四錢打碎炒服前方一帖少頃痛勢立緩一夜安逸次日原方再劑安妥如前十一日診仍以前方略為增減再二劑連日痛固未發而精神食飲亦覺漸健是痛得肉桂而止者居多前方可鑑痛停之後偶啖酸鹹之味舌心染黑而反疑肉桂之熱或口唇起一二小點如芥子大者亦云肉桂之過再或陰頭潮濕夜半多夢又疑為肉桂之助火而防有泄精之虞如斯妙方伸手活人而反招浮議同道中傷致令病家狐疑然而返之吾心固無愧也倘畏避嫌疑而以此等痛症再付諸庸劣之手則必無生理矣豈不悲哉按先哲云以溫補而治痛者古人非不多也惟近代薛立齋汪石山輩尤得之又云明似丹溪而亦曰諸痛不可補氣局人意見豈良法哉痛症之不可補氣者亦有之必謂諸痛不可補氣未免過執矣余案中所論痛症治驗甚夥亦非概以溫補為法也醫貴靈機活變切脈審證無拘拘於板法庶幾盡之矣細閲便悉茲不再贅丙申六月二十三日竹亭老人再筆於遺安堂之有竹居附案王省齋翁五月初九日診痛症未發體倦乏力氣榮並調則精神健而步履輕強潞黨參三錢大熟地五錢山藥三錢炒陳皮一錢半歸身一錢半川續斷一錢半杜仲三錢炒茯神三錢加陽春砂仁三分研細沖服十帖頗安又自服前方之後惟祈仙方以應之兼多煩勞操心飢飽失時忽於乙未十一月二十三日舊恙痛症復發仍起於歧骨間晝輕夜重痛劇則嘔吐酸黃水甚至臭汁黑水皆從胃底泛來致令氣逆厄忒而無已也脈息沉滯左弦乏力病關心榮肺胃而兼肝胃者有之議仲景和法治之薑半夏一錢半淡茱萸三分川黃連四分薑汁炒沉香四分上肉桂心四分制香附二錢化橘紅八分加母丁香五隻柿蒂四隻服此痛緩厄減至天曉大減厄止嘔吐亦停舉家感激頗為合宜二十四日仍於昨方中加夜交藤茯神等同煎又十一月二十五日天明厄逆一二聲即止心窩疼緩自覺脘中鬱郁不爽大便祕結胃口不開舌苔泥白糙刺用二陳湯合左金法加沉香丁香柿蒂等煎服至夜半痛又至復嘔酸黑水一大盞幸未厄逆色脈合參再痛防其厥脫議代赭旋覆湯法以冀轉機二十六日方附下人參鬚一錢另煎沖旋覆花三錢絹包扎製半夏一錢半薑渣一錢代赭石三錢煅醋淬九香蟲一錢半炒橘皮一錢加香穀芽四錢大南棗兩枚去核服後夜間痛緩可耐嘔酸漸止進粥三次又十一月二十七日夜診即前方去穀芽南棗兩味加醋炙元胡索荔枝核等煎服痛減因進爛飯有時小疼胃口稍健神識漸清第易於動怒勞神高年脈弱左弦急與嘔痛厄逆等症最不相宜豈可因小愈即下樓管理家務與親友操心代勞不思謀慮決斷曲運神機多言事冗皆傷心脾肝腎而一身之氣總統乎肺也以故發則痛嘔並至豈非心與脾也味酸色黑豈非肝與腎也劇則氣逆且厄豈非肺氣之虛也理宜竭力圖維猶嫌鞭長莫及豈可藐視之乎又十二月初一日前進代赭旋覆湯出入心窩痛又平大小便通利夜寐不適宜養心榮佐以舒中為穩人參鬚一錢另煎沖歸身一錢半柏子仁三錢陳皮一錢九香蟲一錢半炒茯神三錢炒棗仁二錢遠志一錢炒車前子一錢半炒是方尚未煎好忽又痛發甚至嘔吐酸水難以進藥俟至初二日天曉服藥服後漸自痛緩神疲怕煩是晚戌初延診人參六分另煎沖炒枯冬朮一錢湖蓮肉三錢去心沉香三分上肉桂六分去粗皮淡茱萸三分旋覆花二錢生絹包扎茯苓一錢半代赭石三錢煅紅醋淬加荔核三錢打碎炒九香蟲一錢半炒服此漸自平和痛止嘔平食飲稍增睡臥漸安自有向安之機也痛疾有年屢止屢發前論頗明無再贅矣要之靜養調攝無煩勞戒多語俾食飲貪精神健即可冀其痛疾之常平況平素脈帶陰象豈非永年之基也勿自誤之案溧陽醫者吳春田顴疽治案並論溧陽醫者吳春田年五十六歲道光元年辛巳十一月初二病原附後先生溧陽名醫也遠近慕之鄉宦有疾問治於先生者居多忽於左顴生一小顆不疼不癢無足介意由漸而大始也自醫繼也告診於瘍科外敷內服毫無一效而反堅硬不移千方百計越治越大大如雞卵斯時有外縣請診於先生者概弗克往朝夕躊躇適遇伊同鄉金子竹溪兄特薦治於余豫證脈合參知其用心過度更兼色欲無禁好啖厚味此脈之所以軟弱細小尺按之如綿也此就脈而言之也再視其外形堅如鐵石推之不移知其厚味之毒乘虛而盤踞於顴骨之間更兼舟車更深夜半不辭勞苦寒氣又乘虛而侵其骨以故根深外堅而成骨疽之名延綿十月之久最不易治況年逾半百若斯傷精耗氣之軀尤難之難矣盍早為之尚有法焉遲矣遲矣方案列下以俟自裁脈右虛耎左脈細小尺按之如綿左顴漫腫堅如鐵石病經十月牙關難開攸關心脾波及肝腎精血久虧寒侵於骨骨疽之徵也病由內生所謂有諸內而形諸外也不此之求而妄作外症治恐潰後難以痊可必得調其榮衛而侑以外灸之法正合外內之道也此等大症最宜內托外灸早見早灸百無一失豫醫案中所注治驗非一細閲便悉內經所謂榮衛不和乃生癰腫膏粱之變足生大疔其斯之謂歟加意圖維猶嫌鞭長莫及足生大疔足能也疔疽也西黨參五錢大有耆三錢制首烏五錢當歸一錢半鹿角霜一錢半元武板三錢炙甘草人中黃一錢赤芍一錢半小青皮一錢加豬顴骨引經妙法三兩炙熱用乳香一錢半以蜜水調勻塗上炙至骨黃脆為率打碎用河水三盞煎至兩盞再入藥同煎至一盞服春兄見余所定方案深為欽服備藥數劑舟中制服回里特取盤費來蘇借寓醫治及回鄉延診者甚夥自己愈加鬱怒勞神神思恍惚食減心煩牙關愈緊食物更覺不爽因自嘆其不能來蘇之苦並與竹溪云豫自行道以來江浙兩省遇有道者曾經多人第未見才學有如是者醫之良者也可謂江浙中之有名人也惜乎豫病深沉知遇之遲莫非數也來春竹溪兄至舍而述之余再筆而識之案徽歙汪信安臍腹絞痛危症立救奇驗徽歙汪信安年四十七歲素體肥胖多痰於乙未八月二十八日痛症復發臍腹絞痛叫呼難忍迄今三四日據述服桂附八味丸及脾約丸俱不應痛如故危急極矣特求治於余豫細繹病情合參色脈舌苔泥白如粉脈象沉緊痛無寧刻此寒與氣食交凝大便閉塞痛劇防厥未可藐視擬溫舒法用香附乾薑淡附子木香沉香烏藥淡茱萸元胡索荔枝核等九味河水煎服後少頃腹中上下奔走至胃底而復上自覺肛門塞緊便祕不能解是以下部不通而臍腹之痛不止也又八月二十九日仿叔微溫下法而變易之所謂活法在人無拘拘於成方也制香附三錢淡附子一錢淡乾薑七分大黃一錢廣陳皮一錢半炙甘草六分元明粉一錢半研沖上藥六味用河水一盞半煎至一半去渣入元明粉沖服服後未幾即大便一次先結後微溏頃之痛減七八即可進粥據述兩次飲其四盞豫嫌其太多又申刻診痛已大減較之辰時初診傴僂劇痛之勢大相遠矣第脈形尚滯舌白如前大便通而余滯未盡此際宜和其中佐以舒滌腸滯為最且食宜少進庶無變幻之虞矣於是以生穀芽苡仁木香砂仁殼大腹絨薤白雞內金等七味煎服服後妥甚又解黏膩糞兩次貪食但舌白泥未轉胃土之津未復食飲究宜節制又八月三十診痛勢已停脾土尚壅胃氣未和舌苔仍白惟養胃醒脾舒中與病不悖自來痛症最怕食復勞復世所共聞非臆説也建蓮肉五錢去心杜芡實四錢南棗五錢去核金石斛四錢沉香三分滾水磨沖陳粳米五錢生絹袋扎煎好米倒河內上藥六味河水兩盞煎至一盞去渣入桂花露一兩再一滾服服後解大便一次甚暢進鍋焦心粥頗為適意舌之色白漸轉淡紅又進前方頗宜仍於前方加減調和坤土四五日來精神漸健有時腹中稍有疼刺得食即安舌苔已退脈象虛耎無力議用異功散加玉竹歸身棗仁南棗等以調心脾則坤土和而夜寐安又丸方因於九月望前回里特製丸劑調理西黨參六兩生黃耆三兩防風二兩歸身二兩於白朮二兩土炒雲茯苓二兩陳皮二兩木瓜二兩炙甘草一兩半草蔻仁二兩炒續斷二兩炒木香一兩半杜仲三兩炒山楂肉四兩炒麥芽三兩炒上為細末用蒸餅打糊為丸如桐子大每服五錢清晨滾水送或陳皮泡湯送亦可又平常所食蒸糕方後藥計五十一兩再加炒糯米粉五十兩建蓮肉八兩炒杜芡實八兩炒白扁豆八兩炒胡桃肉八兩搗黑芝麻五兩炒山楂肉四兩炒六神麯五兩炒陽春砂仁三兩不經火新會皮二兩上藥共九味內除桃肉砂仁二味勿經火其餘七味皆照方焙黃研細篩粉再加炒黃糯米粉五十兩和勻前九味內量加潔白糖搜和粉內不可過甜蒸糕切片烘脆如茶食店中之火炙糕是也囑伊行之為妥案戈心梅腸紅屢發治驗戈心梅年五十九歲道光乙未八月草七日診素有腸紅操勞多步或貪涼飲冷則便血頻下色帶鮮紅幸飲食睡臥如常脈象虛耎左關弦細此脾陽不運肝陰有虧先理坤元再為之計生黃耆三錢焦冬朮一錢半丹參三錢防風一錢半陳棕灰一錢半淡茱萸四分炒黑歸身一錢乾薑七分炒炒黑荷葉一錢半河水煎好去渣入砂仁末三分沖服三劑腸紅已止昨步行勞力亦無血下復診前方減薑萸棕荷四味加黨參苡仁白芍炙草等加蜜炙升麻三分煎服四五劑而康案汀州傅上鏞吐血論治奇驗並收功丸方汀州傅上鏞年二十三歲乙未閏六月草八日延診病原吐血起自去秋八月初旬忽吐血幾口當即停止直至今夏前六月下浣忽又吐血連吐旬日每約吐五六口一日共約杯許延鍾先生治以涼血清火法服之不應更方三次尤覺血增胸中不爽嗆咳口甜因問治於余案云血吐數日兩關弦數肝火沖胃經云陽絡傷則血上諡病關肝胃再吐非宜亟於靜養調治免其再吐況值盛夏溽暑方殷引動相火尤非所宜擬引血歸經法參三七一錢藕汁磨沖丹參四錢丹皮一錢半炒貝母二錢去心旱蓮草三錢藕節七枚生蛤殼六錢陳棕三錢炒黑存性懷牛膝一錢半血餘六分沖加元武板一兩炙河水三盞先煎煎至兩盞入後藥再煎至一盞服服一劑咳血氣逆俱稍減原方再劑血未吐咳嗆亦緩又咳血雖止脈仍弦數究宜靜養為最北沙參四錢元參三錢參三七五分如前磨沖紫菀三錢川石斛五錢麥冬一錢半去心巴旦杏三錢去皮尖蘇子一錢半炒水炙草五分側柏葉四錢炙加元武板一兩炙如前法煎又昨日痰中咳血一點如瓜子大幸食飲漸貪制西洋參一錢半山藥三錢炒建蓮肉五錢去心茜草一錢女貞子四錢側柏葉四錢炙人中白八分陳皮一錢炙甘草五分雲茯苓一錢半加參三七五分藕汁磨沖服後血平又閏六月十四日立秋診右脈軟左寸虛關弦尺浮小數肺胃虛而腎水不足相火易升此吐血之所由來耶北沙參三錢中生地四錢百合四錢元參三錢桑白皮一錢半炙鱉甲三錢蛤殼八錢山藥三錢炒人中白八分炙甘草五分加血餘灰六分沖又連進益陰法血停有日左關弦硬漸平中宮坤土未健油泥大葷究不宜進宜以調中養胃之劑俾坤土得令再為善後之謀玉竹四錢扁豆四錢炒川石斛四錢茯苓一錢半木香四分建蓮四錢去心炙甘草五分砂仁殼八分加雞內金一錢五分炙脆服五帖神健食貪原方去雞內金加白花百合二兩用河水三盞煎至兩盞去百合煎藥一盞服再五帖更妥又仍擬脾肺並治再調肝腎之陰是為上策潞黨參二錢薏苡仁五錢炒山藥三錢炒芡實三錢天門冬一錢半去心酸棗仁一錢半炒茯苓一錢半陳皮一錢炒當歸身一錢炒用白花百合二兩如前法又前方進五劑甚妥惟大便忽結忽溏為不能戒油泥大葷耳每每病將小愈口味不節而致病復者皆自誤之也方用五味異功散加首烏女貞歸身芡實棗仁柏子仁霜大南棗一枚去核內填益智仁末二分線扎同煎又進前方便溏日減昨只一次仍用五味異功散加扁豆苡仁山藥女貞枸杞廣木香等十一味仍以大南棗一枚照前同煎服之大便漸結又益氣以保肺胃調榮以養心脾俾氤氳之氣得以融和再為良圖綿黃耆一錢鹽水炒西黨參三錢建蓮肉四錢茯神三錢益智仁一錢柏子仁一錢半去油煨木香七分歸身八分炒炙甘草七分淮山藥三錢炒大南棗兩枚去核是方服四五劑飲食漸自復原睡臥亦安惟易怒心嘈偶有嗆咳不寧而稍知其口乾舌燥也即此觀之雖非緊要而究其源實亦五藏之不足耳靜養調攝食飲節制毋貪厚味庶乎漸安又昨辰診脈左關弦硬相火上炎防吐血復發至夜果然胸膈熱悶喉癢忽吐血一口隨又痰中帶一二口今日肝脈反不過弦而按之不靜猶恐再吐自前吐血迄今約有二十四五日未吐已後咳嗆便溏脾肺並治食增瀉平皆得於用藥之權衡也細審之其中有不相宜處在於日貪肥甘厚味朝夕必啖肉食未免生濕成痰而脾胃弗克健旺者有之古人云寧食淡茹蔬莫貪肥與甘旨哉斯言豫深囑之料知命者依法調治庶可無妨七月初七日方西黨參三錢生黃耆一錢鹽水炒參三七五分開水磨沖降香一錢旱蓮草一錢半人中白七分白花百合一兩蘇子一錢半炒生蛤殼五錢加藕汁一小杯沖又自前月初七日方服後痰血即止停藥匝月於八月初六忽又痰中帶血雖不多而右寸關軟小乏力左寸細小關弦硬尺濡合而參之是脾肺虛而肝腎之陰不足相火易動此痰血之所由來也正值秋分之後加意圖之以杜再吐制首烏四錢炙鱉甲四錢潞黨參三錢丹參三錢黑蘇子一錢半炒懷牛膝一錢半炒巴旦杏三錢去皮尖茜草一錢半加鮮藕節七枚又進前方痰紅即止再二劑如前安妥惟耳鳴睡醒喉中似干日間並不喜飲食貪睡安所嫌脈未平靜耳用沙參首烏元參龜腹心巴旦杏山藥苡仁芡實炙甘草白花百合等十味煎服五六帖諸恙向安煎帖屢效繼以丸劑調補列下丸方八月二十一日診左關虛弦尺濡右脈虛軟無力自是肺脾肝腎皆虛肺何以虛土不生金也肝何以虛水不養木也木無水養而相火易升腎何以虛金不生水也水無金生而腎精易竭且子虛者必求救於母肺求脾肝求腎而腎復求肺肺金之虛愈加虧缺夏間之吐紅未必不由於此也調治雖痊脾肺久虛第知補肝腎之陰而不思調脾固肺究非挈領提綱之治木棉仁四兩白仁揀去黃而走油者用女貞子三兩煎濃湯浸透蒸曬九次余汁同搗拌和藥內大生地六兩用福珍酒煮透半日以砂仁研末五錢同拌蒸曬九次入後藥同搗務要和勻潼蒺藜三兩陳酒拌蒸曬乾焙研真黃精二兩用益智仁一兩陳酒浸透用磁盆荷葉托底將浸透黃精置飯鍋上九蒸九曬入後藥搗勻元武板五兩蜜水炙脆勿焦山萸肉二兩百合二兩杜芡實三兩焙黃勿焦建蓮肉三兩連心炒牡蠣三兩煅粉淮山藥三兩炒叭噠杏二兩去皮尖另用西黨參五兩生黃耆三兩兩味煎膏代蜜為丸上藥十二味照方制焙和研細粉用前參耆膏代蜜為丸如桐子大每服五錢清晨滾水送或蓮心湯送亦可案山西許慶亭淋症敗精留阻作疼治驗山西大同許慶亭年逾二旬乙未秋八月淋症初起敗精留阻溺時疼刺難忍完後亦然醫以利濕清火佐大黃以瀉之不應反增痛癢於二陰之間特求治於余當用苡仁瞿麥草梢青皮黃柏梔子木通澤瀉地膚子等服之至更余小溲出時痛始緩二三口乾喜飲溲赤淋濁之多比前已減半矣又溲出莖中疼痛完後稍緩脈息弦細小數議益陰降火佐以祛淋免其淹纏龜腹板三錢炙小生地四錢瞿麥二錢赤苓三錢海金沙一錢半黑山梔一錢半草梢八分木通一錢半車前子一錢半炒研加鮮荷梗三寸服之溲出疼痛大減完後亦然淋濁減可又服前方溺時痛緩照昨方去海金沙加薏苡仁兩劑痛止即溺完後亦不痛矣惟莖舉底面之筋痛癢交加夜半更甚兼之白濁溲赤未平復診用知柏地黃湯加車前子等共九味河水兩盞煎至一盞去渣午前服晚間臨臥前用知柏地黃丸五錢淡鹽湯送如法服之莖未舉未痛而痊可案汪書蕉二兄時邪內伏身熱胸悶治驗文學汪書蕉二兄年逾六旬甲午五月五日感冒時邪先凜凜而後熱忽止忽作邪伏膜原胸悶舌苔泥白大便祕欲解未解口苦不喜飲宜以溫舒以退寒熱方用厚朴草蔻半夏黃芩檳榔楂肉大腹絨藿梗赤芩甘草佩蘭葉等煎服一劑晡後熱退大便未解舌苔漸化小便仍少又晨診方身熱稍緩又增頭脹胸脘閉悶中州濕阻未清究宜祛濕退熱至於便祕且緩治觀其口不欲飲舌苔白泥小便短赤其為濕阻也無疑服後方一帖胸悶頭脹頓平大便漸通薑厚朴一錢製半夏一錢半瓜蔞仁三錢橘白一錢草蔻仁六分炒赤茯苓三錢青蒿子一錢半黃芩一錢炒塊滑石三錢加生薑八分松蘿茶三分又便結解之未暢知飢納少坤土未和以二陳湯加石斛苡仁麻仁柏子仁枳殼砂仁殼等十味煎服服後大便即通且暢而諸恙向安矣案廣東盧賢傑白濁未止大便祕結異常治驗並附戒鴉片煙癮藥酒方奇驗廣東盧賢傑年四十三歲乙未九月九日診白濁兩月未止六七日來大便祕結每日欲解不能夜半登圊二三十次解出些少少腹兩邊脹疼不已精傷血燥致令大便結而少腹疼也宜於潤燥通幽兼治白濁庶幾兩擅其長矣生首烏六錢制首烏三錢柏子仁三錢研當歸二錢大麻仁三錢研郁李仁三錢研車前子一錢半炒研赤苓三錢皂角子一錢炒研存性煎好去渣服先用更衣丸二錢用陳酒燉溫送用更衣丸大率以錢許為則或一錢五分多至二錢不可再增此用二錢者緣其體健便結脹痛而致六七日之久者故也最後以潤燥通幽之煎劑服之其功更捷矣午後先進更衣丸少頃即服煎劑至點燈時解結糞成堆腹中即然爽快少腹兩旁脹痛頓失小溲亦長病者甚快後以六味地黃湯加固澀之劑兼治白濁而收全功矣是人素吸鴉片煙年久成癮據述屢服丸藥欲戒不能今濁症將愈自分體虛已極不敢再吸乃乞治於豫即將昔年周姓原方內斟酌分量之多寡並用灰之數飲酒之法頗費思索據述照法飲之從此而戒當煙癮發時並無苦楚堪稱神妙是法可與上年山東陶姓之方相輔而行因附識於此大熟地一兩淮山藥白朮各五錢鶴蝨旋覆花絹包各四錢雲苓杜仲川牛膝各六錢陳皮金銀花貫衆川貝各三錢炙甘草二錢上藥共計六兩重另用鴉片煙灰照每日吸食若干加一倍以稀紗袋獨貯煙灰線縫其口用原福珍酒六斤同前藥放瓦罐內浸一周時隔水緩火慢煮候藥味出將酒另貯磁瓶內去淨藥渣惟煙灰袋仍浸酒內再用人參五錢煎濃膏化入封口勿令泄氣照常日吸煙時取飲一酒杯飲畢隨加福珍酒一杯於藥瓶內假如每日吸煙兩次飲藥亦兩次加酒亦兩次是也案蔣子香貧儒病鼓危症奇驗蔣子香十七歲乙未四月藜藿之體質弱勞苦去冬受寒今春頭面漸自浮腫而致大腹虛膨陰囊脹大甚至陰莖漸粗陰頭絞轉朝上小溲少脈息虛軟遲小此水腫症由脾陽之不運所致擬溫中法生冬朮一錢半淡乾薑八分熟附子八分炙草五分小茴香一錢半薏苡仁五錢炒車前子一錢半炒研茯苓一錢半澤瀉一錢半加生薑皮八分同煎服五帖食飲能運大腹溫暖膨脹漸除面浮已退陰囊漸耎小便漸多且長前方再進五劑諸恙咸安矣案山西張惟一淋症溺時疼痛治驗山西張惟一年二十七乙未六月初十診淋濁症溲時尿管疼痛完後亦然兼有敗精頻出口乾喜飲相火未清脈形細數宜益陰降火法小生地五錢丹皮一錢半炒海金沙一錢半青皮一錢半甘草梢八分苡仁五錢人中白一錢澤瀉一錢半黑山梔一錢半加鮮荷葉一小個托底煎藥服前方兩帖溲出刺痛十去七八又復診十二日前方去青皮人中白加白通草滑石等余如前再進兩劑淋濁俱安案許玉田間日瘧治驗許玉田年逾四旬瘧髮間日寒甚於熱迄今三發每發於午正脈來細弦溫舒和解是其治法草蔻仁一錢半炒製半夏一錢半青皮一錢赤苓三錢淡乾薑八分淡黃芩一錢半柴胡一錢山楂三錢炒生甘草五分廣藿香一錢半加生薑渣二錢服上方一劑瘧止案周二如腰脅作疼治驗周二如兄豫長子於九之妻弟於道光乙未六月三十日兩脅作疼波及於腰少有干嗆脈左濡小肝腎攸關法宜舒絡侑以卻濕為妥制香附二錢元胡索一錢半炒小青皮一錢枳殼一錢半廣藿梗一錢半薏苡仁四錢山楂肉三錢炒沉香三分當歸身一錢半穭豆皮二錢鹽水炒服此一帖脅疼即緩再帖痛止而腰疼亦大減矣又閏六月初二復診昨夜夢泄腹中稍有不舒照前方去元胡索沉香枳殼穭豆皮四味加杜仲芡實陳皮木香等兩劑而痊案乍浦朱梅塢陰虛嗆血治驗乍浦朱梅塢歲乙未七月初九診年近四旬素多操勞陰虛之體忽而嗆血杯許色帶紫紅有時成蔑脈息弦數血猶未盡擬去瘀生新法參三七六分開水磨沖丹參三錢旱蓮草二錢茜草一錢半黑蘇子一錢半炒藕節七個拍碎人中白八分引白茅根五錢去心同煎又十一日復診進前方兩劑胸脘不悶嗆血亦無惟痰中稍見粉紅有時喉癢即嗆舌中心泥濁胃土未清也照初九方去茜草茅根加叭噠杏款冬花等三四劑而平矣案高朗亭乃郎癲症治法並辨明與癇症各別高朗亭長子年二十未婚道光乙未延治癲症據述病由長夏冒暑身熱而起愈後未幾復又寒熱調治將痊忽於七月十四發癇症乃尊云體質素薄未發前兩日友人適談及鬼怪事當聞之自覺其驚次日即自言自語東步西走默語聲低食飲不減夜不成寐醫作虛癇治用參朮菟絲肉桂等溫補不應又有用滋陰安神等法亦不應皆以為癇症論無功因於二十五日始求治於余余細繹病象癲也非癇蓋癇病發則陡然跌僕口作六畜聲痰涎隨出或手足牽引少頃病退則宛如平人問答無差惟覺軟倦精神不足或十日半月一發是也如此癲症豈可妄認為癇耳癲之發也終日坐立無定口內默語不知文而不武或笑或悲食飲多進少進亦無飢飽朝暮皆同非癇症之陡然發少頃退如平人可較也邇來時醫以癲作癇案中稱虛癇者是也以故病家亦以為癇症而竟不知其為癲也醫人尚不明況病家乎脈息細滑左弦小數虛痰挾火凝滯包絡陰虧體質亟以祛痰降火之劑進四五帖後朝進歸脾丸五錢麥冬泡湯送晚間臨臥前再以白金丸二錢橘皮泡湯送急則治標緩則治本湯也而繼之以丸職是故耳
