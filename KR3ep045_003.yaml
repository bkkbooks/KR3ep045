body:
  text: 竹亭醫案女科卷三案王氏女産後腹痛寒熱汗多誤作外感幾殆胡家莊王氏女年十八歲於嘉慶十三年九月初六生産兩日後惡露漸少小腹微疼於初七日忽然頭痛頃之寒熱胸悶噁心頭汗甚多次日延土醫治用疏解消食加香附丹皮歸身又以益母草八錢煎湯代水煎服服後愈加胸前難過欲噯氣而不能頭痛汗多如前因特買舟求治於余案云新産受涼雖寒熱頭汗兼痛而産後見之又不得作外感治況脈息虛數無力顯有明徵丹溪云産後氣血俱虧雖有他證以末治之旨哉斯言九月初十日診西黨參三錢歸身一錢半川芎一錢炮薑八分白芍藥一錢半炒元胡索一錢半炒蔓荊子一錢半陳皮一錢白蔻仁四分研沖加生薑二片大棗兩枚去核服此頭痛大減氣逆汗多亦緩當解結糞小溲短赤口乾胸悶身熱未退復診九月十一日診西黨參三錢當歸一錢半川芎一錢炮薑八分赤茯苓三錢烏藥一錢半青皮一錢元參二錢車前子一錢半炒炙甘草六分陳皮一錢半加生薑二片大棗兩枚去核服兩帖身熱漸退胸悶口乾俱平再以益氣調榮之劑而全愈案潘氏女泄瀉大腹膨脹且疼溲少治驗潘氏女年十四歲嘉慶十三年七月十三泄瀉日夜數次大腹膨脹兼疼小溲少當用四苓散加黨參茅朮益智仁扁豆大腹絨等扶脾卻濕使濕從小便而利則大便之泄瀉自止服後泄瀉大減再以四苓散合理中湯加益智煨木香烏藥等服數帖而全愈從此體丰神健案先慈仲太孺人右脅痛波及胃脘背疼治驗先慈於嘉慶十二年孟秋右脅疼痛數日間時輕時重忽又兼臍上胃脘痛朝輕夜甚因以木香當歸元胡神麯乾薑枳殼甘草輩服二三帖胃脘痛稍緩而右脅仍痛又以香附元胡麥芽萊蔔子枳陳薑草等服一二帖脅痛似緩而胃脘又復痛夜間尤甚痛時手按之稍緩仍將前第一方再服兩劑痛仍不減幸食飲尚貪脈息右關沉實而滑痛時牽引背骨知其胸痛徹背夜間更甚不能安臥非仲景瓜蔞薤白半夏湯不可因兼右脅痛又少佐木香以舒肝脾煎以河水再加陳酒一小杯同煎服此一劑而胸痛徹背如失脅疼亦從此全愈草餘日之疼痛服前兩方俱未對證得此一劑痛若失矣快甚快甚案朱氏女表虛易感頭疼咳嗽兼之痰火治驗附論朱氏女年五旬又五嘉慶十二年歲在丁卯夏定丸方案云右寸虛浮兩關弦滑表氣素虧風邪易入土虛木搖外風與內風相召痰火隨之故時而頭痛咳嗽症經年餘服煎劑已漸平可而痰厥猶未全瘳再以扶脾保肺兼之養肝化痰風火自平至於節飲節勞兼戒惱怒料自慎重無庸深囑西黨參二兩炙黃耆一兩五錢防風一兩五錢制冬朮二兩雲茯苓一兩半製半夏一兩半甘草一兩炙新會皮一兩二錢元武板二兩炙炙鱉甲二兩歸身一兩半制首烏二兩白芍藥一兩半炒生明礬一兩茶芽五錢紫沉香五錢勿經火上為細末用荷葉煎湯灑疊成丸每服五錢食後滾水送下是方也君以玉屏風散以固表則外風不入臣以六君以補脾俾土旺而木不搖則內風自平佐以元武鱉甲乙癸同源首烏歸芍肝腎並治再以明礬之去風痰得茶葉而行遲亦治痰之妙法也最後以沉香之行氣不傷中且補藥得之而能運痰火遇之而能降也制方之意可為知者道耳案嘉興鄭惕庵乃室産後身熱發厥危症治驗附膏滋方嘉興鄭惕庵室人道光三年五月二十日診産後十九日身熱有汗頭疼胸悶舌苔淡黃口乾少飲耳鳴兼聾不飢納少手指顫振此産時去血過多新冒風邪六脈軟大小數病已四日防其發痙金匱云新産婦人有三病一者病痙二者病鬱冒三者大便難是也當明辨之小生地三錢粉丹皮一錢半炒炒荊芥一錢半青皮六分蔓荊子一錢半地骨皮一錢半川石斛三錢當歸一錢生甘草六分加黑穭豆皮三錢陳酒拌焙復診五月二十一日進昨方半日安妥天曉發厥於下床小溲時頃之即醒今晨診六脈如昨頭痛漸減食粥即嘔産後去血過多榮血大虧孤陽外浮神魂不守此厥之所由來也是屬險途議益氣養陽和胃止嘔以免痙厥方用大生地黨參茯神當歸白芍棗仁麥冬甘草製半夏等煎服草二復診未厥嘔止納粥據述進粥三次約有二盞惟熱勢未盡左脈空虛右脈稍小無力細審之産時去血過多兼之汗出不少兩日間汗雖減而心血大虧以致藏血之肝亦虛此昨之所以見厥也血既大虧無怪虛熱難退宜乎補血為先而産後之補血又不能全責之血分必以氣分之陽為血分之陰之主為最蓋氣陽也血陰也扶陽可以生陰亦陽生陰長之義也必需益氣養血調和營衛為緊要關頭即此軟大無力之脈神疲難支之狀視一人如兩形證名視岐豈非氣血大虧究恐虛脫立方於下酌之高明人參五分沖炒熟地四錢陳阿膠三錢茯神二錢柏子仁三錢去油炒棗仁一錢半歸身一錢白芍一錢半小青皮三分立方後又延鍾愚泉診案云讀竹亭先生方案頗費匠心周匝無用更章即於余方中增紫石英三錢左牡蠣七錢據主家云仍服豫原方不時呵欠恍惚視岐陽氣外越陰不內守脈軟大而空仍議固納一法以冀轉機五月二十三日人參七分沖大熟地五錢茯神兩錢白芍一錢半炒龍齒三錢炒棗仁二錢左牡蠣七錢五味子四分研加麥冬一錢硃砂填扎紫石英五錢搗碎水三盞先煎煎至一半同前藥再煎余定方案後又延曹樂山兄診其案云讀竹亭先生方案俱皆中的弟亦不能出其範圍而喜功生事也於余方中去牡蠣五味子而加石決明黃耆一錢珠粉四分樂山於余方中所加黃耆珠粉亦未始不可用也至於去余方中之五味子牡蠣而又加石決明恐未當也且五味牡蠣之用亦取佐固納之法何可少也識者鑑之晚診晨進前方二目呆鈍之勢漸自靈活視岐之狀近視他人則一遠觀之仍是兩形足徵陽氣虛而心神不斂也今進固納法略有轉機大便數日未解欲解未能亦産後去血過多氣虛不能送血燥不能潤金匱論産後三病前案已言今一人而兼之可為重極矣仍於晨診方中加一二潤燥之品扶過明晨再商復診五月二十四日昨進固納潤燥兩方視岐不覺惟天明虛熱朝暮未克淨盡精神疲倦喉舌乾燥卻不多飲舌絳無苔究宜氣陰兩固冀其熱退腸潤為最人參七分沖制首烏三錢炒生地三錢丹皮一錢半炒茯神二錢五味子四分研地骨皮一錢半麥冬一錢去心歸身一錢炒白芍藥一錢半炒遠志炭六分南棗兩枚去核此方氣營兩固理應佐薑棗以退虛熱因素不喜薑執性不用方中惟用南棗耳服後精神稍健耳聾漸減舌絳稍淡忽熱忽退喉干引飲小溲二三次出時覺熱轉失氣時有食飲漸貪脈仍虛大無力用六味地黃湯加人參麥冬遠志南棗煎好去渣以蔗漿五錢沖服服三四劑虛熱漸退喉干亦減溲出熱緩復診六月初七日自服前方停藥數日又少有寒熱之象大便燥結仍未一解兼之耳鳴喉疼方用八珍湯加元參三錢酒浸龍膽草五分服此未寒熱喉疼減大便結祕六月十三日用熟地歸身黨參山藥茯苓炙甘草柏子仁松子仁麥冬南棗金石斛等服之便結已通喉疼右耳鳴俱平復診六月十八日大便解後停藥未幾脘中熱氣忽沖忽下醒後口糜左耳鳴減半産後未幾經水已至六日未止總緣産後氣血未復議調中益氣加之養水滋木經水自停人參五分沖炙黃耆一錢大熟地三錢山藥三錢炒柏子仁三錢去油側柏葉三錢炙伏龍肝三錢炙草七分血餘四分沖人中白一錢漂淡天冬一錢半去心麥冬一錢半加炒黑荷葉一錢五分服後天癸即止平素大便祕結五六日一解此脾約症口糜及脘中之熱往來上下俱從此漸平至六月二十四日用二地二冬佐杜仲續斷牛膝歸身柏子仁等煎好去渣用黨參膏四錢衝入藥內燉溫服服四五帖大便解時甚易諸證鹹平食飲如常繼以膏滋方調理收功膏滋方九月初一日定産後氣血將復食飲漸增天癸已行而肌體未豐八脈未充色脈合參當以益氣培陽使氣血融和精神自旺且素有之脾約症亦從斯而漸潤矣大熟地十兩制首烏六兩歸身一兩半柏子仁五兩去油清阿膠五兩後入炙黃耆五兩茯苓三兩於白朮三兩土炒西黨參六兩白芍藥一兩半炒杜仲三兩炒山萸肉四兩炙甘草一兩半新會皮一兩半上藥用長流水如法煎膏煎濃去渣約煎至七八分將前之阿膠打碎投入煎至滴水不散膏成置磁罐內用新汲水放大盆內將膏罐浸一日夜退火氣三日每晨用膏五錢燉熱服滾水過口或橘餅絲湯亦可案木川吳氏女胎懷五月腰痠下墜急固之驗木川吳氏女年逾二旬道光三年九月初四日胎懷五月坤土主令日來胎墜見紅腰胯痠軟土虛難固蓋胎氣繫於脾脾土不足此胎之所以下墜也亟宜扶土益氣以安胎猶嫌其遲炙黃耆一錢半西黨參三錢歸身一錢半焦冬朮一錢半淡黃芩一錢半炒建蓮肉三錢去心炙草七分台州青苧三錢洗杜仲三錢鹽水炒上藥九味河水煎服服四劑血止胎固腰痠下墜之勢頓平案吳嫗素喜燒酒左鼻瘜肉有年治法吳嫗年四旬道光癸未二月初二診素喜燒酒左鼻瘜肉有年邇來疼痛無時牽連左目頭角痛極防其失明脈浮數有力病起數載治之匪易方用酒炒枯芩酒炒知母薄荷甘草桑白皮陳皮池菊辛夷加荷葉邊一小個河水一盞半煎至一半服服後左鼻痛有停時非前之痛極難忍可比也初八日換方原方去陳皮荷葉邊加小生地元參白芷酒焙龍膽草八分同煎服四帖鼻痔痛減其半且有時不痛即痛亦大緩矣後仍於前方出入而痛平矣至於鼻瘜外用硇砂少些同明礬同研日點瘜肉上待其滴盡清黃水冀其漸消為妥然亦須戒酒或可圖之案山西門人曹生乃母冒風咳嗽痰稠治驗山西曹伯侯乃室門生曹生之母嘉慶丁丑歲五月初十年近四旬風邪客肺氣閉火鬱咳嗽痰黏脈象浮數宜於疏解方用前胡防風蘇子桔梗杏仁陳皮甘草桑葉瓜蔞仁蔥白同煎服後咳減痰薄舌苔尚膩脈仍弦數夜間口乾內熱經水素準今過期旬日未至先理客邪再為之計復診五月十二日鮮石斛四錢廣藿梗一錢半桔梗八分杏仁二錢瓜蔞仁三錢研地骨皮一錢半蘇子一錢半炒研甘草五分生穀芽四錢橘紅八分麥冬一錢半去心服前方內熱口乾俱平經水亦通惟咳嗽未盡幸痰易出而薄非前之濃厚可比天癸將至更宜節食避風免其變幻十四日原方去石斛藿梗地骨皮加前胡桑葉枇杷葉服三帖咳嗽十去其八痰亦甚少天癸已止知飢貪食脈息虛浮夜間有汗表氣不固肺胃並調復診五月十七日北沙參二錢款冬花三錢茯苓二錢黑蘇子一錢半炒冬桑葉一錢半生甘草五分陳皮六分淮小麥三錢瓜蔞仁三錢研加紅棗三枚生穀芽四錢服前方諸證咸安食飲如常案豫內人陸氏氣血雙補衝任並調丸方豫內人陸氏丸方嘉慶二十三年戊寅歲二月二十八日診氣血雙補衝任並調生香附四兩分四處用米泔鹽水滴醋童便四制大生地六兩用陳酒一斤煮透飯上蒸曬九次當歸身二兩牡丹皮一兩半炒川芎一兩半地骨皮一兩半西黨參三兩焦冬朮二兩白芍一兩半炒炙甘草一兩宣木瓜一兩半雲茯苓一兩半杜仲三兩炒上為細末煉白蜜為丸如桐子大每服五錢清晨滾水送下案王氏女三歲痘出七朝不治症王氏女三歲出痘於三月二十四日痘已七朝繁密如麩窠粒不分色滯乾紅壯熱不退齒乾唇燥舟小載重毒不化漿成功難望八九之險何待言矣勉擬一方以盡人工方用羚羊角生地川連地丁赤芍牛蒡桔梗青皮木通角針人中黃丹皮蘆根乾地龍等服之至九朝而逝矣案鄭文山女險痘變順幾為庸工所誤之驗鄭文山女五歲出痘於戊寅四月發熱三日見點頭面稀疏胸少背多色紅攢簇兩朝時延李兒科治用犀羚石膏蘆根紫雪大黃佐荊葛蟬衣等服之大便已行而食飲不貪至三朝去解表藥索性用鮮生地二兩石膏二兩犀羚仍各用三錢等再加昨之紫雪蘆根輩煎服痘不起發食飲甚少煩躁不寧因求治於余余燃火一照痘點乾紅色滯點粒細小窠粒不分唇舌乾燥自早至午後惟飲粥不及一盞且勉強而進知其毒伏火鬱不能透松者重用寒涼遏抑為害耳倘其始用解表松毒之劑何至此極就此四朝論治必須疏表透毒佐以清解血分正是活血透毒起脹時之工夫也方用小生地羚羊角桔梗紫草茸木通連翹天蟲山甲青皮楂肉地丁人中黃筍尖等煎好去渣投豬尾膏沖服誠松毒起發之良藥也次日五朝復視據述服此夜間煩躁大減稍可睡著且漸貪食豫至細審察色頭面胸背痘點漸有分窠之形且有放白行漿之勢於是仍用昨方去豬尾膏加鯽魚一大尾洗淨腸肚其餘略為增減煎服至次日六朝頭面漿行半足食貪睡安唇舌滋潤治宜涼血清火以助漿充而達肢體至七朝腿足漿行尚未充足當托裡清火加之解毒至八九朝兩顴漸有回意眼封亦漸有開象再以氣榮兩補兼以清火解毒以杜痘後餘波三日後漿回痂靨發物宜禁清補兼治而收全功設仍遭時醫之手其不誤事者鮮矣案豫內人左牙上齦痛甚難忍治驗豫內人陸氏嘉慶甲戌十一月二十四日左牙上齦時疼時止疑為蟲痛用漱齒藥含漱二次其痛頓止今停五日又痛仍以前藥漱之不應且痛甚難忍因用後方一帖漸緩再帖霍然矣大生地五錢歸頭一錢半獨活一錢半薄荷頭八分香白芷七分上五味河水煎服案程氏女長夏經行感寒小腹脹痛難忍治驗程氏女年三旬乙亥六月正值經行下焦受涼經阻氣滯血凝小腹痛脹難忍法宜舒通制香附三錢歸尾一錢半桃仁泥三錢炮薑五分元胡索一錢半炒烏藥一錢半製半夏一錢半甘草六分小青皮一錢白蔻仁二分研沖蔥須一錢半服一劑至燈前經行血塊隨下小腹不痛不脹而豁然矣案石氏女六月咳嗽上氣微熱溲短之驗石氏女乙亥六月咳嗽上氣身微熱小溲赤短舒肺氣利小便則上下通暢矣用老枇杷葉前胡杏仁蘇子藿梗赤苓甘草橘紅蛤殼冬桑葉等煎好去渣加白蘿蔔汁半酒杯沖服後微汗遍身咳嗆氣逆頓除熱退溲便皆通矣案妹倩王履安令堂太夫人患肥氣有年左脅塊攻寒熱交作發則叫呼如狂形如捉物藥頗合宜拔去沉疴奇驗妹倩王履安令堂太夫人年六十三歲體瘦食健素性暴躁易動肝火數年來左脅有塊每發必先寒熱交作間五六日一發其塊仍伏而不動必待寒熱發勤其塊始動動則寒熱不發塊移於中心下跳動無寧刻甚至手指抓桌形如捉物叫呼如狂待其少緩而問之則曰心中難過如火勢上奔之狀發於春延至長夏而漸減交秋而漸愈素性不喜服藥即或病重雖服藥亦不過一二劑耳咸緣病者性躁不思沉疴積歲豈一二煎帖所能愈病者故纏綿至今而未能已也於嘉慶丁丑正月十七日履安再三延診乞方余按其脈右關虛大無力左關沉弦而徑塊伏於左脅即內經所謂肝積曰肥氣者是也塊欲發動必先有寒熱者正少陽甲膽木氣之報使也肝與膽為表裡寒熱停而左塊攻上橫衝直撞怪形異聲不由自主亦人所罕見者今正值寒熱之時間五六日一發已發二三次矣發時食後胸中必脹悶不爽證脈合參先宜養肝舒肝調中待其塊緩再為扶土保肺間以養水滋木之法佐之常使土氣潤澤木氣暢茂仿灌園之法合內經亢則害承乃制之治自無遺憾矣第豫有愈疾之手而究不知病者能從乎否耶炙鱉甲三錢女貞子四錢青蒿子一錢半青皮八分半夏曲一錢半廣藿梗一錢半淡茱萸三分甘草八分制香附二錢加舊鐵器兩許煅紅醋淬三次同煎張戴人曰左脅下如覆杯久不愈令人發痎瘧此肥氣也王肯堂云肥氣病初如酒杯大發寒熱不早治延至十有餘年惟心下三指許無病滿腹如石片不能坐臥進前藥兩劑左脅塊毫不覺動人亦安妥至十九夜間忽又寒熱四肢冷極其寒熱比未服藥前之寒熱卻大減且脅塊亦無動意正月二十日復診前方去香附加桂枝一錢柴胡五分再兩劑寒熱未至塊亦未動復診正月二十二日制首烏三錢炙鱉甲三錢女貞子四錢青皮八分枸杞子二錢白芍藥一錢半炒焦穀芽三錢藿梗一錢半生甘草八分左牡蠣三錢煅柴胡五分桂枝一錢加舊鐵兩許仍如前煅紅醋淬三次同煎服前方兩帖寒熱仍未至左塊雖動移卻不攻衝胸中亦無難過之狀夜半口舌稍干復診二十五日方制首烏三錢炙鱉甲三錢女貞子三錢歸身一錢半山萸肉一錢白芍藥一錢半炒川石斛三錢茯苓一錢半小青皮八分炙甘草八分加陳海虴三錢洗淨同煎服前方安妥如上口舌之干亦減頗為合宜復診正月二十九日方再以肝脾並治法制首烏三錢枸杞子三錢焦冬朮一錢半茯苓二錢益智仁一錢半女貞子三錢當歸身一錢半麥冬一錢半白芍藥一錢半炒炙甘草八分雞內金一錢半炙陳皮一錢服藥後左脅塊安妥且食後並不胸悶作脹於二月初三日用六君子加益智仁柏子仁歸芍女貞子制首烏荷蒂等煎服八帖至十一日復診諸恙俱平當以五味異功加黃耆歸芍女貞黃精益智仁南棗輩益氣養榮自爾痊可服數劑後再繼以丸藥調理收功丸方列下炙黃耆一兩半西黨參二兩焦冬朮一兩半扁豆四兩炒大熟地四兩搗入炙鱉甲一兩半女貞子二兩茯苓一兩半當歸身一兩半白芍藥一兩半炒菟絲子一兩半炒川芎一兩炙甘草一兩新會皮一兩半砂仁一兩上為細末煉白蜜和丸如桐子大每服五錢清晨滾水送下是丸服畢脅塊久消胸中毫無火勢上奔之狀食健神爽寤寐咸安設非藥餌對症何能若斯效速嗣後每逢交春並未見發數年之疾從此而愈益見豫前論中之預斷非謬而非狂矣道光癸巳竹亭自識時年六十有九案吳梅村女兩歲微熱咳嗽腹膨醫人誤投寒涼以致病增反囑其斷乳病劇更醫幾乎無嗣後永禁不許庸醫妄言斷乳當審證論治於四診中求之無不愈疾者豫之治梅村之愛可鑑也吳梅村女兩歲嘉慶二十年乙亥歲冬十月治案並永禁兒科不許斷乳以喪兒命務宜遵之稚年陰氣未充夜間偶爾發熱咳嗽腹膨多食易飢幼科專治內熱寒涼屢投咳嗆愈增反囑其斷乳甚至面黃肌瘦熱勢尤甚更醫醫指為疳積勞熱用清熱消積之藥治之熱不除而咳不減禍皆起於斷乳者不思小兒全藉乳以養之則氣血充而肌體和早斷其乳使其夜不能安惟以食飲以助飢糕餅以可口而脾胃日損氣機不運以致熱增積盛病劇托治於醫兒科不審起病情由惟見病治病無非熱則清之積則消之蟲則殺之不明虛實鮮有不誤事者余細繹病情望色聞聲仍須照常哺乳加以扶脾保肺益陰退熱止嗽為緊要關頭如法調治庶幾無遺憾矣當以鱉甲青蒿山藥芡實白花百合蘇子甘草款冬花枇杷葉茯苓等連進五六劑內熱頓退咳嗽大減且從此哺乳神識漸健食飲節制非前之多啖易飢可較也復診原方去鱉甲青蒿加苡仁扁豆雞內金再三四劑大腹之膨軟矣咳嗽亦漸徹矣繼以參苓白朮散調理半月而全安案詹文煥乃堂素多思慮勞神心脾兩傷吐血之後頭汗無時漸自耳聾昏倦服藥無功再以扶陽固氣一法頭汗頃止詹文煥乃堂年四十九歲嘉慶丙子五月十二診經水已斷四載於前月二十五日忽吐血三日而止共約有一大盞數年來好飲火酒孀居十有餘年掌管家務不無勞心傷脾此吐血之所由來耶雖止而頭汗無時漸自耳聾昏倦自早至暮可飲粥四中碗至申酉時仍然頭汗如淋當以撲法亦不應惟睡著汗即止脈息虛大無力其為陽虛氣弱可知然吐血過多陰亦傷矣血止之後身中似熱非熱亦陰虛內熱之象也漸自耳聾無間雖腎竅開於耳而心亦寄竅於耳也心主血血去多而耳聾者亦有之素問云精脫者耳聾仲景云耳聾無聞者陽氣虛也更兼朝夕不離火酒中氣彌傷肺金久耗血止而繼以頭汗無時豈不慮其虛脫耶姑擬益氣養榮佐以達之斂之俾榮衛和而陰陽交臥安汗停庶免一脫方用五味異功合四物湯去川芎以茯神易茯苓加遠志炒棗仁五味子巴旦杏左牡蠣等十三味煎服服後稍可多臥片刻而汗究弗克一減次日往診余門人程子病者之壻也豫至適程生先至與豫曰進昨方漸可多睡是佳兆也豫蹙頞頻思頭為諸陽之首汗出不減神倦語低脈形豁大而空究屬陽虛氣衰有立見傾危之險豈佳兆也程生唯唯亟與議四逆湯加人參一錢煎服一劑頭汗頓止繼以氣榮並補之法調理收功案文學程子和乃室症由肝鬱厥逆轉為寒熱無期虛怯已成所苦者又受外蝨之纍約有千萬之多癢無寧刻明知前症無救而現在之蝨豈無法治絶其蝨庶免時刻之苦治之果然立絶稱奇文學程平莊乃媳年二十六歲道光丁亥歲三月十九日病由肝鬱厥逆轉為寒熱無期或日發兩次或間二日而連發兩日種種見端未便遽以為瘧況脈形細小而徑舌苔光剝唇齒乾燥食飲維艱細繹病情陽弱陰虧榮衛兩虛此寒熱之所以無定期也迄今兩月虛損之徵已露先機矣亟亟護陽益陰雖有良方惜乎鞭長莫及擬方於下斧弄班門既蒙垂青聊為塞白方用人參於朮龜板鱉甲鹿角霜青蒿地骨皮麥冬金石斛生穀芽加薑棗煎前論之證決難挽回更兼病者又受外蝨之苦據述約有千萬之夥皮膚癢無寧刻以手握之盈碗自述胸前痛癢異常被褥衣衫處處皆有迄今數日無人能識而亦無人能療者平莊知醫者而亦不知證之名也仍商治於余余應之曰此血潰證也治之無難第內證不救何思所以亟治其蝨以治痛癢為最用百部數兩河水數碗煎汁三次去渣三汁並和再煎煎至汁濃離火另用蘆薈兩許烘脆研極細同炒出汗川椒五錢研細和勻漸漸調入百部汁內調和極勻即以此汁灑於新被褥衫褲內曬乾將衫褲著身將前被褥等一一取去床上掃清換新漿被褥而臥之自此依法而行蝨從此斃稱為仙丹第氣血大敗內證終無救焉不數月而逝矣是症由寒熱而起肝經鬱熱生風榮血腐潰兼多穢濁之氣鬱而生蝨盈千纍萬之多而生於肌腠間者此所謂血潰症也與夏子益所治之血潰症名同而症異也彼則因其人目中白珠渾黑而視物如常毛髮直堅如鐵條能食飲而不語如醉名曰血潰以五靈脂為末湯服二錢即愈子益又治蝨出怪病臨臥渾身蝨出約至五升痛癢不可名狀但飲鹽醋湯數日愈二者皆夏子益之奇疾方也與余所治程氏之蝨各不同也方自余創手到病除亦不為不奇也何必拘拘於古方哉要之今日之古方即昔日之新方也安見今日之新方非後日之古方乎均一理也竹亭老人自識案鄭氏女孀居痛痹症自頭至足皆痛治驗鄭氏女孀居年三十七歲道光丁亥五月二十九日素體肥胖經行落後風寒濕三氣合而成痹起於頸項波及肩臂肢肘下及兩股痛劇難忍業已九日他醫作痿證治妄用鹿角霜瑣陽歸芍沙參等溫補之劑三帖無怪乎痛勢更增寒熱交作脈象浮小而細法宜祛風滲濕通經活絡為最也秦艽二錢防風一錢半制香附二錢當歸一錢半片薑黃二錢嫩桑枝二兩切油松節三錢劈甘草八分杉木節五錢劈蘇木節五錢劈製半夏一錢半陳皮一錢半加去油乳香一錢箬包押煎服一帖痛去十之三非前之痛如錐刺可比且稍能睡漸可進粥閏五月初一日復診頭項風池穴覺重且痛此濕痰為患其餘俱緩即兩股間痛亦可耐原方去半夏防風杉節加羌活苡仁晚蠶砂威靈仙等煎服痛勢更減再劑而風池穴之重痛亦大減矣初三日復診痛痹十去其八惟右股骱仍覺小痛再議舒理氣血冀其漸平方用香附芎歸艽陳苓草桑枝木瓜青皮苡仁輩服之痛痹將愈至四五日後濕熱下注兩足腿重腫且脹而痛旁注此即濕腳氣也朝輕夕盛用白朮苡仁茯苓木通防己黃柏炙草蠶沙青皮升麻柴胡懷牛膝等十二味煎服四劑全愈案海鹽上舍張鐵珊乃室血崩汗多幾危治驗海鹽張鐵珊乃室道光丙戌十二月二十四日診經停兩月餘忽於是月十七經行三日至二十日驟然大崩以致神倦乏力食少汗多怕明喜暗服藥後經水仍頻出不止於是始告治於余余至適前醫周半池兄診定疏方用人參黃耆於朮熟地龜板鹿角霜牛角腮棗仁棕灰龍齒牡蠣阿膠續斷杜仲等觀其方意卻是固氣統血之法第熟地阿膠輩可從緩一嫌其膩又嫌其食飲未貪者恐不利於脾胃也余於方中去此二味加丹參三錢血餘炭五分沖五味子三分臨服衝入童便一酒杯佐此四味取其安神定志亦固納止崩之一助耳復診十二月二十五日進昨議方崩血漸減因欲貪食稍啖葷味便泄隨至脈象細軟滋膩之劑究宜緩投宜以益氣扶脾冀其坤土得令庶幾無妨用黨參山藥芡實茯苓益智仁煨木香炙草陳皮南棗等煎服三四劑漏下已停而便泄仍日四五次皆緣脾土之不足耳擬異功法加建蓮芡實砂仁歸芍陳皮南棗等治之服兩帖便溏日一次再二帖而止矣案洞庭東山金氏女素有肝胃氣發則腹痛且脹欲嘔兼之目疾頻發奇效洞庭東山金氏女年二十四歲道光丁亥五月二十日素有肝胃氣發時遍體不疏腹痛且脹甚至欲嘔又有目疾頻發發時白珠色紅昏花起星偶爾寒熱經水有時應期脈形左弦右緩種種見端由肝鬱而波及於胃也法當土中疏木俾土木合德諸恙向安矣制香附二錢小青皮七分醋炙廣木香六分當歸一錢半半夏曲一錢半淡茱萸三分宣木瓜八分茯苓一錢半加砂仁末三分沖服後脹痛俱平諸恙如失案黃聖濤室人素有肝氣當臍作痛發厥治驗黃聖濤乃室五十歲丁亥歲七月初二痛症復發素有肝氣當臍作痛痛甚則厥必得重手按臍方緩今發尤甚於前月二十五痛之不已服他醫通氣泄肝藥即止未兩日復痛又用黨參首烏石決明沉香等藥不應因求治於余腿膝覺冷得暖則臍中痛緩脈右沉細左小弦衝脈為病裡虛而痛者陰不足也溫養下元是其治法炒熟地四錢當歸一錢半肉桂四分去粗皮五靈脂一錢半炒小青皮一錢醋炙白芍一錢半紫石英五錢研加紫沉香三分磨汁沖燈前進藥至二更臍腹痛頓止次日再劑痛勢全無初四復診體瘦食少素常如是今痛既平養胃兼之溫潤下焦為妥且藥不宜猛當輕鬆調治更有益於肝脾耳建蓮肉五錢去心雲茯苓一錢半薏苡仁四錢炒陳皮一錢炒菟絲子一錢半炒淡蓯蓉三錢砂仁殼八分南棗兩個去核上藥八味河水煎服四五劑食增神健便溺通暢而痊案李建之內人下消症治驗李建之乃室年逾三旬嘉慶二十年乙亥冬十一月十六診下消症迄今數日他醫用萆薢分清飲法不應病得之肝經鬱結而波及於心腎致水火不交口渴溲數出如膏油經云二陽結謂之消飲一溲二此下消症也由於腎水不能上承心火難以下降火在水上正合未濟之卦也故渴飲溲數下如稠濃膏油脈形軟數尺脈虛濡證豈輕候先君子曰飲一而溲一者外飲之水下也至於飲一而溲二則高源素蘊之水下也雪梨汁一小杯沖甘蔗汁一小杯沖生蛤殼二兩麥冬一錢半沉香汁三分沖知母一錢半上用長流水一盞將蛤殼麥冬知母三味煎至半盞去渣以前三汁衝入藥湯內服之約服於午前臨臥前一時用桂附八味丸四錢建蓮湯送下服三劑下消之症漸自痊可繼以養胃調脾舒肝之法收功案鄒氏嫗年高泄瀉嘔吐腹痛治驗附注鄒氏嫗年八十三歲道光丙戌八月十二泄瀉五日由食麵肉而起胸悶不飢不食食則嘔吐並至腹痛即瀉脈軟滑而細雖在高年而宿食停阻當以運食舒中使痛瀉嘔止為最宜以生穀芽製半夏山楂肉麥芽藿香枳殼赤苓甘草木香等九味加煨生薑兩片煎服兩帖而嘔痛瀉頓愈凡治病必欲於四診中詳求之庶不誤人是證若因年高泄瀉防脫執虛妄補而致氣壅食阻甚至發厥而斃深堪痛恨而猶以為補之不及自信無差即主家亦以為然豈知明者觀之不死於病而死於醫人之手嗚呼其死其生斯誰辨之識者鑑之癸巳夏四月竹亭自識案鄭氏女肝氣作楚臍上塊攻作脹治驗鄭氏女年逾三旬道光元年五月十五肝氣作楚臍上素有之塊又覺脹而不舒法宜肝胃並治用二陳湯加香附青皮白扁豆大腹絨歸身佛手柑等服兩劑塊與痛脹俱全安矣案薑仰齋側室痰厥火升等症治驗薑仰齋側室道光八年八月二十二痰厥症發時面紅火升氣逆腹疼厄忒俱在晡後為甚經行四五日未止皆由於氣鬱而痰火凝結也法當舒肝豁痰順氣免其變幻議溫膽法薑半夏一錢半制香附二錢橘紅八分甘草四分黑山梔一錢半廣木香五分切赤苓二錢枳實八分瓜蔞仁三錢研刀豆子二錢炒加鮮竹瀝八錢生薑汁一小匙沖服後胸悶氣逆俱平以故火升面紅厄忒從此而盡徹矣二十四日用二陳湯加鮮石斛瓜蔞仁黑芝麻生穀芽輩和胃止嗽而愈案汪書蕉二兄令愛九歲出正痧治驗汪書蕉小姐九歲出痧於道光己丑歲正月二十四日身熱四五日熱漸緩頭額面部始見痧點咳嗽噴嚏鼻流清涕二目眼淚宜以舒表以冀透發務須避風為最荊芥穗一錢半蟬衣一錢半去足蘇子一錢半炒杏仁三錢牛蒡子一錢半炒研橘紅八分甘草六分桔梗八分前胡一錢半加西河柳六錢茅根三錢去心復診二十五日進昨方頭面兩顴痧點滿布手臂腿足稀少將齊舌苔白腐帶剝身熱漸緩邪未透徹尚不貪食大便結糞已解口乾欲飲不渴咳嗽頻頻仍宜疏表退熱嫌其眼雖有淚而鼻涕少葛根一錢半前胡一錢半荊芥一錢半元參一錢半楂肉三錢炒牛蒡子二錢炒桔梗八分甘草五分薄荷六分杏仁三錢枳殼一錢半加西河柳八錢同煎復診二十六日痧點漸透熱緩食漸進咳聲頻頻舌苔白膩而剝亦十退其七矣色轉淡紅清疏肺胃為最用前胡杏仁桔梗蘇子象貝桑皮地骨皮橘紅人中黃西河柳蘆根同煎服後熱退七八痧點漸收咳嗽漸稀舌苔之膩白退矣惟鼻無清涕幸不幹燥痧出四朝循序而收食飲能進復診二十七日桑白皮一錢半地骨皮一錢半元參一錢半麥冬一錢半去心人中黃五分黑蘇子一錢半炒桔梗八分前胡一錢赤茯苓一錢半白杏仁三錢加老枇杷葉三大片去毛復診二十八日痧發五日正值收回之際鼻涕復來足徵邪去肺清舌胎已退而轉淡紅本色頭顱兩腮尚有未退盡者咳聲未平喜其食貪睡安不足慮也方用桑葉麥冬赤苓杏仁蘇子桔梗甘草加老枇杷葉三大片去毛煎服二十九日用百合苡仁款冬貝母瓜蔞仁桑白皮赤苓甘草枇杷膏等服之鼻涕仍有痧毒盡出也再以清補肺胃之劑調理收功正痧之後須忌一切發味海鮮一百日庶無痧瘡以免終身之纍案張乙庭室人陰虛體質神倦肌瘦口乾食少甚至內熱如蒸汗出如洗用益氣養榮法果獲奇效張乙庭乃室道光九年三月二十七日診素體陰虧內熱汗多忽增忽減淹纏日久體倦肌瘦食少口乾百節疼而背脅如刺也夜夢紛紜心中搖蕩皆榮血虧而衛氣弱心為胃母腎為肺子心榮肺衛兩虧無怪乎內熱如蒸汗出如洗也深恐涸津而轉涉虛損之門前案已論再議東垣益氣養榮法合聖濟大建中湯加味治之附聖濟八味大建中方人參沖黃耆炙歸身白芍炙草龍骨遠志澤瀉八味河水煎服人參五分沖炙黃耆一錢半沙參三錢歸身一錢半白芍一錢半炒炙甘草六分龍骨五錢遠志一錢炒澤瀉一錢半地骨皮二錢丹皮一錢炒麥冬一錢半去心加生穀芽五錢同煎服是日余定方之後據述又延鍾愚泉至即於余方中批注云茲讀尊方案周匝盡善無庸更章矣欽服之至僭加一二聊為塞責仍候教政於余前方中去歸耆地骨皮三味加石斛紅棗十大功勞三錢據乙庭云愚泉至余方已煎服矣至次日熱與汗俱減半矣再三劑諸證咸安數日後天癸至三四日止日來食後腹稍膨足腫便溏兩脅疼議先補中藏之陽而少佐養肝舒肝之法俾土木合德為妥若徒事滋補恐不利於坤土耳依法治之果獲奇效案張春山內人脘腹痛極當臍塊攻立救之驗張春山乃室年逾二旬道光己丑四月十三診脘腹作痛痛劇臍中塊攻氣食交阻脈象沉滑沉者氣之滯也滑者食之阻也法宜溫中運食防痛甚發厥薑厚朴一錢淡乾薑五分炒淡茱萸三分穀芽三錢制香附一錢半小青皮一錢山楂肉三錢炒神麯三錢炒薤白頭三錢加荔枝核四錢切片炒木香六分切片服藥後少頃腹中響動痛止次日清晨解結糞甚暢臍中硬塊拊之不覺矣前所謂食積者此耳十四日原方去薤白青皮加元胡索瓜蔞仁再劑又解結糞如前十五日仍照方去元胡索瓜蔞加陳皮砂仁殼再劑又大便結糞一次甚暢從此膨脹食塊攻痛俱若失矣食飲漸貪再以和胃舒肝之劑而收全功矣案金德升女千腳氣症兼大小腹痛脹食少兩足能屈不能伸危症奇驗金德升女年逾二旬於道光六年兩足小腿疼痛而起已後舉發無時甚至痛劇難忍小腿細小肉削證名乾腳氣漸至大小腹痛而且脹以致食減今於九年己丑歲六月十九求治於余據云於四月生産迄今兩月而腳氣又發疼痛如錐大小腹仍然痛脹食少大便乾結如栗脈息細耎而澀知其血燥筋枯足能屈而不能伸水不滋木木強乘土此大小腹之所以痛且脹也議養水滋木以舒筋俾其痛脹平而筋自舒得谷乃昌服後方三劑而諸證全瘳矣制首烏五錢炙鱉甲四錢女貞子三錢歸身一錢半宣木瓜一錢半香附汁七分開水磨沖淡茱萸二分木香六分切片柏子仁三錢去油九香蟲一錢半焙加荔枝核四錢打碎炒黃案葑門姚惠時內人左脅塊痛兼之寒熱吐血咳嗽等證幾危奇效葑門姚氏女年三十四歲左脅肋塊痛自道光七年冬由寒熱而起纏綿日久塊漸大如杯硬而不高痛甚牽引腰背延至九年秋驟然吐血盈盂三日而止當時塊痛頓平後又復痛是月望前忽爾寒熱成瘧而痛塊又平待瘧止而塊又至且痛無寧刻食少體瘦自血吐之後天癸未至約近兩月診其脈右軟小無力左關浮之弦細按之小數知其胸中鬱郁不舒肝火易動甚至直衝而血溢上逆病起兩載痛塊日增臥床食減大便燥結防涉虛門亟治之或可從凶化吉若假庸工之手尤難之難矣議以扶脾養肝潤燥兼之舒運俾痛塊日減腸潤經行斯可矣焦冬朮一錢半制首烏四錢女貞子四錢木瓜一錢半乳香同炒元胡索一錢制香附二錢淡茱萸三分青皮一錢黑山梔一錢半炙甘草六分歸身一錢半白芍一錢半是方煎服六帖塊痛十去其四牽引腰背之疼已平大便之乾結難解自服豫方後可以日解松爽食亦漸增頗為合宜復診九月初一日向日痛甚即咳嗆是病之根皆由於塊痛為患必先治之西黨參三錢淮山藥三錢炒制首烏五錢鱉甲四錢炙女貞子五錢柏子仁三錢研巴旦杏三錢去皮尖茯苓一錢半廣木香六分切片歸身一錢半白芍藥一錢半炒木瓜一錢半乳香同炒炙甘草六分加生薑兩片黑大棗兩枚去核煎服六劑塊移於中痛減其半食飲又增每次可進飯兩盞余安妥如前初八日復診用五味異功加歸芍女貞九香蟲木香巴旦杏柏子仁加白花百合二兩煎湯代水服六七劑塊痛更減惟夜間咳嗆時則塊痛漸增大便通暢經水將行復診十五日方西黨參三錢北沙參三錢陳阿膠三錢炙草六分巴旦杏三錢去皮尖制首烏三錢女貞子四錢苡仁四錢炒柏子仁三錢研川貝母一錢半去心廣木香六分是方服十二帖塊小痛止咳嗽亦平仍用此方略為加減再服十劑而收全功案張氏女肝胃氣痛痛甚塊攻嘔酸便溏治驗張氏女道光己丑九月二十六日診肝氣作楚波及於胃痛甚塊攻嘔酸便溏業已七日痛劇防厥擬舒肝溫中法淡茱萸三分小青皮八分香附汁八分磨沖烏藥一錢半薑厚朴一錢薑半夏一錢半元胡索一錢炒木香六分切片加陽春砂仁末二分沖服此一劑痛即大減再劑痛止塊平案張乙庭乃室中脘脹痛小腹膨急發厥治驗張乙庭乃室己丑歲十月初六日中脘脹痛波及小腹膨急痛無寧刻現在見厥深慮汗多食不喜進脈息沉細遲緩病勢頗險勿得忽視制香附二錢歸身一錢半肉桂五分去粗皮炮薑四分炙甘草六分陳皮一錢九香蟲一錢半加生穀芽一兩烏梅肉五分炒煎好午前服少頃痛勢漸緩至酉初鍾愚泉見其痛緩伊用旋覆花薑半夏白芍肉桂三分水炙甘草小麥紅棗等煎送烏梅丸三錢夜間煎服到口即嘔再進再嘔而停藥至初七日仍延余診右脈軟小無神左脈弦細肝胃並虧面色㿠白神疲難支二目半合額有黏汗自昨至今午食毫不進素虧之軀加以痛劇見厥之後深恐驟脫議四君子加味亟固胃氣兼之定嘔納穀為最人參五分沖於白朮一錢半土炒茯苓一錢半炙草五分白芍一錢半肉桂三分同炒歸身一錢半淡茱萸三分青皮六分醋炙加生穀芽五錢烏梅肉五分炒是方煎服始能進粥盞許嘔止痛脹俱松初八即以原方去茯苓茱萸加茯神遠志女貞子三味服之漸可進粥三四盞諸恙鹹平初十日用五味異功加歸芍女貞子棗仁遠志南棗等煎服三劑而愈案袁藹堂內人寒熱脘腹膨脹小腿浮腫治驗袁藹堂乃室年二十四歲道光己丑十月初八診病由前月黃昏微寒漸熱熱至天明微汗而退熱時頗甚舌苔早黑少頃淡紅耳鳴骨節疼食無味迄今草日寒熱未解脘腹膨脹醫以疏表清涼之劑皆未去病因延余治脈象兩關弦大按之不足邪熱內伏當以和解退熱俾胃土得令納穀為最恐犯虛熱之門議小柴胡湯去半夏加花粉扁豆苡仁二苓澤瀉秦艽歸身地骨皮等加薑棗煎服三帖寒熱頓減三之二惟脘腹膨脹腿足浮腫未退耳復診燈前微寒即熱熱至天明微汗而退漸能進食午前進飯碗許夜間飲粥有味大便仍結小溲如常而胸腹之脹小腿之浮腫皮色光亮究關脾陽之不運而濕阻於中也今寒熱已退大半再溫理中焦為亟亟也否則防轉中滿穹窿術一錢炒白扁豆三錢炒苡仁五錢炒茯苓三錢薑厚朴一錢草蔻仁一錢炒乾薑八分炒歸身一錢半炙甘草六分陳皮一錢半加生薑兩片黑大棗兩枚去核服此方兩劑寒熱退清脘腹膨亦緩再三帖而腫脹俱平矣案徐氏女咳嗆氣逆喉癢嘔痰治驗徐氏女年逾四旬道光己丑十二月十六咳嗆氣逆嘔痰盈盂喉癢無寧虛火上炎當理肺胃使氣順而火降自無遺蘊矣旋覆花三錢絹包款冬花二錢川貝母一錢半去心苡仁五錢炒生蛤殼五錢黑蘇子一錢半炒巴旦杏三錢去皮尖茯苓一錢半加雪梨汁六錢生薑汁兩小匙沖服兩帖而痊據述後遇此病發服之即安案朱小佇女暑濕熱阻得於行經之後以故寒熱無期朝輕夕重等症極驗朱小佇令愛年十八歲庚寅六月十三日診暑濕熱三氣交阻得於行經之後血室空虛邪乘虛入以故寒熱無期而朝輕暮重也迄今十八日之久更兼吟詠囈語口乾喜飲陰氣虧於下而邪終不能解也脈形弦細按之不足非無以也證頗棘手姑擬益陰退邪以冀轉機生鱉甲五錢青蒿子二錢鮮石斛四錢麥冬一錢半地骨皮三錢栝蔞根一錢半廣皮白八分甘草七分加西瓜汁一酒杯沖服方一劑寒止熱如前十四日原方加黃芩一錢半再服一劑當解結糞成條外有瘀血裹糞而下口吐黏痰盈盂此行經後寒熱交作之時他醫早投生地羚羊角川黃連等涼藥遏住經血得余養陰退熱之劑腸胃滑利使數日未解之結糞與經血裹之而下也其黏痰之多者亦因寒涼遏之而成也是好消息惟熱未淨盡耳耳聾如前十五日仍以前法出入加之和胃生津熱退食貪夜能多寐耳聰神健而安矣案張養齋室人脘腹脹痛嘔酸等症治驗張養齋乃室年逾三旬道光九年十月二十四日脘腹脹痛嘔吐酸水得湯愈增經水過期旬日雖平日趲前而此時之滿腹不舒卻無關於經水也究屬肝氣鬱而波及胃土也旋覆花二錢絹包薑厚朴八分淡乾薑七分炒木香六分製半夏一錢半沉香汁三分磨沖山楂肉三錢茯苓一錢半橘皮一錢加左金丸六分藥湯送下烏梅肉四分服此方嘔止痛緩而腹塊未平食亦未貪二十五日原方去旋覆花左金丸加黑山梔淡茱萸生穀芽等煎服如前安妥惟臍上左右塊攻即有疼意此食塊無足慮今方能進粥半盞不嘔不痛平素腸燥便結約二三日一解今已四五日未解矣二十六日用制香附乾薑半夏曲陳皮枳殼汁沖服藿梗木香淡茱萸黑山梔生穀芽雞內金等服之甚妥再議養胃和榮舒肝之劑三帖大便通暢塊散食貪而愈案又側室脘腹作楚欲嘔發厥牙緊等治驗又養齋側室二十二歲己丑十月脘腹作楚欲嘔發厥手顫二日上竄牙關緊閉面色嬌紅鼻衄色紫左脈弦滑且數肝鬱火升此厥衄之所由來耶羚羊角一錢鎊小川連四分薑半夏一錢半橘皮一錢天竹黃一錢半鉤藤鉤四錢小生地三錢青皮八分加雪梨汁六錢入薑汁二匙沖萊蔔子三錢炒服藥後厥發二次至天明而平脘腹痛緩三分鼻洪止復診羚羊角一錢鎊川黃連三分薑半夏一錢半青皮八分瓜蔞仁三錢黑山梔一錢半九香蟲一錢焙木香五分鮮石斛四錢加竹瀝六錢薑汁兩小匙沖服此厥止面紅退腹痛大減惟體倦食少大便祕結未通復診原方去羚羊角山梔竹瀝薑汁輩加柏子仁麥芽等一劑大便結糞甚少再以生首烏一兩歸身薤白郁李仁砂仁殼麻仁大麥仁青皮木香甘草等服之當解結糞甚暢痛止食貪再以和肝養胃而痊案海鹽張鐵珊乃室唇腫痛寒熱發疔治驗海鹽張鐵珊乃室道光元年辛巳歲十月十九日內唇腫硬畏寒波及鼻傍漫腫疼痛難忍得熱布尉之稍緩見風則愈劇脈象沉緊榮氣閉固鬱結不散而成內唇疔外宜疏解風寒內以散腫拔疔為亟亟也先用針刺唇口鼻下泄其氣並未見血外用蔥汁調家制霞城散敷腫上如藥干再以新綿蘸汁潤之則腫易消內服蘇葉防風蔓荊子桔梗柴胡連翹陳皮甘草加干浮萍草蔥白頭同煎服二十日診服昨藥並敷後今出膿水甚多唇內之疔根始見此處膏藥難貼必須勤換為妥腫自唇至顴及眼泡俱帶漫腫非輕候也最怕走黃慎勿渺視上唇裡面中間近牙根處一粒大如黃豆色紅用針刺之稍見血用家制滴滴金摻上膏蓋不拘時換貼內服蘇葉桂枝銀花白芷陳皮象貝連翹甘桔元參乳香等煎服後寒熱即退夜間少有煩悶七八日便祕始解當日睡安食進二十一日診內唇疔根漸軟小自昨出膿血後今已大減寒熱罷眼鼻外內唇之腫俱已漸退外用拔毒膏貼之次日疔根提出摻上青雲散即能生肌收口仍用膏藥護之再以養胃清火之劑以退餘毒而收功矣案葉氏女經行腹痛嘔吐酸水作瀉治驗附注赤帶葉氏女年二十四歲道光二年閏三月十八診每遇臨經前後小腹必痛而兼嘔酸水甚則增瀉據述病起四五載脈右軟小左弦細肝木犯胃土甚則大便作瀉者以胃與大腸同屬陽明也自云幼年最喜生冷邇年暑熱水果不能戒益見陽明胃土之久虛及早禁之服藥勿懈庶乎漸安現在經轉治宜舒肝和胃制香附三錢廣木香六分切片青皮八分鹽水炒歸身一錢淡茱萸二分元胡索一錢半炒烏藥一錢半鹽水炒白芍一錢半炒加炒出汗川椒十二粒揀去閉口者前方服兩帖痛止嘔平經水停而瀉亦已矣據述昨經血中有一條如筆管式長約寸余中空色帶粉紅此即赤帶之類也全賴平時早治必待經行病至而後藥之恐無濟事矣案豫內子陸氏冒風頭痛且重骨節痛治驗內人陸氏道光六年丙戌三月二十一日診素多勞役連日頭疼骨節痛昨早忽然頭痛且重舉頭不直骨節間疼如針刺身微熱口苦舌乾淡白苔內熱不喜冷飲脈浮小乏力陰虛體質血不榮筋加以外風相搏故遍體疼如針刺申刻進後方一劑漸自微汗二三次少頃覺飢當飲薄粥盞許頃之周身小汗至戌初頭痛骨疼頓緩次日早晨病若失矣方附下當歸一錢半川芎一錢蔓荊子一錢半前胡一錢秦艽一錢半麥芽三錢炒山楂炭三錢陳皮一錢甘草六分上藥九味河水煎服案詹氏女風暑相搏頭脹腹悶疼痛難忍治驗詹氏女二十三歲道光辛巳歲六月二十四風暑搏而頭脹小腹悶而疼痛難忍帶濁綿綿病經六日脈象浮小當以疏解和肝未可忽視老蘇梗一錢半赤茯苓一錢半木香五分藿梗一錢半小青皮八分淡茱萸三分枳殼一錢半甘草五分臺烏藥一錢半萊蔔子一錢半炒服前方一劑熱退脹痛俱平霍然而愈案吳師瞻內人脾濕下注痰多腹膨背脹腰胯漫腫陰戶濕癢白帶頻下經停三月極驗吳師瞻乃室道光二年十一月二十九日脾虛挾濕稠痰盈盂肝氣不舒腹膨背脹腰胯漫腫波及大腿惟小腿與足跗未腫白帶頻下陰戶濕癢食能進多則脹經停三月之久脈形細耎左虛弦尺無滑疾之象非胎也誠恐脾土不運而致有中滿之虞西黨參三錢焦冬朮一錢半歸身一錢半懷牛膝一錢半益智仁一錢生薑皮一錢茯苓二錢廣木香五分新會皮一錢半炙甘草八分加佛手柑六分服此十五帖腹膨背脹俱減大腿之浮腫並腰胯間亦漸寬鬆十五日復診再以五味異功加扁豆木香益智仁歸身雞內金等煎好去渣用砂仁末三分沖服此數劑前恙已平陰戶之濕癢白帶之頻下亦皆若失矣案陸春帆乃室頭頸痰毒自潰溫養氣血自痊陸春帆乃室年逾二旬道光二年十二月二十六日右頸痰毒經年自潰痰出稠黏色如蛋清日來潰處堅硬腫痛風寒內侵氣血兩虛當以養榮湯法使氣血充而易於完口外宜化痰膏貼之以助生肌為最耳炙黃耆二錢西黨參四錢焦冬朮一錢半炙草八分大熟地三錢歸身一錢半上肉桂八分去粗皮川芎一錢左牡蠣五錢煅塊白芍一錢半炒廣陳皮一錢半茯苓一錢半加生薑五分黑大棗兩枚去核案黃埭朱嫗夏間勞役食後作脹腹疼兼塊治驗黃埭車靈橋朱氏女年二旬道光壬午歲八月初七診向有三瘧年餘方止脾土大虧夏間勞碌過度邇來食入即脹脹時腹疼左腹有塊積成瘧母脈右虛小無力失於將息防成單腹脹焦冬朮二錢薏苡仁四錢炒木香六分茯苓三錢淡茱萸三分炙甘草六分陳皮一錢半乾薑六分草蔻仁八分炒焦穀芽三錢雞內金一錢半炙服此三帖食入脹停痛止經水已轉且身面俱發出小粒如㾦遍體松爽此夏日所受暑濕之氣發出以免秋後之餘波得餘溫中卻濕之方服之前症盡除買舟就診換方即於原方略為加減以應之案橫山江氏老嫗前陰白帶直溜後陰紅痢頻下亟固脾胃果獲奇效橫山江氏嫗年七十三道光丁亥六月望前得紅痢症延綿至八月初旬腹痛雖止而晝夜尚有粉紅凍七八次小腹膨悶不爽帶下直溜腰疼食減脈息虛軟脾胃兩虧亟理坤土痢止為最方用冬朮山藥扁豆茯苓煨木香益智仁炙甘草地榆椿根白皮等煎服三帖晝夜痢減二次其餘如前復診滑瀉如凍帶下直溜得食精神漸健高年脈弱治以益氣調中兼之厚腸固脫亟平為妥帶下直溜者高年脾虛不能統攝之故自若作濕熱治則禍不旋踵矣西黨參三錢焦冬朮二錢山藥三錢炒白扁豆三錢炒煨木香八分益智仁一錢半茯苓一錢半炙甘草七分升麻