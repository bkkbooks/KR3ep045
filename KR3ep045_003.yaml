神健而寒熱頓退矣案陸氏女風暑外侵身熱頭痛無汗欲嘔治驗陸氏女年逾四旬嘉慶壬申歲六月十一診風暑外侵身熱頭痛無汗欲嘔太陽陽明為病宜於解肌退熱方用葛根防風豆豉半夏秦艽藿香香薷赤苓麥芽滑石等服後微汗熱緩胸悶欲嘔俱稍減十二日原方再劑身熱頭痛等大減十三日用蔓荊子蘇梗藿梗陳皮通草花粉滑石鮮荷葉邊三錢同煎服之諸恙皆平惟頭熱究未淨盡此暑熱餘火未清耳再以養胃生津而熱自除小生地三錢麥冬一錢半去心青蒿子一錢半甘草六分廣皮白一錢川石斛三錢赤茯苓一錢半連翹一錢半去心加藕二兩切薄片服後熱退胃和而痊案陸誠齋乃室産後脾虛泄瀉足腫治驗陸誠齋內人嘉慶壬申歲六月十三案産後脾虛泄瀉晝夜草余度口乾足腫迄今匝月脈虛無力脾氣下陷先理中宮焦冬朮一錢半白扁豆三錢炒苡仁四錢炒甘草八分煨木香一錢廣藿香一錢半升麻三分蜜炙茯苓二錢加益智仁一錢半復診六月十五日服前十三日方兩劑泄瀉十減其半再議補中益氣湯去當歸加苡仁建蓮煨木香等煎服此方晝夜又減腹微疼口乾足浮如前連服五帖瀉止痛停口乾亦平仍用原方去柴胡當歸加芡實益智仁等煎服數帖足浮全退矣案陸氏嫗風暑挾濕頭脹身熱治驗陸氏女嘉慶壬申七月初五暑風外襲濕邪內阻頭脹舌苔膩滯宜於清解香薷一錢防風一錢半蔓荊子一錢半豆豉三錢赤茯苓二錢滑石三錢廣藿香一錢半神麯三錢炒薄荷一錢加鮮荷葉三錢午後身體壯熱隨即煎服少頃汗出熱退而愈案論治許鐵舟女喘症常發之驗並詳明病原許鐵舟長女年逾二旬喘症有年舉發無時經水落後無定期邇來喘發越勤肌體瘦極食飲日減或冒風或感寒停食發則咳嗽頻增必先左目發癢癢甚則喘症隨發發則氣壅痰塞呼吸不利氣盡奔於胸脘而不下達以致聲如曳鋸鼻煽畏寒甚至一咳則小便直溜臥不著枕倚靠而坐食難下咽其所以難下者緣胸脘氣壅痰阻耳今自初五喘發迄今他醫用紫菀鬱金三子養親及葶藶二陳等湯投之不應而反增重更醫醫作衝脈氣逆治以熟地沉香桑丹苓芍紫石英等以為納氣之法服後胸脘愈覺壅塞大便燥結十餘日未解喘汗肢冷米飲不進奄奄一息於七月十九日始求治於余余察脈審症氣喘汗冷胸前窒塞肌體骨立食毫不進溲出熱短脈細如絲左脈微弦肺金虛而氣壅脾土弱而痰生子母並虧肝木從中乘土侮金以故病發則目之上下兩弦作癢異常而喘病隨發因目為肝竅兩弦屬脾喘屬於肺木之乘土凌金信不爽也察脈審症脫勢已顯權擬一方若能氣漸下降再商北沙參三錢款冬花三錢巴旦杏三錢去皮尖茯神三錢薏苡仁四錢炒炙甘草六分左牡蠣六錢南棗兩枚去核川貝母一錢半去心加陳粳米四錢生絹袋包煎渣倒河中復診七月二十日方進昨方約申正煎服服後胸脘之氣漸鬆而下達上焦毫無壅塞而喘急之勢頓平少頃遵豫言隨搗鮮芡實作粥飲其一盞頗安已後進米粉糕等胸中適意可以坐立問答與昨之病形大相遠矣第脈仍如昨能於斯而日漸減可庶乎盡善即於原方內去牡蠣加百合五味子等服之如前未喘飲粥如前安妥大便之燥結亦從此而解矣二十一日即以昨方再加扁豆黑芝麻等煎服四劑而愈案姚若水室人産後惡露未淨誤補發厥惡血停阻牙關緊閉幾無生理得輔正逐瘀法立刻救蘇之驗姚若水室人十八歲道光十年七月十八産子腹痛腰疼頃之包漿水下穩婆未至兒已落地約半時之久婆至始將臍胞順手而下當時惡露甚少次日血下無幾而停斯時惟日進益母草湯及米粥調養於二十日後早進野味至二十四吃飯四盞較之平常反增倍而猶嫌心嘈貪啖野味至草五日忽覺胸腹脹悶氣阻不爽延醫醫以為産後體虛當用四物湯加減草六日神識似清非清夜來錯語頭汗如雨牙關緊閉小腹膨脹主人問其惡露有否醫者答曰全無用熟地歸芍龍齒牡蠣茯神棗仁黃耆諸補納之劑二三帖病愈劇於二十九日始求治於余余至細審病情兼察色脈脈象虛而滯左脈弦緊答問如常神識尚清舌中焦黃有津口唇燥裂卻能納粥據述昨夜腹膨痛脹陡然汗出自頭至膝牙關緊閉與前無異將參片含之少頃漸自關開神清余知其惡露未淨醫者過投補納而無逐瘀之法是以至夜而病愈劇也當亟以輔正通瘀佐以止汗為吃緊關頭遲恐棘手矣人參五分沖歸尾一錢半茺蔚子一錢半茯神二錢桃仁三錢研炙甘草六分沉香汁三分開水磨沖藕節五個加麻黃根一錢同煎此方未服輕信前醫仍用補納之法是夜仍厥腹膨脹痛甚至牙關緊閉汗出遍身幾無生理因將余前方速煎服之少頃腹痛隨下瘀血色黑韌極以物撥之扯之不散始信余言果然瘀血停阻深感再生之德又案七月三十日察脈審證問答清爽自覺臍下尚有一塊如杯大者仍時痛膨脹主家仍防如昨之厥余曰昨立方時曾已告明産後十二朝惡露停畜已久深慮血不下而致厥脫上攻之變而不得不用之方也豈仍宗前醫補納頃遭斯變幸急進余前方而惡露瘀塊頓下今細繹之猶未淨也再以益氣溫經逐瘀冀其惡露盡徹庶乎漸安若不此之求而概作産後補納為法其如瘀惡未淨從何可出無膽無識難以救人於頃刻僕才疏學淺既蒙垂青聊為塞白人參六分沖於白朮一錢土炒炮薑六分淡附子三分茯神三錢桃仁泥二錢木香五分炙甘草六分元胡索一錢炒加陳粳米四錢生絹袋扎煎米倒河中服之惡露又下從此痛緩塊平而脘腹中究有不舒之勢食飲未貪脈象虛耎右關沉小八月初一用和胃調中兼以潤燥之法投之大便內又解黑糞成堆與前畜積未化之食物齊下足徵新産之後胃火升而多啖食物兼之産後腸燥得余和潤之劑而腹中宿滯頓下從斯塊消痛止矣再用和胃生津之劑口唇之燥裂脘中之不爽亦俱減矣數餘日後又因口燥便結白帶頻下用生津潤腸之劑而漸平復又肝脾並調俾脘腹舒暢腸胃滋潤調治兩月而痊於九月十八日繼以丸方調理收功平素經水應期自幼有胃脘痛症舉發無時邇來或受寒氣鬱停食皆發發之至劇者必厥據述痛甚得溫暖自緩足徵胸中少陽和氤氳之氣以故恆發無定也今因産後調補氣血而兼治之可也方用八珍湯加柏子仁廣木香杜仲新會皮四制香附等煉白蜜為丸如桐子大每服五錢清晨滾水送下或泡建蓮湯送亦可案文學高仰山乃室素有肝胃氣發則嘔痛並至又兼寒熱頭疼咳嗽無痰治驗文學高仰山乃室道光辛卯九月十六診素有肝胃氣發則嘔痛交加日來寒熱咳嗽無痰頭疼舌絳脈右浮緩左弦細先理寒熱為妥用蘇梗前胡蔓荊子杏仁川芎茯苓瓜蔞仁地骨皮黑芝麻沉香輩加生薑皮五分同煎服進三帖寒熱退咳嗽未平二十日診用沙參款冬巴旦杏冬桑葉苡仁茯苓蘇子百合黑芝麻枇杷葉去毛煎服五劑咳嗽全愈舊恙肝胃氣又發臍之上下作痛兼之嘔吐每發於申酉而至夜半者居多年近三旬前緣産後面目小腿俱有虛浮之勢亦脾土之久虧也脈息兩關小弦當理肝胃制香附二錢廣木香六分淡乾薑六分炒陳皮一錢半淡茱萸三分薑半夏一錢半雲茯苓一錢半苡仁四錢炒紫沉香三分煎服三劑肝胃氣痛頓止再二劑而虛浮之勢亦漸退矣案內人陸氏齒痛異常夜間更甚治驗余內人陸氏齒痛異常夜間更甚進清火舒散等法皆不應診得左脈虛數因其痛而食飲難進用後方一劑疼痛頓緩再三劑而痛止已後又有小疼之勢又進數余帖而全愈此道光十一年辛卯歲五月初一日方也方附下大熟地五錢當歸頭一錢半白芍一錢半炒川芎八分山萸肉一錢半薄荷頭六分元參三錢炙草五分女貞子三錢上九味河水煎服案萬松岩內人驟然頭眩眼暗欲僕上重下輕如在舟車嘔吐酸苦治驗萬松岩乃室年六旬體豐多勞酷好濃茶中虛挾濕多痰肝脾不足之軀前月初旬得臂腕疼痛難忍波及手指延次子茂常診治用舒筋活絡間佐氣榮兩補之法調理而安忽於九月初十午刻驟然頭眩眼暗欲僕兼之嘔吐酸苦食物舌白胸悶起立運跌如在舟車上重下輕脈形浮滑弦緊外受之寒引動內風風火交煽氣阻痰凝此頭眩嘔酸之所由來耶深恐變幻亟宜止嘔定眩為最不可藐視時在道光辛卯歲九月初十日診羚羊角一錢半鎊鉤藤鉤五錢石決明一兩天麻一錢煨川黃連四分白池菊一錢半夏曲一錢半神麯三錢炒小青皮一錢加炒出汗開口川椒七粒同煎臨服用生薑汁八分沖服前方一帖至戌初頭眩漸平眼黑嘔酸等亦止矣至次日清晨始進粥一盞少頃心嘈又進炒米粉漿半甌可以坐立亦不覺上重下輕十一日用和胃舒肝化痰之法方以二陳湯去甘草加元參天麻石決明木瓜池菊青皮生谷等煎服時仍用薑汁八分沖兩帖全愈案何怡堂內人産後半月惡露頻下潮熱治驗何怡堂內人年逾二旬道光辛卯十一月二十一診新産十七朝感寒潮熱不已惡露頻下舌苔中心絳剝食不喜進小溲短赤胃土不和正值氣榮兩虧之際宜亟退其熱則胃和而思食庶免産後餘波西黨參二錢白扁豆三錢炒炙鱉甲三錢茯神三錢青蒿子一錢半炙甘草六分金石斛四錢麥冬一錢去心陳皮一錢半生穀芽三錢加生薑六分大棗兩枚去核進前方一帖未大熱次日再劑至更余身熱至二更而漸退少頃汗出過多神倦眼閉漸漸而平舌心淡黃帶潤大便燥結食仍不貪産後氣血大虧虛熱不已加之汗出過多豈不慮其虛脫況脈形軟弱無力必得氣榮兩固扶養胃氣為急急也生黃耆二錢西黨參三錢扁豆三錢炒歸身一錢金石斛四錢左牡蠣七錢茯神三錢棗仁一錢半炒炙甘草六分川芎八分陳皮一錢加生薑兩片黑大棗兩枚去核服此熱未一刻即退汗亦從此而減三劑諸恙向安矣案於潛董仲海內人兩頭角痛甚乳房結硬治驗於潛董仲海內人年二十六道光十年九月二十一診感冒風邪頭之兩角疼痛難忍更兼右乳房結硬如胡桃牽引脹痛稚子吮乳愈疼當用生香附羌活川芎陳皮甘草輩治頭角痛兼以疏通外用蔥白頭搗爛炒熱尉痛硬處內服外尉頭痛頓止乳房結硬漸鬆兩日後塊消忽於乳頭下結硬焮痛吮乳內如刀割由陽明指乳房而致厥陰指乳頭結硬不消尚可消也若瘍科早投苦寒或外傅以涼藥未有不誤事者速與之消散為善也服後方一劑結硬之塊大消且不痛矣再劑而病霍然矣方附下生香附二錢瓜蔞全三錢蒲公英三錢青皮一錢橘皮一錢半甘草節八分大貝母一錢半去心枳殼一錢半赤芍藥一錢半炒乳香一錢半去油用陳酒河水各半煎案文學陳畏甫令愛寒痰凝阻成飲治驗文學陳畏甫令愛年十七歲道光庚寅十二月十九診據述病由九月間胸悶不爽腹中時疼疼久口吐涎沫醫用疏通不應又有作蟲治用烏梅丸等偶有蛔蟲一條瀉出以後痛仍作淹延二三月天癸自起病至今三月之餘未轉日來脘腹閉悶不飢納少腹按之如裹水之狀漉漉有聲脈象沉緊弦細按之無力其為痰飲無疑致令絡脈不利病在脾胃肝而關衝任脈也一以貫之茅山術一錢半麻油拌焙茯苓三錢淡乾薑七分炒苡仁四錢炒製半夏一錢半淡茱萸二分廣木香六分炙草六分廣皮白一錢加生穀芽四錢同煎復診二十三日服前方痰多腹未痛按之仍覺腹中漉漉之聲不按不響響在臍上得轉失氣下覺脘腹舒暢脈象沉緊弦細無力四肢覺冷中脘寒痰凝阻成飲是以按之有聲如水中氣有虧停經三月餘當溫理中宮自爾漸平方用附子理中湯合香砂六君子去陳皮方也西黨參三錢於白朮一錢半土炒茯苓二錢炙甘草六分淡附子六分淡乾薑六分製半夏一錢半木香六分煎好去渣入砂仁末三分沖復診十二月二十六日服前方頗為合宜仍宗前法附子理中湯加味治之西黨參三錢焦冬朮一錢半淡附子八分炙草五分淡乾薑八分炒製半夏一錢半雲茯苓二錢香附三錢炒山楂肉三錢生穀芽五錢益智仁一錢半是方年內服兩帖至辛卯正月初三四又服兩帖寒痰全無按之並無水聲亦無涎沫吐出脘腹松爽於初八日天癸轉瘀塊頻下腹中亦無所痛諸恙咸安再立丸方調理收功方用四物湯合香砂六君子去半夏加四制香附共為細末煉白蜜為丸桐子大每服四錢清晨蓮心湯送案王省齋大令愛經水愆期白帶頻下調經丸方王省齋大令愛年二十道光辛卯六月望日丸方素體瘦弱食少氣血不足天癸每逾期二三月而至白帶頻下脈象細焮尺濡陰陽兩虧之體宜溫養血氣俾八脈融和沖為血海經行應期庶幾無妨炙黃耆四兩西黨參六兩焦冬朮三兩山藥四兩炒大熟地八兩炒全當歸二兩雲茯苓二兩白芍一兩半炒烏賊骨二兩炙野艾葉二兩醋炙元胡索一兩半炒川芎一兩新會皮一兩半砂仁一兩五錢炙甘草一兩半上為細末煉白蜜為丸如桐子大每服五錢清晨滾水送或用建蓮湯送更妙據述此丸服畢身體漸健經行不至愆期頗為合宜案張氏嫗痢疾腹痛裡急後重高年紅積治驗張氏嫗年七十六道光四年八月二十二日痢疾腹痛難忍裡急後重色紅挾凍右寸軟弱兩關弦硬來勢頗險恐高年人難以勝任先以疏通和胃以冀轉機淡豆豉三錢生扁豆三錢煨葛根一錢半紅曲三錢廣木香六分磨沖生香附一錢半元胡索一錢半炒赤芍一錢半淡茱萸四分山楂肉三錢六神麯三錢炒加紅扁豆花十六朵服之痛稍緩所妙者糞多於積嘔去黏痰稍能進粥復診八月二十四日用調中法兼以治積白扁豆三錢苡仁四錢炒黃芩一錢半炒木香八分生甘草六分赤苓二錢淡茱萸四分赤芍二錢炒車前子一錢半炒五穀蟲二錢炙陳皮一錢半服此腹痛滯下俱減七八食亦漸貪溲亦漸長仍以原方略為增減三劑而痊藥用靈活奏功甚捷況高年之滯下耶案虞氏女晡後寒熱熱輕寒重治驗山陰虞氏女道光甲申歲九月初三日寒熱發於酉後寒甚熱微頃之復寒夜半而止病起三日每日如期舌苔白膩脈象耎小年近二旬經水已過法從溫中和解兼治頭疼草蔻仁一錢煨桂枝一錢甘草六分陳皮一錢半淡乾薑六分炒半夏曲一錢半穀芽三錢炒藿梗一錢半蔓荊子一錢半加生薑兩片黑棗兩枚去核服後寒勢十去其七熱亦甚輕而退惟頭疼未已又加小腹痛次日即原方去藿梗穀芽加木香川芎等兩帖而愈案許鐵舟女喘症屢發防脫治驗許鐵舟長女道光壬辰歲三月二十六日舊恙屢發氣逆不降神疲肢冷食少肉削脈弱按之若無脾陽大敗元陰亦虧只恐驟變議用扶土益金法究防虛脫西黨參三錢苡仁四錢炒南棗兩枚去核橘白八分川貝母一錢半去心炙甘草六分生穀芽四錢巴旦杏三錢去皮尖茯神三錢海浮石三錢加北五味子二分研進藥後氣逆之勢漸降脘腹膨響亦緩喘咳從此而平草九日復診原方略為增減再三帖而全安案姚若水室人微冒咳嗽咽疼無寒熱忽吐血杯許並紫塊治驗姚若水室人道光壬辰五月初九診産後八月冒風咳嗽咽疼身無寒熱於兩日前忽吐鮮血數口次日又吐杯許色帶紫塊今日亦然因邀豫診脈象浮小兼數陽明胃土攸關經云陽絡傷則血外溢宜以清降則血散火退矣參三七五分開水磨沖元參二錢麥冬一錢去心鮮石斛四錢人中白六分巴旦杏三錢去皮尖甘草五分側柏葉三錢炙川貝母一錢半去心加藕節七節拍碎同煎服前方兩帖血漸散咳緩紫塊血大減咽疼止十一日復診血已漸停尚有如米粒大者約咯有數口原方去元參柏葉貝母加丹參茯苓等兩帖而痊案萬梅圃乃室感邪身熱內陷耳聾便泄極效萬梅圃乃室壬辰五月草九溫邪旬日頭痛嘔惡已減而身熱猶未盡徹舌糙無津口乾飲少耳聾且鳴火氣上升自覺頭如鉢大今晨便泄數次體質素薄兼多肝鬱恐熱久津涸邪從內陷亟亟退熱止泄為穩耳聾且鳴自疑頭大如鉢皆火浮於上也退其虛熱自已小生地四錢丹皮一錢半炒地骨皮二錢赤苓三錢青蒿子一錢半鱉甲四錢炙小青皮八分橘紅八分川貝母一錢半炒不研薄荷一錢川石斛四錢穀芽四錢加鮮荷葉三錢同煎服此熱勢較昨又減約有二三分便泄十去其半六月初一復診用生地麥冬甘草花粉赤苓半夏曲藿梗鮮石斛薏苡仁等加生穀芽鮮荷葉蒂一個同煎服後熱緩如前便泄僅三次夜安睡如前惟食仍未貪梅圃乃室復診六月初二日脈右軟小左濡數熱未淨盡是以食不貪耳議育陰降火一法免其變幻西洋參一錢半川黃連四分麥冬一錢半去心丹皮一錢半炒地骨皮一錢半鮮石斛四錢甘草四分南棗兩枚去核加生穀芽四錢同煎進藥後頃之肢體頸胸俱有微汗從此熱漸退清大便漸結小溲甚長耳聾漸聰口乾大減惟食飲仍未貪耳初三日原方略為增減又初四日忽又大便溏瀉自早至申瀉已六次脈軟小無力左濡小肝鬱乘土擬養胃止瀉法人參鬚五分白扁豆三錢炒芡實三錢炒赤苓三錢金石斛四錢益智仁七分橘皮六分麥冬一錢半去心大南棗兩枚去核用鍋焦心二兩河水兩盞煎三四滾去鍋焦取湯煎前藥一盞服又初六日方食入頃之即便泄不食則不瀉食仍不貪人參七分另煎沖玉竹四錢南棗兩枚去核建蓮肉四錢去心茯苓一錢半益智仁七分炙草五分金石斛四錢煨木香七分加生穀芽四錢荷葉一個服此兩帖食飲漸貪便泄亦止初八日仍於前方出入食貪神健便溺調勻脈形尚耎小無力已後延診著次子茂常往診調理收功案楊沛泉乃室素有肝氣左脅塊攻於右側嘔吐並至治驗楊沛泉夫人年五十九道光乙酉延診肝氣有年波及於脾塊起於左脅而痛發於右脘甚則嘔吐並至今則痛發亦在左肝氣過旺肝亦自傷也邇來發之無時不常作疼兩足素有浮腫今則兩顴亦浮面色痿黃大便素結結則肝氣易發溏則肝氣少發據述發時必以黃連清之漸愈不喜溫燥斯言亦不作深信就此刻而論肝脾兩傷所慮者防轉中虛法宜養肝舒肝加以調脾庶幾戩榖制首烏四錢炙鱉甲三錢女貞子四錢歸身一錢半白扁豆三錢炒大南棗兩枚去核焦冬朮一錢半玉竹四錢小川連三分淡茱萸一分紫沉香三分切片上藥十一味河水兩盞煎至一盞服是方服兩帖全愈案陳蔚甫令愛脘腹膨脹有聲服藥極驗陳蔚甫文學令嬡十九歲道光壬辰四月二十四日脘腹膨脹有聲脈息右耎左微弦脾土虧而肝木不舒病起有日經水尚調當從土木並治西黨參一錢半焦冬朮一錢半淡茱萸三分茯苓二錢白蔻仁六分水炙甘草五分廣木香五分陳皮一錢半制香附一錢前方進十劑膨脹已平腹中時響食不加餐頭角跳動復診用四君子湯加扁豆芎歸白芍砂仁香附淡茱萸等八劑而安案甥王宗華內人大小便出時並緊不爽治驗甥王宗華之內道光壬辰七月初七診腸紅漸減邇來大便時後陰並緊小腹閉悶不爽小便時前陰亦並緊出時亦不爽病雖阻於二陰之間實關乎厥少二陰之經也細生地四錢川木通一錢川黃柏一錢鹽水炒知母一錢半塊滑石三錢椿根白皮一錢半炒黑存性制香附一錢半青皮一錢加藕節七個同煎服三劑腸紅漸止大便時後陰之並緊亦緩惟小便時少腹並緊不爽如前末後溺孔亦有痠疼之勢仍用前方去木通加淡茱萸三分煎服三劑遂愈附案先大人治江氏孀居癇疾極驗余先大人雨香公嘉慶元年丙辰歲治江氏孀居年二十四歲肝虛氣滯熱鬱生風發而為癇脈左虛弦治在養肝毋泛作風痰治制首烏三錢炙鱉甲三錢女貞子三錢當歸一錢半白芍藥一錢半炒粉丹皮一錢半炒丹參三錢甘草五分制香附一錢半鉤藤三錢加萱花草三錢服二十劑而癇症竟不發矣追思先君用藥每於平淡中見神奇真足法矣道光十三年季夏二日採鄰百拜於有竹居之存存齋中時年六十有九又治槎溪程瑤山女身熱夾經極險治驗並論先大人治槎溪程瑤山女乾隆辛亥八月下旬病熱夾經胸膈熱悶手足清涼併兼指麻舌麻不時冷汗譫語煩躁眼一閉即驚惕眼一開則怕火大小便兩日不通左寸關脈弦數想此女風暑相搏內有鬱熱故眼開羞明閉則魂不歸肝而發驚也曾服荊防藿香等不應用後方一帖病減八九身涼人靜二便俱通薑汁炒生地三錢丹皮三錢炒赤茯苓一錢半澤瀉一錢半川木通一錢香薷一錢半甘草梢七分香附一錢半鉤藤鉤三錢後入九味河水煎服暑邪傷心心火一瀉而心之母亦清所以藏血者不致血熱藏魂者不致魂飛方中生地用薑汁炒者固是寒因熱用而亦取其開鬱而不泥膈也據云服藥後吐痰碗許胸次頓開二便並下藥之對症其效如此是案已載先君子寸心知醫案中今暫録女科一二於斯以見先君用藥靈活隨機應變之妙有非筆舌所能罄者採鄰再筆案王春元內人骨痹痛極如錐治法奇效奏功王春元內人年二十一歲道光辛卯十一月初二日病由感寒腹痛而起漸自右股骱骨痛如刀割朝緩夜劇迄今匝月證名骨痹痛甚見厥乃寒與氣鬱濕阻關節引動內風肝虛氣滯脈象沉緊法從溫舒方用制香附元胡索當歸肉桂木瓜陳皮獨活杜仲淡茱萸等九味煎服兩帖痛如前不增不減風寒濕三氣雜合而為痹骨痹者以冬遇此為骨痹也復診十一月初四日方制首烏四錢女貞子四錢歸身一錢半杜仲三錢鹽水炒虎右股骱骨五錢酥炙制香附三錢炮薑六分炙甘草六分蔥汁炒獨活一錢半蘇木節四錢肉桂七分去粗皮松樹節三錢上藥十二味長流水煎服兩帖骨痹之痛頓緩即痛亦不至於痛極難忍之狀食亦稍加大便亦不至天明而解皆緣痛緩而諸恙亦緩矣初六日復診前方去香附獨活加鱉甲續斷二味再兩劑而痛若失矣案陸琴軒乃室停經小産治驗並附膏滋方陸琴軒乃室辛卯九月十六日診停經五十餘日於是月初旬經水漸至不以為意忽於今晨小産惡露隨下少頃小腹痛甚所進之粥亦盡嘔出頭眩眼花余辰刻至彼診視見其平臥於床囑其坐起以被褥靠背坐直膝宜豎起勿伸直隨飲熱童便一盞閉目靜養勿令熟睡防血氣上壅為最耳制香附三錢歸尾一錢半桃仁泥三錢甘草六分元胡索一錢半炮薑三分五靈脂一錢青皮一錢廣木香六分淡茱萸三分茺蔚子一錢半河水煎服服後至申末嘔止痛緩血塊漸下夜間飲粥未嘔次日復診惡露未盡心蕩口苦食無味脈形虛芤左弦細體倦神疲加意圖維方用當歸川芎炒蒲黃五靈脂炙草陳皮炮薑苡仁生穀芽等煎服後惡露漸少心蕩頭眩夜寐不寧十八日用丹參茯神炒棗仁當歸川芎青皮木香甘草半夏曲茺蔚子等煎服二三劑而平矣繼以膏滋方氣榮兩補俾沖任充盛以冀育麟之喜方用四物湯合黨參二茯柏子仁元參棗仁杜仲陳皮黑芝麻烏鰂骨四制香附等十五味如法煎膏每晨服五六錢隔湯燉溫服服後經水調諸恙向安矣膏內藥味分量未載者臨時酌之可也案許鐵舟女喘症極險屢發治驗許鐵舟長女癸巳五月二十二日喘咳氣逆舊恙屢發肺金虛而痰沫頻頻納穀維艱每發必眼鼻作癢異常易於動怒肝火沖肺也昔年案中已詳論之今脈右軟弱左弦細深慮喘汗並至亟宜益氣定喘為最也蛤粉炒阿膠三錢北沙參三錢苡仁五錢炒茯苓一錢半巴旦杏仁三錢去皮尖黑蘇子一錢半炒百合三錢山藥二錢炒水炙甘草五分海浮石三錢芡實三錢炒加老枇杷葉三錢去毛炙煎服五劑喘咳漸平於六月初三復診正值初伏火旺金衰水不滋木加意調攝最怕喘復方用熟地北沙參女貞子黑蘇子黑芝麻天冬茯神薏苡仁叭噠杏炙甘草山藥南棗等十二味煎服數帖而安案高朗亭內人經行驟阻小腹疼脹溲出涓滴不爽經阻挾淋乃房勞不節所致極驗高朗亭乃室癸巳正月二十九診吮乳兩載未停數日前忽然經行驟阻小腹痛脹經帶並下溲出疼痛有涓滴不爽之勢脈象弦數經阻挾淋兼而療之制香附二錢川萆薢三錢川木通一錢青皮一錢半元胡索一錢半炒甘草梢七分桃仁泥三錢烏藥一錢半山楂肉三錢炒當歸梢一錢半加荷葉一小個托底煎藥煎服三帖經止帶減小溲出時涓滴痠痛俱大減再以原方去萆薢桃仁楂炭加海金沙車前子等再三劑而痊案進士楊蘋香先生如君吐血屢發治驗浙江平湖進士原任四川彭水縣楊蘋香先生如夫人道光癸巳五月十五日診吐血有年舉發無時體偉神健素好濃茶不無濕痰白帶頻下年逾半百天癸未停時而氣逆喉癢則血勢上溢時而火升心嘈則胸中搖蕩皆血去過多故耳雖陽明為多氣多血之鄉而久吐非宜經云陽絡傷則血上溢胃絡豈可久傷也況值天癸應止而未止耶此刻慮其上溢久恐防其下崩經又云陰絡傷則血下溢正此謂耳脈形虛軟預為調攝庶乎戩榖生黃耆三錢西黨參二錢二原地四錢茯神三錢款冬花二錢巴旦杏三錢去皮尖旱蓮草三錢甘草六分炙生蛤殼五錢建蓮肉三錢去心十味用河水煎好去渣入血餘炭七分沖服數劑血停嗆平案慈溪文學葉心水乃嫂孀居痹症掣痛治驗附藥酒方慈溪文學葉心水乃嫂寡居年三十七歲道光癸巳仲冬二日自京回籍舟泊吳郡途中得痹症問治於余方案列下風寒濕三氣合而為痹始於左足屈伸不便疼痛抽掣素喜濃茶經水愆期病起半月進舒筋除濕調經活絡之劑服三帖痛勢漸鬆波及於右右輕而左甚易曰震為足足屬東方木也由左達右木強乘土土虛金弱西方之兌金弗剋制木以故內風動而風生風淫末疾此腿足之所以疼且痛也再驗之脈右虛耎左弦細更顯有明徵耶法宜扶土祛濕舒肝卻風庶乎戩榖制香附三錢研薏苡仁五錢炒秦艽二錢獨活一錢五分虎脛骨三錢炙全當歸一錢半木瓜一錢杜仲三錢炒嫩桑枝五錢乳香一錢同炒懷牛膝一錢半蒸青皮一錢上藥十一味用長流水一盞半加紹興酒半盞和勻同煎服後漸自痊可又浸藥酒方冬季最宜每日早晚量飲生黃耆二兩西黨參三兩大熟地五兩當歸一兩制香附一兩五加皮一兩半炙甘草一兩木瓜一兩懷牛膝一兩半虎脛骨四兩酥炙大南棗四兩陳皮一兩半上藥十二味計重二十六兩五錢用無灰紹興酒二十六斤大壇盛貯以本色夏布袋將前藥放內線縫其口袋宜寬大則藥味易出用粗草紙數層以重物壓緊瓶口約半月後可以開飲每日早晚隨量飲之服完後可將藥渣曬乾為末煉白蜜為丸如桐子大每服四五錢清早滾水送下案錢氏女咽嗌潰痛微有寒熱天癸將行治驗錢氏女年三十七歲道光十三年癸巳季秋咽嗌潰痛懸乳垂下微有寒熱正值天癸將至舒解為最禁用寒涼老蘇梗一錢半制天蟲一錢半即殭蠶薄荷八分元參三錢川貝母一錢半人中黃六分馬勃一錢桔梗八分加白蘿蔔汁一酒杯沖外用家制紅爐雪吹喉服一帖寒熱退喉痛嗌潰俱大減次日復診原方去蘇梗薄荷馬勃加蘇子牛蒡甘草等吹藥如前服之全愈案張蓮卿乃室經行不寐愈後調經種子丸方並論奇效張蓮卿乃室年逾二旬仲冬下浣經行五日未停色淡且少夜寐不寧內熱火升耳鳴心凜凜而肌膚毛聳易於出汗舌苔淡白脈象耎左小弦皆血海不足虛火上炎榮虛衛弱見證多端耳理宜氣榮兩固第胃土未和當先調榮護衛以止汗兼之養胃和肝冀其納穀乃昌黃耆皮一錢半當歸一錢人參鬚六分白芍一錢半炒茯神三錢淮小麥四錢廣皮白六分杜仲二錢炒生穀芽五錢服六七劑經停汗止食飲漸貪矣繼以丸方調經種子兼治白帶道光癸巳歲仲冬定生香附六兩分四處四制一用鹽水浸兩宿一用米醋浸兩宿一用米泔浸兩宿一用陳酒浸兩宿俱曬乾焙研和勻西黨參五兩懷熟地六兩切片炒全當歸二兩川芎一兩半焦冬朮二兩雲茯苓三兩白芍藥二兩炒杜仲三兩鹽水炒海螵蛸四兩焙廣木香一兩半不經火炙甘草一兩半芡實五兩炒上藥十三味各焙研篩細和勻用煉白蜜為丸如梧桐子大每服五錢清晨滾水送下或蓮心湯送更妙丸藥合好外用左牡蠣三兩煅粉棉布袋包扎置丸藥瓶內遵先君子雨香公云於牡蠣條下得純雄無雌之句因悟及懷胎之永不生男者一時靈機想出用藥妙法又云布袋得氣之説更妙如必連滓服之恐牡蠣之功用不一倘有不合其婦之證者豈不有誤但用其純陽之氣不取其鹹寒之味有至理焉時嘉慶八年七月朔日書此待時而行之後有不棄豫言者亦可由此參變雨香孫廷問識於有竹居之存存齋中時年七十有七但得純陽之氣而不取其味也此先君子之妙法可傳也是方也先君創法於前鄰遵行於後果然靈妙筆之於斯傳之後世庶不負先君子之道術精通矣時道光乙未歲四月二十四日男採鄰百拜敬識於三吳之紅杏山莊時年七十有一前丸於十三年十一月服此之後至道光甲午歲十二月十七生一男子深感余之方妙而豫卜其早年得子亦福運使然也所謂有其福而再得此妙法宜乎子之必得也竹亭鄰再筆案萬藝軒女七歲溺時疼痛溲出如疳治驗萬藝軒女甲午四月二十一診七歲童齡縱啖生冷脾胃失運濕阻不化小溲混濁白膩如泔溺時疼痛難忍夜間發熱皆脾胃失調以故水道不利宜以東垣升清降濁法薏苡仁四錢炒白扁豆三錢炒丹皮一錢炒瞿麥一錢半黑山梔一錢地骨皮一錢半木通一錢柴胡四分甘草梢七分海金沙一錢半加鮮荷葉蒂一個服兩帖溺出痛止惟溲出仍混濁如泔再以補中益氣法出入之漸自痊可案王芝嶠兄四妾咳嗽內熱幾成虛怯治驗王芝嶠四妾道光辛卯歲六月咳嗽朝輕夕重內熱口乾手足心熱食飲稍減痰中偶兼血絲白帶頻下脈形細數陰氣虧而肺胃之氣不足延綿日久土虛金弱水虧火升日進滋泥之劑與肺胃大不相宜以故內熱咳嗽終未除也於六月初旬延余診治用後方數余劑而諸恙頓平北沙參三錢淮山藥三錢炒建蓮肉三錢去心茯苓一錢半青蒿子一錢半地骨皮二錢川貝母一錢半去心丹皮一錢半炒蛤粉炒阿膠三錢大麥冬一錢半去心加老枇杷葉三錢去毛案張氏嫗風暑內侵寒熱頭重無汗骨節疼治驗張嫗七月望日診暑風內侵畏寒身熱頭重無汗胸悶骨節疼腰胯痠痛舌苔白泥滿布脈形浮緩其勢匪輕速於舒解微汗為妥香薷一錢防風一錢半秦艽一錢半白蔻仁八分研豆豉三錢枳殼一錢半神麯三錢炒鮮藿香一錢半陳皮一錢半楂肉三錢炒加鮮荷葉三錢服後得小汗而諸恙霍然矣藥用對證捷如桴鼓之應案婁芝軒內人兩足大指夜睡即麻治驗婁芝軒乃室兩足大指夜睡即麻攸關肝脾蓋足大指屬脾穴名隱白臨睡即麻脾陰不足可知而又兼乎肝者肝之大敦穴亦在足大指也況經事每多趲前有時一月兩至非無以也右脈軟和左脈濡細乏力經水雖速究屬虛象脈可憑耳於是用於朮熟地歸身白芍制首烏炙甘草制香附木瓜乳香同炒服數劑全瘳案豫內子陸氏臍上作痛異常牽連左脅治驗余內人陸氏年五十六歲道光甲午端陽日清晨臍上作痛乍止乍甚甚至異常之痛牽連左脅飲以薑湯兼用湯尉皆不應隨用後方一劑頃之痛停左脅之牽疼亦毫不覺矣孰謂藥之不靈也特恐制方之不善耳制香附三錢廣木香七分廣藿梗一錢五分陳皮一錢半淡茱萸五分草蔻仁八分炒山楂肉三錢炒青皮一錢建神麯二錢臺烏藥一錢半加生薑兩片案戈心梅乃室常發肝氣嘔吐發厥治驗戈心梅乃室年五十九甲午十一月十九肝氣舊恙復發胸脘刺痛氣逆嘔吐肢冷發厥脈象沉緊感寒挾食舌苔泥白宜於溫舒制香附二錢老蘇梗一錢半薑半夏一錢半橘紅八分廣木香六分切片淡茱萸四分草蔻仁一錢炒麥芽三錢炒九香蟲一錢半焙沉香三分切片加荔枝核三錢炒研生薑渣八分服兩劑嘔痛鹹平食飲漸貪矣案王青藜室人天癸愆期頭眩腸紅溲數等治驗王青藜夫人年三十二歲甲午十一月二十七診素體豐健惟多濕痰邇年天癸每多愆期頭眩眼花腸紅頻發小溲頻數有不及登圊之速脈形軟滑左弦細此肝腎陰虧脾土弱而不能統攝者皆有之也制首烏三錢歸身一錢女貞子三錢茯神三錢酸棗仁一錢半炒元參二錢制香附二錢陳皮一錢半建蓮肉五錢去心益智仁一錢加大南棗四枚去核服數劑諸恙漸減附案計五案案先大人治馬贊育母胸脘滿痛高凸邪結救生先大人雨香公乾隆甲寅年治馬贊育母時熱雖解而胸脘滿痛高凸痠邪固結不為無因脈象弦澀年近七旬證在垂危未便許可而究不忍坐待也馬氏脘腹高凸形狀離臍上寸許如小鍋式非泛泛之平滿也繪形於後高約二寸川黃連五分肉桂三分製半夏二錢乾薑二分西黨參三錢甘草五分黑大棗兩枚去核用地漿水煎藥即新汲水沃黃土攪濁澄清用水一盞又半煎至一半服又尉方生香附二兩紅曲二兩蘇木二兩大腹皮二兩生薑二兩蔥二兩瓜蔞一個大皂角四挺共八味各切碎用酒水各半煎湯用棉布浸透略絞尉胸腹冷則易如法服藥尉後胸腹頓開皮起皺紋高凸之形減其大半次日復診仍用原方略為加減仍以地漿水煎藥服不必再尉再診用養胃生津之劑調理收功案又焦氏嫗風暑濕食夾雜成痢立救奇驗又附嘉慶元年治焦嫗風暑濕食夾雜成痢使其通則不痛茅山術一錢半炒薑厚朴一錢半枳殼一錢半薤白三錢當歸一錢半六神麯三錢炒甘草五分大黃三錢淡豆豉三錢加廣木香六分開水磨沖未服藥之先裡急後重每解點滴晝夜無數服此一帖宿垢大通登圊不過十餘次矣快甚案蘇府任太守恭人風火內郁怔忡眩暈治驗蘇州太守任藍軒先生恭人嘉慶三年七月二十一日延診案云始而火為風搏風乃外來之風既而風自火出火乃內郁之火火得風而搖動風得火而熏蒸痰因火起悸由痰成此怔忡眩暈汗多之所由來也為之養陰清火而風痰不致為纍制首烏三錢炙鱉甲五錢歸身二錢白芍二錢炒粉丹皮一錢半半夏曲一錢半茯神二錢陳皮一錢半遠志肉一錢半炒酸棗仁一錢半炒用舊鐵器兩許燒紅淬藥湯即取出候溫服三劑而愈案金蕂飛乃室素有肝氣兼嘔血便血垂危治驗並附丸方論治金蕂飛室人嘉慶九年九月初四診素有肝氣痛病甚則便血並嘔血此上年春間事也今秋因肝氣發後始而大便下血繼以嘔血第一次約三盞二次又三盞一日之間幾乎欲脫因清晨延豫視之案云脈虛細而數始而便血繼則嘔血肝不能藏脾不能統而陽明之受纍也深矣蓋脾與胃相為表裡大腸與胃同屬陽明也脫血過多有形之血不能速生無形之氣在所急固本此以治是為上著元武板一兩炙炙鱉甲一兩側柏葉一兩炙麥冬二錢去心西黨參五錢五味子三分研童便半小杯沖紅曲一錢炒黑廣陳皮三分河水兩盞先將元武鱉甲煎至一盞半再入余藥同煎煎好去渣將童便沖服服此一劑血停汗止復診血止汗停脈象稍靜似好消息而調治之法尚費經營元武板八錢炙炙鱉甲八錢側柏葉八錢炙麥冬二錢去心西黨參五錢茯神三錢廣藿梗八分橘白五分藕節炭三錢復診血停汗止速於清肝和胃俾得兩脅寧靜中脘舒松食不惡而氣不嗆預留受補之地西黨參五錢炙鱉甲五錢制首烏三錢天冬二錢去心川貝母一錢半去心側柏葉三錢炙茯神二錢橘白八分加生穀芽一兩先煎二三滾投後藥同煎復診食納嗆稀而且粥進三碗而未足胃口已開脈來五至而有餘陰氣漸得是好消息也但脫血之後務須歸經而引導之法不可躐等亦不宜過泥是在乎用藥之輕清西黨參五錢白花百合五錢炙鱉甲四錢茯神三錢制首烏四錢酸棗仁一錢半炒川貝母二錢去心天冬二錢去心廣皮白八分加生穀芽五錢上藥十味用河水煎服數劑體健食增證漸痊安繼以歸脾湯加減調理半月後再服丸劑收功方案列下九月二十二日定歷年肝氣時發今因脹痛之極忽而大便下血不止藥餌亂投甚至嘔血盈盆十日之內約有鬥許虛汗淋漓幾乎欲脫豫用養陰吸陽法一劑回春並無點血繼用脫血固氣陰陽雙補等法調治全瘳因立丸方以善其後此症之所以敢治者因病在垂危尚有胃脈也真黃精四兩大熟地五兩元武膠三兩煬化山藥四兩炒制首烏三兩建蓮肉五兩去心炒歸身二兩酒洗白芍二兩炒茯神三兩杜仲三兩鹽水炒斷絲生香附四兩分四處四制一用米泔浸一宿一用鹽水浸一宿一用滴醋浸一宿一用陳酒浸一宿俱曬乾炒鱉血四兩用鮮木瓜兩大個切蓋存用將瓜瓤挖空傾入鱉血仍用原蓋簽定外以皮紙密封豎安飯鍋內蒸熟切開取血和藥搗勻木瓜不用上藥照方制焙外用西黨參生黃耆各六兩煎膏代蜜為丸如桐子大每服五錢清晨用桂圓湯送下案薛峰育室人白帶直溜以致血崩無度丸方殘薛峰育乃室丸方嘉慶甲子十月十二日案脫血必先固氣補陽自可生陰況血因帶下而崩迄紅已先停而白仍未斷陽氣之不固可知設無挈領提綱之法恐氣愈虛而陽愈陷任其滑溜統攝何時法宜補脾土者厚培坤元自爾土生金金生水陰血即虧不補亦補矣或者詰之曰崩血既多何不重用滋陰而豈知現在白帶淋漓而再以純陰者滑之有是理乎然而此意亦但可為知者道淘淨曬乾黃土六兩研碎存用西黨參六兩生黃耆四兩建蓮肉四兩於術四兩以下殘缺案韓晚香側室病後調理丸方缺
