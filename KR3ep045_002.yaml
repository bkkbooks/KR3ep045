體畏熱貪涼易於冒風咳嗽頭疼鼻塞舌苔邊白中黃進疏肺藥諸恙少平而頭疼咳嗽究未盡徹擬清疏法四月初八日蔓荊子一錢半馬兜鈴一錢冬桑葉一錢半苡仁三錢生穀芽五錢款冬花二錢黑蘇子一錢半炒百合二錢廣皮白八分加老枇杷葉三大片去毛蜜炙服五劑頭疼止咳嗽十去其八矣原方去蔓荊子馬兜鈴加北沙參茯苓五劑而痊案李鳴山內人寒熱內蘊頭重嘔惡治驗李鳴山內人似寒似熱頭痛且重嘔惡痰涎小溲赤痛腹膨時疼經水匝月未行骨節痠疼脈象沉小病起數日食飲不貪乃風寒內蘊兼之肝胃不和法宜疏通俾經行庶乎漸安四月初六日蔓荊子一錢半老蘇梗一錢半廣藿梗一錢半陳皮一錢小青皮一錢生香附二錢赤茯苓三錢川芎一錢製半夏一錢半秦艽一錢半加蔥白二枚臨服入生薑汁三小匙沖又復診方服前方兩劑二便通利頭痛緩惟乾嘔小腹疼經水未行擬疏表和里法冀其經轉為安蔓荊子一錢半白池菊一錢半川芎一錢花粉一錢半瓜蔞仁三錢淡茱萸三分藿香一錢半木香八分切片黑山梔一錢半生香附二錢半夏一錢炒加雞內金二錢炙服兩劑經行其餘全愈案金竹溪內人肝氣作楚寒熱塊攻治驗溧陽金竹溪內人年近三旬素有肝氣發則塊痛攻衝內熱畏寒頭疼汗冷腹膨脅脹不飢欲嘔種種見證皆肝胃為患兩關弦緊而滑速宜疏肝和胃以免痛厥四月二十八日制香附三錢老蘇梗一錢半廣藿梗一錢半川芎一錢淡茱萸四分廣木香八分半夏曲一錢半炒青皮一錢當歸身一錢半加生薑渣五分雞內金二錢炙進一劑諸證頓平再劑全安案豫妹脂瘤草載自潰治驗豫妹脂瘤自潰症治驗年未及笄左臀外側起一小核如黃豆大不痛不癢無足介意日漸月積大如胡桃後大如酒杯亦毫不覺其痛癢惟其不痛不癢纍月窮年甚至大如茶杯肉色不變拊之似軟坐之將平於椅至嘉慶戊寅五月始漸自潰計其年月迄今二十載矣初潰時流滋水漸小其半因炎熱洗浴兩日後又漸大少有疼痛行步牽強以手捺之瘤內脂片隨出其形如梅花瓣色白光滑於是又以兩手大指按瘤四圍中間脂片層層疊出不覺痛癢視其瘤頭潰處胬肉高突根窠堅固豫詳審原由始緣氣血充和瘤故日漸長大二十年來氣血漸衰瘤亦自潰幸喜脂瘤尚可圖治然亦須氣血並補用探本窮源之法溫補下焦為最當不然脾胃衰憊氣血不復滋水淋漓究難完口終成不救者夥矣丹溪云臀居僻位氣血罕到之處最不易治正謂此耳故寒涼克伐之藥所宜深戒者也乃擬養營湯加附子藉溫補氣血為緊要至於瘤口之胬肉外以自制之白雲散點之用膏藥護之五六日而胬肉腐落白雲散記時百珠囊方卷三十頁內如此內服外點根窠之堅固者漸鬆再以手拊之捺之瘤中又有白條如筆管者約二三寸長捺出一二條或三四條間有如豆渣者出之亦復不少再按之猶有堅硬未化者內服前方外又用三品藥線納入瘤中二三分仍以膏護四五日後堅硬者亦漸化為稠膿而出內服之方仍以前方出入之外以去腐生新之藥搽之漸自肉長肌完未一月而收全美之功矣快哉案姚元章女虛勞寒熱咳嗽幾危治驗姚元章女虛勞危症治驗年十六歲天癸未通素體質薄向來便溏日二三次面色痿黃今夏患瘧寒熱交作已後似寒似熱蔓延日久咳嗽有汗不飢納少大便愈溏較前倍增氣怯神弱肌體羸瘦藥投罔效漸成虛勞於戊寅九月十一日始問治於余余診脈辨色面無神彩脈之右寸微若秋毫關則虛小尺軟如綿左脈弦細乏力知其肺脾大虧而腎陽不足以生脾土則肺氣愈弱心肝久虛而腎陰不足以滋肝木則心血少充無怪乎咳嗽寒熱食減便泄而致天癸未通也陰陽兩虧虛勞之徵也難以許治憐其幼年喪母望治情殷諦思良久肺脈雖如秋毫之微而他脈未敗面色雖無神采而夜間尚能安睡寒熱雖有而汗出尚不淋漓平素大便溏薄今則倍增水瀉乃腸中之濕邪下注究非脾陽之下降可比也再舌中膩黃腐爛四邊淡白食不知味口乾欲飲此又胃中之濕阻不化以致清濁不分而升降不靈也是以上則耳聾下則便泄種種情事虛中挾滯滯者壅也郁也知其意者可以神明變化之因立方以救之方用補肺和中先調肺胃少佐養陰退熱之品疏補兼施服後咳緩熱減舌胎漸退從此增損取不潤不燥之法而便泄漸退如平時之溏食飲日增又九月二十五日復診前用疏補兼治諸恙少退今值霜降節令陽弱陰虛之軀更宜加意留神西黨參四錢淮山藥三錢炒芡實三錢炒苡仁三錢炒炙鱉甲三錢青蒿子一錢半沙參三錢地骨皮一錢半五味子五分研禹餘糧三錢加枇杷膏三錢沖服三劑寒熱退清咳嗽大減舌胎退惟嫌嬌紅光滑無苔此胃陰未復津液未充也原方去鱉甲青蒿加款冬花三錢生蛤殼四錢益智仁一錢再服三劑咳嗽十去八九據述平常可吃飲五六小碗今可進三四碗夜來兩小碗虛勞之症大有生機矣從此節食避風寒則更有益焉又十月初一日診氣血稍和脾肺漸調右寸脈指下按之亦稍有力矣其右尺之軟如綿者漸轉濡小而浮分按之似無也是屬佳兆再擬氣血並補溫胃固腸之法俾脈絡流通陰陽交和預為行經之計且素有之便溏亦可從斯而止矣炙黃耆二錢西黨參三錢淮山藥三錢炒炙草八分白扁豆三錢炒鹿角霜一錢當歸身一錢半麥冬一錢半訶子肉五分煨左牡蠣四錢煅加南棗四枚去核進三劑食飲更增舌之嬌紅光剝無苔今將轉正色再三劑夜來背心之熱止且素有之便溏亦止矣又十月初七日方炙黃耆二錢西黨參三錢北沙參三錢砂仁五分鹿角霜一錢半鱉甲膠一錢半海螵蛸二錢牡蠣三錢煅菟絲餅一錢半用浸胖鹿筋二兩煎湯代水虛勞危症進藥月餘而收全功亦再生之幸也服此數劑繼用丸藥以俟經行方用八珍湯加制香附烏鰂骨鹿角霜女貞子紅花砂仁等煉白蜜為丸桐子大每服五錢清晨炒米湯送下服未一月天癸已通再一月氣血充足肌體豐盈深感余德斯症設非明辨詳察欲生也難矣案邢天一乃堂虛勞咳嗽外寒內熱治驗邢天一乃堂虛勞咳嗽症年四十一歲咳嗽舊恙交冬頻發外寒內熱衛陽虛而營陰不足經水淡少脈象細而小數冬至在即痰紅已見加意圖維生黃耆二錢北沙參三錢淮山藥三錢炒天冬一錢半側柏葉三錢炙干百合五錢左牡蠣四錢煅紫菀二錢款冬花三錢加銀杏十四粒去衣紫衣胡桃肉一個連鬲板進兩劑痰紅已止其餘未平又復診方痰紅雖已而咳嗽喉癢氣逆上衝腎陰虧而相火凌金還恐血溢擬金水相生法陳阿膠三錢蛤粉炒大熟地四錢水炒天冬一錢半去心麥冬一錢半去心西黨參二錢干百合四錢玉竹三錢甘草八分叭噠杏三錢去皮尖加紫衣胡桃肉一個連衣鬲服數劑而痊可此方甚妙案沈裕昆侄女經水適來邪熱內陷藥誤不治症沈裕昆侄女經水適來邪熱內陷不治症年十九歲經斷身熱血室空虛時邪內陷醫用犀角地黃湯佐芩連輩一派寒涼之劑數日來身熱愈增神識不清耳聾囈語變症蜂起戊寅七月十九日門人金書山薦治於豫診其脈右部軟大按之無力左關弦細尺脈細小難尋口雖干而不喜冷飲身雖熱而不煩躁齒唇焦燥舌胎灰黑拊之有津就證脈而詳諦寒涼難投豈知醫者今又定犀角地黃湯合竹葉石膏湯群藥不計斯時已更余尚有一醫未至余與主人云昨既進涼劑熱反增證反重未敢再投豫立一方以俟明眼裁正同書山議用大生地生鱉甲麥冬丹皮知母石斛青皮歸尾桃仁泥鮮稻根鬚等留方而別至二十四日書山會豫知前方占卜未服仍延前二醫及書山診治延書山者緣其家之夥與書同鄉契友也雖然而其家議論紛紛不能專主於書山故終無濟於事也連日醫以生地丹皮輩合利小便法二三日不應復又用犀角生地等合蟬衣板藍根牛蒡子以化斑三日來熱仍不退神識愈昏食飲不貪日瀉稀糞二三次又用清燥救肺法而熱仍如前病勢甚篤復屬書山求治於余往視之熱已十三日之久而一毫未減食飲不進午後想食西瓜約飲半杯而稀糞直溜此等情境豈是退病之象也身熱乾燥神識乍明乍昧語言似清非清舌色紅潤中心灰黑病由經水適斷而起血室空虛邪熱內陷徒事清熱熱非實熱徒以散邪而邪已內陷於血室空虛之所徒清徒散均無益焉是以內經有無犯胃氣及上二焦之論仲景少陽條篇有適斷空虛邪陷一説明指少陽膽腑亦有三禁與經文暗相符歟各有深意神明變通全藉心領意會始能得其妙旨豈泛泛醫流輩所能深悉其意者也況此等症最易變遷如前之脈則右大左小今則兩關浮弦尺脈小數而按之無力又非前比變端不一豈可同日而語哉今病已危險若再延誤措手不及矣為此時計宗啓玄子育陰存津以退內陷之熱合之仲聖少陽篇血海空虛邪陷膽腑之小柴胡合而成方以冀轉機不此之求恐肝風一動徑厥隨之又當如之何耶案定方成適前醫至即於方中加其茯神甚屬合宜方列於下七月二十四日定大生地五錢炒當歸一錢白芍一錢半炒柴胡一錢淡黃芩一錢半炒煨葛根一錢半花粉一錢半甘草五分麥門冬一錢半硃砂拌小青皮八分炮薑二分茯神二錢服後頭面遍體俱有微汗諸恙漸平問答明白斑消瀉停耳聾亦減且能飲粥些少大有轉機之徵也次日主人緣病勢轉輕俗情惜費乃不延余而仍邀前醫與書山同議前醫案云服昨藥微躁微汗斑退泄止神識漸清大有轉機之象仍宗竹亭先生法略為損益等語即豫昨方內去葛根炮薑青皮加丹皮川貝鉤藤鉤其餘悉照豫方末後書山加鮮荷葉一小個此二十六日書山會豫細述之是日延診書山用育陰存津法前醫加入人參白虎湯據述服後反覺躁擾不寧二十七日書山用阿膠黃連湯前醫至以為不然醫用玉女煎法服後書山云較前更重甚至昏沉不語主家從此停藥延至八月初七而逝誠可惜哉案吳師瞻內人濕腳氣症治驗吳師瞻內人腳氣症己巳正月二十日診脈右虛左弦肝脾兩虧濕熱下注兩足腫痛屈而不伸紫斑成朵證名濕腳氣古稱壅疾者是也宗東垣疏理肝脾是為上策屈而不能伸者病在筋伸而不能屈者病在骨腫而痛者為濕腳氣宜清熱利濕搜風攣縮枯細痛而不腫者名乾腳氣宜養血潤燥黃耆皮三錢焦冬朮二錢茅山術二錢炒茯苓三錢全當歸一錢半炙甘草八分懷牛膝二錢木瓜三錢小青皮一錢川黃柏一錢鹽水炒川木通一錢加杉木梢五錢外用鮮橘葉三十片杉木梢三兩煎湯淋洗足腿腫痛處服五劑兩足小腿腫痛十去六七皮起皺紋而少癢且能伸屈非前之拘攣可比紫斑亦退其大半矣原方去木通青皮加白芍五加皮再五劑而痊安案談禹範襟兄乃室産後腹痛誤作腸癰幾危談禹範襟兄乃室己卯五月産後惡露未盡纏綿兩月有餘小腹時痛血塊偏左偶發寒熱食後作脹脾土虧而肝木不舒防其腹大塊攻皆由産後失調耳況右關虛大左關弦急又顯有明徵耶西黨參三錢焦冬朮一錢半茯苓一錢半陳皮一錢當歸身一錢半廣木香八分白芍一錢半炒炙草七分女貞子三錢制香附二錢加陽春砂仁四分研細沖進藥五帖食飲增倍每次可吃飯兩小碗脹勢大減痛亦漸緩惟塊尚在此産後積血而成原不易去必待氣血充和方能漸消若不加意調治便為終身之纍復診原方去白芍香附加川芎益智仁等服後諸恙俱減因腹塊未消不時作痛病者性急輕信旁言疑生外症因延瘍科治醫竟作腸癰論用當歸桃仁元胡索五靈脂益母草膏輩佐攻伐破血之法不應又用平肝活血行氣之劑又不應復更瘍科用破氣泄肝