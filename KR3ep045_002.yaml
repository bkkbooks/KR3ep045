服後諸恙俱減三之一食欲漸進又復診方二月初一日西黨參三錢白扁豆三錢炒茯神二錢丹參三錢青蒿子一錢半叭噠杏三錢去皮尖歸身一錢川芎一錢款冬花二錢炙甘草六分加烏梅肉三分進藥後寒熱頭疼俱止惡露亦少其餘俱減又初二日方北沙參三錢山藥三錢炒款冬花三錢百合三錢薏苡仁三錢炒茯苓二錢白通草一錢陳皮八分黑蘇子一錢半炒歸身一錢加左牡蠣四錢煅塊服此汗止惡露停小便出時不覺其熱且長惟咳嗽未清大便三四日未解復診原方加柏子仁三錢進兩劑大便結糞色黑解後腹中松爽又初五日方西黨參三錢山藥三錢炒茯神二錢柏子仁三錢研炒熟地三錢阿膠三錢蛤粉炒百合三錢款冬花三錢炙甘草六分五味子三分研加紫衣胡桃肉一枚連鬲板進四劑咳嗽停痰亦易出諸恙向安繼以五味異功加山藥扁豆南棗金石斛女貞子輩脾肺並調兼養肝腎數劑而健案吳菊圃室人嘔痛作脹沉疴積歲治驗吳菊圃乃室年三十九歲素有肝胃氣發則脹痛嘔吐每發必有寒熱向來酷好濃茶朝夕不禁大便溏薄日三四次不一有教每日進干蓮肉三十粒服後大便漸結已服十有餘年每病發時仍脹痛且嘔平常食後不脹不疼邇年不喜飲茶口亦不幹惟食後大腹必脹脹則必欲臥臥則脹平而似痛痛在臍上胃脘中必待胃中左右橫衝自覺胃中之氣直上頭頂則胃中之氣漸鬆亦必著人拍打背心及頭額則漸爽快體常畏冷雖春末夏初亦須皮綿衣護身得暖則爽經水每多趲前色淡而少醫更數手投劑似效非效大率以滋補陰陽氣血為法病發時嘔痛畏寒則以桂枝芎歸茱萸沉香佐二陳湯等治之淹延數載沉疴未脫於道光癸未三月初八日甫問治於余方案列下細審病情素有肝胃氣迄今十有餘載發則脹痛交加而兼之嘔嘔屬陽明脹屬太陰知其脾胃之受纍於肝久矣夫土為萬物之母胃為水穀之海易曰至哉坤元萬物資土未有土不足而能生長萬物者今土被木乘脾胃愈憊以故食入即脹脹則欲臥臥則脹安豈知脾土從斯愈滯而愈壅食飲難運而難磨甚至水穀之精氣不能四布上下難以貫串精氣暗耗食飲日減肌體日瘦運化失職中滿之虞其能免乎閲諸君論治頗中肯窾而猶時止時作者想亦沉疴積歲蒂固根深而未能一時奏績也今證脈合參右脈細軟兼遲左脈沉小而弦種種見證皆脾陽不運肝木乘之亟宜益氣扶陽間佐以疏之運之和之溫之舉之降之而引導之俾坤元日旺中滿可免再為善後之謀庶幾無遺憾矣老子云萬物負陰而抱陽意自顯然先得我心之同矣豫豈上工敢治未病而未嘗不願學焉西黨參三錢於白朮一錢土炒熟附子八分青皮七分醋炙炙甘草八分大南棗三枚去核內填淡茱萸一分線扎雲茯苓一錢半加沉香末二分沖服一劑食後未脹亦未臥次日再進如前安妥惟覺其口乾欲飲幸大便不溏再劑口之欲飲漸減細審其情向之脾陽不運不無濕阻屢服他醫滋補膏滋等方脾土愈滯是以食後必脹今服餘溫中益氣之劑不脹不臥脾土有健運之機胃中之濕漸減故口中自覺其燥耳無足慮也又三月十一日方西黨參四錢於白朮一錢土炒淡乾薑五分炒茯神二錢熟附子四分炙甘草八分制香附二錢醋炒陳皮一錢淡茱萸二分砂仁二分沖天冬一錢去心是方益氣溫中佐以疏運俾脾陽得令肝木不致乘土且土旺金生木有所畏坤土益健矣而溫燥之品恐其僭上前方初進口乾喜飲豈無自也今加以天冬保肺清金致高原於清肅嘗按古方溫燥藥中必復滋陰保肺亦恐未得補陽之功先傷肺金陰氣爾豫於是方亦然進此六劑如前不脹不臥口亦不覺其干昨因食飲不節即有似脹之象次日即平於是觀之益信脾陽之不運耳三月十七日原方去茯神香附天冬加制首烏三錢杜仲三錢續斷一錢五分服七劑安妥如前即偶有腹脹之勢亦不欲臥而自平夜來頭足浮腫至早起身漸退之勢亦減半腰股牽引抽痛俱已惟身中常常畏冷綿皮衣不能離體證脈合參究屬脾陽不運衛氣不充八脈有虧經事每多趲前似屬血熱其實亦肝陰之不足耳復診換方用五味異功加制香附二錢良薑一錢木香五分生黃耆二錢淡茱萸三分砂仁末三分沖進五劑繼以後丸暫服一月再酌丸方西黨參三兩於白朮一兩半土炒制香附二兩良薑一兩鹿角霜二兩女貞子一兩半炙甘草一兩歸身一兩半雲茯苓一兩半廣木香一兩不經火上為細末用蒸餅打糊為丸如桐子大每服五錢清晨用陳皮泡湯送下是丸服畢如前不脹不臥夜來頭面足跗之浮亦退惟食多進或啖肉食等物胸腹即有脹滿之勢甚至脘中作痛胸疼徹背而致寒熱作嘔引動舊恙皆由於脹而至此不脹則無其事而脹亦由於多食則脹設少食則仍不脹也其所以不能多食者實緣脾陽之不能運也豫之所以首重在厚培坤元者近是朝以十全大補湯去川芎加四制香附紫石英新會皮作丸煉蜜丸如梧子大每服五錢清晨滾水送下服二十日飯後進六君子湯加木香炮薑山楂雞內金煎服十劑煎丸兩方服畢症仍如前不增不減頗妙又丸方六月初九日診大熟地三兩制首烏三兩歸身一兩半柏子仁二兩去油鹿角霜二兩焦冬朮一兩半蘄艾一兩半炙甘草一兩紫石英一兩半煅紅醋淬雲茯苓一兩半木香一兩半曬研四制香附二兩陳阿膠一兩半炒成珠菟絲子一兩半酒拌蒸按紫石英雖能暖子宮而石藥終燥只可暫用可也上為細末用西黨參六兩煎膏代蜜為丸如梧子大每服五錢清晨滾水送下平素食飲午前約吃飯一碗許夜間飲粥約兩碗服此丸後至申初還可再進飯碗許做兩次進較前增倍夜飲粥仍如前食後頗安舊恙並不一發經水仍趲前約二十日一至淋漓六七日而止服丸劑後大便漸結非日前之溏薄多解可較也又丸方七月二十九日診生黃耆二兩用防風一兩同泡同焙西黨參三兩焦冬朮二兩茯苓一兩半廣木香一兩半不經火炙甘草一兩大熟地四兩歸身一兩半鹿角霜二兩菟絲餅二兩女貞子二兩蜜炙白芍一兩半炒四制香附二兩上為細末煉白蜜為丸如梧桐子大每服五錢清晨滾水送下或建蓮湯送亦可服後食飲愈增仍如前毫不覺脹且不畏風怕冷向來不時骨節背腹腰股胯腿痠疼自服此丸並不一發經水亦漸調超前二三日精神健旺藥服頗宜十月初五日原方去木香女貞菟絲鹿角霜加熟附子一兩枸杞子三兩鹿角膠四兩照前丸服五錢清晨滾水送下服此與前丸俱頗對症月水有時應期食飲倍增而脘中毫無脹滿之意即是啖肉而腹內安妥如常並不腸滑便泄皆緣脾陽之能運耳此其所以奏績之捷也歟又道光甲申正月二十二日丸方西黨參四兩焦冬朮二兩雲茯苓一兩半歸身一兩半大熟地五兩鹿角膠四兩炒珠四制香附四兩白芍一兩半菟絲子二兩蒸炙甘草一兩杜仲三兩生薑汁拌炒續斷一兩半上為細末煉白蜜為丸如梧子大每服五錢清晨滾水送下此方即去冬十月初五之方去黃耆附子杞子加菟絲杜仲續斷是也進是丸安妥如前又丸方四月二十一日診沉疴積歲歷有年矣豫以厚培坤元之法脾土從斯日健面色紅潤肌體漸豐諸證向安而左腰胯不時痠痛赤帶綿綿肝腎之陰未復再以脾腎雙補之法取脾土足而肺金旺肝木有監製之師腎水充而相火平肝陰得滋養之力內以蜜丸外以水疊使先化者歸肺脾後化者入肝腎耳此又脾腎同治之妙法也大熟地四兩鹿角霜三兩淮山藥三兩炒歸身一兩半馬料豆二兩鹽水拌炒白芍一兩半炒四制香附四兩川芎一兩破故紙二兩胡桃肉一兩半同搗豬脊髓兩條去外硬皮蒸熟同搗豬腰子一對要一隻豬身取下者劈開去內白膜用青鹽三錢小茴香末四錢杜仲末五錢三味和勻填入腰子內線扎量用陳酒河水各半煮爛去內藥末入藥同搗上藥十一味照方制焙蒸搗用煉白蜜為丸如小緑豆大曬令極干外用西黨參三兩於術二兩土炒茯苓一兩半廣木香一兩半勿炒炙甘草一兩新會皮一兩半六味各焙曬研極細用荷葉煎湯灑疊為衣曬乾每服五錢清晨滾水送下服後腰痛大減帶濁亦稀因其頗合又進一料又半服至交冬腰痛已平食飲如常睡臥安寧又九月三十日診膏滋方生黃耆五兩西黨參六兩玉竹八兩山藥三兩炒鹿角霜二兩鹿角膠二兩炒珠茯神二兩歸身一兩半炙甘草一兩半菟絲子二兩蒸南棗五兩杜仲二兩鹽水炒制首烏五兩制香附三兩四制陳皮一兩半上藥十五味如常法煎膏煎至滴水不散用磁罐收貯懸挂井中一夜以退火氣每早用六七錢如膏厚少和滾水隔湯燉溫服橘餅湯過口此膏服後腰脊背板之疼刺不松及常常畏冷之勢俱止服至乙酉正月望前方畢諸證全愈調經丸方乙酉正月二十六日診平素經水約二十日一至自服余丸劑後約趲前二三日亦有時應期大熟地五兩淮山藥三兩炒歸身二兩白芍一兩半炒女貞子三兩澤蘭葉二兩川芎一兩半茯苓二兩人乳拌蒸生香附三兩四制紫石英二兩煅紅醋淬芡實三兩炒陳皮一兩五錢西黨參四兩炙甘草一兩牡蠣三兩煅上為細末煉白蜜為丸如梧桐子大每服五錢清晨滾水送下此丸服畢頗妥停藥四月至八月十七日復診方記後吳菊圃室人丸方服前乙酉正月草六日所定丸方諸恙向安已後停藥四月日來背脊三椎覺疼身中偶爾怕冷連日便溏日三兩次經水趲前二三日未至前數日覺左腿牽疼其餘無他苦肌體豐潤飲食睡臥如常八月十七日診西黨參四兩生黃耆二兩防風一兩同焙於白朮二兩土炒杜仲三兩鹽水炒菟絲子二兩酒蒸補骨脂二兩酒拌炒大熟地四兩炒茯苓一兩半當歸身一兩半酒洗四制香附二兩米泔鹽水醋酒分四處制炙甘草一兩芡實三兩炒豬脊骨五寸自大椎起要囫圇者陰陽瓦上炙熱用生白蜜調去油乳香沒藥各三錢塗於骨上炙之候豬脊骨炙至焦黃色帶脆為度上十三味為細末煉白蜜為丸如桐子大每服五錢清晨滾水送下丙戌春正延診據述此丸服畢前恙俱平案黃聖濤內人素有肝胃氣臍下作痛治驗黃聖濤內人年四十六歲癸未六月素有肝胃氣忽於月之初旬胸中跳動臍下作痛脘腹不爽醫者作濕溫治以四苓平胃散輩消息之病益增繼用氣血並調中加入八味丸同進以為汗多防脫舉家倉皇因邀余治審其證臍下痛劇難言必得著人以手重按其腹痛始少緩而氣逆亦少平診其脈左關弦細尺脈遲澀此衝脈為病並足少陰之經逆氣上衝乃下焦虛寒為患痛甚防厥勿藐視之準繩云肝虛則胸痛引背脅肝實則胸痛不得轉側喜太息肝著則常欲蹈壓其胸又云肝著其人常欲踏其胸上蹈音道踐也踏音談入聲踐也著音注著也水煮熟地五錢紫石英四錢生白芍一錢生左牡蠣六錢上肉桂七分去粗皮金鈴子一錢五分加淡茱萸三分進藥未幾即覺胸中之氣下降腹中大響頃之臍下之痛頓減七八可以坐立口能言語夜間安睡至平旦方醒醒後進粥盞許大便向來燥結今已六七日未解復診原方去金鈴子加制首烏三錢柏子仁三錢炮薑三分服一帖便解痛平再帖而痊案木川吳師瞻內人脾虛作脹腰腿漫腫治驗木川吳師瞻內人癸未六月十六日診脈右虛軟無力左關小弦食後作脹覺疼腰腿漫腫經停兩月肝血虧而脾土更虧土虛金弱又兼咳嗆防有中滿之變淮山藥三錢炒苡仁五錢炒白扁豆三錢炒茯苓二錢炙甘草八分木香七分叭噠杏三錢去皮尖炒百合四錢廣皮白六分加雞內金一錢半炙進五劑腹脹咳嗆俱大減尚有嘈雜之勢天癸已行復診原方去叭噠廣白加木瓜白芍益智仁黑大棗加飴糖五錢沖再五劑脹咳俱平夜來腰腿腫退後以六君子湯加乾薑木香調治而安案文學劉小峰室人嘔吐有年不時舉發治法文學劉小峰乃室年逾三旬嘔吐有年不時舉發今於癸未五月二十一日嘔吐至今二旬未已嘔出不酸不苦不甜腹亦不痛更醫屢屢藥進無功且湯藥到口中即嘔飲粥有不吐之時北人素喜食麵又喜水果生冷右脈沉小乏力左關虛弦陽明胃土久傷肝木乘土犯胃既進湯藥不合莫若暫投丸劑待嘔吐漸平再為善後之謀越鞠丸每服二錢早晚各一服服時用淡鹽湯泡炒出汗開口川椒五粒以此湯送丸案豫妹腦漏治法並詳明奇驗妙方豫妹素多肝鬱胸中常悶木火上炎或目珠紅腫或有時鼻衄或偶爾舌痛已有年矣今於道光癸未春忽左鼻出臭水或清或濃或如豆腐腦者其臭不堪始為鼻淵繼成腦漏病成而前之鼻洪目腫舌痛等並不一發合證脈而詳審之皆肝火鬱而沖肺肺竅開於鼻木火侮金故見於左鼻也肝與膽為表裡經云膽移熱於腦發為鼻淵甚則漏下如豆腐腦者此之謂腦漏也雖分兩名其理一也豫於斯而得一探本窮源之治庶幾無遺蘊矣不落水豬腦一具用辛夷末五錢白芷末三錢同豬腦拌和放磁盆內再以陳酒二兩拌勻置飯鍋上蒸熟聽用廣藿香葉三兩用豬膽汁浸一日夜取出曬乾焙研極細北沙參三兩焦冬朮二兩百合三兩茯苓二兩炙甘草一兩半薄荷頭八錢歸身一兩白芍一兩炒北柴胡五錢黑山梔一兩半苡仁三兩炒上藥十二味為細末再入制熟豬腦搗和用神麯打糊為丸每服五錢食後滾水送下服此一料左鼻臭水及如豆腐腦者俱止因停藥多日又漸有鼻水並無臭氣索性停劑數月間日漸水多味仍帶臭以後如豆腐腦者益多夜睡則清黃水常有起身後頭一舉則腦中之濁水由喉舌而出午後如腐腦者尤甚囑其再將前丸合服自爾平可而執意不聽必欲速愈方快於甲申九秋豫妹倩王履安訪得祝由之術以為數日建績往返數里服符水半月毫無功效而尚不思服藥豫亦無如之何矣後於冬十月適有鮑君名嘉蔭者官居浙省玉泉場告假來吳延余診治一日偶談及向有鼻淵治之罔效後遇故鄉鄭公用六味地黃湯加沙苑蒺藜服之覺臭水少減適又遇一友亦得此疾多年有教伊單服沙苑蒺藜一味煎湯作茶飲服之全愈因亦用此煎服日三二次無間月餘而鼻淵全瘳矣永不再發誠平淡中之神奇也豫聞之甚快因將是方囑豫妹服之日服三四盞不可間斷如言服之不一月而腦漏臭水內如腐腦之成塊者俱十去其五六矣再如前服兩月而症霍然矣鄰按蒺藜子乃腎肝肺三經之藥本草云補腎可以代茶其味甚平而奏效甚捷神妙莫測非海上仙方不能有此效速也案吳聲振孫女患濕毒瘡之治驗吳聲振孫女癸未九月初旬忽患濕毒瘡數日內由手臂而至兩里股及肩胛內俱生㾦㿔甚癢抓無寧刻惟手腕臂有如小豆膿窠狀抓之出水浸淫皮膚夜睡肌熱且癢天癸如常食飲不減內服祛風涼血解毒定癢之法外用煮熟雞子黃十枚放銅杓內慢火熬油去渣調川黃柏末一錢用棉裘蘸藥搽之如細小癢極者可以蘸擦兩日後延診據述內服外擦夜來癢止㾦㿔漸自焦平內有幾窠大如豆者尚未平卻亦不癢膿亦無內服方仍以前方出入外仍照前法搽之五日而痊案戴松林母泄瀉腸紅腹中疼脹治驗戴松林母年六十歲於嘉慶乙亥七月望日診泄瀉有年長夏尤甚食後膨脹兼之腸紅醫因腸紅概以涼血清火泄瀉益盛延綿季夏日瀉數十次夜間少減食飲維艱腹疼且脹家居吳江買舟就治於余診其脈脾脈細軟無力當調坤土以免中滿白扁豆三錢炒苡仁四錢炒淮山藥三錢炒煨木香八分焦冬朮一錢半茯苓一錢半益智仁一錢半白芍藥一錢半炒防風一錢半甘草八分炙加煨薑三片服五帖泄瀉頓止腸紅亦平因路遙舟中不便停劑半月食飲不節復又泄瀉較前甚輕復來求治即於原方內去白芍防風加陳皮乾薑再進五六劑瀉止食增精神健旺治病用藥不在乎奇對證便是良方數年之病未半月而全瘳矣快哉後於七月二十九日特求丸方調理方用四君子湯加山藥扁豆益智仁煨木香白芍歸身作丸用炒神麯打糊為丸每服五錢清晨滾水送下案吳春泉女經行飲冷結塊如杯誤藥成癰治驗吳春泉女年十七歲於五月下旬經水將至喜飲冷茶一碗當即經止次日結塊如杯伏於脅下覺痛延瘍科治以為串痰流注服破氣攻塊藥六帖塊反增大疼痛不已更延內科斷為經水停蓄防成中滿初劑用溫經活絡通瘀法塊頓移於臍旁其痛如前次帖用兩頭尖二錢旁注不可為法佐青蔥韭子輩服後則痛如刀割三日前曾發寒熱今已止病勢日重於六月初八日復求治於余細按其腹痛塊左臍旁之左大如五寸盆堅硬不散塊之中央痛如雞啄手不可近小便如常大便不爽舌絳無苔口乾喜飲脈象細小證脈詳審始為冷茶阻遏經水以致經停成塊理應溫通一二劑而塊消痛止矣瘍醫不明此理謬指為流注妄治誤人無怪病反增重後之內科論意頗是而用藥又不中的故塊頓移下而又痛極難忍也自豫觀之有弄假成真之象大凡癰疽之生皆因營氣之不和逆於肉理而成者今經水為寒所凝成塊且痛其為營氣之不和可知瘍醫誤投攻伐內科妄用猛劑俾氣血交阻經絡凝滯痛如雞啄肚癰已成所謂弄假成真者此也第脈未數疾膿未成也亟宜調氣和營繼以內托排膿使其膿出而不至有內攻之憂是又在乎用藥者初八日方列下制香附三錢歸尾一錢半元胡索一錢半炒桃仁三錢研赤芍藥一錢半炒甘草八分小青皮八分烏藥一錢半上肉桂二分研沖服後塊痛如前中間一點如龍眼大者按之漸惟此最痛乃癰之頭也脈象浮數有潰膿之再議托裡排膿之法初九日方列下生黃耆三錢西黨參三錢當歸二錢大貝母一錢半川山甲一錢炙甘草節一錢角刺一錢赤芍藥一錢半金銀花二錢廣陳皮一錢半花粉一錢半服一劑痛緩癰勢漸軟再劑膿熟用咬頭膏貼上次日癰膿約有兩中碗從此痛止食增繼以氣血並調少佐清火解毒數帖肌生肉平而愈案豫內人下脘感寒腹疼泄瀉治驗豫內人每夜四鼓時臍上微痛即瀉已六七日矣脈右沉遲知其受寒停食服後方一劑是夜腹痛便泄頓止藥之對證效如影響神麯三錢炒枳殼一錢半炒淡乾薑一錢半炒煨木香一錢烏藥一錢半生甘草六分案先慈咳嗽喉鳴朝重暮輕治驗豫先母年七十一歲素有咳嗽症每交冬後漸發今夏間不時咳嗽月餘來愈甚薄痰盈盂喉中如水雞聲朝重暮輕風邪客肺輕疏為宜前胡一錢半杏仁二錢黑蘇子二錢炒萊蔔子二錢炒橘白一錢甘草五分海浮石三錢服兩帖痰嗽俱大減喉鳴亦平再兩帖而安後於十一月十九日咳嗽上氣當服疏散藥不應先大人以固表法亦不應仍用前方去萊蔔子甘草加製半夏旋覆花絹包各一錢半一劑減半再劑而痊案豫內人小腹痛甚微寒治驗豫內人年二十六歲嘉慶甲子二月初五日忽小腹痛甚微有畏寒服後方一劑痛止桂枝一錢防風一錢半淡乾薑一錢炒赤茯苓一錢半芍藥一錢炒炙草六分臺烏藥一錢半鹽水炒加青蔥一大枝又四月初二日方經行半月餘忽多忽少色帶紫泡四日前自覺內熱晚間尤甚診其脈關尺沉中兼數左稍大於右舌色純紅無苔口乾不渴知其陰虛內熱用後方一劑夜間不熱惟覺疲倦懶於言動食飲稍減方用四物湯加炮薑一錢續斷三錢陳皮一錢五分後以西黨參丹參炙鱉甲各三錢側柏葉四錢白芍一錢五分炒黑蒲黃一錢炙甘草八分當歸炮薑各六分服一劑次日即覺精神爽快惟血未停再劑至午後漸止又一劑而全愈矣案黃埭周氏女寒熱兩月治驗黃埭周氏女年二十四歲寒熱兩月脈象虛弦速宜退熱久恐骨蒸之慮淡豆豉三錢青蒿子一錢半柴胡八分甘草六分製半夏一錢半草蔻仁五分炒黃芩一錢半赤苓一錢五分加蔥白三枚服兩帖夜間稍寒熱勢退其大半復診原方去柴胡半夏加陳皮生穀芽再三帖而痊案胡氏女頭疼畏寒治驗胡氏女年十八歲丙寅冬頭疼畏寒舌絳寒束於外火鬱於內宜以疏散法蔓荊子一錢半荊芥穗一錢半防風一錢半桔梗八分廣藿香一錢半廣橘紅八分神麯三錢炒甘草七分加蔥白兩枚服兩帖全愈案白楊灣顧氏婦感寒停食腹痛泄瀉治驗白楊灣顧氏年二十九歲冬月感寒停食身中畏冷腹痛泄瀉病經四日宜於溫散防風一錢半桂枝一錢荊芥穗一錢半六神麯三錢炒炮薑八分烏藥一錢半廣木香一錢赤茯苓一錢半甘草六分加蔥二枝服兩帖痛減七八瀉僅一二原方去桂枝加枳殼再劑而安案李氏婦腰痛如折兼之身熱治驗李氏婦腰痛如折兼之身熱服後方一帖而愈荊芥穗一錢半秦艽一錢半淡豆豉三錢藿香一錢半穭豆皮三錢獨活一錢半熟半夏一錢半神麯三錢炒新會皮一錢半加煨薑三片蔥一大枝案豫內人盛夏炎熱慣用冷水灌汗發熱治驗豫內人於嘉慶乙丑閏六月二十六日因暑天炎熱慣用冷水灌汗頭疼皮膚外微熱骨節痠痛內熱尤甚有汗口渴舌色淡紅知其暑熱內蘊用後方一劑全愈香薷一錢半秦艽二錢白扁豆三錢炒麥門冬一錢半去心甘草五分案薛松濤妻左脅塊痛發則脹瀉不寧治驗薛松濤妻左脅塊痛有年不時舉發發則食飲不貪得食即脹脹則瀉肝脾兩虧木邪乘土以逍遙散出入之當歸二錢白芍一錢半炒元胡索一錢半醋炒白扁豆五錢炒苡仁五錢炒茯苓一錢半炙甘草八分薄荷一錢二分柴胡六分加生薑五分外用尉法陳香櫞一兩半青蔥二兩皂角三挺大者生薑一兩半四味煎尉痛處冷則易如法用之服藥後塊平痛止再劑食進脹消而瀉停矣案周氏女風疹屢發骨節疼痛風化為熱治驗周女年十三歲嘉慶己卯五月七日舟中不避風邪風疹屢發發則內熱口乾骨節疼痛脈左浮數風化為熱治在清散防風一錢半鉤藤鉤五錢後入黑山梔一錢半秦艽一錢半連翹一錢半去心炒荊芥一錢半生甘草六分加鮮浮萍草五錢洗淨服兩帖而安案王松濤女腹痛便溏寒食凝滯治驗王松濤女五歲嘉慶癸亥三月八日忽然腹痛即欲大便每解不爽日三五次此寒食凝滯溫疏為宜廣木香四分酒磨沖大腹絨一錢半山楂肉三錢炒枳殼一錢半炒烏藥一錢五穀蟲一錢炙生甘草四分加煨生薑五分服一劑大便未解腹亦不痛再劑全愈終
